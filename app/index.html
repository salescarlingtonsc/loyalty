/* ---------- staff performance ---------- */
async function staffPerfPage(drillId){
  if(drillId) return staffPerfDrill(drillId);
  const today=new Date(),d30=new Date(Date.now()-29*864e5);
  const iso=d=>d.toISOString().slice(0,10);
  M().innerHTML=`<div class="topbar"><div><h1>Staff performance</h1><p class="muted small">Sales, revenue and commission per staff member — click a row to see the individual sales behind it</p></div>
    <div class="range">
      <button class="qbtn" data-d="7">7d</button><button class="qbtn act" data-d="30">30d</button><button class="qbtn" data-d="90">90d</button>
      <input type="date" id="pf" value="${iso(d30)}"> <span class="muted">→</span> <input type="date" id="pt" value="${iso(today)}">
      <button class="btn sm" id="papply">Apply</button>
    </div></div>
    <p class="muted small" style="margin:-8px 0 14px">Commission uses the rate frozen at the time of each sale — changing a staff member's or service's % today never changes past figures.</p>
    <div class="card" id="pbody"><div class="empty">Loading…</div></div>`;
  document.querySelectorAll('.qbtn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.qbtn').forEach(x=>x.classList.remove('act'));b.classList.add('act');
    $('pf').value=iso(new Date(Date.now()-(b.dataset.d-1)*864e5));$('pt').value=iso(new Date());load();
  });
  $('papply').onclick=()=>load();
  async function load(){
    const from=$('pf').value,to=$('pt').value+'T23:59:59';
    const [{data:sc,error},{data:st}]=await Promise.all([
      sb.from('sale_commission').select('*').eq('business_id',S.biz.id).gte('occurred_at',from).lte('occurred_at',to),
      sb.from('staff').select('id,full_name').eq('business_id',S.biz.id).order('full_name')
    ]);
    if(error){
      if(String(error.message||'').toLowerCase().includes('permission')){
        $('pbody').innerHTML=`<div class="empty"><div class="big">🔒</div>Ask the owner for finance access to see staff performance.</div>`;return
      }
      return fail(error);
    }
    const names=Object.fromEntries((st||[]).map(s=>[s.id,s.full_name||'Team member']));
    const agg={};
    (st||[]).forEach(s=>{agg[s.id]={count:0,revenue:0,commission:0}});
    (sc||[]).forEach(r=>{
      const key=r.staff_id||'__unattributed';
      if(!agg[key]) agg[key]={count:0,revenue:0,commission:0};
      agg[key].count++;agg[key].revenue+=r.amount_cents;agg[key].commission+=(r.commission_cents||0);
    });
    const keys=Object.keys(agg).sort((a,b)=>{
      if(a==='__unattributed') return 1; if(b==='__unattributed') return -1;
      return (names[a]||'').localeCompare(names[b]||'');
    });
    if(!keys.length){$('pbody').innerHTML=`<div class="empty"><div class="big">🧑‍💼</div>No staff or sales in this range yet.</div>`;return}
    const totals=keys.reduce((t,k)=>({count:t.count+agg[k].count,revenue:t.revenue+agg[k].revenue,commission:t.commission+agg[k].commission}),{count:0,revenue:0,commission:0});
    $('pbody').innerHTML=`<table><tr><th>Staff</th><th>Sales</th><th>Revenue attributed</th><th>Commission earned</th></tr>
      ${keys.map(k=>`<tr class="click" onclick="location.hash='#/staffperf/${k==='__unattributed'?'unattributed':k}'"><td><b>${k==='__unattributed'?'Unattributed':esc(names[k]||'Team member')}</b></td>
        <td>${agg[k].count}</td><td>${money(agg[k].revenue)}</td><td>${money(agg[k].commission)}</td></tr>`).join('')}
      <tr><td><b>Total</b></td><td><b>${totals.count}</b></td><td><b>${money(totals.revenue)}</b></td><td><b>${money(totals.commission)}</b></td></tr></table>`;
  }
  load();
}

/* Drill-down: one staff member's individual sales — customer clickable to their profile.
   Money + frozen rate come from sale_commission (per-sale snapshot, never today's rates);
   client_id isn't on that view, so a second sales fetch supplies it, joined client-side to
   a clients fetch for names ("Walk-in" for null client_id, matching the list page). */
async function staffPerfDrill(idParam){
  const isUnattr=idParam==='unattributed';
  const today=new Date(),d30=new Date(Date.now()-29*864e5);
  const iso=d=>d.toISOString().slice(0,10);
  let staffName='Unattributed';
  if(!isUnattr){
    const {data:s}=await sb.from('staff').select('full_name').eq('id',idParam).limit(1);
    staffName=s?.[0]?.full_name||'Team member';
  }
  M().innerHTML=`<div class="topbar"><div><h1>${esc(staffName)}</h1><p class="muted small">Individual sales in range</p></div>
    <a class="btn ghost sm" href="#/staffperf">← Staff performance</a></div>
    <div class="range">
      <button class="qbtn" data-d="7">7d</button><button class="qbtn act" data-d="30">30d</button><button class="qbtn" data-d="90">90d</button>
      <input type="date" id="df" value="${iso(d30)}"> <span class="muted">→</span> <input type="date" id="dt" value="${iso(today)}">
      <button class="btn sm" id="dapply">Apply</button>
    </div>
    <div class="card" style="margin-top:14px" id="dbody"><div class="empty">Loading…</div></div>`;
  document.querySelectorAll('.qbtn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.qbtn').forEach(x=>x.classList.remove('act'));b.classList.add('act');
    $('df').value=iso(new Date(Date.now()-(b.dataset.d-1)*864e5));$('dt').value=iso(new Date());load();
  });
  $('dapply').onclick=()=>load();
  async function load(){
    const from=$('df').value,to=$('dt').value+'T23:59:59';
    let q=sb.from('sale_commission').select('*').eq('business_id',S.biz.id).gte('occurred_at',from).lte('occurred_at',to);
    q=isUnattr?q.is('staff_id',null):q.eq('staff_id',idParam);
    const {data:sc,error}=await q;
    if(error){
      if(String(error.message||'').toLowerCase().includes('permission')){
        $('dbody').innerHTML=`<div class="empty"><div class="big">🔒</div>Ask the owner for finance access to see this.</div>`;return
      }
      return fail(error);
    }
    if(!sc||!sc.length){$('dbody').innerHTML=`<div class="empty"><div class="big">🧾</div>No sales for this staff member in range.</div>`;return}
    const ids=sc.map(r=>r.sale_id);
    const {data:sl}=await sb.from('sales').select('id,client_id').in('id',ids);
    const clientBySale=Object.fromEntries((sl||[]).map(s=>[s.id,s.client_id]));
    const clientIds=[...new Set((sl||[]).map(s=>s.client_id).filter(Boolean))];
    let clientName={};
    if(clientIds.length){
      const {data:cl}=await sb.from('clients').select('id,full_name').in('id',clientIds);
      clientName=Object.fromEntries((cl||[]).map(c=>[c.id,c.full_name]));
    }
    const rows=[...sc].sort((a,b)=>b.occurred_at.localeCompare(a.occurred_at));
    $('dbody').innerHTML=`<table><tr><th>Date</th><th>Customer</th><th>Kind</th><th>Amount</th><th>Commission</th></tr>
      ${rows.map(r=>{
        const cid=clientBySale[r.sale_id];
        const cust=cid?`<a href="#/client/${cid}" style="color:#D06A2E"><b>${esc(clientName[cid]||'Customer')}</b></a>`:'<span class="muted">Walk-in</span>';
        return `<tr><td>${sgt(r.occurred_at)}</td><td>${cust}</td><td>${esc((r.kind||'').replace('_',' '))}</td><td>${money(r.amount_cents)}</td><td>${money(r.commission_cents||0)}</td></tr>`;
      }).join('')}</table>`;
  }
  load();
}

/* ---------- daily report ---------- */
async function dailyReportPage(){
  const todayIso=(()=>{const d=new Date(new Date().getTime()+8*3600000);return d.toISOString().slice(0,10)})();
  M().innerHTML=`<div class="topbar"><div><h1>Daily report</h1><p class="muted small">Everyone served today — particulars, service, revenue, staff — in one view</p></div>
    <div class="row no-print"><input type="date" id="drDate" value="${todayIso}"><span id="branchWrap"></span><button class="btn sm" id="drGo">Generate</button>
    <button class="btn ghost sm" id="drCsv">Export CSV</button><button class="btn ghost sm" id="drPrint">Print</button></div></div>
    <div id="drBody"><div class="card"><div class="empty">Pick a date and Generate.</div></div></div>`;
  $('drPrint').onclick=()=>window.print();
  let lastRows=[];
  $('drGo').onclick=load;
  $('drCsv').onclick=()=>{
    if(!lastRows.length) return toast('Generate a report first');
    const reversalByOriginal=Object.fromEntries(lastRows.filter(r=>r.reversal_of).map(r=>[r.reversal_of,r]));
    const rows=[['time','customer','phone','service_or_kind','relationship','original_sale_id','reversal_sale_id','signed_amount_additive','relationship_net_original_only','staff'],
      ...lastRows.map(r=>{const rev=reversalByOriginal[r.id];return [sgt(r.occurred_at),r.custName,r.custPhone,r.label,r.reversal_of?'reversal':'original',r.reversal_of||r.id,r.reversal_of?r.id:(rev?.id||''),(r.amount_cents/100).toFixed(2),r.reversal_of?'':((r.amount_cents+(rev?.amount_cents||0))/100).toFixed(2),r.staffName]})];
    const blob=new Blob([csvRows(rows)],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='frenly-daily-report-'+$('drDate').value+'.csv';a.click();
    toast('CSV downloaded');
  };
  async function load(){
    const day=$('drDate').value;
    const from=sgDateBoundary(day),toExclusive=sgDateBoundary(day,1);
    let sl;
    try{
      sl=await fetchAllRows(()=>{
        let q=sb.from('sales')
          .select('*, clients(full_name,phone), staff(full_name), appointments(services!appointments_service_id_fkey(name))',{count:'exact'})
          .eq('business_id',S.biz.id).gte('occurred_at',from).lt('occurred_at',toExclusive);
        if(selectedBranchId)q=q.eq('branch_id',selectedBranchId);
        return q.order('occurred_at').order('id');
      });
    }catch(error){return fail(error)}
    const rows=(sl||[]).map(s=>({
      occurred_at:s.occurred_at,
      custName:s.clients?.full_name||'Walk-in',custPhone:s.clients?.phone||'',
      label:s.appointments?.services?.name||(s.kind||'').replace('_',' '),
      amount_cents:s.amount_cents,staffName:s.staff?.full_name||'Unattributed',
      id:s.id,reversal_of:s.reversal_of,reversal_reason:s.reversal_reason,
      kind:s.kind,counts_as_revenue:s.counts_as_revenue,counts_as_visit:s.counts_as_visit,client_id:s.client_id}));
    lastRows=rows;
    const revenue=rows.filter(r=>r.counts_as_revenue).reduce((a,r)=>a+r.amount_cents,0);
    const visits=rows.filter(r=>r.counts_as_visit).reduce((n,r)=>n+(r.reversal_of?-1:1),0);
    const uniq=new Set(rows.filter(r=>r.client_id).map(r=>r.client_id)).size;
    const giftCash=rows.filter(r=>r.kind==='gift_card').reduce((a,r)=>a+r.amount_cents,0);
    $('drBody').innerHTML=`<div class="kpis">
        <div class="card kpi"><div class="l">Revenue</div><div class="v">${money(revenue)}</div></div>
        <div class="card kpi"><div class="l">Visits</div><div class="v">${visits}</div></div>
        <div class="card kpi"><div class="l">Unique customers</div><div class="v">${uniq}</div></div>
        <div class="card kpi"><div class="l">Gift card cash collected</div><div class="v">${money(giftCash)}</div></div>
      </div>
      <div class="charts"><div class="card"><b>Revenue by staff</b><div class="chart-frame"><canvas id="drC1"></canvas></div></div>
        <div class="card"><b>Revenue by kind</b><div class="chart-frame"><canvas id="drC2"></canvas></div></div></div>
      <div class="card" style="margin-top:16px"><b>All sales — ${esc(day)}</b><p class="muted small" style="margin-top:4px">Amounts are signed: reversal rows reduce revenue and visits while originals remain visible.</p>
        ${rows.length?`<table style="margin-top:8px"><tr><th>Time</th><th>Customer</th><th>Phone</th><th>Service/kind</th><th>Relationship</th><th>Signed amount</th><th>Staff</th></tr>
          ${rows.map(r=>`<tr><td>${sgt(r.occurred_at).slice(11)}</td><td><b>${esc(r.custName)}</b></td><td class="small">${esc(r.custPhone)}</td>
            <td>${esc(r.label)}</td><td>${r.reversal_of?`<span class="pill no">reversal of ${esc(r.reversal_of)}</span>`:'<span class="pill ok">original</span>'}</td><td>${money(r.amount_cents)}</td><td class="muted">${esc(r.staffName)}</td></tr>`).join('')}</table>`
        :`<div class="empty"><div class="big">📋</div>No sales recorded on this day.</div>`}</div>`;
    if(!rows.length) return;
    const byStaff={};rows.filter(r=>r.counts_as_revenue).forEach(r=>{byStaff[r.staffName]=(byStaff[r.staffName]||0)+r.amount_cents});
    const byKind={};rows.filter(r=>r.counts_as_revenue).forEach(r=>{byKind[r.kind]=(byKind[r.kind]||0)+r.amount_cents});
    const coral='#FF6B5E',amber='#FFB86B';
    const C=(id,cfg)=>S.charts.push(new Chart($(id),cfg));
    C('drC1',{type:'bar',data:{labels:Object.keys(byStaff),datasets:[{data:Object.values(byStaff).map(v=>v/100),backgroundColor:amber,borderRadius:8}]},options:{plugins:{legend:{display:false}}}});
    C('drC2',{type:'doughnut',data:{labels:Object.keys(byKind).map(k=>k.replace('_',' ')),datasets:[{data:Object.values(byKind).map(v=>v/100),backgroundColor:[coral,amber,'#8B7BC7','#2FA36B','#E8E4DD']}]},options:{plugins:{legend:{position:'bottom'}}}});
  }
  refreshBranchFilter(load);
}

/* ---------- expenses ---------- */
async function expensesPage(){
  M().innerHTML=`<div class="topbar"><div><h1>Expenses</h1><p class="muted small">Track what goes out — feeds the P&L</p></div></div>
    <div class="card" id="expGate"><div class="empty">Loading…</div></div>`;
  /* expenses RLS (expenses_all) and get_revenue_summary both gate on the same view_finance
     permission — probe with get_revenue_summary (cheap, today only) since a plain SELECT on
     expenses fails silently under RLS (returns zero rows, not an error) and can't tell
     "no expenses yet" apart from "no permission". */
  const todayIso=new Date().toISOString().slice(0,10);
  const {error:permErr}=await sb.rpc('get_revenue_summary',{p_business:S.biz.id,p_from:todayIso,p_to:todayIso,p_branch:null});
  if(permErr){
    $('expGate').innerHTML=`<div class="empty"><div class="big">🔒</div>Ask the owner for finance access to see expenses.</div>`;return;
  }
  M().innerHTML=`<div class="topbar"><div><h1>Expenses</h1><p class="muted small">Track what goes out — feeds the P&L</p></div></div>
    <div class="split"><div class="card"><b>Add expense</b>
      <label>Category</label><input id="exCat" placeholder="e.g. Supplies, Rent, Utilities">
      <label>Supplier (optional)</label><input id="exSup">
      <label>Description</label><input id="exDesc">
      <label>Amount (SGD)</label><input id="exAmt" type="number" min="0" step="0.01">
      <label>Date</label><input id="exDate" type="date" value="${todayIso}">
      <div style="margin-top:16px"><button class="btn" id="exAdd">Add expense</button></div></div>
    <div class="card"><b>Recent expenses</b><div id="exList" style="margin-top:8px"><p class="muted small">Loading…</p></div></div></div>`;
  $('exAdd').onclick=async()=>{
    const category=$('exCat').value.trim(),amt=Math.round(parseFloat($('exAmt').value||'0')*100);
    if(category.length<2) return toast('Category required');
    if(!(amt>0)) return toast('Enter an amount');
    const {error}=await sb.from('expenses').insert({business_id:S.biz.id,category,
      supplier:$('exSup').value||null,description:$('exDesc').value||null,
      amount_cents:amt,currency:'SGD',occurred_on:$('exDate').value||todayIso});
    if(error) return fail(error);
    toast('Expense added');$('exCat').value='';$('exSup').value='';$('exDesc').value='';$('exAmt').value='';load();
  };
  async function load(){
    const {data:ex,error}=await sb.from('expenses').select('*').eq('business_id',S.biz.id).order('occurred_on',{ascending:false}).limit(200);
    if(error) return fail(error);
    $('exList').innerHTML=(ex&&ex.length)?`<table><tr><th>Date</th><th>Category</th><th>Supplier</th><th>Description</th><th>Amount</th><th>Status</th><th></th></tr>
      ${ex.map(e=>`<tr class="${e.voided_at?'strike':''}"><td>${e.occurred_on}</td><td>${esc(e.category)}</td>
        <td class="small">${esc(e.supplier||'—')}</td><td class="small">${esc(e.description||'—')}</td>
        <td>${money(e.amount_cents)}</td><td>${e.voided_at?'<span class="pill no">voided</span>':'<span class="pill ok">active</span>'}</td>
        <td>${e.voided_at?'':`<button class="btn ghost sm" onclick="voidExp('${e.id}')">Void</button>`}</td></tr>`).join('')}</table>`
      :`<div class="empty"><div class="big">💸</div>No expenses recorded yet.</div>`;
  }
  window.voidExp=async(id)=>{
    if(!confirm('Void this expense? It stays on record, struck through, and drops out of the P&L.')) return;
    const {error}=await sb.rpc('set_expense_void',{p_business:S.biz.id,p_expense:id,p_void:true});
    if(error) return fail(error);
    toast('Expense voided');load();
  };
  load();
}

  $('plCsv').onclick=()=>{

    const rows=[['section','key','amount'],
      ...Object.entries(lastCat).map(([k,v])=>['expenses_by_category',k,(v/100).toFixed(2)]),

  async function load(){

    const {data:sum,error}=await sb.rpc('get_revenue_summary',{p_business:S.biz.id,p_from:from,p_to:to,p_branch:selectedBranchId});

    const {data:ex,error:e2}=await exQ;
    if(e2) return fail(e2);
    const cash=sum.revenue_cash_cents||0, accrual=sum.revenue_accrual_cents||0, expTotal=sum.expenses_cents||0;
    const net=cash-expTotal;
    const byCat={};(ex||[]).forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+e.amount_cents});
    lastCat=byCat;
    /* month-by-month only when the range spans >1 calendar month, per the brief */
    const spanMonths=(new Date(to).getFullYear()-new Date(from).getFullYear())*12+(new Date(to).getMonth()-new Date(from).getMonth());
    let monthly={};
    if(spanMonths>=1){
      let slQ=sb.from('sales').select('amount_cents,occurred_at,counts_as_revenue').eq('business_id',S.biz.id)
        .eq('counts_as_revenue',true).gte('occurred_at',from).lte('occurred_at',to+'T23:59:59');
      if(selectedBranchId) slQ=slQ.eq('branch_id',selectedBranchId);
      const {data:sl}=await slQ;
      (sl||[]).forEach(s=>{const k=s.occurred_at.slice(0,7);(monthly[k]=monthly[k]||{rev:0,exp:0}).rev+=s.amount_cents});
      (ex||[]).forEach(e=>{const k=e.occurred_on.slice(0,7);(monthly[k]=monthly[k]||{rev:0,exp:0}).exp+=e.amount_cents});
    }
    lastMonthly=monthly;
    const mk=Object.keys(monthly).sort();
    $('plBody').innerHTML=`<div class="kpis">
        <div class="card kpi"><div class="l">Revenue (money collected)</div><div class="v">${money(cash)}</div></div>
        <div class="card kpi"><div class="l">Revenue (accrual — earned incl. unpaid)</div><div class="v">${money(accrual)}</div></div>
        <div class="card kpi"><div class="l">Total expenses</div><div class="v">${money(expTotal)}</div></div>
        <div class="card kpi"><div class="l">Net</div><div class="v" style="color:${net>=0?'#2FA36B':'#C0392B'}">${net>=0?'+':'−'}${money(Math.abs(net))}</div></div>
      </div>
      <p class="muted small" style="margin:12px 0">Gift card sales are cash collected, not revenue — they appear when redeemed and spent.</p>
      <div class="charts"><div class="card"><b>Expenses by category</b><div class="chart-frame"><canvas id="plC1"></canvas></div></div>
        <div class="card"><b>${mk.length?'Revenue vs expenses by month':'Add a wider range to see month-by-month'}</b>${mk.length?'<div class="chart-frame"><canvas id="plC2"></canvas></div>':''}</div></div>`;
    const coral='#FF6B5E',amber='#FFB86B',green='#2FA36B';
    const C=(id,cfg)=>S.charts.push(new Chart($(id),cfg));
    const catKeys=Object.keys(byCat);
    if(catKeys.length) C('plC1',{type:'doughnut',data:{labels:catKeys,datasets:[{data:catKeys.map(k=>byCat[k]/100),backgroundColor:[coral,amber,'#8B7BC7',green,'#E8E4DD']}]},options:{plugins:{legend:{position:'bottom'}}}});
    if(mk.length) C('plC2',{type:'bar',data:{labels:mk,datasets:[
      {label:'Revenue',data:mk.map(k=>monthly[k].rev/100),backgroundColor:green,borderRadius:6},
      {label:'Expenses',data:mk.map(k=>monthly[k].exp/100),backgroundColor:coral,borderRadius:6}]},
      options:{plugins:{legend:{position:'bottom'}}}});
  }
  refreshBranchFilter(load);
}

      <label for="bi">Industry</label><select id="bi">${Object.entries(INDUSTRIES).map(([k,v])=>`<option value="${k}" ${S.biz.industry===k?'selected':''}>${v.em} ${v.label}</option>`).join('')}</select>
      <label for="bc">Brand colour (used on your portal)</label><input id="bc" type="color" value="${esc(S.biz.brand_color||'#FF6B5E')}" style="height:44px;padding:4px">
      <label for="bp">Booking policy (shown on your portal)</label><textarea id="bp" rows="2" placeholder="e.g. Please arrive 5 minutes early. 24h notice for cancellations.">${esc(S.biz.booking_policy||'')}</textarea>
      <p class="field-label">Portal link (share with customers)</p>
      <p class="small portal-link-row"><a class="portal-link" target="_blank" rel="noopener noreferrer" href="${location.origin}${location.pathname}#/b/${S.biz.slug}">${location.origin}${location.pathname}#/b/${S.biz.slug}</a></p>
      <div class="settings-save-row"><button class="btn" id="bsave">Save workspace</button><span class="settings-scope">Saves this workspace's name, industry, brand colour and booking policy.</span></div></div></section>
    <section class="settings-panel" id="setpanel-modules" role="tabpanel" aria-labelledby="settab-modules" tabindex="-1" hidden><div class="split"><div class="card"><b>Modules</b><p class="muted small" style="margin:6px 0 4px">Toggle what ${esc(S.biz.name)} uses. Dashboard is always on.</p>
      ${mods.map(m=>`<label class="settings-choice">
        <input type="checkbox" style="width:auto;margin-top:2px" data-m="${m}" ${(S.biz.enabled_modules||[]).includes(m)?'checked':''}>
        <span>${CUI.icon(MODULES[m][0],{size:16})} ${MODULES[m][1]}${dependencyText(m)?`<span class="muted small" style="display:block;font-weight:400">Uses ${esc(dependencyText(m))}</span>`:''}</span></label>`).join('')}
      <div class="settings-save-row"><button class="btn" id="msave">Save modules</button><span class="settings-scope">Turns modules on or off for the whole workspace.</span></div></div>
      <div class="card" id="billingWrap"><div class="empty">Loading…</div></div></div></section>
    <section class="settings-panel" id="setpanel-team" role="tabpanel" aria-labelledby="settab-team" tabindex="-1" hidden>
    <div class="card settings-team-card"><div class="row"><b>Team</b><span class="spacer"></span>${importBtn('staff')}</div><p class="muted small" style="margin:6px 0 10px">Five roles: owner · manager · staff · front desk · bookkeeper. Invite by code — teammate signs up, enters the code, and lands in this workspace. The owner always sees every module and can't be restricted.</p>

      <div id="tplList"><p class="muted small">Loading…</p></div>
    </div>
    <div id="commissionWrap"></div></section>
    <section class="settings-panel" id="setpanel-data" role="tabpanel" aria-labelledby="settab-data" tabindex="-1" hidden><div class="split"><div class="card"><b>Import customers (CSV)</b>
      <p class="muted small" id="csvHelp" style="margin:6px 0 10px">Bring your list from a spreadsheet or another system. Columns recognised: <b>name</b> (required), phone, email, gender, birth_date (YYYY-MM-DD).</p>
      <label for="csvf">Customer CSV file</label>
      <input type="file" id="csvf" accept=".csv,text/csv" aria-describedby="csvHelp">
      <div id="csvprev" style="margin-top:12px"></div></div>
      <div class="card" id="signupWrap"><div class="empty">Loading…</div></div></div></section>
    <section class="settings-panel" id="setpanel-fields" role="tabpanel" aria-labelledby="settab-fields" tabindex="-1" hidden>
    <div class="card" style="margin-top:16px"><b>Customer fields</b>
      <p class="muted small" style="margin:6px 0 12px">Add only information your business genuinely needs. Sensitive fields stay owner-only and never appear in the customer wallet.</p>
      <div id="cfList">${(fieldDefs||[]).length?(fieldDefs||[]).map(f=>`<div class="row" style="padding:7px 0;border-bottom:1px solid var(--line)"><span><b>${esc(f.label)}</b><span class="muted small"> · ${esc(f.value_type)} · ${esc(f.classification)}</span></span><span class="spacer"></span><span class="pill ${f.active?'on':'off'}">${f.active?'active':'retired'}</span>${f.active?`<button class="btn ghost sm cfRetire" data-id="${f.id}">Retire</button>`:''}</div>`).join(''):'<p class="muted small">No custom customer fields yet.</p>'}</div>
      <details><summary>Add a customer field</summary>
        <div class="field-grid"><div><label for="cfLabel">Field name</label><input id="cfLabel" placeholder="e.g. Preferred therapist"></div>
        <div><label for="cfType">Answer type</label><select id="cfType"><option value="text">Short text</option><option value="number">Number</option><option value="date">Date</option><option value="boolean">Yes / no</option><option value="select">Choose from a list</option></select></div>
        <div><label for="cfClass">Data classification</label><select id="cfClass"><option value="operational">Operational</option><option value="personal">Personal</option><option value="sensitive">Sensitive — owner only</option></select></div>
        <div><label for="cfOptions">Choices (list type only)</label><input id="cfOptions" placeholder="e.g. Alice, Ben, No preference"></div></div>
        <button class="btn sm" id="cfAdd" style="margin-top:12px">Add field</button>
      </details></div>
    <div class="card" style="margin-top:16px"><b>Tenant isolation</b>
      <p class="muted small" style="margin-top:6px;line-height:1.7">Every business on Frenly has its own isolated data space. Row-level security is enforced by the database on every table — your customers, sales, and programs are invisible to every other business, and theirs to you. Your team only ever sees this workspace.</p></div>
    </section></div>`;
  /* Tabbed sections (ARIA tablist): every field stays in the DOM at once — only the active
     panel is shown — so each Save button keeps reading exactly the inputs it always did, no
     save semantics change. Roving tabindex + arrow/Home/End keys make the tabs keyboard-complete.
     settingsActiveTab persists the choice across the in-place re-renders that add/retire trigger. */
  const settingsTabs=[...document.querySelectorAll('.settings-tab')];
  const settingsPanels=Object.fromEntries([...document.querySelectorAll('.settings-panel')].map(p=>[p.id,p]));
  function selectSettingsTab(tab,focus){
    settingsTabs.forEach(t=>{
      const on=t===tab;
      t.setAttribute('aria-selected',String(on));t.tabIndex=on?0:-1;
      const panel=settingsPanels['setpanel-'+t.dataset.settab];
      if(panel)panel.hidden=!on;
    });
    settingsActiveTab=tab.dataset.settab;
    if(focus)tab.focus();
  }
  settingsTabs.forEach((tab,i)=>{
    tab.onclick=()=>selectSettingsTab(tab,false);
    tab.onkeydown=e=>{
      let ni=null;
      if(e.key==='ArrowRight'||e.key==='ArrowDown')ni=(i+1)%settingsTabs.length;
      else if(e.key==='ArrowLeft'||e.key==='ArrowUp')ni=(i-1+settingsTabs.length)%settingsTabs.length;
      else if(e.key==='Home')ni=0;else if(e.key==='End')ni=settingsTabs.length-1;
      if(ni===null)return;
      e.preventDefault();selectSettingsTab(settingsTabs[ni],true);
    };
  });
  const initialSettingsTab=document.getElementById('settab-'+settingsActiveTab);
  if(initialSettingsTab&&initialSettingsTab!==settingsTabs[0])selectSettingsTab(initialSettingsTab,false);
  $('bsave').onclick=async()=>{
    const {error}=await sb.from('businesses').update({name:$('bn').value.trim(),industry:$('bi').value,
      brand_color:$('bc').value,booking_policy:$('bp').value||null}).eq('id',S.biz.id);
    if(error)return fail(error);
    Object.assign(S.biz,{name:$('bn').value.trim(),industry:$('bi').value,brand_color:$('bc').value,booking_policy:$('bp').value||null});
    toast('Saved');route();
  };
  $('msave').onclick=async()=>{
    const on=['dashboard',...[...document.querySelectorAll('[data-m]')].filter(x=>x.checked).map(x=>x.dataset.m)];
    const {data,error}=await sb.rpc('set_business_modules',{p_business:S.biz.id,p_modules:on});
    if(error)return fail(error);
    S.biz.enabled_modules=data.modules;
    const added=(data.added_dependencies||[]).filter(m=>m!=='dashboard').map(m=>MODULES[m]?.[1]||m);
    toast(added.length?`Modules updated. Kept ${added.join(', ')} on because another module uses it.`:'Modules updated');
    route();
  };
  $('cfAdd').onclick=async()=>{
    const label=$('cfLabel').value.trim(),valueType=$('cfType').value;
    if(label.length<2)return toast('Give the field a clear name');
    const fieldKey=label.toLowerCase().normalize('NFKD').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,64);
    if(fieldKey.length<2)return toast('Use a field name with at least two letters');
    let options=[];
    if(valueType==='select'){
      options=$('cfOptions').value.split(',').map(x=>x.trim()).filter(Boolean);
      if(options.length<2){
        return toast('List fields need at least two choices');
      }
    }
    const {error}=await sb.rpc('create_client_field_definition',{p_business:S.biz.id,
      p_field_key:fieldKey,p_label:label,p_value_type:valueType,p_classification:$('cfClass').value,
      p_options:options.map((optionLabel,i)=>({option_key:`option_${i+1}`,option_label:optionLabel}))});
    if(error)return fail(error);
    toast('Customer field added');settingsPage();
  };
  document.querySelectorAll('.cfRetire').forEach(b=>b.onclick=async()=>{
    const {error}=await sb.from('client_field_definitions').update({active:false}).eq('id',b.dataset.id).eq('business_id',S.biz.id);
    if(error)return fail(error);toast('Field retired; existing answers remain in history');settingsPage();
  });
  /* Changing the industry re-applies that industry's preset modules (same rules as onboarding),
     so the owner starts from a sensible set instead of an empty/stale one. It only ticks the
     checkboxes — nothing is saved until "Save modules" — so the selection stays fully optional
     and editable. (Bug fix: previously the preset only ran at signup, never on an industry change.) */
  $('bi').onchange=()=>{
    const ind=$('bi').value, preset=(INDUSTRIES[ind]&&INDUSTRIES[ind].mods)||[];
    document.querySelectorAll('[data-m]').forEach(x=>{ x.checked=preset.includes(x.dataset.m); });
    toast(`Modules preset for ${INDUSTRIES[ind]?.label||ind} — adjust if needed, then Save modules`);
  };
  /* team + per-staff module permissions (v14) */
  let openModId=null;   // staff.id whose "Modules" panel is expanded, or null
  const panelSel={};    // staff.id -> {mode:'all'|'selected', mods:string[]} — in-progress
                         // panel edits kept in JS state (not read back from the DOM) so they
                         // survive the loadTeam() redraws other actions trigger.
  let templates=[];     // module_templates rows for this business
  let myStaffId=null;   // this signed-in user's own staff.id

  async function loadTemplates(){
    const {data,error}=await sb.from('module_templates').select('*').eq('business_id',S.biz.id).order('name');
    if(error) return fail(error);
    templates=data||[];
  }
  function templateOptionsHtml(){
    return templates.length?templates.map(t=>`<option value="${t.id}">${esc(t.name)} (${(t.modules||[]).length})</option>`).join('')
      :'<option value="">— no templates saved —</option>';
  }
  function initPanelSel(s){
    if(!panelSel[s.id]) panelSel[s.id]=(s.modules===null)?{mode:'all',mods:[]}:{mode:'selected',mods:[...s.modules]};
  }
  function modChecklistHtml(staffId,sel){
    const avail=Object.keys(MODULES).filter(m=>m!=='settings'&&m!=='setup'&&(S.biz.enabled_modules||[]).includes(m));
    if(!avail.length) return '<p class="muted small">No modules enabled for this business yet.</p>';
    return avail.map(m=>`<label class="settings-choice" style="font-size:13.5px">
      <input type="checkbox" style="width:auto" ${sel.mods.includes(m)?'checked':''} onchange="toggleModCheck('${staffId}','${m}',this.checked)"> ${CUI.icon(MODULES[m][0],{size:16})} ${MODULES[m][1]}</label>`).join('');
  }
  function modPanelHtml(s){
    initPanelSel(s);

    return `<div class="card" style="margin-top:8px;background:#FBFAF7">
      <p class="muted small" style="margin-bottom:8px">What can <b style="color:var(--ink)">${esc(s.full_name||'this teammate')}</b> see?</p>
      <label class="settings-choice" style="font-size:13.5px;margin-bottom:6px">

        <input type="radio" name="modmode-${s.id}" style="width:auto" ${sel.mode==='selected'?'checked':''} onchange="setModMode('${s.id}','selected')"> Only selected</label>
      <div id="modgrid-${s.id}" style="display:${sel.mode==='selected'?'grid':'none'};grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:2px;margin:10px 0;padding:10px;background:#fff;border:1px solid var(--line);border-radius:10px">
        ${modChecklistHtml(s.id,sel)}
      </div>
      <div class="row" style="margin-top:6px"><button class="btn sm" onclick="saveStaffModules('${s.id}')">Save</button>
      <button class="btn ghost sm" onclick="toggleModPanel('${s.id}')">Close</button></div>
      <hr style="border:none;border-top:1px solid var(--line);margin:16px 0">
      <p class="muted small" style="margin-bottom:6px">Save this set as a reusable template:</p>
      <div class="row"><input id="tplName-${s.id}" placeholder="e.g. Barista" style="max-width:160px">
        <button class="btn ghost sm" onclick="saveModTemplate('${s.id}')">Save as template</button></div>
      <p class="muted small" style="margin:12px 0 6px">Or apply a saved template to ${esc((s.full_name||'them').split(' ')[0])}:</p>
      <div class="row"><select id="tplPick-${s.id}" style="max-width:200px">${templateOptionsHtml()}</select>
        <button class="btn ghost sm" onclick="applyModTemplate('${s.id}')">Apply</button></div>
    </div>`;
  }
  async function loadTeam(){
    const [{data:st},{data:inv}]=await Promise.all([
      sb.from('staff').select('*').eq('business_id',S.biz.id).order('created_at'),
      sb.from('staff_invites').select('*').eq('business_id',S.biz.id).eq('status','pending').order('created_at',{ascending:false})]);
    myStaffId=(st||[]).find(x=>x.user_id===S.user?.id)?.id||null;
    $('team').innerHTML=(st&&st.length)?st.map(s=>{
      const modPill=s.role==='owner'?'':(s.modules===null?'<span class="pill on">All modules</span>':`<span class="pill off">${s.modules.length} module${s.modules.length===1?'':'s'}</span>`);
      return `<div style="padding:6px 0;border-bottom:1px solid var(--line)">
        <div class="row">
          <b>${esc(s.full_name||'Member')}</b><span class="pill ${s.role==='owner'?'ok':'off'}">${esc(ROLE_LABELS[s.role]||s.role)}</span>
          ${modPill}<span class="spacer"></span>
          ${s.role!=='owner'?`<button class="btn ghost sm" onclick="toggleModPanel('${s.id}')">Modules</button>
          <select onchange="chRole('${s.id}',this.value)" style="max-width:140px;padding:6px 10px">
            ${['manager','staff','frontdesk','bookkeeper'].map(r=>`<option value="${r}" ${s.role===r?'selected':''}>${ROLE_LABELS[r]}</option>`).join('')}</select>
          <button class="btn ghost sm" onclick="rmStaff('${s.id}')">Remove</button>`:`<span class="muted small">Always sees everything — can't be restricted</span>`}
        </div>
        ${(s.role!=='owner'&&openModId===s.id)?modPanelHtml(s):''}
      </div>`;
    }).join(''):'<p class="muted small">No teammates yet — invite one below.</p>';
    $('invites').innerHTML=(inv&&inv.length)?inv.map(i=>`<div class="row small" style="padding:5px 0">
      <span>🎟️ <b style="letter-spacing:.1em">${esc(i.code)}</b> · ${esc(ROLE_LABELS[i.role]||i.role)} ${i.email?'· '+esc(i.email):''}</span><span class="spacer"></span>
      <button class="btn ghost sm" onclick="cpInv('${i.code}')">Copy</button>
      <button class="btn ghost sm" onclick="rvInv('${i.id}')">Revoke</button></div>`).join('')
      :'<p class="muted small">No pending invites.</p>';
    $('tplList').innerHTML=templates.length?templates.map(t=>`<div class="row small" style="padding:4px 0">
      <span>📋 <b>${esc(t.name)}</b></span><span class="spacer"></span><span class="muted small">${(t.modules||[]).length} module${(t.modules||[]).length===1?'':'s'}</span></div>`).join('')
      :'<p class="muted small">No templates saved yet.</p>';
  }
  window.chRole=async(id,role)=>{const {error}=await sb.from('staff').update({role}).eq('id',id);if(error)return fail(error);toast('Role updated');};
  window.rmStaff=async(id)=>{const {error}=await sb.from('staff').delete().eq('id',id);if(error)return fail(error);toast('Removed');loadTeam();};
  window.cpInv=(c)=>{navigator.clipboard.writeText(c);toast('Code copied — send it to your teammate')};
  window.rvInv=async(id)=>{await sb.from('staff_invites').update({status:'revoked'}).eq('id',id);toast('Invite revoked');loadTeam();};
  window.toggleModPanel=(staffId)=>{openModId=(openModId===staffId)?null:staffId;loadTeam();};
  window.toggleModCheck=(staffId,mod,checked)=>{
    const sel=panelSel[staffId];if(!sel)return;
    sel.mods=checked?[...new Set([...sel.mods,mod])]:sel.mods.filter(x=>x!==mod);

          p_email:rec.email,p_birth_date:rec.birth_date,p_gender:rec.gender,
          p_marketing_consent:false,p_referrer_code:null,p_source:'settings CSV import'});

    };

  loadCommissionConfig();

const COUNTRY_CODES=[['+65','🇸🇬'],['+60','🇲🇾'],['+62','🇮🇩'],['+852','🇭🇰'],['+61','🇦🇺'],
  ['+44','🇬🇧'],['+1','🇺🇸'],['+91','🇮🇳'],['+86','🇨🇳'],['+63','🇵🇭'],['+66','🇹🇭'],['+84','🇻🇳']];
function ccSelectHtml(id){
  return `<select id="${id}" style="max-width:110px">${COUNTRY_CODES.map(([c,f])=>
    `<option value="${c}" ${c==='+65'?'selected':''}>${f} ${c}</option>`).join('')}</select>`;
}
/* Combines a country-code <select> with a free-typed number input into one E.164-ish string,
   stripping spaces/dashes. Forgiving of a customer who types their own leading '+' (trusted
   as-is, so we never double-prefix) or who re-types the selected country's digits at the
   front of the number field. */
function buildPhone(ccId,phoneId){
  const cc=$(ccId).value;
  let digits=($(phoneId).value||'').trim().replace(/[\s\-]/g,'');
  if(!digits) return '';
  if(digits.startsWith('+')) return digits;
  const ccDigits=cc.replace('+','');
  if(digits.startsWith(ccDigits)) digits=digits.slice(ccDigits.length);
  return cc+digits;
}

/* ---------- public customer portal ---------- */
function contrastSafeBrandColor(value){
  const fallback='#C24135';
  if(!/^#[0-9A-Fa-f]{6}$/.test(value||''))return fallback;
  const channels=[1,3,5].map(offset=>parseInt(value.slice(offset,offset+2),16)/255)
    .map(channel=>channel<=.04045?channel/12.92:((channel+.055)/1.055)**2.4);
  const luminance=.2126*channels[0]+.7152*channels[1]+.0722*channels[2];
  return 1.05/(luminance+.05)>=4.5?value.toUpperCase():fallback;
}

      <h2 tabindex="-1">Who would you like?</h2>
      <p class="pf-hint">Pick a team member, or let us assign the best available.</p>
      <div class="pf-choice" role="group" aria-label="Choose a team member">
        <button class="svc${teamPref==='any'?' sel':''}" type="button" aria-pressed="${teamPref==='any'}" data-team="any"><span><b>Anyone available</b> <span class="muted small">· recommended</span></span></button>
        <button class="svc${teamPref==='named'?' sel':''}" type="button" aria-pressed="${teamPref==='named'}" data-team="named"><span><b>Someone specific</b> <span class="muted small">· tell us who</span></span></button>
      </div>
      <div id="teamNamedWrap"${teamPref==='named'?'':' hidden'}><label for="teamName">Team member's name</label><input id="teamName" autocomplete="off" placeholder="e.g. Jamie"></div>
      <div class="pf-nav"><button class="btn ghost pf-back" type="button" data-back>Back</button><button class="btn" id="next-team" type="button">Continue</button></div>
    </section>`;
    const timeStep=`<section class="pf-step" data-step="time" hidden>
      <h2 tabindex="-1">Pick a date & time</h2>
      <p class="pf-hint">${biz.booking_auto_confirm?'We confirm instantly when a spot is free.':'Choose your preferred slot — the team confirms your exact time, usually within a few hours.'}</p>
      <label for="pt">Preferred date & time</label><input id="pt" type="datetime-local" min="${nowSgtLocal}">
      <div class="pf-inlineerr" id="err-time" role="alert"></div>
      <div class="pf-nav"><button class="btn ghost pf-back" type="button" data-back>Back</button><button class="btn" id="next-time" type="button">Continue</button></div>
    </section>`;
    const detailsStep=`<section class="pf-step" data-step="details" hidden>
      <h2 tabindex="-1">Your details</h2>
      <p class="pf-hint">Almost done — just so we can confirm your booking.</p>
      <div class="pf-summary" id="pfSummary"></div>
      <div class="split"><div><label for="pn">Your name *</label><input id="pn" autocomplete="name"></div>
        <div><label for="pp">Phone</label><div class="row">${ccSelectHtml('ppcc')}<input id="pp" type="tel" autocomplete="tel" placeholder="9123 4567"></div></div></div>
      <div class="split"><div><label for="pe">Email</label><input id="pe" type="email" autocomplete="email"></div><div><label for="ps">${usesTables?'Party size':'Guests'}</label><input id="ps" type="number" min="1" max="50" value="${usesTables?2:1}"></div></div>
      <p class="muted small" style="margin-top:6px">Add a phone or email so we can confirm your booking.</p>
      <label for="pnotes">Notes</label><textarea id="pnotes" rows="2" placeholder="Anything we should know?"></textarea>
      <label for="pconsent" style="display:flex;align-items:center;gap:8px;margin-top:16px;cursor:pointer;color:var(--ink);font-weight:500;font-size:14px">
        <input type="checkbox" id="pconsent" style="width:auto"> <span>Send me offers and updates</span></label>
      <p class="muted small" style="margin-top:2px">Occasional news and offers from ${esc(biz.name)} — you can opt out anytime.</p>
      <div class="challenge"><div id="bookingTurnstile"></div>
        <p class="challenge-status" id="bookingTurnstileStatus" role="status" aria-live="polite">Loading security check…</p>
        <button class="challenge-retry" id="bookingTurnstileRetry" type="button" hidden>Retry security check</button>
      </div>
      <div id="perr"></div>
      <div class="pf-nav"><button class="btn ghost pf-back" type="button" data-back>Back</button><button class="btn" id="psend" disabled>Confirm booking</button></div>
      ${biz.booking_policy?`<p class="muted small" style="margin-top:12px;text-align:center">${esc(biz.booking_policy)}</p>`:''}
    </section>`;
    const stepBody={service:serviceStep,table:tableStep,team:teamStep,time:timeStep,details:detailsStep};
    root.innerHTML=`<div class="portal" style="--coral:${bc};--grad:linear-gradient(100deg,${bc},${bc})">
      <div class="head"><h1 style="font-size:2rem">${esc(biz.name)}</h1><p class="muted">Book with us — it takes 30 seconds.</p></div>
      <div id="portalSignedInSlot"></div>
      <div class="card" id="bookingFormCard">
        ${progressHtml}
        ${steps.map(k=>stepBody[k]).join('')}
      </div>
      <div class="card" style="margin-top:16px"><b>Manage an existing booking</b>
        <p class="muted small" style="margin:6px 0 10px">Use the private management code issued with your booking. Your phone number is never used as a password.</p>
        <div class="row"><input id="mtoken" autocomplete="off" placeholder="Booking management code" value="${esc(manageToken)}"><button class="btn ghost sm" id="mfind">Open booking</button></div>
        <div id="merr"></div>
        <div id="mlist" style="margin-top:12px"></div>
      </div>${legalLinks()}</div>`;
    const buildSummary=()=>{
      const el=$('pfSummary');if(!el)return;
      const s=svcObj();
      const rows=[['Service', s?esc(s.name):'General visit']];
      if(s)rows.push(['Duration & price',`${s.duration_min} min · ${esc(currency)} ${(s.price_cents/100).toFixed(2)}`]);
      if(usesTables)rows.push(['Table', selTable?esc((tables.find(t=>t.table_type_id===selTable)||{}).name||'Selected'):'Any available']);
      else rows.push(['Team member',(teamPref==='named'&&staffName())?esc(staffName()):'Anyone available']);
      rows.push(['When',esc(fmtPicked($('pt')?.value))]);
      if(biz.booking_policy)rows.push(['Good to know',esc(biz.booking_policy)]);
      el.innerHTML=`<dl>${rows.map(([k,v])=>`<dt>${k}</dt><dd>${v}</dd>`).join('')}</dl>`;
    };
    const mountBookingTurnstile=()=>{
      if(turnstileMounted)return;
      turnstileMounted=true;
      const challengeGeneration=++bookingChallengeGeneration;
      bookingTurnstileToken='';bookingTurnstileControl=null;
      mountTurnstile(biz.turnstile_site_key,{container:'bookingTurnstile',status:'bookingTurnstileStatus',retry:'bookingTurnstileRetry',action:'public_booking',
        onToken:(token)=>{if(challengeGeneration!==bookingChallengeGeneration)return;bookingTurnstileToken=token;if($('psend'))$('psend').disabled=!token}})
        .then(control=>{if(challengeGeneration===bookingChallengeGeneration)bookingTurnstileControl=control});
    };
    const showStep=(idx)=>{
      stepIdx=Math.max(0,Math.min(idx,steps.length-1));
      const key=steps[stepIdx];
      root.querySelectorAll('.pf-step').forEach(el=>{el.hidden=el.dataset.step!==key;});
      root.querySelectorAll('#pfProgress li').forEach((li,i)=>{
        li.classList.toggle('current',i===stepIdx);
        li.classList.toggle('done',i<stepIdx);
        if(i===stepIdx)li.setAttribute('aria-current','step');else li.removeAttribute('aria-current');
      });
      if(key==='details'){buildSummary();mountBookingTurnstile();}
      const stepEl=root.querySelector(`.pf-step[data-step="${key}"]`);
      const heading=stepEl?.querySelector('h2');
      if(heading)requestAnimationFrame(()=>heading.focus({preventScroll:false}));
      CUI.announce(`Step ${stepIdx+1} of ${steps.length}: ${stepMeta[key].label}`);
    };
    const setChoice=(selector,el)=>root.querySelectorAll(selector).forEach(b=>{const on=b===el;b.classList.toggle('sel',on);b.setAttribute('aria-pressed',String(on));});
    root.querySelectorAll('[data-svc]').forEach(el=>el.onclick=()=>{selSvc=el.dataset.svc||null;serviceChosen=true;setChoice('[data-svc]',el);const e=$('err-service');if(e)e.textContent='';});
    root.querySelectorAll('[data-tbl]').forEach(el=>el.onclick=()=>{selTable=el.dataset.tbl||null;setChoice('[data-tbl]',el);});
    root.querySelectorAll('[data-team]').forEach(el=>el.onclick=()=>{teamPref=el.dataset.team;setChoice('[data-team]',el);const wrap=$('teamNamedWrap');if(wrap)wrap.hidden=teamPref!=='named';if(teamPref==='named')requestAnimationFrame(()=>$('teamName')?.focus());});
    root.querySelectorAll('[data-back]').forEach(el=>el.onclick=()=>showStep(stepIdx-1));
    if($('next-service'))$('next-service').onclick=()=>{if(hasServices&&!serviceChosen){$('err-service').textContent='Please choose a service, or “Just a reservation”.';CUI.announce('Please choose a service',{assertive:true});return;}showStep(stepIdx+1);};
    if($('next-table'))$('next-table').onclick=()=>showStep(stepIdx+1);
    if($('next-team'))$('next-team').onclick=()=>showStep(stepIdx+1);
    if($('next-time'))$('next-time').onclick=()=>{if(!$('pt').value){$('err-time').textContent='Please pick a date and time.';CUI.announce('Please pick a date and time',{assertive:true});return;}showStep(stepIdx+1);};
    $('psend').onclick=async()=>{
      if(!bookingTurnstileToken) return;
      const name=($('pn').value||'').trim();
      const rawPhone=($('pp').value||'').trim();
      const email=($('pe').value||'').trim();
      if(name.length<2){$('perr').innerHTML=`<div class="err">Please enter your name.</div>`;$('pn').focus();return;}
      if(!rawPhone&&!email){$('perr').innerHTML=`<div class="err">Add a phone number or email so we can confirm.</div>`;$('pp').focus();return;}
      $('perr').innerHTML='';$('psend').disabled=true;
      let notesFinal=($('pnotes').value||'').trim();
      if(!usesTables&&teamPref==='named'&&staffName())notesFinal=(notesFinal?notesFinal+' — ':'')+`Preferred team member: ${staffName()}`;
      notesFinal=notesFinal?notesFinal.slice(0,1000):null;
      const bookingPayload={
        slug,name,email:email||null,
        phone:rawPhone?buildPhone('ppcc','pp'):null,service:selSvc,
        party:parseInt($('ps').value||'1'),preferred:sgIso($('pt').value),
        notes:notesFinal,table_type:usesTables?selTable:null,
        consent:$('pconsent').checked};
      const nextBookingKey=JSON.stringify(bookingPayload);
      if(!bookingSubmissionId||bookingSubmissionKey!==nextBookingKey){
        bookingSubmissionId=crypto.randomUUID();bookingSubmissionKey=nextBookingKey;
      }
      let bookRes;
      try{bookRes=await publicGateway('public-booking',{body:{...bookingPayload,submission_id:bookingSubmissionId,
        turnstile_token:bookingTurnstileToken}})}
      catch(error){$('perr').innerHTML=`<div class="err">${esc(error.message)}</div>`;bookingTurnstileControl?.reset();return}
      const msgs={
        confirmed:{em:'🎉',title:"You're booked!",body:`${esc(biz.name)} has confirmed your booking.`,next:"We've saved your booking — no further action needed."},
        pending:{em:'🎉',title:'Request sent!',body:`${esc(biz.name)} has your booking request and will confirm shortly.`,next:'The team reviews your request and confirms personally — you\'ll hear back soon.'},
        waitlisted:{em:'⏳',title:"You're on the waitlist",body:`${esc(biz.name)} is fully booked for that time — we'll be in touch as soon as a spot opens up.`,next:"We'll message you the moment a spot opens up."},
        rejected:{em:'😔',title:'Fully booked',body:`Sorry, ${esc(biz.name)} is fully booked for that — try another table or time.`,next:'Try another table or time — nothing was booked.'}
      };
      const m=msgs[bookRes&&bookRes.status]||msgs.pending;
      manageToken=bookRes.manage_token||'';
      const manageUrl=`${location.origin}${location.pathname}#/b/${encodeURIComponent(slug)}?manage=${encodeURIComponent(manageToken)}`;
      const bookingFormCard=$('bookingFormCard');
      if(!bookingFormCard)return;
      bookingTurnstileControl?.destroy();bookingTurnstileControl=null;
      bookingFormCard.innerHTML=`<div class="empty"><div class="big">${m.em}</div><h2 tabindex="-1" style="margin-bottom:8px">${esc(m.title)}</h2>
        <p class="muted">${m.body}</p>
        <p class="small" style="margin-top:10px"><b>What happens next:</b> ${m.next}</p>${manageToken?`<p class="small" style="margin-top:14px">Keep this private link to manage the booking:</p>
        <p class="small" style="margin-top:6px;word-break:break-all"><a href="${esc(manageUrl)}" style="color:#D06A2E;text-decoration:underline">${esc(manageUrl)}</a></p>
        <button class="btn ghost sm" id="copyManage" style="margin-top:12px">Copy private link</button>`:''}</div>`;
      CUI.announce(`${m.title} ${m.body}`,{assertive:true});
      requestAnimationFrame(()=>bookingFormCard.querySelector('h2')?.focus());
      if($('copyManage')) $('copyManage').onclick=async()=>{await navigator.clipboard.writeText(manageUrl);toast('Private link copied')};
    };
    $('mfind').onclick=async()=>{
      manageToken=($('mtoken').value||'').trim();
      if(!manageToken){$('merr').innerHTML='<div class="err">Enter your booking management code.</div>';return}
      $('merr').innerHTML='';$('mfind').disabled=true;
      let data;
      try{data=await publicGateway('manage-booking',{body:{action:'lookup',token:manageToken}})}
      catch(error){$('merr').innerHTML=`<div class="err">${esc(error.message)}</div>`;$('mfind').disabled=false;return}
      $('mfind').disabled=false;
      const when=data.starts_at||data.preferred_at;
      $('mlist').innerHTML=`<div style="padding:10px 0"><b>${when?new Date(when).toLocaleString():'Time pending'}</b>
        <div class="muted small">${esc(data.service_name||'general visit')} · ${esc(data.status||'pending')}</div></div>
        ${data.can_change?`<label>New preferred time</label><input type="datetime-local" id="mdt">
        <div class="row" style="margin-top:10px"><button class="btn ghost sm" onclick="mCancel()">Cancel booking</button>
        <button class="btn sm" onclick="mReschedule()">Request reschedule</button></div>`:'<p class="muted small">Changes are not available for this booking.</p>'}`;
    };
    showStep(0);
    if(manageToken) setTimeout(()=>$('mfind')?.click(),0);
  };
  window.mCancel=async()=>{
    manageToken=($('mtoken')?.value||manageToken).trim();
    if(!manageToken) return toast('Enter your booking management code');
    if(!confirm('Cancel this booking?')) return;
    const key=JSON.stringify({kind:'cancel',proposed:null,note:null});
    if(!changeAttempt||changeAttempt.key!==key)changeAttempt={key,id:crypto.randomUUID()};
    let data;
    try{data=await publicGateway('manage-booking',{body:{action:'change',token:manageToken,submission_id:changeAttempt.id,kind:'cancel',proposed:null,note:null}})}
    catch(error){return toast(error.message)}
    changeAttempt=null;
    toast(data&&data.status==='approved'?'Done — auto-approved':'Request sent — the team will confirm');
  };
  window.mReschedule=async()=>{
    manageToken=($('mtoken')?.value||manageToken).trim();
    if(!manageToken) return toast('Enter your booking management code');
    const val=$('mdt')?.value;
    if(!val) return toast('Pick a new date & time first');
    const proposed=sgIso(val),key=JSON.stringify({kind:'reschedule',proposed,note:null});
    if(!changeAttempt||changeAttempt.key!==key)changeAttempt={key,id:crypto.randomUUID()};
    let data;
    try{data=await publicGateway('manage-booking',{body:{action:'change',token:manageToken,submission_id:changeAttempt.id,kind:'reschedule',proposed,note:null}})}
    catch(error){return toast(error.message)}
    changeAttempt=null;
    toast(data&&data.status==='approved'?'Done — auto-approved':'Request sent — the team will confirm');
  };
  draw();
  /* Off the critical path: once personas resolve, inject a CUSTOMER-only "Open rewards" banner.
     A staff session in the same browser is deliberately NOT surfaced here — the audit flagged the
     old "Signed in as staff" line as contextually confusing on a customer-facing surface. The
     portal renders as a pure customer product; staff reach their workspace through the app. */
  personaPromise.then(personas=>{
    const slot=$('portalSignedInSlot');
    if(!slot||!personas)return;
    const customer=(personas.customer||[]).find(p=>p.business_slug===slug);
    if(customer)slot.innerHTML=`<div class="card" style="margin-bottom:16px"><div class="row"><span class="small">Signed in for ${esc(customer.business_name)}</span><span class="spacer"></span><a class="btn ghost sm" href="#/wallet/${encodeURIComponent(slug)}">Open rewards</a></div></div>`;
  }).catch(()=>{});
}

async function boot(){
  try{await consumePasswordRecoveryRedirect()}catch{}
  loadBuildIdentity();
  route();
}
boot();
</script>
</body>
</html>
