<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frenly — Loyalty & retention for every business</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================================
   Frenly design system v2 — "mockup layout, iOS polish" (owner ruling 2026-07-18)
   Principles: 8pt grid · SF-grade type with tight optical tracking · hairline
   borders instead of heavy strokes · layered low-opacity shadows (never one big
   blur) · frosted glass on floating surfaces · springy motion on interaction.
   Fraunces is now reserved for the wordmark ONLY — headings run on the system
   (SF on Apple) stack, which is what makes it read as a native app rather than a
   generic web dashboard.
   ============================================================================ */
:root{
  --bg:#F4F2EE; --card:#FFFFFF; --ink:#17161A; --ink2:#3D3B44; --muted:#6B6673;
  --line:#EAE6DF; --control-border:#817B88; --hair:rgba(23,22,26,.06);
  --coral:#C24135; --coral-hover:#9D352C; --amber:#A75514; --green:#1F6B48; --red:#9D352C;
  --grad:linear-gradient(135deg,#C24135,#9D352C);
  --tint:#FFF0EC;            /* coral wash for selected/active surfaces */
  /* iOS uses generous, continuous corner radii */
  --r:18px; --r-sm:12px; --r-lg:24px;
  /* Depth = several cheap shadows stacked, not one expensive one */
  --shadow:0 1px 2px rgba(23,22,26,.04),0 4px 12px rgba(23,22,26,.045);
  --shadow-lg:0 2px 6px rgba(23,22,26,.05),0 18px 44px rgba(23,22,26,.10);
  --spring:cubic-bezier(.34,1.4,.64,1);
  --ease:cubic-bezier(.2,.8,.2,1);
  --sf:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Inter',system-ui,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
.sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
.skip-link{position:fixed;left:12px;top:10px;z-index:200;transform:translateY(-160%);display:inline-flex;align-items:center;min-height:44px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-weight:700}
.skip-link:focus{transform:translateY(0)}
body{background:var(--bg);color:var(--ink);font-family:var(--sf);font-size:14.5px;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  font-feature-settings:'kern' 1,'liga' 1,'cv11' 1;letter-spacing:-.005em}
h1,h2,h3{font-family:var(--sf);font-weight:650;letter-spacing:-.022em;color:var(--ink)}
h1{letter-spacing:-.03em}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;font-size:14px;letter-spacing:-.01em}
:where(a,button,input,select,textarea,[tabindex]):focus-visible{outline:3px solid var(--coral);outline-offset:3px}
input,select,textarea{font-family:inherit;font-size:15px;padding:11px 13px;border:1px solid var(--control-border);
  border-radius:var(--r-sm);background:#fff;color:var(--ink);width:100%;min-height:44px;
  transition:border-color .18s var(--ease),box-shadow .18s var(--ease)}
input:focus,select:focus,textarea:focus{border-color:var(--coral);box-shadow:0 0 0 3.5px rgba(194,65,53,.16)}
label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:16px 0 6px;letter-spacing:-.005em}
.field-label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:16px 0 6px;letter-spacing:-.005em}
/* Buttons: press-down on :active is the single strongest "native app" tell */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;background:var(--grad);color:#fff;font-weight:600;padding:10px 20px;border-radius:100px;
  box-shadow:0 1px 2px rgba(194,65,53,.2),0 6px 16px rgba(194,65,53,.22);
  transition:transform .22s var(--spring),box-shadow .22s var(--ease),opacity .15s}
.btn:hover{transform:translateY(-1.5px);box-shadow:0 2px 4px rgba(255,107,94,.22),0 10px 26px rgba(255,107,94,.3)}
.btn:active{transform:scale(.965) translateY(0);transition-duration:.06s}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--control-border);box-shadow:var(--shadow)}
.btn.ghost:hover{border-color:#DDD7CD;box-shadow:var(--shadow-lg)}
.btn.sm{padding:8px 14px;font-size:13px;min-height:44px}
.btn.danger{background:#fff;color:var(--red);border:1px solid #D9A29C;box-shadow:none}
.btn[disabled]{opacity:.42;pointer-events:none;box-shadow:none}
.card{background:var(--card);border:1px solid var(--hair);border-radius:var(--r);
  box-shadow:var(--shadow);padding:22px}
.grid{display:grid;gap:16px}
.muted{color:var(--muted)} .small{font-size:12.5px}
.pill{display:inline-block;padding:3.5px 10px;border-radius:100px;font-size:11.5px;font-weight:600;letter-spacing:-.005em}
.pill.on{background:#E7F6EE;color:var(--green)} .pill.off{background:#F1EEE9;color:var(--muted)}
.pill.new{background:var(--tint);color:var(--coral)} .pill.ok{background:#E7F6EE;color:var(--green)} .pill.no{background:#FBEAE7;color:var(--red)}
table{width:100%;border-collapse:collapse}
caption{text-align:left;font-size:12px;font-weight:650;color:var(--muted);padding:0 12px 10px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;
  text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
td{padding:13px 12px;border-bottom:1px solid var(--hair);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.click{cursor:pointer;transition:background .14s var(--ease)}
tr.click:hover td{background:#FBFAF8}
.empty{text-align:center;padding:52px 20px;color:var(--muted)}
.empty .big{font-size:34px;margin-bottom:10px}
.cui-icon{display:inline-block;flex:0 0 auto;vertical-align:-.15em}
.cui-page-head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.cui-page-title{display:flex;align-items:flex-start;gap:12px}.cui-page-title>svg{color:var(--coral);margin-top:4px}
.cui-page-title h1{font-size:1.85rem;font-weight:700}.cui-page-title p{color:var(--muted);font-size:13px;margin-top:3px;max-width:72ch;line-height:1.5}
.cui-page-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.permission-banner{display:flex;gap:11px;align-items:flex-start;background:#FFF6E8;color:#65400C;border:1px solid #E7C994;border-radius:var(--r-sm);padding:13px 15px;margin:-7px 0 18px}
.permission-banner p{font-size:12.5px;line-height:1.5;margin-top:2px}.permission-banner svg{margin-top:1px}
.cui-card-head{margin-bottom:14px}.cui-card-head h2,.cui-empty h2{font-size:16px}.cui-card-head p,.cui-empty p,.cui-field-hint{color:var(--muted);font-size:12.5px;line-height:1.5;margin-top:4px}
.cui-field{min-width:0}.cui-field label{margin-top:0}.cui-field-hint{margin-top:6px}
.cui-empty{display:grid;justify-items:center;gap:7px}.cui-empty>svg{color:var(--coral)}.cui-empty-action{margin-top:8px}
.cui-table-wrap{width:100%;overflow-x:auto;border-radius:var(--r-sm);-webkit-overflow-scrolling:touch}
.cui-table-wrap:focus-visible{outline-offset:2px}
.cui-readonly-list{display:grid;gap:12px;margin-top:14px}.cui-readonly-row{display:flex;justify-content:space-between;gap:16px;padding:12px 0;border-bottom:1px solid var(--hair)}
.cui-readonly-row:last-child{border-bottom:0}.cui-readonly-row dt{color:var(--muted);font-size:12.5px}.cui-readonly-row dd{text-align:right;font-weight:600;overflow-wrap:anywhere}
.customer-link{display:inline-flex;align-items:center;min-height:44px;color:var(--coral);font-weight:700;text-decoration:underline;text-underline-offset:3px}
.inline-status{display:inline-flex;align-items:center;gap:6px}
/* Toast: frosted, springs up from the bottom like a native banner */
.toast{position:fixed;bottom:26px;left:50%;background:rgba(23,22,26,.9);
  -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
  color:#fff;padding:12px 22px;border-radius:100px;font-size:13.5px;font-weight:500;
  box-shadow:0 12px 40px rgba(0,0,0,.3);z-index:99;opacity:0;pointer-events:none;
  transform:translateX(-50%) translateY(12px) scale(.96);
  transition:opacity .26s var(--ease),transform .32s var(--spring)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.err{background:#FBEAE7;color:#C0392B;padding:10px 14px;border-radius:var(--r-sm);font-size:13px;margin-top:12px}
/* auth + onboard */
.center-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:420px;max-width:100%;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);padding:30px}
.legal-links{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:0 6px;margin-top:18px;
  color:var(--muted);font-size:11.5px;min-width:0;max-width:100%}
.legal-links a{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:8px;
  color:var(--muted);text-decoration:underline;text-underline-offset:2px}
.build-identity{font-variant-numeric:tabular-nums;white-space:nowrap}
.challenge{margin-top:18px;min-height:82px}.challenge-status{font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.4}
.challenge-retry{background:none;color:var(--coral);font-size:13px;font-weight:600;padding:6px 0;text-decoration:underline}
.logo{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:600;letter-spacing:-.02em}
.logo span{color:var(--coral)}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:8px}
.ind{border:1.5px solid var(--line);border-radius:var(--r-sm);padding:14px;text-align:center;cursor:pointer;
  background:#fff;transition:border-color .18s var(--ease),transform .22s var(--spring),box-shadow .2s}
.ind:hover{border-color:#E3C9A8;transform:translateY(-2px);box-shadow:var(--shadow)}
.ind:active{transform:scale(.97)}
.ind.sel{border-color:var(--coral);background:var(--tint);box-shadow:0 0 0 3.5px rgba(255,107,94,.13)}
.ind .em{font-size:22px;display:block;margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{background:#F1EEE9;border-radius:100px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--tint);color:#D0562E}
/* ---------- shell: light rail (mockup) + frosted top bar, profile TOP-RIGHT ---------- */
.shell{display:grid;grid-template-columns:246px 1fr;min-height:100vh}
.side{background:#FCFBF9;border-right:1px solid var(--line);color:var(--ink2);
  padding:22px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.side .logo{color:var(--ink);padding:0 10px 22px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:14px;min-height:44px;
  font-weight:500;margin-bottom:1px;color:var(--ink2);transition:background .14s var(--ease),color .14s}
.nav a:hover{background:#F2EFEA;color:var(--ink)}
.nav a.act{background:var(--tint);color:var(--coral);font-weight:600}
/* Icons get their own fixed-width box so every label starts on the same optical
   column, and so flex `gap` actually applies — an emoji sitting in the same text
   node as its label is one flex item, so gap silently does nothing and the icon
   ends up jammed against the word. This is the difference between "looks bought"
   and "looks generated". */
.nav .ic{width:18px;font-size:14.5px;display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;line-height:1}
.navhead{display:flex;align-items:center;gap:10px;width:100%;min-height:44px;padding:9px 12px;border-radius:10px;font-size:11px;
  font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);cursor:pointer;text-align:left;background:transparent;
  margin-top:12px;transition:color .14s,background .14s}
.navhead:hover{color:var(--ink2)}
.navhead.act{color:var(--ink2)}
.navhead .chev{margin-left:auto;font-size:10.5px;opacity:.9;transition:transform .22s var(--spring)}
.navbody a{padding-left:22px}
.side .foot{margin-top:auto;padding:10px;font-size:12.5px;color:var(--muted)}
/* the right-hand column: sticky frosted app bar above the scrolling page */
.col{display:flex;flex-direction:column;min-width:0}
.appbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:flex-end;
  gap:10px;padding:12px 34px;border-bottom:1px solid var(--hair);
  background:rgba(244,242,238,.72);
  -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px)}
.profile{position:relative}
.profile .who{display:flex;align-items:center;gap:10px;min-height:44px;padding:6px 10px 6px 6px;border-radius:100px;
  cursor:pointer;background:#fff;border:1px solid var(--hair);box-shadow:var(--shadow);
  transition:transform .2s var(--spring),box-shadow .2s var(--ease)}
.profile .who:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.profile .who:active{transform:scale(.975)}
.profile .who .chev{font-size:9px;color:var(--muted);margin-left:2px}
.profile .avatar{width:30px;height:30px;border-radius:100px;background:var(--grad);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;flex-shrink:0;
  box-shadow:0 2px 6px rgba(255,107,94,.3)}
/* menu now drops DOWN from the top-right chip (was: up from the bottom-left rail) */
.profile .menu{position:absolute;top:calc(100% + 8px);right:0;min-width:212px;
  background:rgba(255,255,255,.86);
  -webkit-backdrop-filter:saturate(180%) blur(24px);backdrop-filter:saturate(180%) blur(24px);
  border:1px solid var(--hair);border-radius:var(--r-sm);padding:6px;box-shadow:var(--shadow-lg);
  transform-origin:top right;animation:pop .2s var(--spring)}
@keyframes pop{from{opacity:0;transform:scale(.94) translateY(-6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.profile .menu a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;
  color:var(--ink2);font-size:13.5px;font-weight:500;white-space:nowrap}
.profile .menu a:hover{background:#F2EFEA;color:var(--ink)}
/* notification bell — sits left of the profile chip, same frosted-popover language */
.bellwrap{position:relative}
.bellbtn{position:relative;width:44px;height:44px;border-radius:100px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;background:#fff;border:1px solid var(--hair);box-shadow:var(--shadow);
  font-size:16px;transition:transform .2s var(--spring),box-shadow .2s var(--ease)}
.bellbtn:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.bellbtn:active{transform:scale(.94)}
.bellbtn .dot{position:absolute;top:-3px;right:-3px;background:var(--coral);color:#fff;border-radius:100px;
  min-width:16px;height:16px;font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;
  padding:0 3px;box-shadow:0 0 0 2px #fff}
.notif-menu{position:absolute;top:calc(100% + 8px);right:0;width:320px;max-width:calc(100vw - 40px);
  background:rgba(255,255,255,.86);-webkit-backdrop-filter:saturate(180%) blur(24px);backdrop-filter:saturate(180%) blur(24px);
  border:1px solid var(--hair);border-radius:var(--r-sm);padding:8px;box-shadow:var(--shadow-lg);
  transform-origin:top right;animation:pop .2s var(--spring);max-height:420px;overflow-y:auto;z-index:41}
.notif-item{display:block;width:100%;padding:10px 12px;border-radius:8px;cursor:pointer;text-align:left;background:transparent;color:inherit;transition:background .14s var(--ease)}
.notif-item:hover{background:#F2EFEA}
.notif-item.unread{background:var(--tint)}
.notif-item .t{font-size:13px;font-weight:600;color:var(--ink)}
.notif-item .b{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.notif-item .ago{font-size:10.5px;color:var(--muted);margin-top:4px}
.notif-empty{text-align:center;padding:24px 12px;color:var(--muted);font-size:13px}
/* global top-bar action cluster — search + everyday actions, sits left of the bell so the
   jobs used all day (find a customer, quick earn, new appointment) are one reach from any route */
.global-actions{display:flex;align-items:center;gap:8px;flex:1 1 auto;min-width:0;margin-right:auto}
.global-search{display:flex;align-items:center;gap:6px;flex:0 1 340px;min-width:0;height:44px;padding-left:13px;
  background:#fff;border:1px solid var(--hair);border-radius:100px;box-shadow:var(--shadow);
  transition:border-color .16s var(--ease),box-shadow .16s var(--ease)}
.global-search:focus-within{border-color:var(--coral);box-shadow:0 0 0 3px rgba(255,107,94,.18)}
.global-search-ic{display:inline-flex;align-items:center;color:var(--muted);flex-shrink:0}
.global-search input{flex:1 1 auto;min-width:0;width:auto;min-height:0;height:42px;border:0;background:transparent;
  box-shadow:none;padding:0 4px;font-size:13.5px;color:var(--ink)}
.global-search input:focus{outline:none;border:0;box-shadow:none}
.global-search-go{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;flex-shrink:0;
  border-radius:100px;background:var(--grad);color:#fff;box-shadow:0 1px 2px rgba(194,65,53,.2)}
.global-search-go:active{transform:scale(.92)}
.global-quick{display:flex;align-items:center;gap:8px;flex-shrink:0}
.global-act{white-space:nowrap}.global-act svg{flex-shrink:0}
/* settings — tabbed sections so each save has a clear, small scope instead of one long page */
.settings-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--line)}
.settings-tab{min-height:44px;padding:10px 15px;border:0;border-bottom:2px solid transparent;background:transparent;
  color:var(--muted);font-size:13.5px;font-weight:600;cursor:pointer;border-radius:10px 10px 0 0;white-space:nowrap;
  transition:color .14s,background .14s,border-color .14s}
.settings-tab:hover{color:var(--ink2);background:#F2EFEA}
.settings-tab[aria-selected="true"]{color:var(--coral);border-bottom-color:var(--coral)}
.settings-panel[hidden]{display:none}
.settings-save-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:16px}
.settings-save-row .btn{flex:0 0 auto}
.settings-scope{color:var(--muted);font-size:12px;line-height:1.4;flex:1 1 160px;min-width:0}
.switchrow{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 4px;font-size:12.5px;color:var(--ink2)}
.tglsw{position:relative;width:44px;height:44px;border-radius:100px;background:transparent;cursor:pointer}
.tglsw::before{content:'';position:absolute;left:4px;top:11px;width:36px;height:21px;border-radius:100px;background:var(--line);
  transition:background .18s var(--ease);flex-shrink:0}
.tglsw.on::before{background:var(--green)}
.tglsw::after{content:'';position:absolute;top:13px;left:6px;width:17px;height:17px;border-radius:100px;
  background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .18s var(--spring)}
.tglsw.on::after{transform:translateX(15px)}
/* universal importer modal */
.modal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;
  background:rgba(23,22,26,.4);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);animation:fade .18s var(--ease)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal-card{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:640px;max-width:100%;
  max-height:88vh;overflow-y:auto;padding:26px;animation:pop .22s var(--spring);transform-origin:center}
.seg{display:inline-flex;gap:4px;background:#F1EEE9;border-radius:100px;padding:3px}
.seg button{background:transparent;border-radius:100px;padding:6px 14px;font-size:12.5px;font-weight:600;color:var(--muted)}
.seg button.act{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
.imp-prev{border:1px solid var(--hair);border-radius:var(--r-sm);overflow:hidden;margin-top:14px}
.imp-prev table{font-size:12px}.imp-prev th,.imp-prev td{padding:7px 10px}
.imp-note{background:var(--tint);color:#8a4a2e;border-radius:var(--r-sm);padding:9px 12px;font-size:12px;margin-top:12px}
.reward-list{display:grid;gap:10px;margin-top:12px}
.reward-item{border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px;background:#fff}
.reward-item .meta{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.reward-editor{margin-top:12px;padding-top:14px;border-top:1px solid var(--line)}
.reward-editor .field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0 12px}
.reward-editor .field-grid .full{grid-column:1/-1}
.reward-editor details{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
.reward-editor summary{cursor:pointer;font-weight:650;color:var(--ink2);list-style:none}
.reward-editor summary::-webkit-details-marker{display:none}
.reward-editor summary::after{content:'+';float:right;color:var(--muted);font-size:18px;line-height:1}

<script>
/* ============ Frenly app ============ */
const RUNTIME_CONFIG=(()=>{try{return window.FrenlyRuntimeConfig.require(window)}catch{
  window.FrenlyRuntimeConfig?.renderFailure(document.getElementById('root'));
  throw new Error('Frenly runtime configuration is unavailable.');
}})();
const CUI=window.FrenlyCustomerUI;
const SB_URL=RUNTIME_CONFIG.supabaseUrl;
const SB_KEY=RUNTIME_CONFIG.supabasePublishableKey;
/* detectSessionInUrl:false — with it left at its (true) default, supabase-js inspects
   window.location.hash on load and can history.replaceState the hash away on a hash-routed
   SPA, which is why a browser refresh was silently losing the current route ("refresh does
   nothing unless I retype the URL"). We don't use Supabase's own hash-based OAuth redirect
   flow here, so it's safe to turn off. */
const sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false,flowType:'implicit'}});
let buildIdentity=Object.freeze({available:false});
const buildIdentityLabel=()=>buildIdentity.available
  ?`Build ${buildIdentity.shortSha} · ${buildIdentity.environment}`:'Build identity unavailable';
const buildIdentityHtml=()=>`<span class="build-identity" data-build-identity>${esc(buildIdentityLabel())}</span>`;
function syncBuildIdentityLabels(){document.querySelectorAll('[data-build-identity]').forEach(element=>{element.textContent=buildIdentityLabel()})}
async function loadBuildIdentity(){
  try{
    const response=await fetch('/api/build',{method:'GET',credentials:'same-origin',headers:{accept:'application/json'}});
    const payload=await response.json();
    const valid=response.ok&&payload?.schemaVersion===1&&payload?.service==='loyalty'&&payload?.available===true
      &&/^[0-9a-f]{40}$/.test(payload.commitSha)&&payload.shortSha===payload.commitSha.slice(0,12)
      &&['production','preview','development'].includes(payload.environment);
    if(!valid)throw new Error('Build identity unavailable.');
    buildIdentity=Object.freeze({available:true,commitSha:payload.commitSha,shortSha:payload.shortSha,environment:payload.environment});
    window.__FRENLY_BUILD_IDENTITY__=buildIdentity;
  }catch{buildIdentity=Object.freeze({available:false})}
  syncBuildIdentityLabels();
}
const legalLinks=()=>`<nav class="legal-links" aria-label="Legal and privacy"><a href="/privacy.html">Privacy</a><a href="/terms.html">Terms</a><a href="/data-request.html">Data request</a>${buildIdentityHtml()}</nav>`;
const publicFunctionUrl=(name,query='')=>`${SB_URL}/functions/v1/${name}${query}`;
async function publicGateway(name,{method='POST',body=null,query=''}={}){
  const response=await fetch(publicFunctionUrl(name,query),{
    method,headers:body?{'content-type':'application/json'}:undefined,
    body:body?JSON.stringify(body):undefined,credentials:'omit'});
  let payload=null;
  try{payload=await response.json()}catch{}
  if(!response.ok) throw new Error(payload?.error||'We could not process that request.');
  return payload;
}
let turnstileLoader;
const mountedTurnstileControls=new Set();
function destroyMountedTurnstiles(){
  [...mountedTurnstileControls].forEach(control=>control.destroy());
}
function loadTurnstile(){
  if(window.turnstile) return Promise.resolve(window.turnstile);
  if(turnstileLoader) return turnstileLoader;
  turnstileLoader=new Promise((resolve,reject)=>{
    const script=document.createElement('script');
    script.src='https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
    script.async=true;script.defer=true;
    script.onload=()=>window.turnstile?resolve(window.turnstile):reject(new Error('Security check unavailable.'));
    script.onerror=()=>{turnstileLoader=null;script.remove();reject(new Error('Security check unavailable.'))};
    document.head.appendChild(script);
  });
  return turnstileLoader;
}
async function mountTurnstile(siteKey,{container,status,retry,action,onToken}){
  const statusEl=$(status),retryEl=$(retry);let api,widgetId,destroyed=false;
  const message=(text,isError=false)=>{statusEl.textContent=text;statusEl.style.color=isError?'#C0392B':''};
  const clear=(text,isError=false)=>{onToken('');message(text,isError)};
  const logTurnstileError=(errorCode)=>{
    const code=String(errorCode||'unknown').replace(/[^\w.-]/g,'').slice(0,64)||'unknown';
    console.warn('Turnstile error code:',code);
  };
  const removeWidget=()=>{
    const host=document.getElementById(container);
    if(api&&widgetId!==undefined&&host){
      try{if(typeof api.remove==='function')api.remove(widgetId);else api.reset(widgetId)}catch{}
    }
    widgetId=undefined;
    host?.replaceChildren();
  };
  const render=async()=>{
    if(destroyed)return;
    message('Loading security check…');retryEl.hidden=true;
    try{
      api=await loadTurnstile();
      if(destroyed||!document.getElementById(container)) return;
      removeWidget();
      if(destroyed)return;
      widgetId=api.render(`#${container}`,{sitekey:siteKey,action,
        callback:(token)=>{if(destroyed)return;onToken(token);message('Security check complete.');retryEl.hidden=true},
        'expired-callback':()=>{if(destroyed)return;clear('Security check expired. Please try again.',true);retryEl.hidden=false},
        'timeout-callback':()=>{if(destroyed)return;clear('Security check timed out. Please try again.',true);retryEl.hidden=false},
        'error-callback':(errorCode)=>{if(destroyed)return true;logTurnstileError(errorCode);clear('Security check could not connect. Please retry, or check your browser and network settings.',true);retryEl.hidden=false;return true}});
    }catch{if(!destroyed){clear('Security check could not load. Check your connection and try again.',true);retryEl.hidden=false}}
  };
  const retryRender=()=>{if(destroyed)return;clear('Complete the security check to continue.');retryEl.hidden=true;render()};
  const reset=()=>{if(destroyed)return;clear('Complete the security check to continue.');retryEl.hidden=true;if(api&&widgetId!==undefined)api.reset(widgetId);else render()};
  const destroy=()=>{
    if(destroyed)return;
    destroyed=true;retryEl.onclick=null;removeWidget();mountedTurnstileControls.delete(control);
  };
  const control={reset,destroy};
  mountedTurnstileControls.add(control);
  retryEl.onclick=retryRender;
  await render();
  return control;
}
/* Supabase Auth has CAPTCHA protection enabled (Cloudflare Turnstile), so every
   signUp / signInWithPassword / resetPasswordForEmail call must carry a captchaToken.
   The site key is public by design (the join/booking pages already expose the same
   widget's key); the secret lives only in Supabase Auth settings. */
const AUTH_TURNSTILE_SITE_KEY='0x4AAAAAAD4_7rnuzB3ug-NF';
/* The private database flags are the normal release authority. This build-time

}

/* Chart.js global defaults (design system v2). Chart.js out of the box is the single
   biggest "generic AI dashboard" tell — grey 1px grids on both axes, boxed legends,
   black tooltips. Strip it back: no vertical grid, hairline horizontal grid only, no
   axis borders, dot legends, and a frosted dark tooltip that matches our toast. */
if(window.Chart){
  const CS=getComputedStyle(document.documentElement);

  Chart.defaults.font.weight=500;
  Chart.defaults.color=gv('--muted')||'#8B8794';
  Chart.defaults.maintainAspectRatio=false;
  Chart.defaults.animation.duration=520;
  Chart.defaults.animation.easing='easeOutQuart';
  Chart.defaults.elements.bar.borderRadius=8;
  Chart.defaults.elements.bar.borderSkipped=false;
  Chart.defaults.elements.line.borderWidth=2.5;
  Chart.defaults.elements.point.radius=0;
  Chart.defaults.elements.point.hoverRadius=5;
  Chart.defaults.elements.point.hitRadius=14;
  Chart.defaults.elements.arc.borderWidth=0;
  Chart.defaults.plugins.legend.labels.usePointStyle=true;
  Chart.defaults.plugins.legend.labels.pointStyle='circle';
  Chart.defaults.plugins.legend.labels.boxWidth=7;
  Chart.defaults.plugins.legend.labels.padding=16;
  Object.assign(Chart.defaults.plugins.tooltip,{
    backgroundColor:'rgba(23,22,26,.92)',padding:11,cornerRadius:10,displayColors:false,
    titleFont:{size:11,weight:'600'},bodyFont:{size:13,weight:'600'},caretSize:5});
  Chart.defaults.scale.grid.color=gv('--hair')||'rgba(23,22,26,.06)';
  Chart.defaults.scale.grid.drawTicks=false;
  Chart.defaults.scale.border.display=false;
  Chart.defaults.scale.ticks.padding=8;
  /* x-axis: a vertical grid adds noise and no information on our chart types.
     Chart.js 4 does not pre-populate a `grid` object on per-type scale defaults
     (unlike the shared Chart.defaults.scale), so mutating .grid.display on it
     threw "Cannot set properties of undefined" and blocked the entire app boot. */
  Chart.defaults.scales.category.grid={display:false};
}

const ALLMODS=['dashboard','till','clients','appointments','sales','services','bookings','waitlist','inventory','packages','loyalty','retention','referrals','memberships','giftcards','reports','staffperf','dailyreport','pnl','expenses'];

  sales:['sales','Sales'],services:['services','Services'],bookings:['bookings','Bookings'],waitlist:['waitlist','Waitlist'],

let toastGeneration=0,toastTimer=null;
const showToast=message=>{
  const t=$('toast'),generation=++toastGeneration;
  if(toastTimer)clearTimeout(toastTimer);
  t.textContent=message;t.classList.add('show');
  toastTimer=setTimeout(()=>{
    if(generation!==toastGeneration)return;
    t.classList.remove('show');t.textContent='';toastTimer=null;
  },2600);
};
const toast=m=>{const message=String(m??'');showToast(message);CUI.announce(message)};
const fail=e=>{console.error(e);const message=e?.message||String(e);showToast(message);CUI.announce(message,{assertive:true})};
/* Singapore-fixed-offset (UTC+8) display helper: shows a stored UTC instant as SGT wall-clock
   text, regardless of the viewer's own browser/system timezone. Frenly is SG-first — bookings
   are always shown in SGT so "what the customer picked is what staff see". */
const sgt=iso=>{if(!iso) return null;const d=new Date(new Date(iso).getTime()+8*3600000);return d.toISOString().slice(0,16).replace('T',' ')};
/* Turn a <input type=datetime-local> value (always "YYYY-MM-DDTHH:mm", locale-free) into a
   UTC ISO string by anchoring it explicitly to Singapore time (+08:00) instead of relying on
   the browser's ambient system timezone — avoids the local-vs-UTC mismatch bug. */
const sgIso=v=>v?new Date(v+':00+08:00').toISOString():null;
/* reporting-scale:start — keep raw exports complete despite the Data API row cap. */
const DATA_API_PAGE_SIZE=1000;
const sgDateBoundary=(date,dayOffset=0)=>{
  if(!date) return null;
  const start=new Date(date+'T00:00:00+08:00');
  return new Date(start.getTime()+dayOffset*864e5).toISOString();
};
async function fetchAllRows(makeQuery,pageSize=DATA_API_PAGE_SIZE){
  const rows=[];
  let from=0,total=null;
  for(;;){
    const {data,error,count}=await makeQuery().range(from,from+pageSize-1);
    if(error) throw error;
    if(Number.isInteger(count)) total=count;
    rows.push(...(data||[]));
    if(!data||!data.length||(total!==null&&rows.length>=total)||(total===null&&data.length<pageSize)) return rows;
    from=rows.length;
  }
}
function csvField(value){
  const text=String(value??'');
  return /[",\r\n]/.test(text)?`"${text.replace(/"/g,'""')}"`:text;
}
function csvRows(rows){return rows.map(row=>row.map(csvField).join(',')).join('\r\n')+'\r\n'}

function expiryModeRequiresDays(mode){return mode==='fixed'||mode==='inactivity'}
function positiveExpiryDays(value){const days=Number(value);return Number.isInteger(days)&&days>0?days:null}
function syncExpiryModeUi(modeInput,daysInput,daysField){
  const needsDays=expiryModeRequiresDays(modeInput.value),current=positiveExpiryDays(daysInput.value);
  const showOptionalInheritedDays=daysInput.dataset.expiryAllowInherit==='true'&&modeInput.value!=='none';
  if(needsDays&&!current)daysInput.value=String(positiveExpiryDays(daysInput.dataset.expiryPrior)||positiveExpiryDays(daysInput.dataset.expiryFallback)||365);
  if(!needsDays&&current)daysInput.dataset.expiryPrior=String(current);
  daysField.hidden=!(needsDays||showOptionalInheritedDays);daysInput.disabled=daysField.hidden;daysInput.required=needsDays;
}
function bindExpiryModeUi(modeInput,daysInput,daysField){
  modeInput.addEventListener('change',()=>syncExpiryModeUi(modeInput,daysInput,daysField));
  daysInput.addEventListener('input',()=>{const current=positiveExpiryDays(daysInput.value);if(current)daysInput.dataset.expiryPrior=String(current)});
  syncExpiryModeUi(modeInput,daysInput,daysField);
}
function expiryDaysForMode(mode,daysInput){
  if(mode==='none')return undefined;
  const raw=String(daysInput.value??'').trim();
  if(!raw)return expiryModeRequiresDays(mode)?NaN:undefined;
  return positiveExpiryDays(raw)??NaN;
}
function createLatestRequestGate(isInstanceCurrent){
  let generation=0;
  return {
    begin(){const requestGeneration=++generation;return()=>requestGeneration===generation&&isInstanceCurrent()},
    invalidate(){generation+=1}
  };
}

/* "/" or ⌘K / Ctrl+K focuses the global customer search from anywhere in the workspace. "/"
   is ignored while the user is typing in a field so it can't hijack normal input. The listener
   is attached once and resolves #globalSearch at event time, so it survives every shell re-render
   and no-ops on routes (auth, portal, wallet) where the app bar isn't present. */
function handleGlobalSearchHotkey(e){
  const input=document.getElementById('globalSearch');
  if(!input)return;
  const cmdK=(e.key==='k'||e.key==='K')&&(e.metaKey||e.ctrlKey);
  const slash=e.key==='/'&&!e.metaKey&&!e.ctrlKey&&!e.altKey;
  if(!cmdK&&!slash)return;
  const t=e.target;
  const typing=t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.tagName==='SELECT'||t.isContentEditable);
  if(slash&&typing)return;
  e.preventDefault();input.focus();if(input.select)input.select();
}
document.addEventListener('keydown',handleGlobalSearchHotkey);

/* ---------- routing ---------- */
async function route(){
  const isRouteCurrent=beginRouteInvocation();
  dashboardRenderEpoch+=1;
  customerWalletRenderEpoch+=1;
  destroyMountedTurnstiles();
  disposeCurrentRoute();
  /* Boot/nav must never leave a blank page behind — a transient network blip or a Supabase
     hiccup used to throw straight out of this async function with nothing rendered, which
     read to the owner as "pressing refresh does nothing." Now it's recoverable in-place. */
  try{
    killCharts();
    if(passwordRecoveryError) return renderRecoveryInvalid();
    if(passwordRecoveryActive) return renderPasswordUpdate();
    let h=location.hash||'#/';
    if(h.startsWith('#/claim?')){
      const invite=new URLSearchParams(h.split('?')[1]||'').get('invite')||'';
      if(invite){
        pendingCustomerInvitationToken=invite;
        history.replaceState(null,'',`${location.pathname}${location.search}#/claim`);
        h='#/claim';
      }
    }
    const {data:{session}}=await sb.auth.getSession();
    if(!isRouteCurrent())return;
    S.user=session?.user||null;
    if(h.startsWith('#/b/')) return renderPortal(h.slice(4).split('?')[0]);
    if(h==='#/customer'||h==='#/customer/register') return renderCustomerRegistration();
    if(!S.user) return renderAuth();
    if(h==='#/claim'||h.startsWith('#/claim?')) return renderCustomerClaim();
    if(h==='#/wallet'||h.startsWith('#/wallet/')){
      const customerCapabilities=await loadCustomerFeatureCapabilities();
      if(customerCapabilities._load_error)return renderCustomerCapabilityRetry('We could not check your customer access. Please try again.');
      if(!customerCapabilities.customer_wallet) return renderCustomerWalletUnavailable();
      return renderCustomerWallet(h.startsWith('#/wallet/')?decodeURIComponent(h.slice(9)):null);
    }
    if(h==='#/'){
      const {data:rootPersonas,error:rootPersonaError}=await sb.rpc('get_my_personas');
      if(!isRouteCurrent()||location.hash&&location.hash!=='#/')return;
      if(rootPersonaError)return renderPersonaResolutionUnavailable();
      const staffPersonas=rootPersonas?.staff||[],customerPersonas=rootPersonas?.customer||[];
      if(customerPersonas.length&&!staffPersonas.length){nav('#/wallet');return}
      if(customerPersonas.length&&staffPersonas.length){nav(rootPersonas.default_route||`#/workspace/${encodeURIComponent(staffPersonas[0].business_slug)}/dashboard`);return}
    }
    let workspacePage=null,workspaceStaffPersona=null;
    if(h.startsWith('#/workspace/')){
      const workspaceParts=h.slice(12).split('/');
      const workspaceSlug=decodeURIComponent(workspaceParts[0]||'');
      const requestedModule=decodeURIComponent(workspaceParts[1]||'dashboard');
      const {data:personas,error:personaError}=await sb.rpc('get_my_personas');
      workspaceStaffPersona=!personaError&&(personas?.staff||[]).find(p=>p.business_slug===workspaceSlug);
      if(!workspaceStaffPersona){
        root.innerHTML=`<main class="center-wrap" id="main" tabindex="-1"><section class="card" style="width:420px;max-width:100%;text-align:center" aria-labelledby="workspaceUnavailableTitle"><h1 id="workspaceUnavailableTitle" style="font-size:1.5rem">Workspace unavailable</h1><p class="muted small" style="margin-top:8px">This workspace is not available to this account.</p><button class="btn" id="workspaceHome" style="margin-top:16px">Continue</button></section></main>`;
        $('main').focus();
        $('workspaceHome').onclick=()=>nav(personas?.default_route||'#/');return;
      }
      const {data:workspace,error:workspaceError}=await sb.from('businesses').select('*').eq('slug',workspaceSlug).single();
      if(workspaceError||!workspace){
        root.innerHTML=`<main class="center-wrap" id="main" tabindex="-1"><section class="card" style="width:420px;max-width:100%;text-align:center" aria-labelledby="workspaceUnavailableTitle"><h1 id="workspaceUnavailableTitle" style="font-size:1.5rem">Workspace unavailable</h1><p class="muted small" style="margin-top:8px">This workspace is not available to this account.</p></section></main>`;$('main').focus();return;
      }
      if(S.biz?.id!==workspace.id){
        S.biz=workspace;S.myModules=null;S.myModulePerms=null;S.myRole=null;S.isSA=false;S.saChecked=false;S.hasCustomerPersona=null;
      }
      S.hasCustomerPersona=(personas?.customer||[]).length>0;
      workspacePage=requestedModule;
    }
    if(!S.biz){
      const {data:st}=await sb.from('staff').select('business_id').eq('user_id',S.user.id).limit(1);
      if(st&&st.length){
        const {data:b}=await sb.from('businesses').select('*').eq('id',st[0].business_id).single();
        S.biz=b;
      }
    }
    if(!S.biz) return renderOnboard();
    /* Effective module permissions (v14): staff.modules===null means "inherit — sees
       everything the firm enabled"; an explicit array is an allowlist. Owners always
       bypass server-side. Fetched once per session, then cached on S until a Team edit
       resets it back to null (see settingsPage's per-staff module panel). */
    if(S.myModules===null){
      const {data:mm,error:mmErr}=await sb.rpc('get_my_modules',{p_business:S.biz.id});
      if(mmErr||!mm){
        /* A transient resolver failure must stay fail closed. A workspace route
           already has the effective module list from get_my_personas; legacy
           routes recompute the same v14 precedence from the caller's RLS-scoped
           staff row and never broaden to every firm module by default. */
        const enabled=S.biz.enabled_modules||[];S.isSA=false;
        if(workspaceStaffPersona){
          S.myRole=workspaceStaffPersona.role||null;
          S.myModules=Array.isArray(workspaceStaffPersona.modules)?workspaceStaffPersona.modules:[];
          S.myModulePerms=Object.fromEntries(S.myModules.map(m=>[m,'r']));
        }else{
          const {data:me}=await sb.from('staff').select('role,modules,module_perms')
            .eq('business_id',S.biz.id).eq('user_id',S.user.id).limit(1);
          const staffRow=me&&me.length?me[0]:null;
          S.myRole=staffRow?.role||null;
          if(!staffRow){S.myModules=[];S.myModulePerms={}}
          else if(staffRow.role==='owner'){S.myModules=enabled;S.myModulePerms=Object.fromEntries(enabled.map(m=>[m,'rw']))}
          else if(staffRow.module_perms!==null){S.myModules=enabled.filter(m=>Object.hasOwn(staffRow.module_perms||{},m));S.myModulePerms=Object.fromEntries(S.myModules.map(m=>[m,staffRow.module_perms[m]]))}
          else if(staffRow.modules===null){S.myModules=enabled;S.myModulePerms=Object.fromEntries(enabled.map(m=>[m,'rw']))}
          else {S.myModules=enabled.filter(m=>(staffRow.modules||[]).includes(m));S.myModulePerms=Object.fromEntries(S.myModules.map(m=>[m,'rw']))}
        }
      }else{
        S.myModules=Array.isArray(mm.modules)?mm.modules:[];S.myRole=mm.role||null;S.isSA=mm.is_super_admin===true;
        S.myModulePerms=mm.module_perms&&typeof mm.module_perms==='object'
          ?mm.module_perms:Object.fromEntries(S.myModules.map(m=>[m,'rw']));
      }
    }
    /* get_my_modules resolves staff status and super-admin status server-side. An
       identity with neither an active staff role nor any effective modules must stop
       here: rendering Dashboard would only issue predictable denied data requests. */
    S.saChecked=true;
    const hasResolvedStaffRole=typeof S.myRole==='string'&&S.myRole.length>0;
    const hasResolvedStaffModules=Array.isArray(S.myModules)&&S.myModules.length>0;
    if(!S.isSA&&!hasResolvedStaffRole&&!hasResolvedStaffModules){
      S.myModules=[];S.myModulePerms={};
      return renderWorkspaceAccessUnavailable();
    }
    if(S.hasCustomerPersona===null){
      const {data:personas}=await sb.rpc('get_my_personas');
      S.hasCustomerPersona=!!((personas?.staff||[]).some(p=>p.business_slug===S.biz.slug)
        &&(personas?.customer||[]).length);
    }
    const frontlineDefault=!workspacePage&&h==='#/'&&['staff','frontdesk'].includes(S.myRole)&&S.myModules.includes('till');
    const page=workspacePage?[workspacePage]:frontlineDefault?['till']:(h.replace('#/','')||'dashboard').split('/');
    if(frontlineDefault)history.replaceState(null,'',`${location.pathname}${location.search}#/till`);
    /* Route guard: a restricted employee must not reach a page by typing the URL, not
       just by it being hidden from nav. 'client' maps to the 'clients' module key, same
       as activeGroupKey() does for the sidebar. dashboard/setup are always reachable. */
    const pageKey=page[0]==='client'?'clients':page[0];
    /* Settings is owner-only. Hiding the nav link is not a guard — anyone can type the
       hash. The DB is the real boundary (every write in here is RLS/RPC owner-gated), but
       the page also surfaces billing, the team roster and the sign-up QR, so don't render
       it to staff at all. */
    if(pageKey==='settings'&&S.myRole!=='owner'){
      toast('Only the owner can open Settings.');
      return nav('#/dashboard');
    }
    if(pageKey==='branches'&&S.myRole!=='owner'){
      toast('Only the owner can manage branches.');
      return nav('#/dashboard');
    }
    if(pageKey==='platform'&&!S.isSA){
      toast('Not authorized.');
      return nav('#/dashboard');
    }
    if(MODULES[pageKey]&&pageKey!=='settings'&&pageKey!=='setup'&&pageKey!=='dashboard'&&!S.myModules.includes(pageKey)){
      toast('You don\'t have access to that.');
      return nav('#/dashboard');
    }
    renderShell(page);
  }catch(e){
    console.error(e);
    root.innerHTML=`<div class="center-wrap"><div class="card" style="width:400px;max-width:100%;text-align:center">
      <div style="font-size:40px">⚠️</div>
      <h2 style="margin:12px 0 4px">Something went wrong</h2>
      <p class="muted small">${esc(e&&e.message||String(e))}</p>
      <button class="btn" id="routeReload" style="margin-top:18px">Reload</button>
      </div></div>`;
    const rb=$('routeReload');
    if(rb) rb.onclick=()=>location.reload();
  }
}

function normalizeSingaporeCustomerPhone(value){
  const digits=String(value??'').replace(/[^0-9]/g,'');
  const local=digits.startsWith('65')&&digits.length===10?digits.slice(2):digits;
  return /^[89][0-9]{7}$/.test(local)?`+65${local}`:null;
}
const unavailableCustomerPhoneOtpCapabilities=()=>({sms:false,whatsapp:false});
async function loadCustomerPhoneOtpCapabilities({refresh=false}={}){
  if(!CUSTOMER_PHONE_OTP_RUNTIME_ENABLED)return unavailableCustomerPhoneOtpCapabilities();
  if(customerPhoneOtpCapabilities&&!refresh)return customerPhoneOtpCapabilities;
  const {data,error}=await sb.rpc('get_customer_phone_otp_capabilities');
  customerPhoneOtpCapabilities=error?unavailableCustomerPhoneOtpCapabilities():{
    sms:data?.sms===true,whatsapp:data?.whatsapp===true
  };
  return customerPhoneOtpCapabilities;
}
async function customerPhoneOtpAvailable(channel='sms'){
  if(!CUSTOMER_PHONE_OTP_RUNTIME_ENABLED)return false;
  if(channel==='whatsapp'&&!CUSTOMER_WHATSAPP_OTP_RUNTIME_ENABLED)return false;
  const serverCapabilities=await loadCustomerPhoneOtpCapabilities({refresh:true});
  return channel==='whatsapp'?serverCapabilities.whatsapp===true:serverCapabilities.sms===true;
}

    <div class="row"><span aria-hidden="true">${CUI.icon('customers',{size:24})}</span><div><h1 id="customerOtpTitle">Enter your code</h1><p class="muted small" style="margin-top:5px">Enter the one-time code sent to your mobile number.</p></div></div>

    <div id="customerOtpError" role="alert" aria-live="assertive"></div>
    <button class="btn" id="customerOtpVerify" type="button" style="width:100%;margin-top:16px">${CUI.icon('check',{size:18})}<span>Verify and continue</span></button>
    <div style="margin-top:14px">${authChallengeHtml()}</div>
    <button class="btn ghost" id="customerOtpResend" type="button" disabled style="width:100%;margin-top:10px">Resend available in 30 seconds</button>
  </section>`);
  let resendCaptcha='',resendControl=null,seconds=30;
  mountTurnstile(AUTH_TURNSTILE_SITE_KEY,{container:'authTurnstile',status:'authTurnstileStatus',retry:'authTurnstileRetry',action:'frenly_customer_otp',
    onToken:(token)=>{resendCaptcha=token;}}).then(control=>resendControl=control);
  const resend=$('customerOtpResend');
  const countdown=setInterval(()=>{
    if(!resend?.isConnected)return clearInterval(countdown);
    seconds-=1;
    if(seconds>0)resend.textContent=`Resend available in ${seconds} seconds`;
    else {resend.disabled=false;resend.textContent='Resend code';clearInterval(countdown);}
  },1000);
  $('customerOtpVerify').onclick=async()=>{
    const token=$('customerOtp').value.replace(/\s/g,'');
    if(!/^[0-9]{6}$/.test(token)){
      $('customerOtpError').innerHTML='<div class="err">Enter the 6-digit code.</div>';return;

    const {data,error}=await sb.auth.verifyOtp({phone,token,type:'sms'});

    if(!(await customerPhoneOtpAvailable(channel))||!resendCaptcha){
      $('customerOtpError').innerHTML='<div class="err">Customer mobile verification is unavailable. Please return and try again later.</div>';return;
    }
    resend.disabled=true;
    const options={captchaToken:resendCaptcha};if(channel==='whatsapp')options.channel='whatsapp';
    const {error}=await sb.auth.signInWithOtp({phone,options});
    resendCaptcha='';resendControl?.reset();
    if(error){resend.disabled=false;$('customerOtpError').innerHTML='<div class="err">We could not resend a code. Please try again.</div>';return;}
    seconds=30;resend.textContent='Resend available in 30 seconds';
    const nextCountdown=setInterval(()=>{
      if(!resend?.isConnected)return clearInterval(nextCountdown);
      seconds-=1;
      if(seconds>0)resend.textContent=`Resend available in ${seconds} seconds`;
      else {resend.disabled=false;resend.textContent='Resend code';clearInterval(nextCountdown);}
    },1000);
  };
}

}

// Detail sections share stable element IDs across business routes. An RPC that
// began on route A must therefore prove both its render epoch and its original

function walletSectionStillCurrent(host,isCurrent){
  return !!host&&isCurrent()&&host.isConnected&&$(host.id)===host;
}

function ensureWalletEmptyState(businessSlug){
  const sections=$('walletSections');if(!sections)return;
  const hasSection=!!sections.querySelector('.wallet-section:not(#walletEmpty)');
  const existing=$('walletEmpty');
  if(hasSection){if(existing)existing.remove();return}
  if(!existing)sections.insertAdjacentHTML('beforeend',`<section class="card wallet-section" id="walletEmpty"><div class="wallet-section-head"><div><h2>Nothing to show yet</h2><p class="muted small">This business has no customer wallet sections available for your account.</p></div><span class="spacer"></span><button class="btn ghost sm" id="walletEmptyRetry">Refresh</button></div></section>`);

}

async function walletSectionEmpty(id,title,message,businessSlug,capability,retry,isCurrent=()=>true){
  const host=$(id);if(!walletSectionStillCurrent(host,isCurrent))return;
  const {data,error}=await sb.rpc('customer_portal_capabilities',{p_business_slug:businessSlug});
  if(!walletSectionStillCurrent(host,isCurrent))return;
  if(error)return walletSectionError(id,'This section could not be refreshed.',retry);
  if(!data?.[capability]){host.remove();ensureWalletEmptyState(businessSlug);return}
  host.setAttribute('aria-busy','false');
  host.innerHTML=`<div class="wallet-section-head"><div><h2>${esc(title)}</h2><p class="muted small">${esc(message)}</p></div><span class="spacer"></span><button class="btn ghost sm" id="${id}EmptyRetry">Refresh</button></div>`;
  $(`${id}EmptyRetry`).onclick=retry;
}

function actionableWalletExpiryText(expiry,unit){
  if(expiry?.mode==='none')return 'Never expires';
  if(Number(expiry?.expiring_units||0)>0&&expiry?.next_expiry_at){
    return `${Number(expiry.expiring_units)} ${unit} expire within 30 days · next ${walletDate(expiry.next_expiry_at)}`;
  }
  return expiry?.mode==='inactivity'?'Expiry terms may apply':'No units expiring in the next 30 days';
}
function actionableWalletActionText(card){
  const action=card?.action||{},reward=card?.next_eligible_reward||{},expiry=card?.expiry||{},visit=card?.visit_progress||{};
  const unit=String(card?.loyalty?.unit||'points');
  if(action.reason==='expiring_within_7_days')return `${Number(expiry.expiring_within_7_days||0)} ${unit} expire soon${action.deadline_at?` · ${walletDate(action.deadline_at)}`:''}`;
  if(action.reason==='reward_available')return `${reward.name||'Reward'} is ready at the counter`;
  if(action.reason==='expiring_within_30_days')return `${Number(expiry.expiring_units||0)} ${unit} expire within 30 days${action.deadline_at?` · ${walletDate(action.deadline_at)}`:''}`;
  if(action.reason==='one_qualifying_visit_remaining')return `One qualifying visit remains${visit.customer_description?` · ${visit.customer_description}`:''}${action.deadline_at?` · by ${walletDate(action.deadline_at)}`:''}`;
  if(action.reason==='reward_progress')return `${Number(reward.remaining_units||0)} ${unit} to ${reward.name||'your next reward'}`;
  if(action.reason==='birthday_benefit_expiring_within_7_days')return `Birthday benefit ends soon${action.deadline_at?` · ends ${walletDate(action.deadline_at,true)}`:''}`;
  if(action.reason==='birthday_benefit_available')return 'Birthday benefit is ready to use';
  return 'No urgent action right now';
}
