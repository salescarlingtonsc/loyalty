async function clientDetail(id){
  const routeMain=M();
  const isClientDetailCurrent=()=>routeMain.isConnected&&M()===routeMain;
  routeMain.innerHTML=CUI.loadingState({title:'Customer profile',iconName:'customers'});
  const canWriteClients=canWriteModule('clients');
  const canWriteLoyalty=canWriteModule('loyalty')&&hasRoleCapability('create_sales');
  const customerFeatures=await loadCustomerFeatureCapabilities();
  if(!isClientDetailCurrent())return;
  // Birthday data is capability-gated before any staff reader is called. This
  // prevents the customer detail view from probing or rendering the feature
  // while C45 remains disabled, rather than relying on an RPC error alone.
  const birthdayBenefitsEnabled=customerFeatures.customer_birthday_benefits===true;
  const canRedeemBirthday=birthdayBenefitsEnabled&&canWriteModule('loyalty');
  const canReverseBirthday=birthdayBenefitsEnabled&&S.myRole==='owner'&&canWriteModule('loyalty');
  let classicRedemptionIdem=null;
  let birthdayRedemptionIdem=null;
  let birthdayReversalIdem=null;
  const rewardRedemptionIdem=new Map();
  const [{data:c,error},{data:pb},{data:cb},{data:rg},{data:lp},{data:xb},{data:rwList},{data:allSl},{data:allAp},{data:stAll},{data:rwBr},{data:rwSv},{data:rwPr},{data:ctxBr},{data:ctxSv},{data:ctxPr},{data:cfDefs},{data:cfVals},{data:cfOpts},{data:birthdayBenefit},{data:msRows},{data:cpRows}]=await Promise.all([
    // Staff customer detail deliberately excludes DOB. Birthday fulfilment
    // exposes only the capability-gated, benefit-safe RPC projection below.
    sb.from('clients').select('id,business_id,full_name,phone,email,gender,referral_code,marketing_consent').eq('id',id).single(),
    sb.from('client_points_balance').select('points').eq('client_id',id),
    sb.from('client_credit_balance').select('balance_cents').eq('client_id',id),
    sb.from('reward_grants').select('*, retention_programs(name)').eq('client_id',id).order('granted_at',{ascending:false}),
    sb.from('loyalty_programs').select('*').eq('business_id',S.biz.id).limit(1),
    sb.from('points_batches').select('remaining,expires_at').eq('client_id',id).gt('remaining',0).not('expires_at','is',null).order('expires_at').limit(1),
    sb.from('loyalty_rewards').select('*').eq('business_id',S.biz.id).eq('active',true).order('sort').order('created_at'),
    /* Full history — one unlimited paged fetch drives both the Customer 360 timeline and the
       net-visit/lifetime-spend totals below (the old duplicate 10-row summary query was unused). */
    fetchAllRows(()=>sb.from('sales').select('*',{count:'exact'}).eq('client_id',id)
      .order('occurred_at',{ascending:false}).order('id')).then(data=>({data})),
    sb.from('appointments').select('*, services!appointments_service_id_fkey(name)').eq('client_id',id).order('starts_at',{ascending:false}),
    sb.from('staff').select('id,full_name').eq('business_id',S.biz.id),
    sb.from('loyalty_reward_branches').select('reward_id,branch_id').eq('business_id',S.biz.id),
    sb.from('loyalty_reward_services').select('reward_id,service_id').eq('business_id',S.biz.id),
    sb.from('loyalty_reward_products').select('reward_id,product_id').eq('business_id',S.biz.id),
    sb.from('branches').select('id,name').eq('business_id',S.biz.id).eq('active',true).order('name'),
    sb.from('services').select('id,name').eq('business_id',S.biz.id).eq('active',true).order('name'),
    sb.from('products').select('id,name').eq('business_id',S.biz.id).eq('active',true).order('name'),
    S.myRole==='owner'?sb.from('client_field_definitions').select('*').eq('business_id',S.biz.id).eq('active',true).order('created_at'):Promise.resolve({data:[]}),
    S.myRole==='owner'?sb.from('client_field_values').select('*').eq('business_id',S.biz.id).eq('client_id',id):Promise.resolve({data:[]}),
    S.myRole==='owner'?sb.from('client_field_options').select('*').eq('business_id',S.biz.id).eq('active',true).order('sort_order'):Promise.resolve({data:[]}),
    birthdayBenefitsEnabled
      ?sb.rpc('staff_get_customer_birthday_benefit',{p_business_id:S.biz.id,p_client_id:id})
      :Promise.resolve({data:null}),
    /* Membership + package events for the unified timeline and the status badges. These reuse
       the same tables the Memberships / Packages pages already query, now scoped to one client. */
    sb.from('memberships').select('*, membership_plans(name,price_cents,cadence)').eq('business_id',S.biz.id).eq('client_id',id).order('created_at',{ascending:false}),
    sb.from('client_packages').select('*, package_plans(name,sessions)').eq('business_id',S.biz.id).eq('client_id',id).order('purchased_at',{ascending:false})]);
  if(!isClientDetailCurrent())return;
  if(error) throw error;
  let reversalData=null;
  try{reversalData=await loadReversalWorkflows(id,100)}catch(e){fail(e)}
  if(!isClientDetailCurrent())return;
  const saleWorkflow=Object.fromEntries((reversalData?.sales||[]).map(x=>[x.id,x]));
  const staffName=Object.fromEntries((stAll||[]).map(s=>[s.id,s.full_name||'Team member']));
  const nowIso=new Date().toISOString();
  /* One unified reverse-chronological timeline. Each source keeps its own date field for sorting
     and is rendered from its own shape (they are separate tables, not a union query): sales carry
     reversal provenance from staff_get_reversal_workflows; appointments split past vs upcoming;
     retention grants, membership enrolments and package purchases add their lifecycle facets. */
  const histSales=(allSl||[]).map(s=>({...(saleWorkflow[s.id]||{}),t:s.occurred_at,kind:'sale',id:s.id,saleKind:s.kind,
    amount:s.amount_cents,note:s.note,staff:staffName[s.staff_id]||null}));
  const histAppts=(allAp||[]).map(a=>({t:a.starts_at,kind:'appointment',service:a.services?.name,status:a.status,
    upcoming:(a.starts_at||'')>nowIso&&a.status!=='cancelled'&&a.status!=='completed'}));
  const histRedemptions=(reversalData?.redemptions||[]).map(r=>({t:r.redeemed_at,kind:'redemption',...r}));
  const histGrants=(rg||[]).map(g=>({t:g.granted_at,kind:'grant',program:g.retention_programs?.name,
    reward_label:g.reward_label,fulfillment_kind:g.fulfillment_kind,reward_value:g.reward_value,reward_item:g.reward_item}));
  const histMemberships=(msRows||[]).map(m=>({t:m.created_at,kind:'membership',plan:m.membership_plans?.name,
    status:m.status,cadence:m.membership_plans?.cadence,renews:m.current_period_end}));
  const histPackages=(cpRows||[]).map(k=>({t:k.purchased_at,kind:'package',plan:k.package_plans?.name,
    sessions:k.package_plans?.sessions,remaining:k.remaining,status:k.status}));
  const history=[...histSales,...histAppts,...histRedemptions,...histGrants,...histMemberships,...histPackages]
    .sort((a,b)=>(b.t||'').localeCompare(a.t||''));
  let histShown=50;
  const pts=pb?.[0]?.points||0,cred=cb?.[0]?.balance_cents||0,prog=lp?.[0];
  const nextExp=xb?.[0];
  const idsByReward=(rows,key)=>rows.reduce((out,row)=>{
    (out[row.reward_id]??=[]).push(row[key]);return out;
  },{});
  const rewardEligibility={branch:idsByReward(rwBr||[],'branch_id'),service:idsByReward(rwSv||[],'service_id'),product:idsByReward(rwPr||[],'product_id')};
  const contextOptions=(rewardId,key,items)=>{
    const allowed=rewardEligibility[key][rewardId]||[];
    if(!allowed.length)return '';
    const choices=items.filter(x=>allowed.includes(x.id));
    return `<select class="reward-context" data-reward-${key}="${rewardId}" aria-label="Choose ${key}">${choices.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('')}</select>`;
  };
  const customValueByField=Object.fromEntries((cfVals||[]).map(v=>[v.field_definition_id,v]));
  const customFieldInput=(f)=>{
    const v=customValueByField[f.id]||{},inputId=`cfv-${f.id}`;
    if(f.value_type==='select'){
      const choices=(cfOpts||[]).filter(o=>o.field_definition_id===f.id);
      return `<select id="${inputId}"><option value="">Choose…</option>${choices.map(o=>`<option value="${o.option_key}" ${v.select_value===o.option_key?'selected':''}>${esc(o.option_label)}</option>`).join('')}</select>`;
    }
    if(f.value_type==='boolean')return `<select id="${inputId}"><option value="">Choose…</option><option value="true" ${v.boolean_value===true?'selected':''}>Yes</option><option value="false" ${v.boolean_value===false?'selected':''}>No</option></select>`;
    const key={text:'text_value',number:'number_value',date:'date_value'}[f.value_type];
    return `<input id="${inputId}" type="${f.value_type==='number'?'number':f.value_type==='date'?'date':'text'}" value="${esc(v[key]??'')}">`;
  };
  /* Net visits use the complete paged sale history, not the 10-row summary query. Each
     immutable visit snapshot contributes +1 and its compensating reversal contributes -1. */
  const netVisits=(allSl||[]).filter(s=>s.counts_as_visit).reduce((n,s)=>n+(s.reversal_of?-1:1),0);
  /* Lifetime spend uses the app's canonical net-revenue methodology (see Reports): reversal rows
     carry a signed-negative amount_cents, so a plain additive sum over counts_as_revenue rows is
     already net of every correction. */
  const lifetimeSpendCents=(allSl||[]).filter(s=>s.counts_as_revenue).reduce((a,s)=>a+(s.amount_cents||0),0);
  const dayMs=86400000;
  const lastVisitIso=(allSl||[]).filter(s=>s.counts_as_visit&&!s.reversal_of)
    .reduce((mx,s)=>(s.occurred_at||'')>mx?s.occurred_at:mx,'');
  const lastVisitDays=lastVisitIso?Math.floor((Date.now()-new Date(lastVisitIso).getTime())/dayMs):null;
  /* Which reward (if any) the customer can redeem right now, honouring the active model: a catalog
     model reads loyalty_rewards, classic uses the program threshold. Deterministic — no guessing. */
  let rewardReady=false,rewardReadyLabel='',pointsToUnlock=null;
  if(prog&&prog.active){
    if(prog.loyalty_model&&prog.loyalty_model!=='classic'){
      const sorted=[...(rwList||[])].sort((a,b)=>a.cost_points-b.cost_points);
      const afford=sorted.filter(r=>pts>=r.cost_points);
      if(afford.length){rewardReady=true;const best=afford[afford.length-1];rewardReadyLabel=best.customer_name||best.name||'a reward';}
      else if(sorted.length){pointsToUnlock=sorted[0].cost_points-pts;rewardReadyLabel=sorted[0].customer_name||sorted[0].name||'a reward';}
    }else if(prog.redeem_points){
      if(pts>=prog.redeem_points){rewardReady=true;rewardReadyLabel=`${money(prog.reward_credit_cents)} credit`;}
      else{pointsToUnlock=prog.redeem_points-pts;rewardReadyLabel=`${money(prog.reward_credit_cents)} credit`;}
    }
  }

    consentButton.disabled=true;
    const {error}=await sb.rpc('staff_set_marketing_consent',{p_business:S.biz.id,p_client:id,
      p_idempotency_key:consentIdempotencyKey,p_marketing_consent:to,p_source:'admin client page'});
    if(!isClientDetailCurrent())return;
    if(error){consentButton.disabled=false;return fail(error)}
    toast(to?'Consent recorded':'Consent withdrawn — recorded');clientDetail(id);
  };
  const histMore=$('histMore');
  if(histMore) histMore.onclick=()=>{
    histShown+=50;
    $('histBody').innerHTML=renderHistPage(history,histShown);
    bindReversalButtons(()=>clientDetail(id));
    if(histShown>=history.length) histMore.parentElement.style.display='none';
  };
  bindReversalButtons(()=>clientDetail(id));
}
/* Renders the first n entries of the unified Customer 360 timeline. Each entry keeps its own
   shape (sales carry reversal provenance; appointments split past/upcoming; grants, membership
   and package rows add their own facets) — these come from different tables, not a union query.
   Rendered as a pictogram-first list (low-literacy-first, CLAUDE.md) while preserving the reversal
   buttons' data-reverse-kind/data-reverse-id hooks so bindReversalButtons keeps working. */
function renderHistPage(history,n){
  const rows=history.slice(0,n);
  if(!rows.length) return '<div class="empty small" style="margin-top:6px">No activity yet. When this customer buys, books, or earns a reward, it appears here.</div>';
  const when=t=>`<div class="c360-tl-when">${esc(sgt(t)||'')}</div>`;
  const item=(tone,iconName,titleHtml,detailHtml,sideHtml)=>`<li class="c360-tl-item">
    <span class="c360-tl-ic ${tone}" aria-hidden="true">${CUI.icon(iconName,{size:17})}</span>
    <div class="c360-tl-main"><div class="t">${titleHtml}</div>${detailHtml?`<div class="d">${detailHtml}</div>`:''}</div>
    <div class="c360-tl-side">${sideHtml||''}</div></li>`;
  return `<ul class="c360-timeline">${rows.map(h=>{
    if(h.kind==='sale'){
      const isRev=!!h.is_reversal;
      const relation=isRev?`<span class="pill no">reversal of ${esc(h.original_sale_id||'')}</span>`
        :h.reversal_sale_id?`<span class="pill off">reversed → ${esc(h.reversal_sale_id)}</span>`:'';
      const action=h.can_reverse?`<button class="btn danger sm" data-reverse-kind="sale" data-reverse-id="${h.id}">Reverse</button>`
        :h.refusal_reason?`<span class="muted small">${esc(h.refusal_reason)}</span>`:'';
      const detail=`${esc((h.saleKind||'sale').replace('_',' '))}${h.staff?' · '+esc(h.staff):''}${h.note?' — '+esc(h.note):''}`
        +`${h.is_package_session?'<br><span class="muted small">Package session · reversal restores one session with no payment refund</span>':''}`
        +`${action?'<br>'+action:''}`;
      const amt=Number((h.amount??h.amount_cents)??0);
      const side=`<div class="c360-tl-amt">${money(amt)}</div>${h.reversal_sale_id?`<div class="c360-tl-when">Net ${money(Number(h.net_amount_cents||0))}</div>`:''}${when(h.t)}`;
      return item(isRev?'reversal':'sale',isRev?'retention':'sales',`${isRev?'Reversal':'Sale'} ${relation}`,detail,side);
    }
    if(h.kind==='redemption'){
      const relation=h.reversal_id?'<span class="pill off">reversed</span>':'';
      const action=h.can_reverse?`<button class="btn danger sm" data-reverse-kind="redemption" data-reverse-id="${h.id}">Reverse</button>`
        :`<span class="muted small">${esc(h.refusal_reason||'Not reversible')}</span>`;
      const detail=`${esc(h.reward_name||'Loyalty reward')} · ${Number(h.points_spent||0)} points${h.credit_cents?` → ${money(Number(h.credit_cents))} credit`:''}<br>${action}`;
      return item('reward','redeem',`Reward redeemed ${relation}`,detail,when(h.t));
    }
    if(h.kind==='grant'){
      const value=h.fulfillment_kind==='credit'?money(Number(h.reward_value||0))
        :h.fulfillment_kind==='discount_pct'?`${h.reward_value}% off`:esc(h.reward_item||'free item');
      const detail=`${esc(h.program||'Retention program')} · ${esc(h.reward_label||'Reward')} · ${value}`;
      const side=`${h.fulfillment_kind==='credit'?`<div class="c360-tl-amt">${money(Number(h.reward_value||0))}</div>`:''}${when(h.t)}`;
      return item('reward','loyalty','Retention reward earned',detail,side);
    }
    if(h.kind==='membership'){
      const status=`<span class="pill ${h.status==='active'?'on':h.status==='cancelled'?'no':'off'}">${esc((h.status||'').replace(/_/g,' '))}</span>`;
      const detail=`${esc(h.plan||'Membership')}${h.cadence?' · '+esc(h.cadence):''}${h.renews?' · renews '+esc(String(h.renews).slice(0,10)):''}`;
      return item('membership','memberships',`Membership ${status}`,detail,when(h.t));
    }
    if(h.kind==='package'){
      const status=`<span class="pill ${h.status==='active'?'on':'off'}">${esc((h.status||'').replace(/_/g,' '))}</span>`;
      const detail=`${esc(h.plan||'Package')} · ${Number(h.remaining||0)}/${h.sessions||'?'} sessions left`;
      return item('package','packages',`Package ${status}`,detail,when(h.t));
    }
    const status=`<span class="pill ${h.status==='completed'?'ok':h.status==='booked'?'new':'off'}">${esc(h.status||'')}</span>`;
    const title=`Appointment${h.upcoming?' <span class="c360-upcoming">· upcoming</span>':''}`;
    return item('appt','appointments',title,`${esc(h.service||'general visit')} · ${status}`,when(h.t));
  }).join('')}</ul>`;
}

/* ---------- quick earn (8-digit phone lookup + amount — the counter flow) ----------
   Story: customer pays, staff types the 8-digit phone number, system shows the customer,
   staff presses Confirm. Built as a big, dumb, 3-step screen for low-literacy staff on a
   tablet till: Step 1 number entry (with on-screen keypad), Step 2 customer card + amount,
   Step 3 done. All UI state is local to this closure — nothing persisted, resets on reload
   (no localStorage in this stack) and resets itself on "Next customer". */
async function tillPage(){
  const routeMain=M();
  const isTillCurrent=()=>routeMain.isConnected&&M()===routeMain;
  const canAddClient=canWriteModule('clients');
  const canRecordSales=hasRoleCapability('create_sales')&&canReadModule('clients');
  if(!canRecordSales){
    routeMain.innerHTML=`${CUI.pageHeader({title:'Quick earn',subtitle:'Customer lookup and purchase recording are unavailable for this role.',iconName:'till',canWrite:false,moduleLabel:'Quick earn'})}${CUI.card({title:'Additional access required',description:'Quick earn requires customer read access and permission to record purchases.',body:'<p class="muted small">Ask an owner to review your Customers and Quick earn assignments.</p>'})}`;
    return;
  }
  routeMain.innerHTML=CUI.loadingState({title:'Quick earn',iconName:'till'});
  const [
    {data:tillStaff,error:tillStaffError},{data:tillBranches,error:tillBranchError},
    {data:tillStaffBranches,error:tillStaffBranchError}
  ]=await Promise.all([
    sb.from('staff').select('id').eq('business_id',S.biz.id).eq('user_id',S.user.id).eq('active',true).limit(1),
    sb.from('branches').select('id,name,is_default').eq('business_id',S.biz.id).eq('active',true).order('name'),
    sb.from('staff_branches').select('staff_id,branch_id').eq('business_id',S.biz.id)
  ]);
  if(!isTillCurrent())return;
  if(tillStaffError||tillBranchError||tillStaffBranchError)throw tillStaffError||tillBranchError||tillStaffBranchError;
  const tillStaffId=tillStaff?.[0]?.id||null;
  const canSeeAllTillBranches=S.myRole==='owner'||S.myRole==='manager';
  const tillAssignedBranchIds=new Set((tillStaffBranches||[]).filter(row=>row.staff_id===tillStaffId).map(row=>row.branch_id));
  const accessibleTillBranches=(tillBranches||[]).filter(branch=>canSeeAllTillBranches||tillAssignedBranchIds.has(branch.id));
  let tillBranchId=accessibleTillBranches.some(branch=>branch.id===selectedBranchId)?selectedBranchId:
    (accessibleTillBranches.find(branch=>branch.is_default)?.id||accessibleTillBranches[0]?.id||'');
  if(!tillStaffId||!tillBranchId){
    routeMain.innerHTML=`${CUI.pageHeader({title:'Quick earn',subtitle:'A staff identity and active branch are required before taking payment.',iconName:'till',canWrite:false,moduleLabel:'Quick earn'})}${CUI.card({title:'Quick earn is not ready',description:'Ask an owner to activate this staff account and assign it to a branch.',body:'<p class="muted small">No purchase or points were recorded.</p>'})}`;
    return;
  }
  selectedBranchId=tillBranchId;
  let step=1;             // 1=enter number, 2=customer card / new customer / invalid, 3=done
  let phone='';           // digits typed so far in step 1
  let cust=null;          // lookup_client_by_phone result once status==='found'
  let notFoundPhone=null; // normalised 8-digit phone when status==='not_found'
  let invalidMsg=null;    // message when status==='invalid'
  let saleIdem=null;      // idempotency key for the CURRENT sale attempt — one fresh
                           // crypto.randomUUID() per sale, reused across retries of that
                           // same sale so a double-tap can never earn points twice; a new
                           // key is only minted when a new sale starts (resetToStart / back).
  let busy=false;         // guards Find/Confirm while a request is in flight
  let doneInfo=null;      // {name, pointsEarned, pointsTotal, duplicate} for step 3
  let quickAddIdem=null;   // stable while retrying one Till customer creation
  let tender=null;         // intentionally selected received tender for this purchase

  /* ---- optional cart mode (opt-in advanced checkout; simple mode above is the default) ----
     Cart mode is a per-browser preference. localStorage is prohibited in this stack, so the
     flag rides in sessionStorage (the same primitive the app already uses for retry keys):
     it survives in-session SPA navigation across the till and resets on a full reload, exactly
     like every other preference here. Cart mode changes ONLY the customer-card screen (step 2)
     and adds a receipt to step 3 — steps 1 and the simple confirm path stay byte-identical. */
  const TILL_CART_PREF='frenly.till.cartMode';
  const readCartPref=()=>{try{return sessionStorage.getItem(TILL_CART_PREF)==='1'}catch{return false}};
  const writeCartPref=(on)=>{try{sessionStorage.setItem(TILL_CART_PREF,on?'1':'0')}catch{}};
  let cartMode=readCartPref();
  let cart=[];            // sale + gift lines: {id,type:'service'|'product'|'custom'|'giftcard',label,unit_cents,qty,key?}
  let catalog=null;       // {services:[...],products:[...]|null} lazy-loaded once when cart mode opens
  let catalogLoading=false, catalogError=null;
  let saleCommitted=false, saleResult=null; // once the quick_sale succeeds it is LOCKED; a retry
                                             // never re-runs it, only the failed gift-card calls.
  let checkoutError=null;  // partial-failure banner state on the composer

  function resetToStart(){
    step=1;phone='';cust=null;notFoundPhone=null;invalidMsg=null;saleIdem=null;quickAddIdem=null;tender=null;busy=false;doneInfo=null;
    cart=[];saleCommitted=false;saleResult=null;checkoutError=null;draw();
  }
  function draw(){
    if(step===1) return drawStep1();
    if(step===2) return drawStep2();
    return drawStep3();
  }

  function drawStep1(){
    M().innerHTML=`${CUI.pageHeader({title:'Quick earn',subtitle:"Type the customer's phone number. Nothing else is needed on this step.",iconName:'till',canWrite:canRecordSales,moduleLabel:'Quick earn'})}
      <div class="card frontline-card" style="text-align:center">
        <label class="sr-only" for="tPhone">Customer phone number</label>
        <input id="tPhone" class="frontline-phone" inputmode="numeric" autocomplete="tel-national" maxlength="8" placeholder="8186 3833" value="${esc(phone)}">
        <div id="tErr"></div>
        <button class="btn" id="tFind" style="width:100%;margin-top:14px;padding:16px;font-size:17px">${CUI.icon('forward',{size:19})} Next</button>
        <div class="grid frontline-keypad" id="tKeys" aria-label="Phone keypad">
          ${['1','2','3','4','5','6','7','8','9','⌫','0','✕'].map(k=>`<button class="btn ghost" data-k="${k}" aria-label="${k==='⌫'?'Delete one digit':k==='✕'?'Clear phone number':'Digit '+k}">${k}</button>`).join('')}
        </div>
        <p class="muted small" style="margin-top:14px">⌫ deletes one digit · ✕ clears</p>
      </div>`;
    const inp=$('tPhone');
    inp.focus();
    inp.oninput=()=>{phone=inp.value.replace(/\D/g,'').slice(0,8);inp.value=phone};
    inp.onkeydown=(e)=>{if(e.key==='Enter') doFind();};
    $('tFind').onclick=doFind;
    document.querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>{
      const k=b.dataset.k;
      if(k==='⌫') phone=phone.slice(0,-1);
      else if(k==='✕') phone='';
      else if(phone.length<8) phone+=k;
      inp.value=phone;inp.focus();
    });
  }
  async function doFind(){
    if(busy) return;
    if(!phone){$('tErr').innerHTML='<div class="err">Enter a phone number</div>';return}
    busy=true;$('tFind').disabled=true;$('tFind').textContent='Looking…';
    const {data,error}=await sb.rpc('lookup_client_by_phone',{p_business:S.biz.id,p_phone:phone});
    if(!isTillCurrent())return;
    busy=false;$('tFind').disabled=false;$('tFind').innerHTML=`${CUI.icon('forward',{size:19})} Next`;
    if(error) return fail(error);
    if(data.status==='found'){cust=data;notFoundPhone=null;invalidMsg=null;step=2;draw();return}
    if(data.status==='not_found'){cust=null;notFoundPhone=data.phone;invalidMsg=null;quickAddIdem=crypto.randomUUID();step=2;draw();return}
    if(data.status==='invalid'){invalidMsg=data.message||'Enter a valid Singapore number';step=2;draw();return}
  }

  function drawStep2(){
    if(invalidMsg) return drawInvalid();
    if(!cust) return drawNewCustomer();
    return cartMode?drawCartComposer():drawCustomerCard();
  }
  /* Mode switch shown in the step-2 header. Present in BOTH renders so switching is symmetric;
     it never touches the simple-mode form fields, so the simple sale flow is unchanged. */
  function cartToggleHtml(){
    return `<button type="button" class="btn ghost sm" id="tModeToggle" role="switch" aria-checked="${cartMode?'true':'false'}" aria-label="Cart mode — build a multi-item sale">
      ${CUI.icon(cartMode?'sales':'till',{size:16})}<span>${cartMode?'Cart mode':'Simple mode'}</span></button>`;
  }
  function bindCartToggle(){
    const t=$('tModeToggle');if(!t)return;
    t.onclick=()=>{cartMode=!cartMode;writeCartPref(cartMode);saleIdem=null;checkoutError=null;
      CUI.announce(cartMode?'Cart mode on':'Simple mode on');draw();};
  }
  function drawInvalid(){
    M().innerHTML=`${CUI.pageHeader({title:'Quick earn',subtitle:'The phone number could not be used.',iconName:'till',canWrite:canRecordSales,moduleLabel:'Quick earn'})}
      <div class="card frontline-card" style="text-align:center">
        ${CUI.icon('info',{size:40})}
        <div class="err" style="margin-top:10px">${esc(invalidMsg)}</div>
        <button class="btn ghost sm" id="tBack" style="margin-top:14px">${CUI.icon('back',{size:17})} Try another number</button>
      </div>`;
    $('tBack').onclick=()=>{invalidMsg=null;step=1;draw()};
  }
  function drawNewCustomer(){
    M().innerHTML=`${CUI.pageHeader({title:'Quick earn',subtitle:'This number is new. Add the customer once, then continue.',iconName:'till',canWrite:canRecordSales,moduleLabel:'Quick earn'})}
      <div class="card frontline-card" style="text-align:center">
        ${CUI.icon('customers',{size:40})}
        <h2 style="margin:8px 0 2px">New customer</h2>
        <p class="muted small">${esc(notFoundPhone||phone)} isn't in your system yet</p>
        <div style="text-align:left"><label for="tName">Name</label><input id="tName" placeholder="Customer's name">
        <label style="display:flex;align-items:center;gap:8px;margin-top:14px;cursor:pointer;color:var(--ink);font-weight:500;font-size:14px">
          <input type="checkbox" id="tConsent" style="width:auto"> Marketing consent given</label></div>
        <div id="tErr2"></div>
        ${canAddClient?'<button class="btn" id="tAdd" style="width:100%;margin-top:16px;padding:16px;font-size:16px">Add & continue</button>':'<div class="err">Customer creation is read only for your role.</div>'}
        <button class="btn ghost sm" id="tBack" style="width:100%;margin-top:10px">${CUI.icon('back',{size:17})} Different number</button>
      </div>`;
    $('tBack').onclick=()=>{quickAddIdem=null;step=1;draw()};
    if($('tAdd'))$('tAdd').onclick=async()=>{
      if(busy) return;
      const name=$('tName').value.trim();
      if(name.length<2){$('tErr2').innerHTML='<div class="err">Enter a name</div>';return}
      busy=true;$('tAdd').disabled=true;
      if(!quickAddIdem) quickAddIdem=crypto.randomUUID();
      const {data,error}=await sb.rpc('staff_create_client',{p_business:S.biz.id,p_idempotency_key:quickAddIdem,
        p_phone:notFoundPhone||phone,p_full_name:name,p_marketing_consent:$('tConsent').checked,
        p_source:'till quick add'});
      if(!isTillCurrent())return;
      if(error){busy=false;$('tAdd').disabled=false;$('tErr2').innerHTML=`<div class="err">${esc(error.message)}</div>`;return}
      const {data:lk,error:lkErr}=await sb.rpc('lookup_client_by_phone',{p_business:S.biz.id,p_phone:notFoundPhone||phone});
      if(!isTillCurrent())return;
      busy=false;
      if(lkErr||!lk||lk.status!=='found'){$('tAdd').disabled=false;fail(lkErr||new Error('Customer added, but could not load their card — press Find again'));return}
      toast(data.status==='completed'?'Customer added ✓':'Customer found ✓');
      cust=lk;step=2;draw();
    };
  }
  function drawCustomerCard(){
    M().innerHTML=`${CUI.pageHeader({title:'Quick earn',subtitle:'Confirm the customer, amount paid and payment method. Frenly saves the purchase and points together.',iconName:'till',canWrite:canRecordSales,moduleLabel:'Quick earn',actions:cartToggleHtml()})}
      <div class="card frontline-card">
        <div style="text-align:center">
          <div style="font-size:1.9rem;font-weight:700;letter-spacing:-.035em">${esc(cust.full_name)}</div>
          <p class="muted small">${esc(cust.phone||'')}</p>
          <p class="inline-status" style="justify-content:center;margin-top:9px;color:var(--green)">${CUI.icon('check',{size:17})}<span>Customer found</span></p>
        </div>
        <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
        ${canRecordSales?`${accessibleTillBranches.length>1
          ?`<label for="tBranch">Branch</label><select id="tBranch">${accessibleTillBranches.map(branch=>`<option value="${branch.id}" ${branch.id===tillBranchId?'selected':''}>${esc(branch.name)}</option>`).join('')}</select>`
          :`<p class="muted small" style="margin-bottom:12px"><b>Branch:</b> ${esc(accessibleTillBranches[0].name)}</p>`}
        <label for="tAmt">Amount paid (${S.biz.currency||'SGD'})</label>
        <input id="tAmt" inputmode="decimal" placeholder="0.00" style="font-size:28px;text-align:center;height:56px">
        <fieldset style="border:0;padding:0;margin:16px 0 0"><legend style="font-size:13px;font-weight:700">Payment received</legend>
          <div class="frontline-tenders" id="tTenders">
            ${[['cash','Cash'],['card','Card'],['paynow','PayNow'],['other','Other']].map(([value,label])=>`<button type="button" class="btn ghost" data-tender="${value}" aria-pressed="${tender===value}">${label}</button>`).join('')}
          </div>
        </fieldset>
        <div id="tErr3"></div>
        <button class="btn" id="tConfirm" style="width:100%;margin-top:14px;padding:18px;font-size:18px">${CUI.icon('check',{size:19})} Save & add points</button>`:'<div class="permission-banner" role="note">Purchases cannot be recorded by this role.</div>'}
        <button class="btn ghost sm" id="tBack" style="width:100%;margin-top:10px">${CUI.icon('back',{size:17})} Different number</button>
      </div>`;
    bindCartToggle();
    $('tBack').onclick=()=>{step=1;cust=null;saleIdem=null;draw()};
    if($('tBranch'))$('tBranch').onchange=()=>{tillBranchId=$('tBranch').value;selectedBranchId=tillBranchId;saleIdem=null};
    document.querySelectorAll('[data-tender]').forEach(button=>button.onclick=()=>{
      tender=button.dataset.tender;saleIdem=null;
      document.querySelectorAll('[data-tender]').forEach(choice=>choice.setAttribute('aria-pressed',String(choice===button)));
      CUI.announce(`${button.textContent.trim()} selected`);
    });
    if($('tAmt')){$('tAmt').focus();$('tAmt').oninput=()=>{saleIdem=null}};
    if($('tAmt'))$('tAmt').onkeydown=e=>{if(e.key==='Enter')$('tConfirm')?.click()};
    if($('tConfirm'))$('tConfirm').onclick=async()=>{
      if(busy) return;
      const rawAmount=$('tAmt').value.trim();
      if(!/^\d+(?:\.\d{1,2})?$/.test(rawAmount)){$('tErr3').innerHTML='<div class="err">Enter dollars and cents, for example 12.50</div>';return}
      const amt=Math.round(Number(rawAmount)*100);
      if(!(amt>0)||amt>2147483647){$('tErr3').innerHTML='<div class="err">Enter an amount between 0.01 and 21,474,836.47</div>';return}
      if(!tender){$('tErr3').innerHTML='<div class="err">Choose how the customer paid</div>';return}
      if(!saleIdem) saleIdem=crypto.randomUUID(); // fresh key for this sale; reused on retry
      busy=true;$('tConfirm').disabled=true;$('tConfirm').textContent='Recording…';
      const {data,error}=await sb.rpc('record_sale_by_phone',{p_business:S.biz.id,p_phone:cust.phone||phone,
        p_amount_cents:amt,p_kind:'quick_sale',p_note:null,p_staff:tillStaffId,p_idem:saleIdem,
        p_branch:tillBranchId,p_method:tender});
      if(!isTillCurrent())return;
      busy=false;
      if(error){$('tConfirm').disabled=false;$('tConfirm').textContent='Save & add points';return fail(error)}
      doneInfo=(data.status==='duplicate_ignored')
        ?{name:data.full_name,pointsEarned:0,pointsTotal:data.points,method:data.payment_method,duplicate:true}
        :{name:data.full_name,pointsEarned:data.points_earned||0,pointsTotal:data.points,method:data.payment_method,duplicate:false};
      step=3;draw();
    };
  }

  /* ---- cart mode: compose a multi-item sale from the catalog the app already reads ----
     Honest write-path map (verified against migrations): the only sale write path reachable
     from this till surface is record_sale_by_phone → record_quick_sale, which books ONE
     quick_sale row + ONE payment row for a single total and earns points on it. There is NO
     sale_items / line-item table. So service, retail and custom lines are summed into that one
     idempotent quick_sale and their breakdown is written into the note (a real field in the
     contract, ≤1000 chars) — never faked as per-line financial rows. Gift cards ARE a separate
     honest, server-idempotent path (issue_gift_card), so each gift line is its own call, run
     AFTER the sale. Packages/memberships are deliberately excluded: sell_package and
     enroll_membership_v41 have NO server idempotency key, so they cannot be made double-tap
     safe here without a forbidden write-path change (gap recorded for a future v51). */
  async function loadCatalog(){
    if(catalog||catalogLoading) return;
    catalogLoading=true;catalogError=null;
    const wantProducts=canReadModule('inventory');
    const [svc,prod]=await Promise.all([
      sb.from('services').select('id,name,price_cents,active').eq('business_id',S.biz.id).eq('active',true).order('name'),
      wantProducts?sb.from('products').select('id,name,retail_price_cents,active').eq('business_id',S.biz.id).eq('active',true).order('name')
        :Promise.resolve({data:null,error:null})
    ]);
    if(!isTillCurrent())return;
    catalogLoading=false;
    if(svc.error){catalogError=svc.error.message||'The catalog could not be loaded.';draw();return}
    catalog={
      services:(svc.data||[]).map(s=>({id:s.id,name:s.name,unit_cents:s.price_cents||0})),
      products:(prod.error||!prod.data)?null:prod.data.map(p=>({id:p.id,name:p.name,unit_cents:p.retail_price_cents||0}))
    };

  }
  function addCatalogLine(type,item){
    if(checkoutError)return;
    const ex=cart.find(l=>l.type===type&&l.ref===item.id);
    if(ex){ex.qty++;}
    else cart.push({lineId:crypto.randomUUID(),type,ref:item.id,label:item.name,unit_cents:item.unit_cents,qty:1});
    saleIdem=null;CUI.announce(`${item.name} added`);draw();
  }
  function addCustomLine(cents){

  }
  function addGiftLine(cents){
    if(checkoutError)return;

  function changeQty(lineId,delta){
    if(checkoutError)return;
    const l=cart.find(x=>x.lineId===lineId);if(!l||l.type==='giftcard')return;
    l.qty=Math.max(1,l.qty+delta);saleIdem=null;draw();
  }
  function removeLine(lineId){
    if(checkoutError)return;
    cart=cart.filter(x=>x.lineId!==lineId);saleIdem=null;draw();
  }
  function saleLinesOf(){return cart.filter(l=>l.type!=='giftcard')}
  function giftLinesOf(){return cart.filter(l=>l.type==='giftcard')}
  function saleSubtotalCents(){return saleLinesOf().reduce((s,l)=>s+l.unit_cents*l.qty,0)}
  function grandTotalCents(){return cart.reduce((s,l)=>s+l.unit_cents*l.qty,0)}

  function drawCartComposer(){
    if(catalog===null&&!catalogError)loadCatalog();

    const branchPicker=accessibleTillBranches.length>1

          ?`<b class="small" style="display:block;margin-top:14px">Retail</b><div class="till-cart-catalog">${catalog.products.map(p=>`<button type="button" class="btn ghost" data-add="product" data-id="${p.id}">${esc(p.name)}<span class="till-cart-price">${money(p.unit_cents)}</span></button>`).join('')}</div>`
          :'';
        picker=`<b class="small" style="display:block">Services</b>${svcBtns}${prodBtns}
          <div class="split" style="margin-top:14px;align-items:end">
            <div><label for="tCustom">Other amount (${S.biz.currency||'SGD'})</label><input id="tCustom" inputmode="decimal" placeholder="0.00"></div>
            <div><button type="button" class="btn ghost" id="tCustomAdd" style="width:100%">${CUI.icon('add',{size:16})} Add item</button></div>
          </div>

            <div><button type="button" class="btn ghost" id="tGiftAdd" style="width:100%">${CUI.icon('giftcard',{size:16})} Add card</button></div>

    const linesHtml=cart.length?`<ul class="till-cart-lines">${cart.map(l=>{
      const done=l.type==='giftcard'&&l._status==='issued';
      const failed=l.type==='giftcard'&&l._status==='failed';

        :l.type==='custom'?'<span class="till-cart-line-sub">Other item</span>':'';
      const qtyCtl=(l.type==='giftcard'||checkoutError)?'':`<div class="till-cart-qty">
        <button type="button" class="btn ghost" data-qty="-1" data-line="${l.lineId}" aria-label="Reduce quantity">−</button>
        <output aria-label="Quantity">${l.qty}</output>
        <button type="button" class="btn ghost" data-qty="1" data-line="${l.lineId}" aria-label="Increase quantity">+</button></div>`;
      const rm=checkoutError?'':`<button type="button" class="btn ghost sm" data-remove="${l.lineId}" aria-label="Remove ${esc(l.label)}">${CUI.icon('close',{size:16})}</button>`;
      return `<li class="till-cart-line"><span class="till-cart-line-label">${esc(l.label)}${l.qty>1&&l.type!=='giftcard'?` ×${l.qty}`:''}${badge}</span>${qtyCtl}<span class="till-cart-line-amount">${money(l.unit_cents*l.qty)}</span>${rm}</li>`;
    }).join('')}</ul>
      <div class="till-cart-total"><span>Total</span><span class="till-cart-total-num">${money(grand)}</span></div>`
      :`<div class="empty" style="padding:22px 8px"><div>${CUI.icon('sales',{size:30})}</div><p class="muted small" style="margin-top:8px">Cart is empty. Tap a service or add an amount to begin.</p></div>`;
    // tender (only meaningful when a points-earning sale is part of the cart)
    const tenderHtml=(cart.length&&!checkoutError)?`<fieldset style="border:0;padding:0;margin:16px 0 0"><legend style="font-size:13px;font-weight:700">Payment received</legend>
      <div class="frontline-tenders" id="tTenders">${[['cash','Cash'],['card','Card'],['paynow','PayNow'],['other','Other']].map(([value,label])=>`<button type="button" class="btn ghost" data-tender="${value}" aria-pressed="${tender===value}">${label}</button>`).join('')}</div>
      ${saleSub===0?'<p class="muted small" style="margin-top:6px">Gift-card-only sale — tender is recorded on your receipt but not stored against the card.</p>':''}</fieldset>`:'';
    // partial-failure panel
    const partialHtml=checkoutError?`<div class="err" role="alert" style="margin-top:12px"><b>Some steps did not finish</b><p style="margin:4px 0 0">${esc(checkoutError)}</p></div>
      <div class="till-cart-status ${saleCommitted?'ok':''}">${CUI.icon(saleCommitted?'check':'info',{size:17})}<span>${saleCommitted?`Sale recorded${saleResult?.duplicate?' (already recorded earlier)':''} · +${saleResult?.pointsEarned||0} points`:'No points-earning sale in this cart'}</span></div>
      <button class="btn" id="tRetryGifts" style="width:100%;margin-top:12px;padding:16px">${CUI.icon('retention',{size:18})} Retry unfinished</button>
      <button class="btn ghost sm" id="tFinishPartial" style="width:100%;margin-top:8px">See receipt (with what failed)</button>`:'';

    M().innerHTML=`${CUI.pageHeader({title:'Quick earn',subtitle:'Build the cart, choose payment, then charge once. Points are added on the sale total.',iconName:'till',canWrite:canRecordSales,moduleLabel:'Quick earn',actions:cartToggleHtml()})}
      <div class="card frontline-card till-cart-card">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px">
          <div><div style="font-size:1.3rem;font-weight:700;letter-spacing:-.03em">${esc(cust.full_name)}</div><p class="muted small" style="margin:0">${esc(cust.phone||'')}</p></div>
          <p class="inline-status" style="margin:0;color:var(--green)">${CUI.icon('check',{size:16})}<span>Found</span></p>
        </div>
        <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
        ${branchPicker}
        ${picker}
        ${linesHtml}
        <div id="tcErr"></div>
        ${tenderHtml}
        ${partialHtml}
        ${(cart.length&&!checkoutError)?`<button class="btn" id="tCartConfirm" style="width:100%;margin-top:16px;padding:18px;font-size:18px">${CUI.icon('check',{size:19})} Take payment · ${money(grand)}</button>`:''}
        <button class="btn ghost sm" id="tBack" style="width:100%;margin-top:10px">${CUI.icon('back',{size:17})} Different number</button>
      </div>`;
    bindCartToggle();
    $('tBack').onclick=()=>{if(checkoutError){toast('Finish or retry the gift cards first');return}step=1;cust=null;saleIdem=null;cart=[];draw()};
    if($('tBranch'))$('tBranch').onchange=()=>{tillBranchId=$('tBranch').value;selectedBranchId=tillBranchId;saleIdem=null};
    if($('tCatRetry'))$('tCatRetry').onclick=()=>{catalogError=null;catalog=null;draw()};
    document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{
      const type=b.dataset.add, list=type==='service'?catalog.services:catalog.products;
      const item=(list||[]).find(x=>x.id===b.dataset.id);if(item)addCatalogLine(type,item);
    });
    if($('tCustomAdd'))$('tCustomAdd').onclick=()=>{
      const raw=($('tCustom').value||'').trim();
      if(!/^\d+(?:\.\d{1,2})?$/.test(raw))return cartErr('Enter dollars and cents, for example 12.50');
      const c=Math.round(Number(raw)*100);if(!(c>0)||c>2147483647)return cartErr('Enter an amount between 0.01 and 21,474,836.47');
      addCustomLine(c);
    };
    if($('tGiftAdd'))$('tGiftAdd').onclick=()=>{
      const raw=($('tGift').value||'').trim();
      if(!/^\d+(?:\.\d{1,2})?$/.test(raw))return cartErr('Enter a gift-card value, for example 50.00');
      const c=Math.round(Number(raw)*100);if(!(c>0)||c>100000000)return cartErr('Gift card must be between 0.01 and 1,000,000.00');
      addGiftLine(c);
    };
    document.querySelectorAll('[data-qty]').forEach(b=>b.onclick=()=>changeQty(b.dataset.line,parseInt(b.dataset.qty,10)));
    document.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>removeLine(b.dataset.remove));
    document.querySelectorAll('[data-tender]').forEach(button=>button.onclick=()=>{
      tender=button.dataset.tender;saleIdem=null;
      document.querySelectorAll('[data-tender]').forEach(choice=>choice.setAttribute('aria-pressed',String(choice===button)));
      CUI.announce(`${button.textContent.trim()} selected`);
    });
    if($('tCartConfirm'))$('tCartConfirm').onclick=doCartCheckout;
    if($('tRetryGifts'))$('tRetryGifts').onclick=doCartCheckout;
    if($('tFinishPartial'))$('tFinishPartial').onclick=()=>finishCartReceipt();
  }
  function cartErr(msg){const e=$('tcErr');if(e)e.innerHTML=`<div class="err">${esc(msg)}</div>`;else toast(msg)}

  /* Honest checkout sequencing + partial-failure handling.
     Order: (1) the single points-earning quick_sale (record_sale_by_phone) for the summed
     service/retail/custom lines, then (2) one issue_gift_card per gift line. Idempotency:
     the quick_sale reuses `saleIdem` across retries (server dedupes on it); each gift line
     carries its own stable `key`. If the sale fails we STOP — no gift card is issued. If the
     sale succeeds it is LOCKED (saleCommitted) and never re-run; a retry re-invokes only the
     gift-card calls that failed, with their original keys — never a different call, never a
     silent replay of the sale. */
  async function doCartCheckout(){
    if(busy)return;
    const saleLines=saleLinesOf(), giftLines=giftLinesOf(), saleSub=saleSubtotalCents();
    if(!cart.length)return cartErr('Add at least one item');
    if(saleSub>0&&saleSub>2147483647)return cartErr('Sale total is too large');
    if(saleSub>0&&!tender)return cartErr('Choose how the customer paid');
    busy=true;checkoutError=null;
    const confirmBtn=$('tCartConfirm')||$('tRetryGifts');if(confirmBtn){confirmBtn.disabled=true;confirmBtn.textContent='Working…'}
    // (1) points-earning quick sale — only if not already committed and there is a positive subtotal
    if(saleSub>0&&!saleCommitted){
      if(!saleIdem)saleIdem=crypto.randomUUID();
      let note=`Till cart · ${saleLines.length} line${saleLines.length===1?'':'s'} · `+
        saleLines.map(l=>`${l.label}${l.qty>1?' x'+l.qty:''} ${money(l.unit_cents*l.qty)}`).join('; ');
      if(note.length>1000)note=note.slice(0,997)+'…';
      const {data,error}=await sb.rpc('record_sale_by_phone',{p_business:S.biz.id,p_phone:cust.phone||phone,
        p_amount_cents:saleSub,p_kind:'quick_sale',p_note:note,p_staff:tillStaffId,p_idem:saleIdem,
        p_branch:tillBranchId,p_method:tender});
      if(!isTillCurrent())return;
      if(error){busy=false;if(confirmBtn){confirmBtn.disabled=false;confirmBtn.textContent='Retry'}return cartErr(error.message||'The sale could not be recorded — try again')}
      saleCommitted=true;
      saleResult=(data.status==='duplicate_ignored')
        ?{pointsEarned:0,pointsTotal:data.points,method:data.payment_method,duplicate:true}
        :{pointsEarned:data.points_earned||0,pointsTotal:data.points,method:data.payment_method,duplicate:false};
    }
    // (2) gift cards — each independent and idempotent; failures are collected, not thrown
    let anyGiftFailed=false;
    for(const l of giftLines){
      if(l._status==='issued')continue;
      const {data,error}=await sb.rpc('issue_gift_card',{p_business:S.biz.id,p_amount:l.unit_cents,
        p_purchaser:cust.client_id,p_recipient_email:null,p_idempotency_key:l.key});
      if(!isTillCurrent())return;
      if(error){anyGiftFailed=true;l._status='failed';l._error=error.message||'issue failed';continue}
      l._status='issued';l._code=data.code;l._error=null;
    }
    busy=false;
    if(anyGiftFailed){
      checkoutError='The sale is safe. One or more gift cards could not be issued. Retry to finish just those — nothing is charged twice.';
      draw();return;
    }
    finishCartReceipt();
  }
  function finishCartReceipt(){
    const saleLines=saleLinesOf(), giftLines=giftLinesOf(), saleSub=saleSubtotalCents();
    doneInfo={receipt:true,name:cust.full_name,tender,
      lines:saleLines.map(l=>({label:l.label,qty:l.qty,amount:l.unit_cents*l.qty})),
      gifts:giftLines.map(l=>({amount:l.unit_cents,status:l._status||'issued',code:l._code||null,error:l._error||null})),
      saleSub,grand:grandTotalCents(),
      pointsEarned:saleResult?saleResult.pointsEarned:0,
      pointsTotal:saleResult?saleResult.pointsTotal:(cust.points??null),
      duplicate:saleResult?saleResult.duplicate:false};
    checkoutError=null;step=3;draw();
  }
  function drawStep3(){
    if(doneInfo&&doneInfo.receipt)return drawCartReceipt();
    M().innerHTML=`${CUI.pageHeader({title:'Quick earn',subtitle:'Points added. The screen is ready for the next customer.',iconName:'till',canWrite:canRecordSales,moduleLabel:'Quick earn'})}
      <div class="card frontline-card" style="text-align:center">
        ${CUI.icon('check',{size:56})}
        <h2 style="margin:8px 0 4px">${doneInfo.duplicate?'Already recorded':'Done'}</h2>
        ${doneInfo.duplicate?`<p class="muted">This sale was already recorded — no extra points added.</p>`
          :`<p style="font-size:1.6rem;font-weight:700;letter-spacing:-.035em;color:var(--green);margin-top:4px;font-variant-numeric:tabular-nums">+${doneInfo.pointsEarned} points</p>`}
        <p class="muted small" style="margin-top:6px">${esc(doneInfo.name)} · ${esc(doneInfo.method||'payment')} received · now ${doneInfo.pointsTotal} points total</p>
        <button class="btn" id="tNext" style="width:100%;margin-top:20px;padding:16px;font-size:16px">Next customer ${CUI.icon('forward',{size:18})}</button>
      </div>`;
    $('tNext').onclick=resetToStart;
  }
  /* Cart-mode receipt: items, gift-card codes (with any failures honestly flagged), tender,
     points earned (straight from the RPC responses), then reset for the next customer. */
  function drawCartReceipt(){
    const d=doneInfo;
    const anyGiftFailed=d.gifts.some(g=>g.status==='failed');
    const lineRows=d.lines.map(l=>`<li><span>${esc(l.label)}${l.qty>1?` ×${l.qty}`:''}</span><span>${money(l.amount)}</span></li>`).join('');
    const giftRows=d.gifts.map(g=>`<li><span>Gift card ${g.status==='failed'?'(not issued)':`· <span class="till-receipt-code">${esc(g.code||'')}</span>`}</span><span>${g.status==='failed'?'—':money(g.amount)}</span></li>`).join('');
    M().innerHTML=`${CUI.pageHeader({title:'Quick earn',subtitle:anyGiftFailed?'Sale saved. Some gift cards did not issue.':'Sale saved and points added. Ready for the next customer.',iconName:'till',canWrite:canRecordSales,moduleLabel:'Quick earn'})}
      <div class="card frontline-card till-cart-card" style="text-align:center">
        ${CUI.icon(anyGiftFailed?'info':'check',{size:52})}
        <h2 style="margin:8px 0 4px">${d.duplicate?'Already recorded':anyGiftFailed?'Mostly done':'Done'}</h2>
        ${d.saleSub>0?(d.duplicate
          ?`<p class="muted">This sale was already recorded — no extra points added.</p>`
          :`<p style="font-size:1.5rem;font-weight:700;letter-spacing:-.03em;color:var(--green);margin-top:2px;font-variant-numeric:tabular-nums">+${d.pointsEarned} points</p>`)
          :`<p class="muted small">Gift-card-only sale — no points earned.</p>`}
        <ul class="till-receipt-lines" style="text-align:left">${lineRows}${giftRows}</ul>
        <div class="till-cart-total"><span>Total</span><span class="till-cart-total-num">${money(d.grand)}</span></div>
        <p class="muted small" style="margin-top:8px">${esc(d.name)} · ${esc(d.tender||'payment')} received${d.pointsTotal!=null?` · now ${d.pointsTotal} points total`:''}</p>
        ${anyGiftFailed?`<p class="err" role="alert" style="margin-top:10px">Some gift cards could not be issued. Reopen this customer to try again — the recorded sale will not be charged twice.</p>`:''}
        <button class="btn" id="tNext" style="width:100%;margin-top:18px;padding:16px;font-size:16px">Next customer ${CUI.icon('forward',{size:18})}</button>
      </div>`;
    $('tNext').onclick=resetToStart;
  }

  /* A phone handed in from the global app-bar search starts step 1 pre-filled and, when it is a
     complete number, runs the same lookup a keypad tap would (lookup_client_by_phone) — no new
     call, just a jump straight to the customer's card. */
  if(pendingTillPhone){phone=String(pendingTillPhone).replace(/\D/g,'').slice(0,8);pendingTillPhone='';}
  draw();
  if(phone.length===8)doFind();
}

/* ---------- sales ---------- */
async function salesPage(){

    sb.from('clients').select('id,full_name').eq('business_id',S.biz.id).order('full_name'),

  const saleBranches=branchRows||[];

  let quickSaleAttempt=null;
  M().innerHTML=`<div class="topbar"><div><h1>Sales</h1><p class="muted small">Record a sale — loyalty points and retention rewards fire automatically</p></div></div>
    <div class="split">
    <div class="card"><b>Quick sale</b>
      <label>Customer</label><select id="qc"><option value="">Walk-in (no loyalty)</option>
        ${(cl||[]).map(c=>`<option value="${c.id}">${esc(c.full_name)}</option>`).join('')}</select>
      <label>Branch</label><select id="qb">${saleBranches.map(b=>`<option value="${b.id}" ${b.id===initialSaleBranch?'selected':''}>${esc(b.name)}</option>`).join('')||'<option value="">No active permitted branch</option>'}</select>
      <label>Amount (${S.biz.currency||'SGD'})</label><input id="qa" type="number" min="0" step="0.01" placeholder="45.00">
      <div class="split"><div><label>Payment state</label><select id="qpaid"><option value="true">Paid now</option><option value="false">Unpaid</option></select></div>
      <div><label>Payment method</label><select id="qm"><option data-method="cash">Cash</option><option data-method="card">Card</option><option data-method="paynow">PayNow</option><option data-method="bank_transfer">Bank transfer</option><option data-method="other">Other</option></select></div></div>
      <label>Note</label><input id="qn" placeholder="optional">
      <div style="margin-top:16px"><button class="btn" id="rec">Record sale</button></div></div>
    <div class="card"><b>Recent sales</b><div id="recent" style="margin-top:8px"><p class="muted small">Loading…</p></div></div></div>`;
  $('rec').onclick=async()=>{
    const amt=Math.round(parseFloat($('qa').value||'0')*100);
    if(!(amt>0)) return toast('Enter an amount');
    if(!$('qb').value) return toast('Choose an active branch');
    const request={p_business:S.biz.id,p_amount_cents:amt,p_method:$('qm').selectedOptions[0].dataset.method,
      p_client:$('qc').value||null,p_staff:null,p_branch:$('qb').value,
      p_note:$('qn').value.trim()||null,p_paid:$('qpaid').value==='true'};
    const fingerprint=JSON.stringify(request);
    if(!quickSaleAttempt||quickSaleAttempt.fingerprint!==fingerprint){
      quickSaleAttempt={fingerprint,key:crypto.randomUUID()};
    }
    $('rec').disabled=true;
    const {data,error}=await sb.rpc('record_quick_sale',{
      ...request,p_idempotency_key:quickSaleAttempt.key});
    $('rec').disabled=false;
    if(error) return fail(error);
    quickSaleAttempt=null;
    toast(data?.replayed?'Quick sale retry verified — no duplicate created':
      request.p_paid?'Quick sale and payment recorded atomically ✓':'Unpaid quick sale recorded ✓');
    $('qa').value='';$('qn').value='';loadRecent();
  };
  async function loadRecent(){
    const [{data:sl,error},workflow]=await Promise.all([
      sb.from('sales').select('*, clients(full_name)').eq('business_id',S.biz.id).order('occurred_at',{ascending:false}).limit(50),
      loadReversalWorkflows(null,50).catch(e=>{fail(e);return null})]);
    if(error)return fail(error);

    <div class="card"><b>Your services</b><div id="slist" style="margin-top:8px"></div></div></div>`;
  /* Keep the list in memory so an add reflects INSTANTLY (one insert round-trip that
     returns the row, then local splice + re-render) instead of a second full re-fetch. */
  let svCache=[];
  function renderSvc(){
    const sv=svCache;
    $('slist').innerHTML=(sv&&sv.length)?`<table><tr><th>Service</th><th>Price</th><th>Mins</th><th>Status</th><th></th></tr>
      ${sv.map(s=>`<tr><td><b>${esc(s.name)}</b></td><td>${money(s.price_cents)}</td><td>${s.duration_min}</td>
      <td><span class="pill ${s.active?'on':'off'}">${s.active?'active':'off'}</span></td>
      <td><button class="btn ghost sm" onclick="toggleSvc('${s.id}',${!s.active})">${s.active?'Disable':'Enable'}</button></td></tr>`).join('')}</table>`
      :`<div class="empty"><div class="big">🛠️</div>No services yet.</div>`;
  }
  $('sadd').onclick=async()=>{
    const name=$('sn').value.trim(),price=Math.round(parseFloat($('sp').value||'0')*100),dur=parseInt($('sd').value||'60');
    if(name.length<2) return toast('Name required');
    const btn=$('sadd');btn.disabled=true;btn.textContent='Adding…';
    const {data,error}=await sb.from('services').insert({business_id:S.biz.id,name,price_cents:price,duration_min:dur}).select().single();
    btn.disabled=false;btn.textContent='Add service';
    if(error) return fail(error);
    svCache=[...svCache,data].sort((a,b)=>a.name.localeCompare(b.name));
    renderSvc();
    toast('Service added');$('sn').value='';$('sp').value='';$('sn').focus();
  };
  window.toggleSvc=async(id,to)=>{
    await sb.from('services').update({active:to}).eq('id',id);
    const s=svCache.find(x=>x.id===id);if(s)s.active=to;renderSvc();
  };
  async function load(){
    const {data:sv}=await sb.from('services').select('*').eq('business_id',S.biz.id).order('name');
    svCache=sv||[];renderSvc();
  }
  load();
  /* bundles + resources */
  M().insertAdjacentHTML('beforeend',`<div class="split" style="margin-top:16px">
    <div class="card"><b>Bundles</b><p class="muted small" style="margin:6px 0 10px">Several services at one price.</p>
      <label>Name</label><input id="bnm" placeholder="e.g. Cut + Colour">
      <label>Bundle price (${S.biz.currency||'SGD'})</label><input id="bpr" type="number" min="0" step="0.01">
      <label>Included services</label><div id="bsv" class="small"></div>
      <div style="margin-top:12px"><button class="btn sm" id="badd3">Create bundle</button></div>
      <div id="blist3" style="margin-top:12px"></div></div>
    <div class="card"><b>Resources</b><p class="muted small" style="margin:6px 0 10px">Rooms, chairs, equipment you can assign to appointments.</p>
      <div class="row"><input id="rnm" placeholder="e.g. Room 2"><button class="btn sm" id="radd3">Add</button></div>
      <div id="rlist3" style="margin-top:12px"></div></div></div>`);
  async function loadBR(){
    const [{data:sv2},{data:bu},{data:rs}]=await Promise.all([
      sb.from('services').select('id,name').eq('business_id',S.biz.id).eq('active',true).order('name'),
      sb.from('bundles').select('*, bundle_items(service_id, services(name))').eq('business_id',S.biz.id).order('name'),
      sb.from('resources').select('*').eq('business_id',S.biz.id).order('name')]);
    $('bsv').innerHTML=(sv2||[]).map(s=>`<label style="display:inline-flex;gap:6px;margin:4px 10px 0 0;cursor:pointer;color:var(--ink)">

    $('blist3').innerHTML=(bu&&bu.length)?bu.map(b=>`<div class="row small" style="padding:5px 0;border-bottom:1px solid var(--line)">
      <b>${esc(b.name)}</b><span class="muted">${money(b.price_cents)} · ${(b.bundle_items||[]).map(i=>esc(i.services?.name||'')).join(' + ')||'—'}</span>
      <span class="spacer"></span><span class="pill ${b.active?'on':'off'}">${b.active?'active':'off'}</span></div>`).join('')
      :'<p class="muted small">No bundles yet.</p>';
    $('rlist3').innerHTML=(rs&&rs.length)?rs.map(r=>`<div class="row small" style="padding:5px 0;border-bottom:1px solid var(--line)">
      <b>${esc(r.name)}</b><span class="spacer"></span><span class="pill ${r.active?'on':'off'}">${r.active?'active':'off'}</span></div>`).join('')
      :'<p class="muted small">No resources yet.</p>';
  }
  $('badd3').onclick=async()=>{

    if(picked.length<2) return toast('Pick at least 2 services');

      price_cents:Math.round(parseFloat($('bpr').value||'0')*100)}).select().single();
    if(error) return fail(error);
    const {error:e2}=await sb.from('bundle_items').insert(picked.map(sid=>({bundle_id:b.id,service_id:sid})));

  $('radd3').onclick=async()=>{

      sb.from('services').select('id,name').eq('business_id',S.biz.id).order('name'),

      <span><b>${esc(l.services?.name||'—')}</b> ← ${l.qty} × ${esc(l.products?.name||'—')}</span>
      <span class="spacer"></span><button class="btn ghost sm" onclick="rmSP('${l.service_id}','${l.product_id}')">Remove</button></div>`).join('')

  $('ladd').onclick=async()=>{

    const {error}=await sb.from('service_products').upsert({service_id:$('lsvc').value,product_id:$('lprod').value,qty:parseInt($('lqty').value||'1')});

    toast('Removed');loadSP();
  };
  loadSP();
}

      ${tbl.map(t=>{const a=availByType[t.id];
        return `<tr><td><b>${esc(t.name)}</b></td><td>${t.pax??'—'}</td><td>${t.quantity}</td>
