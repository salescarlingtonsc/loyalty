  /* ---- CSV import of existing bookings (owner only) ---- */
  $('bkCsvf').onchange=async(ev)=>{
    const file=ev.target.files[0];if(!file)return;
    const text=await file.text();
    const rows=[];let cur=[''],q=false;
    for(const ch of text){
      if(q){ if(ch==='"'){q=false} else cur[cur.length-1]+=ch; }
      else if(ch==='"'){q=true}
      else if(ch===','){cur.push('')}
      else if(ch==='\n'||ch==='\r'){ if(cur.length>1||cur[0]!==''){rows.push(cur);cur=[''];} }
      else cur[cur.length-1]+=ch;
    }
    if(cur.length>1||cur[0]!=='')rows.push(cur);
    if(rows.length<2){$('bkCsvPrev').innerHTML=`<div class="err">CSV needs a header row + data</div>`;return}
    const hdr=rows[0].map(h=>h.trim().toLowerCase());
    const col=n=>hdr.findIndex(h=>h.includes(n));
    const iN=col('name'),iP=col('phone'),iE=col('email'),iPs=col('party'),iAt=col('preferred'),iNo=col('notes');
    const iTtId=hdr.findIndex(h=>h.includes('table_type_id'));
    const iTt=hdr.findIndex((h,idx)=>idx!==iTtId&&h.includes('table'));
    if(iN<0){$('bkCsvPrev').innerHTML=`<div class="err">No "name" column found</div>`;return}
    const recs=rows.slice(1).filter(r=>r[iN]&&r[iN].trim().length>1).map(r=>{
      const rec={name:r[iN].trim()};
      if(iP>=0&&r[iP]) rec.phone=r[iP].trim();
      if(iE>=0&&r[iE]) rec.email=r[iE].trim();
      if(iPs>=0&&r[iPs]) rec.party_size=parseInt(r[iPs]);
      if(iAt>=0&&r[iAt]) rec.preferred_at=r[iAt].trim();
      if(iNo>=0&&r[iNo]) rec.notes=r[iNo].trim();
      if(iTtId>=0&&r[iTtId]) rec.table_type_id=r[iTtId].trim();
      else if(iTt>=0&&r[iTt]) rec.table_type=r[iTt].trim();
      return rec;
    });
    $('bkCsvPrev').innerHTML=`<p class="small"><b>${recs.length}</b> bookings ready (of ${rows.length-1} rows).
      First: ${esc(recs[0]?.name||'—')}${recs[1]?', '+esc(recs[1].name):''}…</p>
      <button class="btn sm" id="bkCsvGo" style="margin-top:8px">Import ${recs.length} bookings</button>`;
    $('bkCsvGo').onclick=async()=>{
      $('bkCsvGo').disabled=true;
      const {data,error}=await sb.rpc('import_bookings',{p_business:S.biz.id,p_rows:recs});
      $('bkCsvGo').disabled=false;
      if(error){$('bkCsvPrev').innerHTML+=`<div class="err">${esc(error.message)}</div>`;return}
      const errs=(data.errors||[]).slice(0,5);
      $('bkCsvPrev').innerHTML=`<p class="small">✓ Imported <b>${data.inserted}</b>, skipped <b>${data.skipped}</b>.</p>
        ${errs.length?`<div class="err" style="margin-top:8px">First ${errs.length} error${errs.length===1?'':'s'}:<br>${errs.map(e=>`Row ${esc(String(e.row))}: ${esc(e.error)}`).join('<br>')}</div>`:''}`;
      toast(`Imported ${data.inserted} bookings — review them above as pending`);
      load();
    };
  };
}

/* ---------- loyalty config ----------
   The firm picks ONE model and tunes every number itself (nothing hardcoded):
   classic      — fixed: N points -> $X credit (the original one-tap redeem).
   points_tiers — points + owner-defined reward catalog + tiers (multipliers by visits/spend/points).
   stamps       — every $Y spent = 1 stamp; owner-defined milestones ("4 stamps -> free bowl").
   Rewards/milestones live in loyalty_rewards (cost_points = points or stamps; credit_cents = 0
   means a manual-item claim, >0 mints store credit). Tiers in loyalty_tiers.

   v27 frontend contract assumptions, kept explicit until the v27 migration lands:
   - loyalty_rewards retains name, cost_points, credit_cents, active and sort, and adds
     customer_name, description, estimated_cost_cents, entitlement_expiry_days, usage_limit,
     image_ref and fulfillment_kind.
   - fulfillment_kind is a controlled machine value: credit or manual_item. A firm label never
     creates a new financial behaviour; unsupported kinds are intentionally not offered here.
   - v27 extends the existing allowlisted create_loyalty_config_draft ->
     save_loyalty_config_draft -> publish_loyalty_config workflow. The save JSON contains a
     reward envelope plus branch/service/product IDs; the backend writes the normalized
     eligibility tables loyalty_reward_branches, loyalty_reward_services and
     loyalty_reward_products before atomic publication. No eligibility rows means unrestricted eligibility.
   - These three relations use reward_id plus branch_id/service_id/product_id and are versioned by
     the backend. This UI sends IDs, never a uuid array column, and never deletes reward history. */
async function loyaltyPage(modelOverride,draftVersionId=null,recommendation=null){
  const routeMain=M();
  const isLoyaltyCurrent=()=>routeMain.isConnected&&M()===routeMain;
  routeMain.innerHTML=CUI.loadingState({title:'Loyalty',iconName:'loyalty'});
  const canWriteLoyalty=canWriteModule('loyalty');
  const canManageLoyalty=S.myRole==='owner'&&canWriteLoyalty;
  const loyaltyControlDisabled=canManageLoyalty?'':' disabled';
  let lp=[],rw=[],tr=[],rb=[],rs=[],rp=[],bo=[],birthdayPrograms=[],publishedBirthdayPrograms=[],draftSnapshotHash=null;
  const [{data:br,error:brError},{data:sv,error:svError},{data:pr,error:prError}]=await Promise.all([
    sb.from('branches').select('id,name,active').eq('business_id',S.biz.id).order('name'),
    sb.from('services').select('id,name,active').eq('business_id',S.biz.id).order('name'),
    sb.from('products').select('id,name,active').eq('business_id',S.biz.id).order('name')]);
  if(!isLoyaltyCurrent())return;
  if(brError||svError||prError)throw brError||svError||prError;
  if(draftVersionId){
    const {data:draft,error:draftError}=await sb.rpc('get_loyalty_reward_draft',{p_config_version:draftVersionId});
    if(!isLoyaltyCurrent())return;
    if(draftError){
      routeMain.innerHTML=`<div class="topbar"><div><h1>Loyalty</h1><p class="muted small">Draft could not load safely.</p></div></div>
        <div class="card"><p class="err">${esc(draftError.message)}</p><button class="btn" id="reloadLoyaltyDraft">Retry</button></div>`;
      $('reloadLoyaltyDraft').onclick=()=>loyaltyPage(modelOverride,draftVersionId,recommendation);
      return;
    }
    draftSnapshotHash=draft?.snapshot_hash||null;
    lp=draft?.program?[draft.program]:[];
    rw=draft?.rewards||[];
    tr=draft?.tiers||[];
    rb=(rw||[]).flatMap(r=>(r.eligibility?.branches||[]).map(branch_id=>({reward_id:r.reward_id||r.id,branch_id})));
    rs=(rw||[]).flatMap(r=>(r.eligibility?.services||[]).map(service_id=>({reward_id:r.reward_id||r.id,service_id})));
    rp=(rw||[]).flatMap(r=>(r.eligibility?.products||[]).map(product_id=>({reward_id:r.reward_id||r.id,product_id})));
    const {data:branchOverrides,error:boError}=await sb.from('loyalty_branch_overrides')
      .select('branch_id,active,earn_points_per_dollar,stamp_per_cents,expiry_mode,expiry_days')
      .eq('business_id',S.biz.id).eq('config_version_id',draftVersionId);
    if(!isLoyaltyCurrent())return;
    if(boError){
      routeMain.innerHTML=`<div class="topbar"><div><h1>Loyalty</h1><p class="muted small">Draft branch settings could not load safely.</p></div></div>
        <div class="card"><p class="err">${esc(boError.message)}</p><button class="btn" id="reloadLoyaltyDraft">Retry</button></div>`;
      $('reloadLoyaltyDraft').onclick=()=>loyaltyPage(modelOverride,draftVersionId,recommendation);
      return;
    }
    bo=branchOverrides||[];
    const {data:birthdayDraft}=await sb.rpc('get_birthday_program_draft',{p_config_version:draftVersionId});
    if(!isLoyaltyCurrent())return;
    birthdayPrograms=Array.isArray(birthdayDraft?.programs)?birthdayDraft.programs:[];
  }else{
    const [{data:liveProgram,error:programError},{data:liveRewards,error:rewardsError},{data:liveTiers,error:tierError},{data:liveBranches,error:rbError},{data:liveServices,error:rsError},{data:liveProducts,error:rpError}]=await Promise.all([
      sb.from('loyalty_programs').select('*').eq('business_id',S.biz.id).limit(1),
      sb.from('loyalty_rewards').select('*').eq('business_id',S.biz.id).order('sort').order('created_at'),
      sb.from('loyalty_tiers').select('*').eq('business_id',S.biz.id).order('threshold'),
      sb.from('loyalty_reward_branches').select('reward_id,branch_id').eq('business_id',S.biz.id),
      sb.from('loyalty_reward_services').select('reward_id,service_id').eq('business_id',S.biz.id),
      sb.from('loyalty_reward_products').select('reward_id,product_id').eq('business_id',S.biz.id)]);
    if(!isLoyaltyCurrent())return;
    if(programError||rewardsError||tierError||rbError||rsError||rpError)throw programError||rewardsError||tierError||rbError||rsError||rpError;
    lp=liveProgram||[];rw=liveRewards||[];tr=liveTiers||[];
    rb=liveBranches||[];rs=liveServices||[];rp=liveProducts||[];
    if(canManageLoyalty){
      const {data:publishedBirthday,error:publishedBirthdayError}=await sb.rpc('get_active_birthday_program',{p_business_id:S.biz.id});
      if(!isLoyaltyCurrent())return;
      if(publishedBirthdayError)throw publishedBirthdayError;
      publishedBirthdayPrograms=Array.isArray(publishedBirthday?.programs)?publishedBirthday.programs:[];
    }
  }
  const p=lp?.[0]?{...lp[0],configuration_status:draftVersionId?'draft':lp[0].configuration_status}:null;
  const birthdayProgram=birthdayPrograms[0]||null;
  const publishedBirthdayProgram=publishedBirthdayPrograms[0]||null;
  const rewards=rw||[],tiers=(tr||[]).filter(t=>t.active!==false);
  const model=modelOverride||p?.loyalty_model||'classic';
  const unit=model==='stamps'?'stamps':'points';
  const groupEligibility=(rows,key)=>rows.reduce((a,x)=>{
    (a[x.reward_id]??=[]).push(x[key]);
    return a;
  },{});
  const eligibility={
    branch:groupEligibility(rb||[],'branch_id'),
    service:groupEligibility(rs||[],'service_id'),
    product:groupEligibility(rp||[],'product_id')};
  const activeItems=(items)=>items.filter(x=>x.active!==false);
  const branchOverrideById=Object.fromEntries((bo||[]).map(x=>[x.branch_id,x]));
  const rewardLabel=(r)=>r.customer_name||r.name||'Unnamed reward';
  const rewardKind=(r)=>r.fulfillment_kind||((r.credit_cents||0)>0?'credit':'manual_item');
  const eligibilitySummary=(r)=>['branch','service','product'].map((k)=>{
    const n=(eligibility[k][r.id]||[]).length;
    return n?`${n} ${k}${n===1?'':'s'}`:`all ${k}s`;
  }).join(' · ');
  const renderEligibilityGroup=(key,label,items,selected)=>`<div class="eligibility-group">
    <b>${label}</b><p class="muted small help">Leave blank for all ${label.toLowerCase()}.</p>
    ${(items.length?items.map(x=>`<label><input type="checkbox" data-reward-elig="${key}" value="${x.id}" ${selected.has(x.id)?'checked':''}>${esc(x.name)}</label>`).join(''):'<p class="muted small" style="margin-top:8px">None added yet.</p>')}
  </div>`;
  const branchOverrideRows=()=>draftVersionId?`
    <details style="margin-top:18px"><summary>Branch settings</summary>
      <p class="muted small help">Leave blank to inherit the firm setting. Save only changes this draft.</p>
      ${activeItems(br||[]).length?activeItems(br||[]).map((branch,idx)=>{
        const o=branchOverrideById[branch.id]||{};
        const branchExpiryMode=o.expiry_mode||'',branchExpiryNeedsDays=expiryModeRequiresDays(branchExpiryMode);
        const branchExpiryShowsDays=branchExpiryMode!=='none';
        const branchExpiryFallback=positiveExpiryDays(o.expiry_days)||positiveExpiryDays(p?.expiry_days)||365;
        return `<div class="branch-override" style="padding:12px 0;border-bottom:1px solid var(--line)">
          <b>${esc(branch.name)}</b>
          <div class="field-grid">
            <div><label>Loyalty status</label><select data-bo-active="${idx}" data-branch="${branch.id}"${loyaltyControlDisabled}>
              <option value="" ${o.active==null?'selected':''}>Inherit firm setting</option>
              <option value="true" ${o.active===true?'selected':''}>Active here</option>
              <option value="false" ${o.active===false?'selected':''}>Paused here</option>
            </select></div>
            <div><label>Points per $1</label><input data-bo-earn="${idx}" data-branch="${branch.id}" type="number" min="0" step="0.1" value="${o.earn_points_per_dollar??''}" placeholder="${p?.earn_points_per_dollar??1}"${loyaltyControlDisabled}></div>
            <div><label>Spend per stamp</label><input data-bo-stamp="${idx}" data-branch="${branch.id}" type="number" min="0.5" step="0.5" value="${o.stamp_per_cents!=null?(o.stamp_per_cents/100).toFixed(2):''}" placeholder="${((p?.stamp_per_cents??500)/100).toFixed(2)}"${loyaltyControlDisabled}></div>
            <div><label>Expiry</label><select data-bo-expiry="${idx}" data-branch="${branch.id}" aria-controls="bo-days-field-${idx}"${loyaltyControlDisabled}>
              <option value="" ${!o.expiry_mode?'selected':''}>Inherit firm setting</option>
              <option value="none" ${o.expiry_mode==='none'?'selected':''}>Never expire</option>
              <option value="inactivity" ${o.expiry_mode==='inactivity'?'selected':''}>After inactivity</option>
              <option value="fixed" ${o.expiry_mode==='fixed'?'selected':''}>Fixed shelf life</option>
            </select></div>
            <div class="expiry-days-field" id="bo-days-field-${idx}" data-bo-days-field="${idx}" ${branchExpiryShowsDays?'':'hidden'}><label>Expiry days</label><input data-bo-days="${idx}" data-branch="${branch.id}" data-expiry-fallback="${branchExpiryFallback}" data-expiry-allow-inherit="true" type="number" min="1" step="1" value="${o.expiry_days??''}" placeholder="${branchExpiryFallback}" ${branchExpiryNeedsDays?'required':branchExpiryShowsDays?'':'disabled'}${loyaltyControlDisabled}></div>
          </div>
          ${canManageLoyalty?`<div class="row" style="margin-top:10px"><button class="btn ghost sm boInherit" data-idx="${idx}" data-branch="${branch.id}">Inherit firm setting</button><span class="spacer"></span><button class="btn sm boSave" data-idx="${idx}" data-branch="${branch.id}">Save branch</button></div>`:''}
        </div>`;
      }).join(''):'<p class="muted small" style="margin-top:8px">Add branches first.</p>'}
    </details>`:'';
  const rewardRows=(label)=>`
    <b style="display:block;margin-top:18px">${label}</b>
    <div class="reward-list" id="rwList">
    ${rewards.length?rewards.map(r=>`<div class="reward-item">
      <div class="meta"><div><b class="inline-status">${r.active?'':CUI.icon('retention',{size:15})}${esc(rewardLabel(r))}</b>
        <div class="muted small" style="margin-top:4px">${r.cost_points} ${unit} · ${rewardKind(r)==='credit'?money(r.credit_cents||0)+' store credit':'manual fulfilment'} · ${eligibilitySummary(r)}</div>
        ${r.description?`<div class="muted small" style="margin-top:4px">${esc(r.description)}</div>`:''}</div>
        <span class="spacer"></span><span class="pill ${r.active?'on':'off'}">${r.active?'live':'archived'}</span>
        ${canManageLoyalty?`<button class="btn ghost sm rwEdit" data-id="${r.id}">Edit</button>`:''}</div></div>`).join('')
      :`<p class="muted small" style="margin-top:6px">None yet — add your first below.</p>`}</div>
    <div id="rwEditor" aria-live="polite"></div>
    ${canManageLoyalty?'<button class="btn sm" id="rwAdd" style="margin-top:12px">+ Add reward</button>':''}`;
  const tierRows=()=>`
    <b style="display:block;margin-top:18px">Tiers (optional)</b>
    <label>Tier level is earned by</label><select id="ltb"${loyaltyControlDisabled}>
      <option value="visits" ${(p?.tier_basis??'visits')==='visits'?'selected':''}>Number of visits (recommended)</option>
      <option value="spend" ${p?.tier_basis==='spend'?'selected':''}>Lifetime spend ($)</option>
      <option value="points_earned" ${p?.tier_basis==='points_earned'?'selected':''}>Lifetime points earned</option></select>
    ${tiers.length?tiers.map(t=>`<div class="row" style="margin-top:8px">
      <span>${esc(t.name)}</span><span class="spacer"></span>
      <span class="muted small">from ${t.threshold} · ${t.points_multiplier}× ${unit}${t.perk_note?' · '+esc(t.perk_note):''}</span>
      ${canManageLoyalty?`<button class="btn ghost sm trEdit" data-id="${t.tier_id||t.id}">Edit</button>
      <button class="btn ghost sm trDel" data-id="${t.tier_id||t.id}">✕</button>`:''}</div>`).join('')
      :`<p class="muted small" style="margin-top:6px">No tiers yet — customers all earn at 1×.</p>`}
    ${canManageLoyalty?`<div class="row" style="margin-top:10px;flex-wrap:wrap;gap:8px">
      <label class="sr-only" for="trName">Tier name</label><input id="trName" placeholder="e.g. Gold" style="flex:1;min-width:100px">
      <label class="sr-only" for="trTh">Tier threshold</label><input id="trTh" type="number" min="0" placeholder="from" style="max-width:80px">
      <label class="sr-only" for="trMul">Points earning multiplier</label><input id="trMul" type="number" min="1" step="0.5" placeholder="× earn" style="max-width:90px">
      <label class="sr-only" for="trPerk">Tier perk note</label><input id="trPerk" placeholder="perk note (optional)" style="flex:1;min-width:120px">
      <button class="btn sm" id="trAdd">Add</button></div>`:''}`;
  const firmExpiryMode=p?.expiry_mode??'none';
  const firmExpiryDays=positiveExpiryDays(p?.expiry_days)||365;
  const firmExpiryNeedsDays=expiryModeRequiresDays(firmExpiryMode);
  const loyaltyActions=canManageLoyalty&&!draftVersionId?CUI.action({id:'loyaltyRecommend',label:'Create recommended draft',iconName:'add',variant:'secondary'}):'<span class="pill off">Read only</span>';
  const publishedBirthdaySummary=publishedBirthdayProgram
    ?`<div class="wallet-line" style="margin-top:12px"><div><b>${esc(publishedBirthdayProgram.customer_label||'Birthday benefit')}</b><p class="muted small" style="margin-top:4px">${esc(publishedBirthdayProgram.fulfillment_kind==='discount_pct'?`${publishedBirthdayProgram.discount_percent}% off`:publishedBirthdayProgram.manual_item||'Manual benefit')} · ${publishedBirthdayProgram.active?'Live for eligible customers':'Published but paused'} · window ${Number(publishedBirthdayProgram.window_days_before||0)} day(s) before to ${Number(publishedBirthdayProgram.window_days_after||0)} day(s) after</p>${publishedBirthdayProgram.customer_description?`<p class="muted small" style="margin-top:4px">${esc(publishedBirthdayProgram.customer_description)}</p>`:''}</div><span class="spacer"></span><span class="pill ${publishedBirthdayProgram.active?'on':'off'}">Published</span></div>`
    :'<p class="muted small" style="margin-top:10px">No birthday benefit is published. Starting a draft makes no offer until you complete, explicitly enable, and publish it.</p>';
  const birthdayEditor=canManageLoyalty
    ?!draftVersionId?`<div class="card" style="margin-top:16px"><b>Birthday benefit</b><p class="muted small" style="margin-top:6px">Customer participation is separately opt-in and birthday details are never shared with your team.</p>${publishedBirthdaySummary}<button class="btn ghost sm" id="birthdayStartDraft" style="margin-top:12px">${publishedBirthdayProgram?'Create change draft':'Configure birthday benefit'}</button></div>`
    :`<div class="card" style="margin-top:16px"><div class="row"><div><b>Birthday benefit</b><p class="muted small" style="margin-top:5px">One programme per configuration version. A new programme starts blank and paused; no customer promise exists until you complete, explicitly enable, and publish it.</p></div><span class="spacer"></span><span class="pill">Draft</span></div>
      <div class="field-grid" style="margin-top:10px"><div class="full"><label for="birthdayLabel">Customer-facing label</label><input id="birthdayLabel" value="${esc(birthdayProgram?.customer_label||'')}"></div><div class="full"><label for="birthdayDescription">Customer description</label><textarea id="birthdayDescription" rows="2">${esc(birthdayProgram?.customer_description||'')}</textarea></div><div class="full"><label for="birthdayTerms">Terms</label><textarea id="birthdayTerms" rows="2">${esc(birthdayProgram?.customer_terms||'')}</textarea></div><div><label for="birthdayKind">Benefit type</label><select id="birthdayKind"><option value="" ${birthdayProgram?.fulfillment_kind?'':'selected'}>Choose a benefit type</option><option value="discount_pct" ${birthdayProgram?.fulfillment_kind==='discount_pct'?'selected':''}>Percentage discount</option><option value="free_item" ${birthdayProgram?.fulfillment_kind==='free_item'?'selected':''}>Free item / manual benefit</option></select></div><div id="birthdayDiscountField"><label for="birthdayDiscount">Discount percentage</label><input id="birthdayDiscount" type="number" min="0.01" max="100" step="0.01" value="${birthdayProgram?.discount_percent??''}"></div><div id="birthdayItemField"><label for="birthdayItem">Free item / benefit</label><input id="birthdayItem" value="${esc(birthdayProgram?.manual_item||'')}"></div><div><label for="birthdayBefore">Days before birthday</label><input id="birthdayBefore" type="number" min="0" max="182" value="${birthdayProgram?.window_days_before??0}"></div><div><label for="birthdayAfter">Days after birthday</label><input id="birthdayAfter" type="number" min="0" max="182" value="${birthdayProgram?.window_days_after??0}"></div></div><label class="row" style="margin-top:12px;color:var(--ink);font-weight:500"><input id="birthdayActive" type="checkbox" style="width:auto" ${birthdayProgram?.active===true?'checked':''}> I explicitly enable this benefit for eligible customers after publication</label><div class="row" style="margin-top:14px"><button class="btn sm" id="birthdaySaveDraft">Save birthday benefit draft</button><p id="birthdayDraftStatus" class="muted small" role="status" aria-live="polite"></p></div></div>`
    :'';
  routeMain.innerHTML=`${CUI.pageHeader({title:'Loyalty',subtitle:canManageLoyalty?'Choose the model and publish deliberate, versioned changes.':'Review the current program, rewards, tiers, and branch settings.',iconName:'loyalty',actions:loyaltyActions,canWrite:canManageLoyalty,moduleLabel:'Loyalty configuration'})}
    ${p?.configuration_status==='draft'?`<div class="imp-note" style="margin-bottom:16px"><b>Draft recommendation</b><br>${recommendation?esc(recommendation.rationale):'Nothing is earning or redeeming yet.'} Review every number below, then publish only when it fits your business.</div>`:''}
    <div class="split"><div class="card"><b>Program settings</b>
      <label>Status</label><select id="la"${loyaltyControlDisabled}><option value="true" ${p?.active?'selected':''}>Active</option><option value="false" ${!p?.active?'selected':''}>Paused</option></select>
      <label>Loyalty model</label><select id="lm"${loyaltyControlDisabled}>
        <option value="classic" ${model==='classic'?'selected':''}>Simple points — fixed redeem into credit</option>
        <option value="points_tiers" ${model==='points_tiers'?'selected':''}>Points + reward catalog + tiers</option>
        <option value="stamps" ${model==='stamps'?'selected':''}>Stamp card — $ per stamp, milestone rewards</option></select>
      ${model==='stamps'
        ?`<label>Spend per stamp (${S.biz.currency||'SGD'})</label><input id="lsp" type="number" min="0.5" step="0.5" value="${((p?.stamp_per_cents??500)/100).toFixed(2)}"${loyaltyControlDisabled}>
          <p class="muted small" style="margin-top:4px">e.g. $5 per stamp → a $12 bill earns 2 stamps.</p>`
        :`<label>Points earned per $1 spent</label><input id="le" type="number" min="0" step="0.5" value="${p?.earn_points_per_dollar??1}"${loyaltyControlDisabled}>`}
      ${model==='classic'
        ?`<label>Points needed to redeem</label><input id="lr" type="number" min="1" value="${p?.redeem_points??800}"${loyaltyControlDisabled}>
          <label>Credit minted on redemption (${S.biz.currency||'SGD'})</label><input id="lc" type="number" min="0" step="0.01" value="${((p?.reward_credit_cents??2000)/100).toFixed(2)}"${loyaltyControlDisabled}>`:''}
      <label>${model==='stamps'?'Stamp':'Points'} expiry</label><select id="lx" aria-controls="lxdField"${loyaltyControlDisabled}>
        <option value="none" ${firmExpiryMode==='none'?'selected':''}>Never expire</option>
        <option value="inactivity" ${p?.expiry_mode==='inactivity'?'selected':''}>Expire after inactivity (clock resets on every earn)</option>
        <option value="fixed" ${p?.expiry_mode==='fixed'?'selected':''}>Fixed shelf life from earn (oldest expire first)</option></select>
      <div class="expiry-days-field" id="lxdField" ${firmExpiryNeedsDays?'':'hidden'}><label for="lxd">Expiry window (days)</label><input id="lxd" data-expiry-fallback="${firmExpiryDays}" type="number" min="1" step="1" value="${firmExpiryDays}" ${firmExpiryNeedsDays?'required':'disabled'}${loyaltyControlDisabled}></div>
      ${branchOverrideRows()}
      ${canManageLoyalty?`<div style="margin-top:16px"><button class="btn" id="lsave">${p?.configuration_status==='draft'?'Publish program':'Save program'}</button></div>`:''}</div>
    <div class="card">
      ${model==='classic'
        ?`<b>How it works</b><p class="muted" style="margin-top:8px;line-height:1.7">Every sale earns points automatically. At ${p?.redeem_points??800} points, one tap converts them into ${money(p?.reward_credit_cents??2000)} of real in-store credit. Switch models above any time — balances carry over.</p>`
        :model==='stamps'
        ?`<b>Milestones</b><p class="muted small" style="margin-top:6px">Customers collect stamps automatically as they spend. Define what each milestone is worth — a free item to hand over, or store credit.</p>${rewardRows('Your milestones')}`
        :`<b>Reward catalog & tiers</b><p class="muted small" style="margin-top:6px">Customers spend points on rewards you define, and climb tiers that multiply their earning.</p>${rewardRows('Your rewards')}${tierRows()}`}
    </div></div>${birthdayEditor}`;
  if(!canManageLoyalty)return;
  const birthdayStartDraft=$('birthdayStartDraft');
  if(birthdayStartDraft)birthdayStartDraft.onclick=async()=>{
    birthdayStartDraft.disabled=true;
    const {data,error}=await sb.rpc('create_loyalty_config_draft',{p_business:S.biz.id,p_based_on:p?.current_config_version_id||null,p_source:'owner_birthday_editor'});
    if(!isLoyaltyCurrent())return;
    if(error){birthdayStartDraft.disabled=false;return fail(error)}
    loyaltyPage(model,data.version_id,recommendation);
  };
  const birthdaySaveDraft=$('birthdaySaveDraft');
  if(birthdaySaveDraft){
    const birthdayProgramId=birthdayProgram?.program_id||crypto.randomUUID();
    const syncBirthdayKind=()=>{
      const isDiscount=$('birthdayKind').value==='discount_pct';
      $('birthdayDiscountField').hidden=!isDiscount;$('birthdayItemField').hidden=isDiscount;
    };
    $('birthdayKind').onchange=syncBirthdayKind;syncBirthdayKind();
    birthdaySaveDraft.onclick=async()=>{
      const kind=$('birthdayKind').value;
      const label=$('birthdayLabel').value.trim(),description=$('birthdayDescription').value.trim(),terms=$('birthdayTerms').value.trim();
      const draftStatus=$('birthdayDraftStatus');
      if(!label||!description||!terms||!['discount_pct','free_item'].includes(kind)){
        if(draftStatus)draftStatus.textContent='Complete the customer copy and choose a benefit type before saving.';
        return;
      }
      if(kind==='discount_pct'&&!(Number($('birthdayDiscount').value)>0&&Number($('birthdayDiscount').value)<=100)){
        if(draftStatus)draftStatus.textContent='Enter a discount percentage between 0.01 and 100.';
        return;
      }
      if(kind==='free_item'&&!$('birthdayItem').value.trim()){
        if(draftStatus)draftStatus.textContent='Describe the free item or manual benefit before saving.';
        return;
      }
      const payload={active:$('birthdayActive').checked,customer_label:label,customer_description:description,customer_terms:terms,fulfillment_kind:kind,window_days_before:Number($('birthdayBefore').value),window_days_after:Number($('birthdayAfter').value),sort:0};
      if(kind==='discount_pct')payload.discount_percent=Number($('birthdayDiscount').value);else payload.manual_item=$('birthdayItem').value.trim();
      birthdaySaveDraft.disabled=true;
      const {data,error}=await sb.rpc('save_birthday_program_draft',{p_config_version:draftVersionId,p_program_id:birthdayProgramId,p_program:payload,p_expected_snapshot_hash:draftSnapshotHash});
      if(!isLoyaltyCurrent())return;
      if(error){birthdaySaveDraft.disabled=false;const status=$('birthdayDraftStatus');if(status)status.textContent='Birthday benefit draft could not be saved. Reload and review the fields.';return;}
      const status=$('birthdayDraftStatus');if(status)status.textContent=data?.replayed?'Saved previously.':'Birthday benefit draft saved. Review then publish the configuration.';
      loyaltyPage(model,draftVersionId,recommendation);
    };
  }
  const recommend=$('loyaltyRecommend');
  if(recommend) recommend.onclick=async()=>{
    recommend.disabled=true;recommend.textContent='Preparing draft…';
    const {data,error}=await sb.rpc('generate_retention_recommendation',{
      p_business:S.biz.id,p_idempotency_key:crypto.randomUUID()});
    if(!isLoyaltyCurrent())return;
    if(error){recommend.disabled=false;recommend.textContent='Create recommended draft';return fail(error)}
    toast('Recommended draft created — review every number before publishing');
    loyaltyPage(data.model,data.draft_config_version_id,data);
  };
  $('lm').onchange=()=>loyaltyPage($('lm').value,draftVersionId,recommendation);
  bindExpiryModeUi($('lx'),$('lxd'),$('lxdField'));
  document.querySelectorAll('[data-bo-expiry]').forEach(modeInput=>{
    const idx=modeInput.dataset.boExpiry;
    bindExpiryModeUi(modeInput,document.querySelector(`[data-bo-days="${idx}"]`),document.querySelector(`[data-bo-days-field="${idx}"]`));
  });
  document.querySelectorAll('.boSave').forEach(button=>button.onclick=async()=>{
    const idx=button.dataset.idx,branchId=button.dataset.branch;
    const active=document.querySelector(`[data-bo-active="${idx}"]`).value;
    const earn=document.querySelector(`[data-bo-earn="${idx}"]`).value;
    const stamp=document.querySelector(`[data-bo-stamp="${idx}"]`).value;
    const expiry=document.querySelector(`[data-bo-expiry="${idx}"]`).value;
    const daysInput=document.querySelector(`[data-bo-days="${idx}"]`);
    const expiryDays=expiryDaysForMode(expiry,daysInput);
    if(Number.isNaN(expiryDays)){toast('Enter a positive whole-number expiry window');daysInput.focus();return}
    const override={};
    if(active)override.active=active==='true';
    if(earn!=='')override.earn_points_per_dollar=parseFloat(earn);
    if(stamp!=='')override.stamp_per_cents=Math.round(parseFloat(stamp)*100);
    if(expiry)override.expiry_mode=expiry;
    if(expiryDays!==undefined)override.expiry_days=expiryDays;
    if(!Object.keys(override).length)return toast('Use Inherit firm setting to clear this branch');
    button.disabled=true;button.textContent='Saving…';
    const args={p_config_version:draftVersionId,p_branch:branchId,p_override:override,
      p_expected_snapshot_hash:draftSnapshotHash||null};
    const {error}=await sb.rpc('save_loyalty_branch_override_draft',args);
    if(!isLoyaltyCurrent())return;
    if(error){button.disabled=false;button.textContent='Save branch';return fail(error)}
    toast('Branch setting saved');loyaltyPage(model,draftVersionId,recommendation);
  });
  document.querySelectorAll('.boInherit').forEach(button=>button.onclick=async()=>{
    button.disabled=true;button.textContent='Clearing…';
    const args={p_config_version:draftVersionId,p_branch:button.dataset.branch,
      p_expected_snapshot_hash:draftSnapshotHash||null};
    const {error}=await sb.rpc('remove_loyalty_branch_override_draft',args);
    if(!isLoyaltyCurrent())return;
    if(error){button.disabled=false;button.textContent='Inherit firm setting';return fail(error)}
    toast('Branch now inherits firm setting');loyaltyPage(model,draftVersionId,recommendation);
  });
  $('lsave').onclick=async()=>{
    const expiryMode=$('lx').value,expiryDays=expiryDaysForMode(expiryMode,$('lxd'));
    if(Number.isNaN(expiryDays)){toast('Enter a positive whole-number expiry window');$('lxd').focus();return}
    const row={business_id:S.biz.id,kind:'points',active:$('la').value==='true',loyalty_model:model,
      configuration_status:'published',
      expiry_mode:expiryMode};
    if(expiryDays!==undefined)row.expiry_days=expiryDays;
    if(model==='stamps') row.stamp_per_cents=Math.round(parseFloat($('lsp').value||'5')*100);
    else row.earn_points_per_dollar=parseFloat($('le').value||'1');
    if(model==='classic'){row.redeem_points=parseInt($('lr').value||'800');
      row.reward_credit_cents=Math.round(parseFloat($('lc').value||'20')*100)}
    if(model==='points_tiers'&&$('ltb')) row.tier_basis=$('ltb').value;
    $('lsave').disabled=true;
    let versionId=draftVersionId;
    if(!versionId){
      const {data:draft,error:draftError}=await sb.rpc('create_loyalty_config_draft',{
        p_business:S.biz.id,p_based_on:p?.current_config_version_id||null,p_source:'owner_editor'});
      if(!isLoyaltyCurrent())return;
      if(draftError){$('lsave').disabled=false;return fail(draftError)}
      versionId=draft.version_id;
    }
    const saveArgs={p_version:versionId,p_config:row,p_expected_snapshot_hash:draftSnapshotHash||null};
    const {error:saveError}=await sb.rpc('save_loyalty_config_draft',saveArgs);
    if(!isLoyaltyCurrent())return;
    if(saveError){$('lsave').disabled=false;return fail(saveError)}
    const {error:publishError}=await sb.rpc('publish_loyalty_config',{p_version:versionId});
    if(!isLoyaltyCurrent())return;
    if(publishError){$('lsave').disabled=false;return fail(publishError)}
    toast(p?.configuration_status==='draft'?'Loyalty program published':'Loyalty program saved');loyaltyPage();
  };
  let editorReward=null;
  function openRewardEditor(reward){
    editorReward=reward;
    const r=reward||{};
    const selected={
      branch:new Set(eligibility.branch[r.id]||[]),
      service:new Set(eligibility.service[r.id]||[]),
      product:new Set(eligibility.product[r.id]||[])};
    $('rwEditor').innerHTML=`<div class="reward-editor">
      <div class="row" style="justify-content:space-between;gap:12px"><b>${reward?'Edit reward':'New reward'}</b><button class="btn ghost sm" id="rwClose" type="button">Close</button></div>
      <div class="field-grid">
        <div class="full"><label>Customer-facing name *</label><input id="rwCustomerName" value="${esc(r.customer_name||r.name||'')}" placeholder="e.g. Free bowl of noodles"></div>
        <div class="full"><label>What the customer gets</label><textarea id="rwDescription" rows="2" placeholder="Short, clear description shown to customers">${esc(r.description||'')}</textarea></div>
        <div><label>${model==='stamps'?'Stamps':'Points'} cost *</label><input id="rwCost" type="number" min="1" step="1" value="${r.cost_points??''}" placeholder="e.g. 4"></div>
        <div><label>Estimated business cost (${S.biz.currency||'SGD'})</label><input id="rwEstimate" type="number" min="0" step="0.01" value="${r.estimated_cost_cents!=null?(r.estimated_cost_cents/100).toFixed(2):''}" placeholder="e.g. 1.50"></div>
        <div><label>Fulfilment</label><select id="rwKind"><option value="manual_item" ${rewardKind(r)==='manual_item'?'selected':''}>Manual item or benefit</option><option value="credit" ${rewardKind(r)==='credit'?'selected':''}>Store credit</option></select></div>
        <div id="rwCreditWrap"><label>Store credit value (${S.biz.currency||'SGD'})</label><input id="rwCredit" type="number" min="0" step="0.01" value="${((r.credit_cents||0)/100).toFixed(2)}" placeholder="e.g. 3.00"></div>
        <div><label>Reward expires after (days)</label><input id="rwExpiry" type="number" min="1" step="1" value="${r.entitlement_expiry_days??''}" placeholder="Leave blank for no expiry"></div>
        <div><label>Uses per customer</label><input id="rwUsage" type="number" min="1" step="1" value="${r.usage_limit??''}" placeholder="Leave blank for unlimited"></div>
      </div>
      <details><summary>More options</summary>
        <div class="field-grid" style="margin-top:4px"><div class="full"><label>Internal name</label><input id="rwInternalName" value="${esc(r.name||r.customer_name||'')}" placeholder="Only your team sees this"></div>
          <div class="full"><label>Image reference</label><input id="rwImage" value="${esc(r.image_ref||'')}" placeholder="Storage path or image URL"><p class="muted small help">Use a stable storage path or URL. Upload handling belongs to the v27 storage contract.</p></div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;margin-top:16px;cursor:pointer;color:var(--ink);font-weight:500;font-size:14px"><input id="rwActive" type="checkbox" style="width:auto" ${r.active!==false?'checked':''}> Available for customers</label>
        <p class="muted small help">Archived rewards stay in history and cannot be newly redeemed.</p>
        <div class="eligibility-grid">
          ${renderEligibilityGroup('branch','Branches',activeItems(br||[]),selected.branch)}
          ${renderEligibilityGroup('service','Services',activeItems(sv||[]),selected.service)}
          ${renderEligibilityGroup('product','Products',activeItems(pr||[]),selected.product)}
        </div>
        <p class="muted small help">Choose specific items to restrict eligibility. Leaving a group empty means all of that resource type.</p>
      </details>
      <div class="row" style="margin-top:16px"><button class="btn" id="rwSave">${reward?'Save changes':'Create reward'}</button><span class="spacer"></span>${reward?'<button class="btn danger sm" id="rwArchive" type="button">Archive</button>':''}</div>
    </div>`;
    $('rwClose').onclick=()=>{$('rwEditor').innerHTML='';editorReward=null};
    const kind=$('rwKind'),creditWrap=$('rwCreditWrap');
    const syncKind=()=>{creditWrap.style.display=kind.value==='credit'?'block':'none';if(kind.value!=='credit')$('rwCredit').value='0'};
    kind.onchange=syncKind;syncKind();
    $('rwSave').onclick=()=>saveReward(false);
    const archive=$('rwArchive');if(archive)archive.onclick=()=>saveReward(true);
  }
  async function saveReward(archive){
    const customerName=$('rwCustomerName').value.trim();
    const cost=parseInt($('rwCost').value||'0',10);
    const kind=archive?rewardKind(editorReward):$('rwKind').value;
    if(customerName.length<2) return toast('Give the reward a clear customer-facing name');
    if(!(cost>0)) return toast(`Enter a positive ${unit} cost`);
    const expiry=parseInt($('rwExpiry').value||'0',10),usage=parseInt($('rwUsage').value||'0',10);
    if(expiry<0||usage<0) return toast('Expiry and usage limit cannot be negative');
    const creditCents=Math.round(parseFloat($('rwCredit').value||'0')*100);
    if(kind==='credit'&&!(creditCents>0)) return toast('Enter a store credit value, or choose manual fulfilment');
    const selected=(key)=>[...document.querySelectorAll(`[data-reward-elig="${key}"]:checked`)].map(x=>x.value);
    const payload={id:editorReward?.reward_id||editorReward?.id||null,business_id:S.biz.id,
      name:$('rwInternalName')?.value.trim()||customerName,customer_name:customerName,
      description:$('rwDescription').value.trim()||null,cost_points:cost,
      credit_cents:kind==='credit'?creditCents:0,
      estimated_cost_cents:Math.round(parseFloat($('rwEstimate').value||'0')*100),
      entitlement_expiry_days:expiry>0?expiry:null,usage_limit:usage>0?usage:null,
      image_ref:$('rwImage')?.value.trim()||null,fulfillment_kind:kind,
      active:archive?false:$('rwActive').checked};
    const btn=archive?$('rwArchive'):$('rwSave');btn.disabled=true;btn.textContent=archive?'Archiving…':'Saving…';
    let versionId=draftVersionId;
    if(!versionId){
      const {data:draft,error:draftError}=await sb.rpc('create_loyalty_config_draft',{
        p_business:S.biz.id,p_based_on:p?.current_config_version_id||null,p_source:'owner_reward_editor'});
      if(!isLoyaltyCurrent())return;
      if(draftError){btn.disabled=false;btn.textContent=archive?'Archive':'Save changes';return fail(draftError)}
      versionId=draft.version_id;
    }
    const saveArgs={p_version:versionId,p_config:{
      reward:payload,reward_branch_ids:selected('branch'),reward_service_ids:selected('service'),
      reward_product_ids:selected('product')},p_expected_snapshot_hash:draftSnapshotHash||null};
    const {error:saveError}=await sb.rpc('save_loyalty_config_draft',saveArgs);
    if(!isLoyaltyCurrent())return;
    if(saveError){btn.disabled=false;btn.textContent=archive?'Archive':'Save changes';return fail(saveError)}
    if(!draftVersionId){
      const {error:publishError}=await sb.rpc('publish_loyalty_config',{p_version:versionId});
      if(!isLoyaltyCurrent())return;
      if(publishError){btn.disabled=false;btn.textContent=archive?'Archive':'Save changes';return fail(publishError)}
    }
    toast(draftVersionId?'Draft reward saved':archive?'Reward archived':editorReward?'Reward saved':'Reward created');
    loyaltyPage(model,draftVersionId,recommendation);
  }
  const ra=$('rwAdd');
  if(ra) ra.onclick=()=>openRewardEditor(null);
  document.querySelectorAll('.rwEdit').forEach(b=>b.onclick=()=>openRewardEditor(rewards.find(r=>r.id===b.dataset.id)));
  let editingTier=null;
  const fillTier=(tier)=>{editingTier=tier;$('trName').value=tier?.name||'';
    $('trTh').value=tier?.threshold??'';$('trMul').value=tier?.points_multiplier??'';
    $('trPerk').value=tier?.perk_note||'';$('trAdd').textContent=tier?'Save':'Add'};
  async function saveTier(tier){
    let versionId=draftVersionId;
    if(!versionId){
      const {data:draft,error}=await sb.rpc('create_loyalty_config_draft',{
        p_business:S.biz.id,p_based_on:p?.current_config_version_id||null,p_source:'owner_tier_editor'});
      if(!isLoyaltyCurrent())return;
      if(error)return fail(error);versionId=draft.version_id;
    }
    const saveArgs={p_version:versionId,p_config:{tier},p_expected_snapshot_hash:draftSnapshotHash||null};
    const {error}=await sb.rpc('save_loyalty_config_draft',saveArgs);
    if(!isLoyaltyCurrent())return;
    if(error)return fail(error);
    if(!draftVersionId){const {error:publishError}=await sb.rpc('publish_loyalty_config',{p_version:versionId});if(publishError)return fail(publishError)}
    loyaltyPage(model,draftVersionId,recommendation);
  }
  const ta=$('trAdd');
  if(ta) ta.onclick=async()=>{
    const name=$('trName').value.trim(),th=parseInt($('trTh').value||'0'),mul=parseFloat($('trMul').value||'1');
    if(!name) return toast('Give the tier a name');
    ta.disabled=true;
    await saveTier({id:editingTier?.tier_id||editingTier?.id||null,name,threshold:Math.max(0,th),
      points_multiplier:Math.max(1,mul),perk_note:$('trPerk').value.trim()||null,
      sort:editingTier?.sort||0,active:true});
  };
  document.querySelectorAll('.trEdit').forEach(b=>b.onclick=()=>fillTier(
    tiers.find(t=>(t.tier_id||t.id)===b.dataset.id)));
  document.querySelectorAll('.trDel').forEach(b=>b.onclick=async()=>{
    const tier=tiers.find(t=>(t.tier_id||t.id)===b.dataset.id);
    if(tier)await saveTier({id:tier.tier_id||tier.id,name:tier.name,threshold:tier.threshold,
      points_multiplier:tier.points_multiplier,perk_note:tier.perk_note,sort:tier.sort||0,active:false});
  });
}

/* ---------- versioned retention programs ---------- */
async function retentionPage(draftVersionId=null,editProgramId=null){
  const routeMain=M();
  const isRetentionCurrent=()=>routeMain.isConnected&&M()===routeMain;
  routeMain.innerHTML=CUI.loadingState({title:'Retention programs',iconName:'retention'});
  const isOwner=S.myRole==='owner';
  let programs=[],taxonomy=[],snapshotHash=null,currentVersion=null,history=[],resumableDraft=null;
  const {data:business,error:businessError}=await sb.from('businesses')
    .select('active_config_version_id').eq('id',S.biz.id).single();
  if(!isRetentionCurrent())return;
  if(businessError)throw businessError;
  currentVersion=business?.active_config_version_id||null;
  if(draftVersionId){
    const {data:draft,error}=await sb.rpc('get_retention_config_draft',{p_config_version:draftVersionId});
    if(!isRetentionCurrent())return;
    if(error){
      routeMain.innerHTML=`<div class="topbar"><div><h1>Retention programs</h1><p class="muted small">Draft could not load safely.</p></div></div>
        <div class="card"><p class="err">${esc(error.message)}</p><button class="btn" id="retryRetention">Retry</button></div>`;
      $('retryRetention').onclick=()=>retentionPage(draftVersionId,editProgramId);return;
    }
    programs=draft?.programs||[];taxonomy=draft?.taxonomy||[];snapshotHash=draft?.snapshot_hash||null;
  }else{
    const livePrograms=currentVersion
      ?sb.from('retention_programs').select('*, firm_reward_taxonomy(label,fulfillment_kind,active,sort)')
        .eq('business_id',S.biz.id).eq('current_config_version_id',currentVersion).order('created_at',{ascending:false})
      :Promise.resolve({data:[],error:null});
    const [{data:live,error:liveError},{data:types,error:typeError}]=await Promise.all([
      livePrograms,
      sb.from('firm_reward_taxonomy').select('id,label,fulfillment_kind,active,sort')
        .eq('business_id',S.biz.id).order('sort').order('label')]);
    if(!isRetentionCurrent())return;
    if(liveError||typeError)throw liveError||typeError;
    programs=(live||[]).map(r=>({...r,program_id:r.id,reward_label:r.firm_reward_taxonomy?.label,
      fulfillment_kind:r.firm_reward_taxonomy?.fulfillment_kind||r.reward_type,
      discount_percent:r.reward_type==='discount_pct'?r.reward_value:null,
      credit_cents:r.reward_type==='credit'?Number(r.reward_value):null,
      manual_item:r.reward_type==='free_item'?r.reward_item:null}));
    taxonomy=types||[];
  }
  if(isOwner){
    const draftRequest=!draftVersionId&&currentVersion
      ?sb.from('firm_config_versions').select('id,version_no').eq('business_id',S.biz.id)
        .eq('status','draft').eq('based_on_version_id',currentVersion).order('version_no',{ascending:false}).limit(1)
      :Promise.resolve({data:[],error:null});
    const [{data,error},{data:drafts,error:draftError}]=await Promise.all([
      sb.from('firm_config_versions').select('id,version_no,status,published_at,snapshot_hash')
        .eq('business_id',S.biz.id).in('status',['published','superseded']).order('version_no',{ascending:false}).limit(20),
      draftRequest]);
    if(!isRetentionCurrent())return;
    if(error||draftError)throw error||draftError;history=data||[];resumableDraft=drafts?.[0]||null;
  }
  const rewardTypes=taxonomy.filter(x=>x.active);
  const newProgramRetryKey=draftVersionId?`frenly:retention-program:${S.biz.id}:${draftVersionId}`:null;
  const pendingProgramId=newProgramRetryKey?sessionStorage.getItem(newProgramRetryKey):null;
  if(pendingProgramId&&programs.some(r=>(r.program_id||r.id)===pendingProgramId))sessionStorage.removeItem(newProgramRetryKey);
  const editing=programs.find(r=>(r.program_id||r.id)===editProgramId)||null;
  const displayReward=(r)=>r.fulfillment_kind==='credit'?money(r.credit_cents||0)
    :r.fulfillment_kind==='discount_pct'?`${r.discount_percent||0}% off`:esc(r.manual_item||'manual item');
  const versionTools=isOwner?`<div class="card" style="margin-bottom:16px">
    <div class="row"><div><b>${draftVersionId?'Draft configuration':'Published configuration'}</b>
      <div class="muted small">${draftVersionId?'Nothing changes at the counter until you publish. Every save checks the draft hash.':currentVersion?'Create a draft before changing retention behavior.':'Publish your loyalty foundation first; retention rules share the same versioned configuration.'}</div></div><span class="spacer"></span>
      ${draftVersionId?`<button class="btn ghost" id="discardRetentionDraft">Leave draft</button><button class="btn" id="publishRetention">Publish draft</button>`
        :currentVersion?(resumableDraft?`<a class="btn" href="#/retention/${resumableDraft.id}">Resume draft v${resumableDraft.version_no}</a>`:'<button class="btn" id="beginRetentionDraft">Create editing draft</button>')
          :'<a class="btn" href="#/loyalty">Set up loyalty first</a>'}</div>
    ${!draftVersionId&&history.length>1?`<div class="row" style="margin-top:12px"><label style="margin:0">Restore prior version</label>
      <select id="retentionRollback" style="max-width:240px">${history.filter(v=>v.id!==currentVersion).map(v=>`<option value="${v.id}">Version ${v.version_no} · ${v.status}</option>`).join('')}</select>
      <button class="btn ghost sm" id="createRetentionRollback">Create rollback draft</button></div>`:''}
    </div>`:'';
  routeMain.innerHTML=`${CUI.pageHeader({title:'Retention programs',subtitle:'Versioned return-visit rules with immutable reward behavior and grant history.',iconName:'retention',canWrite:isOwner,moduleLabel:'Retention configuration'})}
    ${versionTools}
    ${draftVersionId&&isOwner?`<div class="card" style="margin-bottom:16px"><b>Quick templates</b><div class="row" style="margin-top:10px;flex-wrap:wrap;gap:8px">
      <button class="qbtn" data-t='{"name":"Weekly regular","g":1,"p":7,"rt":"discount_pct","rv":10}'>1 visit / week → 10% off</button>
      <button class="qbtn" data-t='{"name":"Twice a week","g":2,"p":7,"rt":"free_item","ri":"Free drink"}'>2 visits / week → free item</button>
      <button class="qbtn" data-t='{"name":"Loyal half-year","g":2,"p":180,"rt":"credit","rv":1000}'>2 visits / 6 months → $10 credit</button>
    </div></div>`:''}
    <div class="split"><div class="card"><b>${editing?'Edit program':draftVersionId?'New program':'Programs'}</b>
      ${draftVersionId&&isOwner?`<label>Name</label><input id="rn" value="${esc(editing?.name||'')}" placeholder="e.g. Weekly regular">

        <button class="btn ghost sm taxonomyRename" data-id="${t.id}" data-label="${esc(t.label)}">Rename</button><button class="btn ghost sm taxonomySort" data-id="${t.id}" data-sort="${t.sort||0}">Sort</button>${t.active?`<button class="btn ghost sm taxonomyRetire" data-id="${t.id}">Retire</button>`:''}</div></div>`).join('')}</div>
      <details><summary>Add a new reward type</summary><label>Label</label><input id="rtName" placeholder="e.g. Complimentary side dish"><label>Immutable behavior</label><select id="rtKind"><option value="free_item">Hand over an item or benefit</option><option value="discount_pct">Apply a percentage discount</option><option value="credit">Add store credit</option></select><button class="btn ghost sm" id="rtAdd" style="margin-top:10px">Add reward type</button></details>
    </div>`:''}`;

  if(isOwner&&!draftVersionId){
    if($('beginRetentionDraft'))$('beginRetentionDraft').onclick=async()=>{const {data,error}=await sb.rpc('create_loyalty_config_draft',{p_business:S.biz.id,p_based_on:currentVersion,p_source:'owner_retention_editor'});if(!isRetentionCurrent())return;if(error)return fail(error);nav(`#/retention/${data.version_id}`)};
    if($('createRetentionRollback'))$('createRetentionRollback').onclick=async()=>{const base=$('retentionRollback').value;if(!base)return toast('Choose a prior version');const {data,error}=await sb.rpc('create_loyalty_config_draft',{p_business:S.biz.id,p_based_on:base,p_source:'retention_rollback'});if(!isRetentionCurrent())return;if(error)return fail(error);toast('Rollback draft created — review before publishing');nav(`#/retention/${data.version_id}`)};
  }
  if(isOwner&&draftVersionId){
    $('discardRetentionDraft').onclick=()=>nav('#/retention');
    $('publishRetention').onclick=async()=>{if(!confirm('Publish this retention draft? New sales will use it immediately.'))return;const publishButton=$('publishRetention');publishButton.disabled=true;const {error}=await sb.rpc('publish_loyalty_config',{p_version:draftVersionId});if(!isRetentionCurrent())return;if(error){publishButton.disabled=false;return fail(error)}toast('Retention configuration published');nav('#/retention')};
    const setRewardInput=()=>{const kind=$('rt').selectedOptions[0]?.dataset.kind;$('rvl').textContent=kind==='discount_pct'?'Discount %':kind==='credit'?`Credit amount (${S.biz.currency||'SGD'})`:'Item or benefit';$('rv').type=kind==='free_item'?'text':'number';if(editing){$('rv').value=kind==='discount_pct'?(editing.discount_percent||''):kind==='credit'?((editing.credit_cents||0)/100).toFixed(2):(editing.manual_item||'')}else $('rv').value=kind==='free_item'?'Free drink':'10'};
    if(rewardTypes.length){$('rt').onchange=setRewardInput;setRewardInput()}
    document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{const t=JSON.parse(b.dataset.t),type=rewardTypes.find(x=>x.fulfillment_kind===t.rt);if(!type)return toast('Add this reward type first');$('rn').value=t.name;$('rg').value=t.g;$('rp').value=t.p;$('rt').value=type.id;setRewardInput();$('rv').value=t.rt==='free_item'?(t.ri||'Free item'):t.rt==='credit'?(t.rv/100):t.rv});
    $('saveRetentionProgram').onclick=async()=>{const kind=$('rt').selectedOptions[0]?.dataset.kind,name=$('rn').value.trim();if(name.length<1)return toast('Name your program');const payload={name,active:$('ra').checked,goal_visits:parseInt($('rg').value),period_days:parseInt($('rp').value),starts_on:$('rs').value,reward_taxonomy_id:$('rt').value,customer_description:$('rcd').value.trim()||null,staff_description:$('rsi').value.trim()||null};if(kind==='discount_pct')payload.discount_percent=parseFloat($('rv').value||'0');if(kind==='credit')payload.credit_cents=Math.round(parseFloat($('rv').value||'0')*100);if(kind==='free_item')payload.manual_item=$('rv').value.trim();const programId=editing?.program_id||sessionStorage.getItem(newProgramRetryKey)||crypto.randomUUID();if(!editing)sessionStorage.setItem(newProgramRetryKey,programId);const saveButton=$('saveRetentionProgram');saveButton.disabled=true;const {error}=await sb.rpc('save_retention_program_draft',{p_config_version:draftVersionId,p_program_id:programId,p_program:payload,p_expected_snapshot_hash:snapshotHash});if(!isRetentionCurrent())return;if(error){saveButton.disabled=false;return fail(error)}if(!editing)sessionStorage.removeItem(newProgramRetryKey);toast('Draft retention rule saved');retentionPage(draftVersionId)};
    if($('cancelRetentionEdit'))$('cancelRetentionEdit').onclick=()=>retentionPage(draftVersionId);
    document.querySelectorAll('.retentionEdit').forEach(b=>b.onclick=()=>retentionPage(draftVersionId,b.dataset.id));
    document.querySelectorAll('.retentionToggle').forEach(b=>b.onclick=async()=>{const {error}=await sb.rpc('save_retention_program_draft',{p_config_version:draftVersionId,p_program_id:b.dataset.id,p_program:{active:b.dataset.to==='true'},p_expected_snapshot_hash:snapshotHash});if(!isRetentionCurrent())return;if(error)return fail(error);retentionPage(draftVersionId)});
  }
  if(isOwner){
    $('rtAdd').onclick=async()=>{const label=$('rtName').value.trim();if(label.length<2)return toast('Give the reward type a clear name');const {error}=await sb.rpc('save_reward_taxonomy',{p_business:S.biz.id,p_taxonomy_id:null,p_taxonomy:{label,fulfillment_kind:$('rtKind').value,active:true}});if(!isRetentionCurrent())return;if(error)return fail(error);toast('Reward type added');retentionPage(draftVersionId)};
    document.querySelectorAll('.taxonomyRename').forEach(b=>b.onclick=async()=>{const label=prompt('New reward label',b.dataset.label)?.trim();if(!label||label===b.dataset.label)return;const {error}=await sb.rpc('save_reward_taxonomy',{p_business:S.biz.id,p_taxonomy_id:b.dataset.id,p_taxonomy:{label}});if(!isRetentionCurrent())return;if(error)return fail(error);toast('Reward label renamed; prior grants are unchanged');retentionPage(draftVersionId)});
    document.querySelectorAll('.taxonomySort').forEach(b=>b.onclick=async()=>{const raw=prompt('Sort order (0–10000)',b.dataset.sort);if(raw===null)return;const sort=Number(raw);if(!Number.isInteger(sort)||sort<0||sort>10000)return toast('Sort order must be a whole number from 0 to 10000');const {error}=await sb.rpc('save_reward_taxonomy',{p_business:S.biz.id,p_taxonomy_id:b.dataset.id,p_taxonomy:{sort}});if(!isRetentionCurrent())return;if(error)return fail(error);toast('Reward type order updated');retentionPage(draftVersionId)});
    document.querySelectorAll('.taxonomyRetire').forEach(b=>b.onclick=async()=>{if(!confirm('Retire this label? Published active programs must be replaced or paused first.'))return;const {error}=await sb.rpc('save_reward_taxonomy',{p_business:S.biz.id,p_taxonomy_id:b.dataset.id,p_taxonomy:{active:false}});if(!isRetentionCurrent())return;if(error)return fail(error);toast('Reward type retired; history is preserved');retentionPage(draftVersionId)});
  }
}

    <td>${r.qualified_at?r.qualified_at.slice(0,10):'—'}</td></tr>`).join('')}</table>`

/* ---------- memberships ---------- */
async function membershipsPage(){
  const routeMain=M();
  const isMembershipsCurrent=()=>routeMain.isConnected&&M()===routeMain;
  routeMain.innerHTML=CUI.loadingState({title:'Memberships',iconName:'memberships'});
  const canWrite=canWriteModule('memberships');
  const canEnroll=canWrite&&hasRoleCapability('create_sales');
  const [{data:plans,error:plansError},{data:cl,error:clientsError}]=await Promise.all([
    sb.from('membership_plans').select('*').eq('business_id',S.biz.id).order('created_at',{ascending:false}),
    sb.from('clients').select('id,full_name').eq('business_id',S.biz.id).order('full_name')]);
  if(!isMembershipsCurrent())return;
  if(plansError||clientsError)throw plansError||clientsError;
  const planEditor=canWrite?`<label for="mn">Plan name</label><input id="mn" placeholder="e.g. Glow Monthly">
      <div class="split"><div><label for="mp">Price (${S.biz.currency||'SGD'})</label><input id="mp" type="number" min="0" step="0.01" value="80"></div>
      <div><label for="mc">Billing</label><select id="mc"><option value="monthly">Monthly</option><option value="annual">Annual</option></select></div></div>
      <label for="mcr">Credit dropped each period (${S.biz.currency||'SGD'})</label><input id="mcr" type="number" min="0" step="0.01" value="60">
      <p class="muted small" style="margin-top:8px">Billing is collect-in-person for now (renewal books the charge as a sale). Credits land on the member's account and roll over. Membership charges never earn loyalty points.</p>
      <div style="margin-top:16px">${CUI.action({id:'madd',label:'Create plan',iconName:'add'})}</div>`
    :`<p class="muted small">Plan creation is unavailable with read-only access. Existing prices, cadence, and credits remain visible below.</p>`;
  const enrollmentEditor=canEnroll?`<label for="ec">Customer</label><select id="ec">${(cl||[]).map(c=>`<option value="${c.id}">${esc(c.full_name)}</option>`).join('')||'<option value="">— add a customer first —</option>'}</select>
      <label for="ep">Plan</label><select id="ep">${(plans||[]).filter(p=>p.active).map(p=>`<option value="${p.id}">${esc(p.name)} — ${money(p.price_cents)}/${p.cadence==='annual'?'yr':'mo'}</option>`).join('')||'<option value="">— create a plan first —</option>'}</select>
      <div style="margin-top:16px">${CUI.action({id:'ego',label:'Enroll and charge first period',iconName:'add'})}</div>`
    :`<p class="muted small">Enrollment requires membership write access and a role allowed to create sales. Current members remain visible below.</p>`;
  routeMain.innerHTML=`${CUI.pageHeader({title:'Memberships',subtitle:'Recurring plans with automated credit drops and daily renewals.',iconName:'memberships',canWrite,moduleLabel:'Membership management'})}
    <div class="split">
    <div class="card"><div class="cui-card-head"><h2>${canWrite?'Create a plan':'Plan catalogue'}</h2></div>
      ${planEditor}
      <div id="plist" style="margin-top:18px"></div></div>
    <div class="card"><div class="cui-card-head"><h2>${canEnroll?'Enroll a member':'Current memberships'}</h2></div>
      ${enrollmentEditor}
      <div id="mlist" style="margin-top:18px"><p class="muted small">Loading members…</p></div></div></div>`;
  if($('madd'))$('madd').onclick=async()=>{
    const name=$('mn').value.trim();
    if(name.length<2) return toast('Name the plan');
    const addButton=$('madd');addButton.disabled=true;
    const {error}=await sb.rpc('save_membership_plan',{p_business:S.biz.id,p_plan:null,p_name:name,
      p_price_cents:Math.round(parseFloat($('mp').value||'0')*100),p_cadence:$('mc').value,
      p_credit_cents:Math.round(parseFloat($('mcr').value||'0')*100),p_discount_pct:0,p_active:true});
    if(!isMembershipsCurrent())return;
    if(error){addButton.disabled=false;return fail(error)}
    toast('Plan created');membershipsPage();
  };
  if(canEnroll&&$('ego'))$('ego').onclick=async()=>{
    if(!$('ec').value||!$('ep').value) return toast('Pick a customer and a plan');
    const enrollButton=$('ego');enrollButton.disabled=true;
    const {error}=await sb.rpc('enroll_membership_v41',{p_business:S.biz.id,p_client:$('ec').value,p_plan:$('ep').value});
    if(!isMembershipsCurrent())return;
    if(error){fail(error);enrollButton.disabled=false;return}
    toast('Enrolled — first charge booked, credits dropped 🎉');membershipsPage();
  };
  $('plist').innerHTML=(plans&&plans.length)?plans.map(p=>`<div class="row" style="padding:8px 0;border-bottom:1px solid var(--line)">
    <div><b>${esc(p.name)}</b><div class="muted small">${money(p.price_cents)}/${p.cadence==='annual'?'yr':'mo'} → ${money(p.credit_cents)} credit each period</div></div>

    .select('*, clients(full_name), membership_plans(name,price_cents,cadence)')
    .eq('business_id',S.biz.id).order('created_at',{ascending:false});

    ${ms.map(m=>`<tr><td><b>${esc(m.clients?.full_name||'—')}</b></td><td>${esc(m.membership_plans?.name||'—')}</td>
    <td><span class="pill ${m.status==='active'?'on':m.status==='cancelled'?'no':'off'}">${m.status.replace(/_/g,' ')}</span></td>
    <td>${m.current_period_end.slice(0,10)}</td>
    <td>${canWrite&&m.status==='active'?`<button class="btn ghost sm" onclick="setMs('${m.id}','paused')">Pause</button>
      <button class="btn ghost sm" onclick="setMs('${m.id}','cancel_at_period_end')">Cancel@end</button>`
      :canWrite&&m.status==='paused'?`<button class="btn ghost sm" onclick="setMs('${m.id}','active')">Resume</button>`:''}</td></tr>`).join('')}</table>`
    :'<p class="muted small">No members yet — enroll your first above.</p>';
  if(canWrite)window.setMs=async(id,status)=>{const {error}=await sb.rpc('set_membership_status',{p_business:S.biz.id,
    p_membership:id,p_status:status});if(error)return fail(error);toast('Membership '+status.replace(/_/g,' '));membershipsPage()};
}

  function layoutCalendarDay(items){

      ${days.map((day,index)=>`<div class="calendar-day ${day===todaySg?'is-today':''}" style="height:${bodyHeight}px;--calendar-hour-height:${hourHeight}px">${dayEvents[index].map(({item:a,from,to,lane,laneCount})=>{const top=Math.max(0,(from-startHour*60)/60*hourHeight),height=(to-from)/60*hourHeight,color=staffColor[a.staff_id]||'#7C9CBF',left=(lane/laneCount*100).toFixed(4),width=(100/laneCount).toFixed(4);return `<button type="button" class="calendar-event" data-appointment="${a.id}" style="--event-color:${esc(color)};top:${top}px;height:${height}px;left:calc(${left}% + 3px);right:auto;width:calc(${width}% - 6px)" aria-label="${esc(`${a.services?.name||'Appointment'} for ${a.clients?.full_name||'customer'}, ${appointmentTimeRange(a)}, ${appointmentDuration(a)} minutes, ${staffName[a.staff_id]||'unassigned'}`)}"><b>${esc(a.services?.name||'General visit')} · ${esc(a.clients?.full_name||'—')}</b><span class="calendar-event-time">${esc(appointmentTimeRange(a))}</span>${staffFilter==='all'?`<span>${esc(staffName[a.staff_id]||'Unassigned')}</span>`:''}</button>`}).join('')}</div>`).join('')}</div></div></div>
      <div class="calendar-agenda">${agenda||`<div class="cui-empty">${CUI.icon('appointments',{size:38})}<h2>No appointments this week</h2></div>`}</div>`;
    wireAppointmentActions();
  }

    if(error) return fail(error);

  };

/* ---------- branches (owner-only) ----------

   live yet). is_default is shown as a read-only badge, never editable from this page: which

async function branchesPage(){
  M().innerHTML=`<div class="topbar"><div><h1>Branches</h1><p class="muted small">Manage your locations. Staff assigned to a branch see only that branch's data — owners and managers always see every branch.</p></div>

  let branchList=[],staffList=[],openAssignId=null,editId=null;
  $('addBr').onclick=()=>openForm(null);
  function openForm(b){
    editId=b?b.id:null;
    $('brForm').style.display='block';
    $('brForm').innerHTML=`<b>${b?'Edit branch':'New branch'}</b>
      <div class="split"><div><label>Name *</label><input id="brName" value="${b?esc(b.name):''}"></div>
      <div><label>Phone</label><input id="brPhone" value="${b?esc(b.phone||''):''}"></div></div>
      <div class="split"><div><label>Email</label><input id="brEmail" type="email" value="${b?esc(b.email||''):''}"></div>
      <div><label>Address</label><input id="brAddr" value="${b?esc(b.address||''):''}"></div></div>
      <label style="display:flex;align-items:center;gap:8px;margin-top:16px;cursor:pointer;color:var(--ink);font-weight:500;font-size:14px">
        <input type="checkbox" id="brActive" style="width:auto" ${(!b||b.active)?'checked':''}> Active</label>
      <div class="row" style="margin-top:16px"><button class="btn" id="brSave">${b?'Save changes':'Create branch'}</button>
      <button class="btn ghost sm" id="brCancel">Cancel</button></div>`;
    $('brCancel').onclick=()=>{$('brForm').style.display='none';};
    $('brSave').onclick=async()=>{
      const name=$('brName').value.trim();
      if(name.length<2) return toast('Branch name required');
      const payload={name,phone:$('brPhone').value.trim()||null,email:$('brEmail').value.trim()||null,
        address:$('brAddr').value.trim()||null,active:$('brActive').checked};
      $('brSave').disabled=true;
      const {error}=editId
        ? await sb.from('branches').update(payload).eq('id',editId).eq('business_id',S.biz.id)
        : await sb.from('branches').insert({...payload,business_id:S.biz.id});
      if(error){fail(error);$('brSave').disabled=false;return}
      toast(editId?'Branch updated':'Branch created');
      $('brForm').style.display='none';
      load();
    };

  async function load(){
    const [{data:br,error},{data:st}]=await Promise.all([
      sb.from('branches').select('*').eq('business_id',S.biz.id).order('is_default',{ascending:false}).order('name'),
      sb.from('staff').select('id,full_name,role,active').eq('business_id',S.biz.id).eq('active',true).order('full_name')
    ]);
    if(error) return fail(error);
    branchList=br||[];staffList=st||[];
    if(!branchList.length){$('brList').innerHTML=`<div class="card"><div class="empty"><div class="big">🏢</div>No branches yet — add your first one.</div></div>`;return}
    const {data:sbRows,error:sbErr}=await sb.from('staff_branches').select('staff_id,branch_id').eq('business_id',S.biz.id);
    if(sbErr) return fail(sbErr);
    const assigned={};(sbRows||[]).forEach(r=>{(assigned[r.branch_id]=assigned[r.branch_id]||new Set()).add(r.staff_id)});
    $('brList').innerHTML=branchList.map(b=>{
      const aset=assigned[b.id]||new Set();
      return `<div class="card" style="margin-bottom:12px">
        <div class="row" style="flex-wrap:wrap">
          <div><b>${esc(b.name)}</b> ${b.is_default?'<span class="pill new">Default</span>':''} <span class="pill ${b.active?'ok':'no'}">${b.active?'Active':'Inactive'}</span>
          <div class="muted small" style="margin-top:4px">${esc(b.address||'No address set')}${b.phone?' · '+esc(b.phone):''}${b.email?' · '+esc(b.email):''}</div></div>
          <span class="spacer"></span>
          <button class="btn ghost sm" onclick="editBranch('${b.id}')">Edit</button>
          <button class="btn ghost sm" onclick="toggleAssign('${b.id}')">Staff (${aset.size})</button>
        </div>
        ${openAssignId===b.id?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line)">
          <p class="muted small" style="margin-bottom:8px">Tick who works here. Staff assigned here see only this branch's data — owners & managers see every branch regardless of assignment.</p>
          ${staffList.length?staffList.map(s=>`<label style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;color:var(--ink);font-size:13.5px">
            <input type="checkbox" style="width:auto" ${aset.has(s.id)?'checked':''} onchange="toggleStaffBranch('${b.id}','${s.id}',this.checked)"> ${esc(s.full_name||'Team member')} <span class="muted small">(${esc(ROLE_LABELS[s.role]||s.role)})</span></label>`).join(''):'<p class="muted small">No active staff on your team yet.</p>'}
        </div>`:''}
      </div>`;
    }).join('');
  }
  window.editBranch=(id)=>{const b=branchList.find(x=>x.id===id);if(b) openForm(b);};
  window.toggleAssign=(id)=>{openAssignId=openAssignId===id?null:id;load();};
  window.toggleStaffBranch=async(branchId,staffId,checked)=>{
    if(checked){
      const {error}=await sb.from('staff_branches').insert({business_id:S.biz.id,staff_id:staffId,branch_id:branchId});
      if(error) return fail(error);
      toast('Staff assigned to branch');
    }else{
      const {error}=await sb.from('staff_branches').delete().eq('business_id',S.biz.id).eq('staff_id',staffId).eq('branch_id',branchId);
      if(error) return fail(error);
      toast('Staff unassigned from branch');
    }
    load();
  };
  load();
}

/* ---------- reports ---------- */
async function reportsPage(){
  const iso=d=>d.toISOString().slice(0,10);
  M().innerHTML=`<div class="topbar"><div><h1>Reports</h1><p class="muted small">Money and loyalty, in numbers your accountant can read.</p></div>
    <div class="range"><input type="date" id="rf" value="${iso(new Date(Date.now()-29*864e5))}"> <span class="muted">→</span>
    <input type="date" id="rt2" value="${iso(new Date())}"> <span id="branchWrap"></span><button class="btn sm" id="rgo">Run</button>
    <button class="btn ghost sm" id="rcsv">Export sales CSV</button></div></div>
    <div class="grid reports-grid" id="rbody"><div class="card"><div class="empty">Pick a range and Run.</div></div></div>`;
  let lastScope=null;
  async function run(){
    const from=$('rf').value,to=$('rt2').value;
    const scope={from:sgDateBoundary(from),toExclusive:sgDateBoundary(to,1),branchId:selectedBranchId||null};
    const [{data,error},reportSales]=await Promise.all([
      sb.rpc('get_reports_summary',{p_business:S.biz.id,p_from:from,p_to:to,p_branch:selectedBranchId||null}),
      fetchAllRows(()=>{let q=sb.from('sales').select('id,amount_cents,reversal_of,counts_as_revenue').eq('business_id',S.biz.id)
        .gte('occurred_at',scope.from).lt('occurred_at',scope.toExclusive).order('occurred_at').order('id');
        if(scope.branchId)q=q.eq('branch_id',scope.branchId);return q;})]);
    if(error) return fail(error);
    lastScope=scope;
    const d=data||{},byKind=d.revenue_by_kind||{},nonRevByKind=d.non_revenue_by_kind||{},pt=d.points_by_type||{};
    const liab=d.credit_liability_cents||0,gcOut=d.gift_card_liability_cents||0,actMs=d.active_memberships||0;
    const reversalRows=(reportSales||[]).filter(s=>s.reversal_of);
    const reversedCents=Math.abs(reversalRows.filter(s=>s.counts_as_revenue).reduce((a,s)=>a+s.amount_cents,0));
    const netRevenue=(reportSales||[]).filter(s=>s.counts_as_revenue).reduce((a,s)=>a+s.amount_cents,0);
    $('rbody').innerHTML=`
      <div class="card"><b>Revenue by type</b><table style="margin-top:8px">
        ${Object.entries(byKind).map(([k,v])=>`<tr><td>${k.replace('_',' ')}</td><td style="text-align:right"><b>${money(v)}</b></td></tr>`).join('')||'<tr><td class="muted">No sales in range</td></tr>'}
        <tr><td><b>Net total</b></td><td style="text-align:right"><b>${money(Object.values(byKind).reduce((a,b)=>a+b,0))}</b></td></tr></table>
        ${Object.keys(nonRevByKind).length?`<p class="muted small" style="margin-top:8px">Cash collected, not revenue: ${Object.entries(nonRevByKind).map(([k,v])=>`<b>${money(v)}</b> ${k.replace('_',' ')}`).join(', ')} — real cash in the drawer, but it isn't revenue until it's actually spent (gift cards) or otherwise realised, per this business's current sale policy.</p>`:''}</div>
      <div class="card"><b>Reversal reconciliation</b><table style="margin-top:8px">
        <tr><td>Compensating rows</td><td style="text-align:right"><b>${reversalRows.length}</b></td></tr>
        <tr><td>Revenue reversed</td><td style="text-align:right"><b>−${money(reversedCents)}</b></td></tr>
        <tr><td>Net revenue from immutable rows</td><td style="text-align:right"><b>${money(netRevenue)}</b></td></tr></table>
        <p class="muted small" style="margin-top:8px">Originals remain on record. Negative reversal rows link back to them and reduce the net.</p></div>
      <div class="card"><b>Loyalty flow (in range)</b><table style="margin-top:8px">
        <tr><td>Points earned</td><td style="text-align:right"><b>${pt.earn||0}</b></td></tr>
        <tr><td>Points redeemed</td><td style="text-align:right"><b>${Math.abs(pt.redeem||0)}</b></td></tr>
        <tr><td>Points expired</td><td style="text-align:right"><b>${Math.abs(pt.expire||0)}</b></td></tr>
        <tr><td>Manual adjustments</td><td style="text-align:right"><b>${pt.adjust||0}</b></td></tr></table></div>
      <div class="card"><b>Liabilities (now)</b><table style="margin-top:8px">
        <tr><td>Customer credit outstanding</td><td style="text-align:right"><b>${money(liab)}</b></td></tr>
        <tr><td>Gift cards unredeemed</td><td style="text-align:right"><b>${money(gcOut)}</b></td></tr></table>
        <p class="muted small" style="margin-top:8px">Credit is money you owe customers — the daily expiry sweep keeps it honest. Gift-card liability is business-wide, even when a branch filter is selected, because gift cards are not assigned to branches.</p></div>
      <div class="card"><b>Memberships</b><table style="margin-top:8px">
        <tr><td>Active members</td><td style="text-align:right"><b>${actMs}</b></td></tr>
        <tr><td>Membership revenue (range)</td><td style="text-align:right"><b>${money(byKind.membership||0)}</b></td></tr></table></div>`;
  }
  $('rgo').onclick=run;
  $('rcsv').onclick=async()=>{
    if(!lastScope) return toast('Run a report first');
    $('rcsv').disabled=true;
    let lastSales;
    try{
      lastSales=await fetchAllRows(()=>{
        let q=sb.from('sales').select('*, clients(full_name)',{count:'exact'}).eq('business_id',S.biz.id)
          .gte('occurred_at',lastScope.from).lt('occurred_at',lastScope.toExclusive)
          .order('occurred_at').order('id');
        if(lastScope.branchId) q=q.eq('branch_id',lastScope.branchId);
        return q;
      });
    }catch(error){$('rcsv').disabled=false;return fail(error)}
    if(!lastSales.length){$('rcsv').disabled=false;return toast('No sales in this report range')}
    /* Signed amounts plus explicit parent/child IDs make this export exactly reconcilable:
       sum(signed_amount) is net, while originals and compensating rows remain immutable. */
    const reversalByOriginal=Object.fromEntries(lastSales.filter(s=>s.reversal_of).map(s=>[s.reversal_of,s]));
    const rows=[['occurred_at','customer','kind','relationship','original_sale_id','reversal_sale_id','signed_amount_additive','relationship_net_original_only','reason','note','counts_as_revenue','counts_as_visit'],
      ...lastSales.map(s=>{const rev=reversalByOriginal[s.id];return [s.occurred_at,s.clients?.full_name||'',s.kind,s.reversal_of?'reversal':'original',s.reversal_of||s.id,s.reversal_of?s.id:(rev?.id||''),(s.amount_cents/100).toFixed(2),s.reversal_of?'':((s.amount_cents+(rev?.amount_cents||0))/100).toFixed(2),s.reversal_reason||'',s.note||'',s.counts_as_revenue,s.counts_as_visit]})];
    const blob=new Blob([csvRows(rows)],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='frenly-sales.csv';a.click();
    $('rcsv').disabled=false;
    toast('CSV downloaded');
  };
  refreshBranchFilter(run);
}
