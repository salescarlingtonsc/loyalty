<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frenly — Loyalty & retention for every business</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================================
   Frenly design system v2 — "mockup layout, iOS polish" (owner ruling 2026-07-18)
   Principles: 8pt grid · SF-grade type with tight optical tracking · hairline
   borders instead of heavy strokes · layered low-opacity shadows (never one big
   blur) · frosted glass on floating surfaces · springy motion on interaction.
   Fraunces is now reserved for the wordmark ONLY — headings run on the system
   (SF on Apple) stack, which is what makes it read as a native app rather than a
   generic web dashboard.
   ============================================================================ */
:root{
  --bg:#F4F2EE; --card:#FFFFFF; --ink:#17161A; --ink2:#3D3B44; --muted:#8B8794;
  --line:#EAE6DF; --hair:rgba(23,22,26,.06);
  --coral:#FF6B5E; --amber:#FFB86B; --green:#2FA36B;
  --grad:linear-gradient(135deg,#FF7A6B,#FFB86B);
  --tint:#FFF2ED;            /* coral wash for selected/active surfaces */
  /* iOS uses generous, continuous corner radii */
  --r:18px; --r-sm:12px; --r-lg:24px;
  /* Depth = several cheap shadows stacked, not one expensive one */
  --shadow:0 1px 2px rgba(23,22,26,.04),0 4px 12px rgba(23,22,26,.045);
  --shadow-lg:0 2px 6px rgba(23,22,26,.05),0 18px 44px rgba(23,22,26,.10);
  --spring:cubic-bezier(.34,1.4,.64,1);
  --ease:cubic-bezier(.2,.8,.2,1);
  --sf:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Inter',system-ui,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--sf);font-size:14.5px;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  font-feature-settings:'kern' 1,'liga' 1,'cv11' 1;letter-spacing:-.005em}
h1,h2,h3{font-family:var(--sf);font-weight:650;letter-spacing:-.022em;color:var(--ink)}
h1{letter-spacing:-.03em}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;font-size:14px;letter-spacing:-.01em}
input,select,textarea{font-family:inherit;font-size:15px;padding:11px 13px;border:1px solid var(--line);
  border-radius:var(--r-sm);background:#fff;color:var(--ink);width:100%;
  transition:border-color .18s var(--ease),box-shadow .18s var(--ease)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--coral);
  box-shadow:0 0 0 3.5px rgba(255,107,94,.16)}
label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:16px 0 6px;letter-spacing:-.005em}
/* Buttons: press-down on :active is the single strongest "native app" tell */
.btn{background:var(--grad);color:#fff;font-weight:600;padding:11px 20px;border-radius:100px;
  box-shadow:0 1px 2px rgba(255,107,94,.2),0 6px 16px rgba(255,107,94,.22);
  transition:transform .22s var(--spring),box-shadow .22s var(--ease),opacity .15s}
.btn:hover{transform:translateY(-1.5px);box-shadow:0 2px 4px rgba(255,107,94,.22),0 10px 26px rgba(255,107,94,.3)}
.btn:active{transform:scale(.965) translateY(0);transition-duration:.06s}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow)}
.btn.ghost:hover{border-color:#DDD7CD;box-shadow:var(--shadow-lg)}
.btn.sm{padding:7px 14px;font-size:13px}
.btn.danger{background:#fff;color:#C0392B;border:1px solid #F0C4BE;box-shadow:none}
.btn[disabled]{opacity:.42;pointer-events:none;box-shadow:none}
.card{background:var(--card);border:1px solid var(--hair);border-radius:var(--r);
  box-shadow:var(--shadow);padding:22px}
.grid{display:grid;gap:16px}
.muted{color:var(--muted)} .small{font-size:12.5px}
.pill{display:inline-block;padding:3.5px 10px;border-radius:100px;font-size:11.5px;font-weight:600;letter-spacing:-.005em}
.pill.on{background:#E7F6EE;color:var(--green)} .pill.off{background:#F1EEE9;color:var(--muted)}
.pill.new{background:var(--tint);color:#D0562E} .pill.ok{background:#E7F6EE;color:var(--green)} .pill.no{background:#FBEAE7;color:#C0392B}
table{width:100%;border-collapse:collapse}
th{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;
  text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
td{padding:13px 12px;border-bottom:1px solid var(--hair);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.click{cursor:pointer;transition:background .14s var(--ease)}
tr.click:hover td{background:#FBFAF8}
.empty{text-align:center;padding:52px 20px;color:var(--muted)}
.empty .big{font-size:34px;margin-bottom:10px}
/* Toast: frosted, springs up from the bottom like a native banner */
.toast{position:fixed;bottom:26px;left:50%;background:rgba(23,22,26,.9);
  -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
  color:#fff;padding:12px 22px;border-radius:100px;font-size:13.5px;font-weight:500;
  box-shadow:0 12px 40px rgba(0,0,0,.3);z-index:99;opacity:0;pointer-events:none;
  transform:translateX(-50%) translateY(12px) scale(.96);
  transition:opacity .26s var(--ease),transform .32s var(--spring)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.err{background:#FBEAE7;color:#C0392B;padding:10px 14px;border-radius:var(--r-sm);font-size:13px;margin-top:12px}
/* auth + onboard */
.center-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:420px;max-width:100%;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);padding:30px}
.logo{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:600;letter-spacing:-.02em}
.logo span{color:var(--coral)}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:8px}
.ind{border:1.5px solid var(--line);border-radius:var(--r-sm);padding:14px;text-align:center;cursor:pointer;
  background:#fff;transition:border-color .18s var(--ease),transform .22s var(--spring),box-shadow .2s}
.ind:hover{border-color:#E3C9A8;transform:translateY(-2px);box-shadow:var(--shadow)}
.ind:active{transform:scale(.97)}
.ind.sel{border-color:var(--coral);background:var(--tint);box-shadow:0 0 0 3.5px rgba(255,107,94,.13)}
.ind .em{font-size:22px;display:block;margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{background:#F1EEE9;border-radius:100px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--tint);color:#D0562E}
/* ---------- shell: light rail (mockup) + frosted top bar, profile TOP-RIGHT ---------- */
.shell{display:grid;grid-template-columns:246px 1fr;min-height:100vh}
.side{background:#FCFBF9;border-right:1px solid var(--line);color:var(--ink2);
  padding:22px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.side .logo{color:var(--ink);padding:0 10px 22px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:14px;
  font-weight:500;margin-bottom:1px;color:var(--ink2);transition:background .14s var(--ease),color .14s}
.nav a:hover{background:#F2EFEA;color:var(--ink)}
.nav a.act{background:var(--tint);color:#D0562E;font-weight:600}
/* Icons get their own fixed-width box so every label starts on the same optical
   column, and so flex `gap` actually applies — an emoji sitting in the same text
   node as its label is one flex item, so gap silently does nothing and the icon
   ends up jammed against the word. This is the difference between "looks bought"
   and "looks generated". */
.nav .ic{width:18px;font-size:14.5px;display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;line-height:1}
.navhead{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:11px;
  font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#A8A3B0;cursor:pointer;
  margin-top:12px;transition:color .14s}
.navhead:hover{color:var(--ink2)}
.navhead.act{color:var(--ink2)}
.navhead .chev{margin-left:auto;font-size:10.5px;opacity:.9;transition:transform .22s var(--spring)}
.navbody a{padding-left:22px}
.side .foot{margin-top:auto;padding:10px;font-size:12.5px;color:var(--muted)}
/* the right-hand column: sticky frosted app bar above the scrolling page */
.col{display:flex;flex-direction:column;min-width:0}
.appbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:flex-end;
  gap:10px;padding:12px 34px;border-bottom:1px solid var(--hair);
  background:rgba(244,242,238,.72);
  -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px)}
.profile{position:relative}
.profile .who{display:flex;align-items:center;gap:10px;padding:6px 10px 6px 6px;border-radius:100px;
  cursor:pointer;background:#fff;border:1px solid var(--hair);box-shadow:var(--shadow);
  transition:transform .2s var(--spring),box-shadow .2s var(--ease)}
.profile .who:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.profile .who:active{transform:scale(.975)}
.profile .who .chev{font-size:9px;color:var(--muted);margin-left:2px}
.profile .avatar{width:30px;height:30px;border-radius:100px;background:var(--grad);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;flex-shrink:0;
  box-shadow:0 2px 6px rgba(255,107,94,.3)}
/* menu now drops DOWN from the top-right chip (was: up from the bottom-left rail) */
.profile .menu{position:absolute;top:calc(100% + 8px);right:0;min-width:212px;
  background:rgba(255,255,255,.86);
  -webkit-backdrop-filter:saturate(180%) blur(24px);backdrop-filter:saturate(180%) blur(24px);
  border:1px solid var(--hair);border-radius:var(--r-sm);padding:6px;box-shadow:var(--shadow-lg);
  transform-origin:top right;animation:pop .2s var(--spring)}
@keyframes pop{from{opacity:0;transform:scale(.94) translateY(-6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.profile .menu a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;
  color:var(--ink2);font-size:13.5px;font-weight:500;white-space:nowrap}
.profile .menu a:hover{background:#F2EFEA;color:var(--ink)}
/* notification bell — sits left of the profile chip, same frosted-popover language */
.bellwrap{position:relative}
.bellbtn{position:relative;width:38px;height:38px;border-radius:100px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;background:#fff;border:1px solid var(--hair);box-shadow:var(--shadow);
  font-size:16px;transition:transform .2s var(--spring),box-shadow .2s var(--ease)}
.bellbtn:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.bellbtn:active{transform:scale(.94)}
.bellbtn .dot{position:absolute;top:-3px;right:-3px;background:var(--coral);color:#fff;border-radius:100px;
  min-width:16px;height:16px;font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;
  padding:0 3px;box-shadow:0 0 0 2px #fff}
.notif-menu{position:absolute;top:calc(100% + 8px);right:0;width:320px;max-width:calc(100vw - 40px);
  background:rgba(255,255,255,.86);-webkit-backdrop-filter:saturate(180%) blur(24px);backdrop-filter:saturate(180%) blur(24px);
  border:1px solid var(--hair);border-radius:var(--r-sm);padding:8px;box-shadow:var(--shadow-lg);
  transform-origin:top right;animation:pop .2s var(--spring);max-height:420px;overflow-y:auto;z-index:41}
.notif-item{display:block;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .14s var(--ease)}
.notif-item:hover{background:#F2EFEA}
.notif-item.unread{background:var(--tint)}
.notif-item .t{font-size:13px;font-weight:600;color:var(--ink)}
.notif-item .b{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.notif-item .ago{font-size:10.5px;color:var(--muted);margin-top:4px}
.notif-empty{text-align:center;padding:24px 12px;color:var(--muted);font-size:13px}
.switchrow{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 4px;font-size:12.5px;color:var(--ink2)}
.tglsw{position:relative;width:36px;height:21px;border-radius:100px;background:var(--line);cursor:pointer;
  transition:background .18s var(--ease);flex-shrink:0}
.tglsw.on{background:var(--green)}
.tglsw::after{content:'';position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:100px;
  background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .18s var(--spring)}
.tglsw.on::after{transform:translateX(15px)}
/* universal importer modal */
.modal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;
  background:rgba(23,22,26,.4);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);animation:fade .18s var(--ease)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal-card{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:640px;max-width:100%;
  max-height:88vh;overflow-y:auto;padding:26px;animation:pop .22s var(--spring);transform-origin:center}
.seg{display:inline-flex;gap:4px;background:#F1EEE9;border-radius:100px;padding:3px}
.seg button{background:transparent;border-radius:100px;padding:6px 14px;font-size:12.5px;font-weight:600;color:var(--muted)}
.seg button.act{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
.imp-prev{border:1px solid var(--hair);border-radius:var(--r-sm);overflow:hidden;margin-top:14px}
.imp-prev table{font-size:12px}.imp-prev th,.imp-prev td{padding:7px 10px}
.imp-note{background:var(--tint);color:#8a4a2e;border-radius:var(--r-sm);padding:9px 12px;font-size:12px;margin-top:12px}
.main{padding:26px 34px 46px;max-width:1240px;width:100%}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:1.85rem;font-weight:700}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(172px,1fr));gap:14px}
.kpi{transition:transform .24s var(--spring),box-shadow .24s var(--ease)}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
/* Tabular figures stop KPI numbers from jittering as they update */
.kpi .v{font-family:var(--sf);font-size:1.75rem;font-weight:680;margin-top:3px;
  letter-spacing:-.035em;font-variant-numeric:tabular-nums}
.kpi .l{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.charts .card{min-height:280px}
.range{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.range input{width:auto}
/* segmented control, iOS-style */
.qbtn{background:#fff;border:1px solid var(--hair);border-radius:100px;padding:7px 14px;font-size:12.5px;
  font-weight:600;color:var(--muted);box-shadow:var(--shadow);
  transition:transform .18s var(--spring),color .14s,background .14s}
.qbtn:hover{color:var(--ink)}
.qbtn:active{transform:scale(.94)}
.qbtn.act{background:var(--ink);color:#fff;border-color:var(--ink)}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row{display:flex;gap:10px;align-items:center}
.spacer{flex:1}
@media(max-width:960px){
  .shell{grid-template-columns:1fr}
  .side{position:static;height:auto;flex-direction:row;align-items:center;overflow-x:auto;
    border-right:none;border-bottom:1px solid var(--line)}
  .side .foot,.side .logo{display:none}
  .nav{display:flex}
  .appbar{padding:10px 18px}
  .charts,.split{grid-template-columns:1fr}
  .main{padding:18px 18px 40px}
}
@media(prefers-reduced-motion:reduce){*{animation:none !important;transition-duration:.01ms !important}}
/* portal */
.portal{max-width:640px;margin:0 auto;padding:40px 20px}
.portal .head{text-align:center;margin-bottom:26px}
.svc{display:flex;justify-content:space-between;padding:13px 16px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;background:#fff}
.svc.sel{border-color:var(--coral);background:#FFF7F0}
.strike{text-decoration:line-through;opacity:.55}
@media print{
  .side,.no-print{display:none !important}
  .shell{display:block}
  .main{padding:0;max-width:100%}
  body{background:#fff}
}
</style>
</head>

<div id="root"></div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* ============ Frenly app ============ */
const SB_URL='https://kyzovonwnscrzmkvocid.supabase.co';
const SB_KEY='sb_publishable_hOMgvuulHY0iSs7nmbqt3Q_RD0df_p7';
/* detectSessionInUrl:false — with it left at its (true) default, supabase-js inspects
   window.location.hash on load and can history.replaceState the hash away on a hash-routed
   SPA, which is why a browser refresh was silently losing the current route ("refresh does
   nothing unless I retype the URL"). We don't use Supabase's own hash-based OAuth redirect
   flow here, so it's safe to turn off. */
const sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});

/* Chart.js global defaults (design system v2). Chart.js out of the box is the single
   biggest "generic AI dashboard" tell — grey 1px grids on both axes, boxed legends,
   black tooltips. Strip it back: no vertical grid, hairline horizontal grid only, no
   axis borders, dot legends, and a frosted dark tooltip that matches our toast. */
if(window.Chart){
  const CS=getComputedStyle(document.documentElement);
  const gv=n=>CS.getPropertyValue(n).trim();
  Chart.defaults.font.family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif";
  Chart.defaults.font.size=11.5;
  Chart.defaults.font.weight=500;
  Chart.defaults.color=gv('--muted')||'#8B8794';
  Chart.defaults.maintainAspectRatio=false;
  Chart.defaults.animation.duration=520;
  Chart.defaults.animation.easing='easeOutQuart';
  Chart.defaults.elements.bar.borderRadius=8;
  Chart.defaults.elements.bar.borderSkipped=false;
  Chart.defaults.elements.line.borderWidth=2.5;
  Chart.defaults.elements.point.radius=0;
  Chart.defaults.elements.point.hoverRadius=5;
  Chart.defaults.elements.point.hitRadius=14;
  Chart.defaults.elements.arc.borderWidth=0;
  Chart.defaults.plugins.legend.labels.usePointStyle=true;
  Chart.defaults.plugins.legend.labels.pointStyle='circle';
  Chart.defaults.plugins.legend.labels.boxWidth=7;
  Chart.defaults.plugins.legend.labels.padding=16;
  Object.assign(Chart.defaults.plugins.tooltip,{
    backgroundColor:'rgba(23,22,26,.92)',padding:11,cornerRadius:10,displayColors:false,
    titleFont:{size:11,weight:'600'},bodyFont:{size:13,weight:'600'},caretSize:5});
  Chart.defaults.scale.grid.color=gv('--hair')||'rgba(23,22,26,.06)';
  Chart.defaults.scale.grid.drawTicks=false;
  Chart.defaults.scale.border.display=false;
  Chart.defaults.scale.ticks.padding=8;
  /* x-axis: a vertical grid adds noise and no information on our chart types.
     Chart.js 4 does not pre-populate a `grid` object on per-type scale defaults
     (unlike the shared Chart.defaults.scale), so mutating .grid.display on it
     threw "Cannot set properties of undefined" and blocked the entire app boot. */
  Chart.defaults.scales.category.grid={display:false};
}

const ALLMODS=['dashboard','till','clients','appointments','sales','services','bookings','waitlist','inventory','packages','loyalty','retention','referrals','memberships','giftcards','reports','staffperf','dailyreport','pnl','expenses'];
const INDUSTRIES={
  fnb:{em:'🍜',label:'F&B / Café',mods:['dashboard','till','clients','sales','bookings','waitlist','inventory','loyalty','retention','referrals','giftcards','reports','staffperf','dailyreport','pnl','expenses']},
  salon:{em:'💇',label:'Hair Salon',mods:ALLMODS},
  facial:{em:'✨',label:'Facial / Spa',mods:ALLMODS},
  massage:{em:'💆',label:'Massage',mods:ALLMODS},
  fitness:{em:'🏋️',label:'Fitness',mods:ALLMODS},
  retail:{em:'🛍️',label:'Retail',mods:['dashboard','till','clients','sales','inventory','packages','loyalty','retention','referrals','giftcards','reports','staffperf','dailyreport','pnl','expenses']},
  other:{em:'🏪',label:'Other',mods:ALLMODS}
};
const MODULES={dashboard:['📊','Dashboard'],till:['💵','Till'],clients:['👥','Customers'],appointments:['🗓️','Appointments'],
  sales:['🧾','Sales'],services:['🛠️','Services'],bookings:['📅','Bookings'],waitlist:['⏳','Waitlist'],
  inventory:['📦','Inventory'],packages:['🎫','Packages'],loyalty:['🎁','Loyalty'],
  retention:['🔁','Retention'],referrals:['🤝','Referrals'],memberships:['💎','Memberships'],

/* ---------- routing ---------- */
async function route(){
  /* Boot/nav must never leave a blank page behind — a transient network blip or a Supabase
     hiccup used to throw straight out of this async function with nothing rendered, which
     read to the owner as "pressing refresh does nothing." Now it's recoverable in-place. */
  try{
    killCharts();
    const h=location.hash||'#/';
    if(h.startsWith('#/b/')) return renderPortal(h.slice(4).split('?')[0]);
    const {data:{session}}=await sb.auth.getSession();
    S.user=session?.user||null;
    if(!S.user) return renderAuth();
    if(!S.biz){
      const {data:st}=await sb.from('staff').select('business_id').eq('user_id',S.user.id).limit(1);
      if(st&&st.length){
        const {data:b}=await sb.from('businesses').select('*').eq('id',st[0].business_id).single();
        S.biz=b;
      }
    }
    if(!S.biz) return renderOnboard();
    /* Effective module permissions (v14): staff.modules===null means "inherit — sees
       everything the firm enabled"; an explicit array is an allowlist. Owners always
       bypass server-side. Fetched once per session, then cached on S until a Team edit
       resets it back to null (see settingsPage's per-staff module panel). */
    if(S.myModules===null){
      const {data:mm,error:mmErr}=await sb.rpc('get_my_modules',{p_business:S.biz.id});
      if(mmErr||!mm){
        /* Fallback must still resolve the ROLE, not just the modules: myRole drives the
           Settings gate below, so leaving it null on a transient RPC blip would lock the
           real owner out of their own Settings. Read it straight off the staff row (RLS
           already scopes that select to this workspace). */
        S.myModules=S.biz.enabled_modules||[];S.isSA=false;
        const {data:me}=await sb.from('staff').select('role,modules')
          .eq('business_id',S.biz.id).eq('user_id',S.user.id).limit(1);
        S.myRole=me&&me.length?me[0].role:null;
        if(me&&me.length&&me[0].modules&&S.myRole!=='owner'){
          S.myModules=(S.biz.enabled_modules||[]).filter(m=>me[0].modules.includes(m));
        }
      }else{
        S.myModules=mm.modules||S.biz.enabled_modules||[];S.myRole=mm.role||null;S.isSA=!!mm.is_super_admin;
      }
    }
    const page=(h.replace('#/','')||'dashboard').split('/');
    /* Route guard: a restricted employee must not reach a page by typing the URL, not
       just by it being hidden from nav. 'client' maps to the 'clients' module key, same
       as activeGroupKey() does for the sidebar. dashboard/setup are always reachable. */
    const pageKey=page[0]==='client'?'clients':page[0];
    /* Settings is owner-only. Hiding the nav link is not a guard — anyone can type the
       hash. The DB is the real boundary (every write in here is RLS/RPC owner-gated), but
       the page also surfaces billing, the team roster and the sign-up QR, so don't render
       it to staff at all. */
    if(pageKey==='settings'&&S.myRole!=='owner'){
      toast('Only the owner can open Settings.');
      return nav('#/dashboard');
    }
    if(MODULES[pageKey]&&pageKey!=='settings'&&pageKey!=='setup'&&pageKey!=='dashboard'&&!S.myModules.includes(pageKey)){
      toast('You don\'t have access to that.');
      return nav('#/dashboard');
    }
    renderShell(page);
  }catch(e){
    console.error(e);
    root.innerHTML=`<div class="center-wrap"><div class="card" style="width:400px;max-width:100%;text-align:center">
      <div style="font-size:40px">⚠️</div>
      <h2 style="margin:12px 0 4px">Something went wrong</h2>
      <p class="muted small">${esc(e&&e.message||String(e))}</p>
      <button class="btn" id="routeReload" style="margin-top:18px">Reload</button>
      </div></div>`;
    const rb=$('routeReload');
    if(rb) rb.onclick=()=>location.reload();
  }
}

/* ============================================================================
   Universal importer — paste-from-Excel (TSV), CSV, or .xlsx upload → any module.
   One engine, per-module config. Excel "copy cells" pastes tab-separated, so paste
   and file share the same row/column pipeline. Inserts row-by-row (chunked) so one
   bad/duplicate row is skipped, never failing the whole batch.
   ============================================================================ */
const IMPORT_CONFIGS={
  customers:{title:'Customers',table:'clients',
    hint:'Columns we recognise: name (required), phone, email, gender, birthday (YYYY-MM-DD), notes. Duplicates (same phone) are skipped.',
    fields:[
      {key:'full_name',aliases:['name','full name','fullname','customer','client'],required:true},
      {key:'phone',aliases:['phone','mobile','contact','hp','number','tel']},
      {key:'email',aliases:['email','e-mail','mail']},
      {key:'gender',aliases:['gender','sex'],transform:v=>['female','male','other'].includes(v.toLowerCase())?v.toLowerCase():null},
      {key:'birth_date',aliases:['birthday','birth date','birth','dob'],transform:v=>/^\d{4}-\d{2}-\d{2}$/.test(v.trim())?v.trim():null},
      {key:'notes',aliases:['notes','note','remark','remarks']}],
    build:o=>({business_id:S.biz.id,...o})},
  services:{title:'Services',table:'services',
    hint:'Columns: name (required), price (in dollars), duration/mins, category, description.',
    fields:[
      {key:'name',aliases:['name','service'],required:true},
      {key:'price_cents',aliases:['price','price (sgd)','amount','cost'],money:true},
      {key:'duration_min',aliases:['duration','mins','minutes','time','duration (minutes)'],int:true,def:60},
      {key:'category',aliases:['category','type','group']},
      {key:'description',aliases:['description','desc','details']}],
    build:o=>({business_id:S.biz.id,active:true,...o})},
  inventory:{title:'Products',table:'products',
    hint:'Columns: name (required), sku, price/retail (in dollars), and optionally qty/stock for an opening batch.',
    fields:[
      {key:'name',aliases:['name','product','item'],required:true},
      {key:'sku',aliases:['sku','code','barcode','ref']},
      {key:'retail_price_cents',aliases:['price','retail','retail price','price (sgd)','amount','cost'],money:true},
      {key:'__qty',aliases:['qty','quantity','stock','on hand','opening stock','count'],int:true,stripField:true}],
    build:o=>{const q=o.__qty;delete o.__qty;return {business_id:S.biz.id,...o};},
    postInsert:async(inserted,mapped)=>{
      const q=parseInt(mapped.__qty||'0');
      if(q>0) await sb.from('stock_batches').insert({product_id:inserted.id,qty:q});
    }},
};
/* Parse pasted/file text into array-of-arrays. Auto-detects tab (Excel paste) vs comma (CSV),
   honours quoted fields + embedded newlines. */
function parseDelimited(text){
  const head=(text.split(/\r?\n/)[0]||'');
  const delim=(head.split('\t').length>head.split(',').length)?'\t':',';
  const rows=[];let cur=[''],q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur[cur.length-1]+='"';i++} else q=false } else cur[cur.length-1]+=ch; }
    else if(ch==='"')q=true;
    else if(ch===delim)cur.push('');
    else if(ch==='\n'||ch==='\r'){ if(ch==='\r'&&text[i+1]==='\n')i++; if(cur.length>1||cur[0]!==''){rows.push(cur);cur=['']} }
    else cur[cur.length-1]+=ch;
  }
  if(cur.length>1||cur[0]!=='')rows.push(cur);
  return rows;
}
/* rows(array-of-arrays) + config → {recs:[{payload,mapped}], skipped, total, missing} */
function mapRows(rows,cfg){
  if(!rows||rows.length<2) return {recs:[],skipped:0,total:0,missing:null};
  const hdr=rows[0].map(h=>String(h||'').trim().toLowerCase());
  const idx={};let missingReq=null;
  for(const f of cfg.fields){
    let i=hdr.findIndex(h=>f.aliases.includes(h));
    if(i<0) i=hdr.findIndex(h=>h&&f.aliases.some(a=>h.includes(a)));
    idx[f.key]=i;
    if(f.required&&i<0) missingReq=f.aliases[0];
  }
  if(missingReq) return {recs:[],skipped:0,total:rows.length-1,missing:missingReq};
  const recs=[];let skipped=0;
  for(const r of rows.slice(1)){
    if(r.every(c=>!String(c||'').trim())) continue; // blank line
    const mapped={};let ok=true;
    for(const f of cfg.fields){
      const i=idx[f.key];let raw=i>=0?String(r[i]??'').trim():'';
      let val=raw;
      if(f.money) val=raw?Math.round(parseFloat(raw.replace(/[^0-9.\-]/g,''))*100):0;
      else if(f.int) val=raw?parseInt(raw.replace(/[^0-9\-]/g,'')):(f.def??null);
      else if(f.transform) val=raw?f.transform(raw):null;
      else val=raw||null;
      if(f.required&&(!val||String(val).length<2)){ok=false;break}
      if(val!==null&&val!==undefined&&val!=='') mapped[f.key]=val;
      else if(f.def!==undefined) mapped[f.key]=f.def;
    }
    if(!ok){skipped++;continue}
    recs.push({payload:cfg.build({...mapped}),mapped});
  }
  return {recs,skipped,total:rows.length-1,missing:null};
}
async function runImport(recs,cfg,onProgress){
  let inserted=0,failed=0;const errs=[];
  for(let i=0;i<recs.length;i+=20){
    const chunk=recs.slice(i,i+20);
    const res=await Promise.allSettled(chunk.map(async rec=>{
      const {data,error}=await sb.from(cfg.table).insert(rec.payload).select().single();
      if(error) throw error;
      if(cfg.postInsert) await cfg.postInsert(data,rec.mapped);
      return data;
    }));
    res.forEach(x=>{ if(x.status==='fulfilled')inserted++; else {failed++; if(errs.length<4)errs.push(x.reason?.message||'row failed')} });
    if(onProgress) onProgress(inserted+failed,recs.length);
  }
  return {inserted,failed,errs};
}
/* The modal. moduleKey ∈ customers|services|inventory. onDone() re-renders the caller. */
window.openImport=function(moduleKey,onDone){
  const cfg=IMPORT_CONFIGS[moduleKey];if(!cfg)return;
  let mode='paste',parsed=null;
  const wrap=document.createElement('div');wrap.className='modal';wrap.id='impModal';
  document.body.appendChild(wrap);
  const close=()=>wrap.remove();
  function render(){
    wrap.innerHTML=`<div class="modal-card">
      <div class="row"><h2 style="font-size:1.3rem">⬆️ Import ${cfg.title}</h2><span class="spacer"></span>
        <button class="btn ghost sm" id="impX">Close</button></div>
      <div class="imp-note">${esc(cfg.hint)}</div>
      <div style="margin:16px 0 6px"><div class="seg">
        <button class="${mode==='paste'?'act':''}" data-m="paste">📋 Paste from Excel</button>
        <button class="${mode==='file'?'act':''}" data-m="file">📁 Upload file</button></div></div>
      ${mode==='paste'
        ? `<label>Copy the cells in Excel/Sheets (including the header row) and paste here</label>
           <textarea id="impText" rows="7" placeholder="name&#9;phone&#9;email&#10;Jane Tan&#9;9123 4567&#9;jane@mail.com" style="font-family:ui-monospace,monospace;font-size:12.5px"></textarea>
           <div style="margin-top:12px"><button class="btn sm" id="impParse">Preview</button></div>`
        : `<label>Choose a .csv or .xlsx file (first row = headers)</label>
           <input type="file" id="impFile" accept=".csv,.tsv,.xlsx,.xls,text/csv">`}
      <div id="impResult"></div>
    </div>`;
    $('impX').onclick=close;
    wrap.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>{mode=b.dataset.m;parsed=null;render()});
    if(mode==='paste'){
      $('impParse').onclick=()=>{ const t=$('impText').value; if(!t.trim())return toast('Paste some rows first'); preview(parseDelimited(t)); };
    }else{
      $('impFile').onchange=async ev=>{
        const f=ev.target.files[0];if(!f)return;
        try{
          if(/\.x(lsx|ls)$/i.test(f.name)){
            const buf=await f.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});
            const sheet=wb.Sheets[wb.SheetNames[0]];
            preview(XLSX.utils.sheet_to_json(sheet,{header:1,blankrows:false,raw:false}));
          }else{ preview(parseDelimited(await f.text())); }
        }catch(e){fail(e)}
      };
    }
  }
  function preview(rows){
    parsed=mapRows(rows,cfg);
    const R=$('impResult');
    if(parsed.missing){R.innerHTML=`<div class="err">Couldn't find a <b>${esc(parsed.missing)}</b> column. Make sure your first row has headers.</div>`;return}
    if(!parsed.recs.length){R.innerHTML=`<div class="err">No valid rows found${parsed.skipped?` (${parsed.skipped} skipped — missing a name)`:''}.</div>`;return}
    const cols=cfg.fields.filter(f=>!f.stripField).map(f=>f.key);
    const show=parsed.recs.slice(0,4);
    R.innerHTML=`<div class="imp-prev"><table><tr>${cols.map(c=>`<th>${esc(c.replace('_cents','').replace('_',' '))}</th>`).join('')}</tr>
      ${show.map(rec=>`<tr>${cols.map(c=>{let v=rec.payload[c];if(c.endsWith('_cents'))v=v!=null?money(v):'';return `<td>${esc(v??'')}</td>`}).join('')}</tr>`).join('')}</table></div>
      <p class="small muted" style="margin-top:8px"><b>${parsed.recs.length}</b> ready to import${parsed.skipped?` · ${parsed.skipped} skipped (no name)`:''}. Showing first ${show.length}.</p>
      <div style="margin-top:12px"><button class="btn" id="impGo">Import ${parsed.recs.length} ${cfg.title.toLowerCase()}</button></div>`;
    $('impGo').onclick=async()=>{
      $('impGo').disabled=true;$('impGo').textContent='Importing…';
      const {inserted,failed,errs}=await runImport(parsed.recs,cfg,(d,t)=>{$('impGo').textContent=`Importing… ${d}/${t}`});
      R.innerHTML=`<div class="imp-note" style="background:#E7F6EE;color:#1f7a4d">✓ Imported <b>${inserted}</b> ${cfg.title.toLowerCase()}${failed?` · ${failed} skipped (duplicates or invalid)`:''}.</div>
        ${errs.length?`<p class="small muted" style="margin-top:8px">First issues: ${errs.map(e=>esc(e)).join('; ')}</p>`:''}
        <div style="margin-top:14px"><button class="btn sm" id="impDone">Done</button></div>`;
      $('impDone').onclick=()=>{close();if(onDone)onDone()};
    };
  }
  render();
};

/* Opening/closing the profile menu must NOT touch #main or #navwrap — it used to call
   renderShell(page), which also re-invokes the current page's render function (full
   Supabase refetch, chart re-animation, any custom date range reset). This widget now
   re-renders only itself. */
function wireProfile(page){
  $('profWho').onclick=(e)=>{e.stopPropagation();profileOpen=!profileOpen;if(profileOpen){bellOpen=false;renderBell(page);}renderProfile(page);};
  if(profileOpen){
    $('pmSignout').onclick=async(e)=>{e.preventDefault();killChannels();await sb.auth.signOut();S={user:null,biz:null,charts:[],myModules:null,myRole:null,isSA:false};profileOpen=false;nav('#/')};
    $('pmSetup').onclick=()=>{profileOpen=false};
    const pmS=$('pmSettings');if(pmS) pmS.onclick=()=>{profileOpen=false};
    /* click-away to dismiss — expected of a native popover, and without it the menu
       could only be closed by re-clicking the chip. One-shot listener, re-armed on
       each open, so it can't stack up across renders. */
    setTimeout(()=>document.addEventListener('click',function away(ev){
      const w=$('profwrap');
      if(w&&!w.contains(ev.target)){profileOpen=false;document.removeEventListener('click',away);renderProfile(page);}
      else if(!w){document.removeEventListener('click',away);}
    }),0);
  }
}
function renderProfile(page){
  const wrap=$('profwrap');
  if(!wrap) return;
  wrap.outerHTML=profileHtml();
  wireProfile(page);
}

/* ---------- realtime notifications (bell, left of the profile chip) ----------
   One realtime channel per signed-in session, built once against the current S.biz and
   reused across every route change (route() -> renderShell() -> initNotifications() runs
   on every navigation, but ensureRealtimeChannel() is a no-op once a channel for this
   business already exists — tearing it down and rebuilding on every route change would be
   wasteful and could miss events landing in the gap). killChannels() is the only thing that
   removes it, called on sign-out (mirrors killCharts()). */
function timeAgo(iso){
  if(!iso) return '';
  const s=Math.max(0,(Date.now()-new Date(iso).getTime())/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
/* Every notification kind we currently emit routes to the same place — booking requests,
   waitlist and change-request activity are all triaged from the Bookings page. Kept as an
   explicit map (not a blanket default) so a future new kind is a deliberate decision, not
   an accident. */
const NOTIF_ROUTE={booking_new:'#/bookings',booking_waitlisted:'#/bookings',change_request:'#/bookings',
  booking_expired:'#/bookings',waitlist_ready:'#/bookings'};
async function loadNotifications(){
  const {data,error}=await sb.rpc('get_notifications',{p_business:S.biz.id,p_limit:30});
  if(error){notifError=error.message||'Could not load notifications';return}
  notifError=null;notifLoaded=true;notifState={unread:data.unread||0,items:data.items||[]};
}
function bellHtml(){
  const n=notifState.unread||0;
  return `<div class="bellwrap" id="bellwrap">
      <div class="bellbtn" id="bellBtn" title="Notifications">🔔${n>0?`<span class="dot">${n>99?'99+':n}</span>`:''}</div>
      ${bellOpen?notifMenuHtml():''}
    </div>`;
}
function notifMenuHtml(){
  const items=notifState.items||[];
  const isOwner=S.myRole==='owner';
  return `<div class="notif-menu" id="notifmenu">
    <div class="row" style="padding:4px 8px 8px"><b class="small">Notifications</b><span class="spacer"></span>
      ${notifState.unread>0?`<button class="btn ghost sm" id="markAll" style="padding:4px 10px;font-size:11.5px">Mark all read</button>`:''}</div>
    ${notifError?`<div class="err" style="margin:0 6px 8px">${esc(notifError)}</div>`:''}
    ${!notifLoaded?`<div class="notif-empty">Loading…</div>`
      :items.length?items.map(it=>`<div class="notif-item ${it.read_at?'':'unread'}" data-nid="${esc(it.id)}" data-ref="${esc(it.kind)}">
          <div class="t">${esc(it.title||'')}</div>
          ${it.body?`<div class="b">${esc(it.body)}</div>`:''}
          <div class="ago">${timeAgo(it.created_at)}</div></div>`).join('')
      :`<div class="notif-empty">No notifications yet.</div>`}
    <hr style="border:none;border-top:1px solid var(--hair);margin:6px 0">
    ${isOwner?`<div class="switchrow"><span>Pop-up alerts</span>
        <div class="tglsw ${S.biz.notify_new_bookings?'on':''}" id="notifToggle"></div></div>`
      :`<div class="switchrow"><span>Pop-up alerts (this session)</span>
        <div class="tglsw ${muteAlerts?'':'on'}" id="notifToggle"></div></div>`}
    </div>`;
}
function wireBell(page){
  $('bellBtn').onclick=(e)=>{e.stopPropagation();bellOpen=!bellOpen;if(bellOpen){profileOpen=false;renderProfile(page);}renderBell(page);};
  if(!bellOpen) return;
  const markAll=$('markAll');
  if(markAll) markAll.onclick=async(e)=>{
    e.stopPropagation();markAll.disabled=true;
    const {error}=await sb.rpc('mark_all_notifications_read',{p_business:S.biz.id});
    if(error){fail(error);markAll.disabled=false;return}
    notifState.items=(notifState.items||[]).map(it=>({...it,read_at:it.read_at||new Date().toISOString()}));
    notifState.unread=0;
    renderBell(page);
  };
  document.querySelectorAll('.notif-item').forEach(el=>el.onclick=async()=>{
    const id=el.dataset.nid,kind=el.dataset.ref;
    const {error}=await sb.rpc('mark_notification_read',{p_id:id});
    if(!error){
      const item=(notifState.items||[]).find(i=>i.id===id);
      if(item&&!item.read_at){item.read_at=new Date().toISOString();notifState.unread=Math.max(0,notifState.unread-1);}
    }
    bellOpen=false;
    nav(NOTIF_ROUTE[kind]||'#/bookings');
  });
  const tgl=$('notifToggle');
  if(tgl) tgl.onclick=async(e)=>{
    e.stopPropagation();
    if(S.myRole==='owner'){
      const to=!S.biz.notify_new_bookings;
      tgl.style.pointerEvents='none';
      const {error}=await sb.rpc('set_booking_settings',{p_business:S.biz.id,
        p_hold_minutes:S.biz.booking_hold_minutes,p_overflow:S.biz.booking_overflow,
        p_notify:to,p_auto_confirm:S.biz.booking_auto_confirm});
      if(error){fail(error);tgl.style.pointerEvents='';return}
      S.biz.notify_new_bookings=to;
    }else{
      muteAlerts=!muteAlerts;
    }
    renderBell(page);
  };
  /* click-away, same one-shot pattern as the profile menu */
  setTimeout(()=>document.addEventListener('click',function away(ev){
    const w=$('bellwrap');
    if(w&&!w.contains(ev.target)){bellOpen=false;document.removeEventListener('click',away);renderBell(page);}
    else if(!w){document.removeEventListener('click',away);}
  }),0);
}
function renderBell(page){
  const wrap=$('bellwrap');
  if(!wrap) return;
  wrap.outerHTML=bellHtml();
  wireBell(page);
}
/* Re-runs the currently-open page's own render fn (no hash change) so new booking activity
   shows up without the owner having to manually refresh — the #1 complaint this feature set
   is meant to fix. Only wired for the pages where booking/waitlist activity is visible. */
function autoRefreshIfRelevant(){
  const key=(currentPage&&currentPage[0])||'';
  const P={bookings:bookingsPage,appointments:appointmentsPage,waitlist:waitlistPage};
  if(P[key]) P[key](currentPage[1]);
}
function ensureRealtimeChannel(){
  if(rtChannel&&rtChannelBizId===S.biz.id) return; // already live for this business — reuse it
  if(rtChannel){ try{sb.removeChannel(rtChannel);}catch(e){} rtChannel=null; }
  rtChannel=sb.channel('rt-'+S.biz.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:'business_id=eq.'+S.biz.id},payload=>{
      notifState.unread=(notifState.unread||0)+1;
      notifState.items=[payload.new,...(notifState.items||[])].slice(0,30);
      renderBell(currentPage);
      if(S.biz.notify_new_bookings&&!muteAlerts) toast('🔔 '+(payload.new?.title||'New notification'));
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'booking_requests',filter:'business_id=eq.'+S.biz.id},()=>autoRefreshIfRelevant())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'appointments',filter:'business_id=eq.'+S.biz.id},()=>autoRefreshIfRelevant())
    .subscribe();
  rtChannelBizId=S.biz.id;
}
function killChannels(){
  if(rtChannel){ try{sb.removeChannel(rtChannel);}catch(e){} }
  rtChannel=null;rtChannelBizId=null;
}
async function initNotifications(){
  if(!S.biz) return;
  await loadNotifications();
  renderBell(currentPage);
  ensureRealtimeChannel();
}

/* ---------- dashboard ---------- */
async function dashboard(){
  const today=new Date(),d30=new Date(Date.now()-29*864e5);
  const iso=d=>d.toISOString().slice(0,10);
  M().innerHTML=`<div class="topbar"><div><h1>Dashboard</h1><p class="muted small">How ${esc(S.biz.name)} is doing</p></div>
    <div class="range">
      <button class="qbtn" data-d="7">7d</button><button class="qbtn act" data-d="30">30d</button><button class="qbtn" data-d="90">90d</button>
      <input type="date" id="df" value="${iso(d30)}"> <span class="muted">→</span> <input type="date" id="dt" value="${iso(today)}">
      <button class="btn sm" id="apply">Apply</button>
    </div></div>
    <div class="kpis" id="kpis"></div><div class="charts" id="charts"></div>`;
  document.querySelectorAll('.qbtn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.qbtn').forEach(x=>x.classList.remove('act'));b.classList.add('act');
    $('df').value=iso(new Date(Date.now()-(b.dataset.d-1)*864e5));$('dt').value=iso(new Date());load();
  });
  $('apply').onclick=()=>load();
  async function load(){
    killCharts();
    const from=$('df').value,to=$('dt').value+'T23:59:59';
    const [sales,clients,pts,credit]=await Promise.all([
      // refund/reversal state deferred to a future migration; no reversal rows exist yet
      sb.from('sales').select('id,client_id,amount_cents,occurred_at,kind,counts_as_revenue,counts_as_visit').eq('business_id',S.biz.id).gte('occurred_at',from).lte('occurred_at',to).order('occurred_at'),
      sb.from('clients').select('id,gender,birth_date,created_at').eq('business_id',S.biz.id),
      sb.from('points_ledger').select('points,entry_type,created_at').eq('business_id',S.biz.id).gte('created_at',from).lte('created_at',to),
      sb.from('client_credit_balance').select('balance_cents').eq('business_id',S.biz.id)
    ]);
    if(sales.error) return fail(sales.error);
    const sl=sales.data||[],cl=clients.data||[],pl=pts.data||[];
    /* Revenue and visits are read off each sale's own immutable policy snapshot
       (counts_as_revenue / counts_as_visit) — never re-derived from today's sale_policies.
       That live join was the v10.1 defect: a settings change would retroactively rewrite
       completed history. refund/reversal state deferred to a future migration; no reversal
       rows exist yet, so there is nothing to exclude from the visit count here. */
    const rev=sl.filter(s=>s.counts_as_revenue);
    const visits=sl.filter(s=>s.counts_as_visit);
    const revenue=rev.reduce((a,s)=>a+s.amount_cents,0);
    const uniq=new Set(sl.filter(s=>s.client_id).map(s=>s.client_id)).size;
    const newC=cl.filter(c=>c.created_at>=from&&c.created_at<=to).length;
    const earned=pl.filter(p=>p.entry_type==='earn').reduce((a,p)=>a+p.points,0);
    const liab=(credit.data||[]).reduce((a,c)=>a+Math.max(c.balance_cents,0),0);
    $('kpis').innerHTML=[['Visits (sales)',visits.length],['Revenue',money(revenue)],['Unique customers',uniq],
      ['New customers',newC],['Points issued',earned],['Credit liability',money(liab)]]
      .map(([l,v])=>`<div class="card kpi"><div class="l">${l}</div><div class="v">${v}</div></div>`).join('');
    $('charts').innerHTML=`
      <div class="card"><b>Busiest days</b><p class="muted small">Visits by day of week</p><canvas id="c1"></canvas></div>
      <div class="card"><b>Revenue over time</b><p class="muted small">Daily total in range</p><canvas id="c2"></canvas></div>
      <div class="card"><b>Customer gender</b><p class="muted small">All customers on file</p><canvas id="c3"></canvas></div>
      <div class="card"><b>Age groups</b><p class="muted small">From birth dates on file</p><canvas id="c4"></canvas></div>`;
    const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],wd=[0,0,0,0,0,0,0];
    visits.forEach(s=>{wd[(new Date(s.occurred_at).getDay()+6)%7]++});
    const byDay={};rev.forEach(s=>{const k=s.occurred_at.slice(0,10);byDay[k]=(byDay[k]||0)+s.amount_cents});
    const dk=Object.keys(byDay).sort();
    const g={female:0,male:0,other:0,unknown:0};
    cl.forEach(c=>g[c.gender||'unknown']++);
    const ages={'<25':0,'25–34':0,'35–44':0,'45–54':0,'55+':0,'—':0};
    cl.forEach(c=>{if(!c.birth_date){ages['—']++;return}
      const a=(Date.now()-new Date(c.birth_date))/3.156e10;
      ages[a<25?'<25':a<35?'25–34':a<45?'35–44':a<55?'45–54':'55+']++});
    const C=(id,cfg)=>S.charts.push(new Chart($(id),cfg));
    const coral='#FF6B5E',amber='#FFB86B',ink='#1C1A22';
    C('c1',{type:'bar',data:{labels:days,datasets:[{data:wd,backgroundColor:days.map((_,i)=>wd[i]===Math.max(...wd)&&wd[i]>0?coral:amber),borderRadius:8}]},options:{plugins:{legend:{display:false}}}});
    C('c2',{type:'line',data:{labels:dk,datasets:[{data:dk.map(k=>byDay[k]/100),borderColor:coral,backgroundColor:'rgba(255,107,94,.12)',fill:true,tension:.35}]},options:{plugins:{legend:{display:false}}}});
    C('c3',{type:'doughnut',data:{labels:['Female','Male','Other','Not set'],datasets:[{data:[g.female,g.male,g.other,g.unknown],backgroundColor:[coral,amber,'#8B7BC7','#E8E4DD']}]},options:{plugins:{legend:{position:'bottom'}}}});
    C('c4',{type:'bar',data:{labels:Object.keys(ages),datasets:[{data:Object.values(ages),backgroundColor:amber,borderRadius:8}]},options:{plugins:{legend:{display:false}}}});
  }
  load();
}

        <td><b>${esc(c.full_name)}</b></td><td>${esc(c.phone||'—')}</td><td>${esc(c.gender||'—')}</td>
        <td>${P[c.id]||0} pts</td><td>${money(C[c.id]||0)}</td>
        <td>${c.marketing_consent?'<span class="pill ok">yes</span>':'<span class="pill off">no</span>'}</td></tr>`).join('')}</table>`;
  }
  load();
}

async function clientDetail(id){
  const [{data:c,error},{data:pb},{data:cb},{data:sl},{data:rg},{data:lp},{data:xb},{data:allSl},{data:allAp},{data:stAll}]=await Promise.all([
    sb.from('clients').select('*').eq('id',id).single(),
    sb.from('client_points_balance').select('points').eq('client_id',id),
    sb.from('client_credit_balance').select('balance_cents').eq('client_id',id),
    sb.from('sales').select('*').eq('client_id',id).order('occurred_at',{ascending:false}).limit(10),
    sb.from('reward_grants').select('*, retention_programs(name)').eq('client_id',id).order('granted_at',{ascending:false}),
    sb.from('loyalty_programs').select('*').eq('business_id',S.biz.id).limit(1),
    sb.from('points_batches').select('remaining,expires_at').eq('client_id',id).gt('remaining',0).not('expires_at','is',null).order('expires_at').limit(1),
    /* Full history (Feature 2) — separate, unlimited fetches so the existing 10-row KPI/list
       logic above stays untouched exactly as it was ("fix nothing else"). */
    sb.from('sales').select('*').eq('client_id',id).order('occurred_at',{ascending:false}),
    sb.from('appointments').select('*, services!appointments_service_id_fkey(name)').eq('client_id',id).order('starts_at',{ascending:false}),
    sb.from('staff').select('id,full_name').eq('business_id',S.biz.id)]);
  if(error) return fail(error);
  const staffName=Object.fromEntries((stAll||[]).map(s=>[s.id,s.full_name||'Team member']));
  /* Merge sales + appointments into one reverse-chronological timeline. Each entry keeps its
     own date field for sorting (sale.occurred_at / appointment.starts_at) and is rendered
     from its own shape — these are two different tables, not a union query. */
  const histSales=(allSl||[]).map(s=>({t:s.occurred_at,kind:'sale',saleKind:s.kind,amount:s.amount_cents,note:s.note,staff:staffName[s.staff_id]||null}));
  const histAppts=(allAp||[]).map(a=>({t:a.starts_at,kind:'appointment',service:a.services?.name,status:a.status}));
  const history=[...histSales,...histAppts].sort((a,b)=>(b.t||'').localeCompare(a.t||''));
  let histShown=50;
  const pts=pb?.[0]?.points||0,cred=cb?.[0]?.balance_cents||0,prog=lp?.[0];
  const nextExp=xb?.[0];
  /* "Visits on record" must read each sale's own immutable counts_as_visit snapshot, not
     just count every row — otherwise gift-card and (pre-v10.1) membership rows inflate it.
     This list is also capped at the 10 most recent sales (see the query above), so the
     '+' suffix already meant "at least this many" before this fix and still does.
     refund/reversal state deferred to a future migration; no reversal rows exist yet. */
  const visitSales=(sl||[]).filter(s=>s.counts_as_visit);
  M().innerHTML=`<div class="topbar"><div><h1>${esc(c.full_name)}</h1>
      <p class="muted small">${esc(c.phone||'')} ${esc(c.email||'')} · ${esc(c.gender||'gender not set')} ${c.birth_date?'· born '+c.birth_date:''}</p></div>
    <a class="btn ghost sm" href="#/clients">← All customers</a></div>
    <div class="kpis">
      <div class="card kpi"><div class="l">Points</div><div class="v">${pts}</div></div>
      <div class="card kpi"><div class="l">Spendable credit</div><div class="v">${money(cred)}</div></div>
      <div class="card kpi"><div class="l">Visits on record</div><div class="v">${visitSales.length}${(sl?.length||0)===10?'+':''}</div></div>
    </div>
    <div class="split" style="margin-top:16px">
      <div class="card"><b>Loyalty</b>
        ${prog&&prog.active?`<p class="muted small" style="margin:6px 0 14px">Earns ${prog.earn_points_per_dollar} pt/$ · Redeem ${prog.redeem_points} pts → ${money(prog.reward_credit_cents)} credit</p>
        <button class="btn sm" id="redeem" ${pts<prog.redeem_points?'disabled':''}>Redeem ${prog.redeem_points} pts → ${money(prog.reward_credit_cents)}</button>
        ${pts<prog.redeem_points?`<p class="muted small" style="margin-top:8px">${prog.redeem_points-pts} more points to unlock</p>`:''}
        ${nextExp?`<p class="muted small" style="margin-top:8px">⏳ ${nextExp.remaining} pts expire ${nextExp.expires_at.slice(0,10)}</p>`:''}
        <div class="row" style="margin-top:14px"><input id="adjV" type="number" placeholder="+/- points" style="max-width:120px">
        <input id="adjR" placeholder="reason (audited)"><button class="btn ghost sm" id="adjGo">Adjust</button></div>`
        :'<p class="muted small" style="margin-top:6px">No active loyalty program. Configure it in Loyalty.</p>'}
      </div>
      <div class="card"><b>Referral & consent</b>
        <p class="muted small" style="margin:8px 0 4px">Personal referral code — friends quote it when they join:</p>
        <div class="row"><b style="font-size:1.3rem;letter-spacing:.15em">${esc(c.referral_code||'—')}</b>
        <button class="btn ghost sm" id="copyRef">Copy</button></div>
        <p class="muted small" style="margin:14px 0 6px">Marketing consent (PDPA) — every change is recorded:</p>
        <button class="btn ghost sm" id="consentBtn">${c.marketing_consent?'✓ Consented — withdraw':'Record consent'}</button>
      </div>
      <div class="card"><b>Retention rewards earned</b>
        ${(rg&&rg.length)?rg.map(g=>`<div class="row" style="margin-top:10px"><span>🏆 ${esc(g.retention_programs?.name||'Program')}</span><span class="spacer"></span>
          <span class="muted small">${g.reward_type==='credit'?money(g.reward_value):g.reward_type==='discount_pct'?g.reward_value+'% off':esc(g.reward_item||'free item')} · ${g.granted_at.slice(0,10)}</span></div>`).join('')
        :'<p class="muted small" style="margin-top:6px">None yet — rewards land here automatically when visit goals are hit.</p>'}
      </div></div>
    <div class="card" style="margin-top:16px"><b>Full history</b><p class="muted small" style="margin:4px 0 8px">Every service and sale, ever — newest first.</p>
      <div id="histBody">${renderHistPage(history,histShown)}</div>
      ${history.length>histShown?`<div style="text-align:center;margin-top:10px"><button class="btn ghost sm" id="histMore">Show earlier</button></div>`:''}
    </div>`;
  const rd=$('redeem');
  if(rd) rd.onclick=async()=>{
    rd.disabled=true;
    const {data,error}=await sb.rpc('redeem_points',{p_business:S.biz.id,p_client:id});
    if(error){fail(error);rd.disabled=false;return}
    toast(`Redeemed → ${money(data.credit_cents)} credit added 🎉`);clientDetail(id);
  };
  const aj=$('adjGo');
  if(aj) aj.onclick=async()=>{
    const v=parseInt($('adjV').value||'0');
    if(!v) return toast('Enter +/- points');
    const {data,error}=await sb.rpc('adjust_points',{p_business:S.biz.id,p_client:id,
      p_points:v,p_reason:$('adjR').value||null});
    if(error) return fail(error);
    toast(`Adjusted — new balance ${data} pts (audited)`);clientDetail(id);
  };
  $('copyRef').onclick=()=>{navigator.clipboard.writeText(c.referral_code||'');toast('Code copied')};
  $('consentBtn').onclick=async()=>{
    const to=!c.marketing_consent;
    const {error:e1}=await sb.from('clients').update({marketing_consent:to}).eq('id',id);
    if(e1) return fail(e1);
    await sb.from('consents').insert({business_id:S.biz.id,client_id:id,channel:'marketing',
      action:to?'granted':'withdrawn',source:'admin client page',actor:S.user.id});
    toast(to?'Consent recorded':'Consent withdrawn — recorded');clientDetail(id);
  };
  const histMore=$('histMore');
  if(histMore) histMore.onclick=()=>{
    histShown+=50;
    $('histBody').innerHTML=renderHistPage(history,histShown);
    if(histShown>=history.length) histMore.parentElement.style.display='none';
  };
}
/* Renders the first n entries of a merged sale+appointment timeline (Feature 2). Each row
   shape differs by kind.kind (sale vs appointment) since they come from different tables. */
function renderHistPage(history,n){
  const rows=history.slice(0,n);
  if(!rows.length) return '<p class="muted small" style="margin-top:6px">No history yet.</p>';
  return `<table><tr><th>Date</th><th>Type</th><th>Details</th><th>Amount</th><th>Served by</th></tr>
    ${rows.map(h=>{
      if(h.kind==='sale'){
        return `<tr><td>${sgt(h.t)||''}</td><td>Sale</td><td>${esc((h.saleKind||'').replace('_',' '))}${h.note?' — '+esc(h.note):''}</td>
          <td>${money(h.amount)}</td><td class="muted">${esc(h.staff||'—')}</td></tr>`;
      }
      return `<tr><td>${sgt(h.t)||''}</td><td>Appointment</td><td>${esc(h.service||'general visit')}</td>
        <td class="muted">—</td><td><span class="pill ${h.status==='completed'?'ok':h.status==='booked'?'new':'off'}">${esc(h.status||'')}</span></td></tr>`;
    }).join('')}</table>`;
}

/* ---------- till (8-digit phone lookup + confirm sale — the counter POS flow) ----------
   Story: customer pays, staff types the 8-digit phone number, system shows the customer,
   staff presses Confirm. Built as a big, dumb, 3-step screen for low-literacy staff on a
   tablet till: Step 1 number entry (with on-screen keypad), Step 2 customer card + amount,
   Step 3 done. All UI state is local to this closure — nothing persisted, resets on reload
   (no localStorage in this stack) and resets itself on "Next customer". */
async function tillPage(){
  let step=1;             // 1=enter number, 2=customer card / new customer / invalid, 3=done
  let phone='';           // digits typed so far in step 1
  let cust=null;          // lookup_client_by_phone result once status==='found'
  let notFoundPhone=null; // normalised 8-digit phone when status==='not_found'
  let invalidMsg=null;    // message when status==='invalid'
  let saleIdem=null;      // idempotency key for the CURRENT sale attempt — one fresh
                           // crypto.randomUUID() per sale, reused across retries of that
                           // same sale so a double-tap can never earn points twice; a new
                           // key is only minted when a new sale starts (resetToStart / back).
  let busy=false;         // guards Find/Confirm while a request is in flight
  let doneInfo=null;      // {name, pointsEarned, pointsTotal, duplicate} for step 3

  function resetToStart(){
    step=1;phone='';cust=null;notFoundPhone=null;invalidMsg=null;saleIdem=null;busy=false;doneInfo=null;draw();
  }
  function draw(){
    if(step===1) return drawStep1();
    if(step===2) return drawStep2();
    return drawStep3();
  }

  function drawStep1(){
    M().innerHTML=`<div class="topbar"><div><h1>💵 Till</h1><p class="muted small">Type the customer's phone number, then press Find</p></div></div>
      <div class="card" style="max-width:420px;margin:0 auto;text-align:center">
        <input id="tPhone" inputmode="numeric" maxlength="8" placeholder="8186 3833"
          style="font-size:34px;text-align:center;height:64px;letter-spacing:.04em" value="${esc(phone)}">
        <div id="tErr"></div>
        <button class="btn" id="tFind" style="width:100%;margin-top:14px;padding:16px;font-size:16px">🔎 Find</button>
        <div class="grid" id="tKeys" style="grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px">
          ${['1','2','3','4','5','6','7','8','9','⌫','0','✕'].map(k=>`<button class="btn ghost" data-k="${k}" style="height:60px;font-size:22px;font-weight:700">${k}</button>`).join('')}
        </div>
        <p class="muted small" style="margin-top:14px">⌫ deletes one digit · ✕ clears</p>
      </div>`;
    const inp=$('tPhone');
    inp.focus();
    inp.oninput=()=>{phone=inp.value.replace(/\D/g,'').slice(0,8);inp.value=phone};
    inp.onkeydown=(e)=>{if(e.key==='Enter') doFind();};
    $('tFind').onclick=doFind;
    document.querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>{
      const k=b.dataset.k;
      if(k==='⌫') phone=phone.slice(0,-1);
      else if(k==='✕') phone='';
      else if(phone.length<8) phone+=k;
      inp.value=phone;inp.focus();
    });
  }
  async function doFind(){
    if(busy) return;
    if(!phone){$('tErr').innerHTML='<div class="err">Enter a phone number</div>';return}
    busy=true;$('tFind').disabled=true;$('tFind').textContent='Looking…';
    const {data,error}=await sb.rpc('lookup_client_by_phone',{p_business:S.biz.id,p_phone:phone});
    busy=false;$('tFind').disabled=false;$('tFind').textContent='🔎 Find';
    if(error) return fail(error);
    if(data.status==='found'){cust=data;notFoundPhone=null;invalidMsg=null;step=2;draw();return}
    if(data.status==='not_found'){cust=null;notFoundPhone=data.phone;invalidMsg=null;step=2;draw();return}
    if(data.status==='invalid'){invalidMsg=data.message||'Enter a valid Singapore number';step=2;draw();return}
  }

  function drawStep2(){
    if(invalidMsg) return drawInvalid();
    if(!cust) return drawNewCustomer();
    return drawCustomerCard();
  }
  function drawInvalid(){
    M().innerHTML=`<div class="topbar"><div><h1>💵 Till</h1></div></div>
      <div class="card" style="max-width:420px;margin:0 auto;text-align:center">
        <div style="font-size:40px">⚠️</div>
        <div class="err" style="margin-top:10px">${esc(invalidMsg)}</div>
        <button class="btn ghost sm" id="tBack" style="margin-top:14px">← Try another number</button>
      </div>`;
    $('tBack').onclick=()=>{invalidMsg=null;step=1;draw()};
  }
  function drawNewCustomer(){
    M().innerHTML=`<div class="topbar"><div><h1>💵 Till</h1></div></div>
      <div class="card" style="max-width:420px;margin:0 auto;text-align:center">
        <div style="font-size:40px">🙋</div>
        <h2 style="margin:8px 0 2px">New customer</h2>
        <p class="muted small">${esc(notFoundPhone||phone)} isn't in your system yet</p>
        <div style="text-align:left"><label>Name</label><input id="tName" placeholder="Customer's name">
        <label style="display:flex;align-items:center;gap:8px;margin-top:14px;cursor:pointer;color:var(--ink);font-weight:500;font-size:14px">
          <input type="checkbox" id="tConsent" style="width:auto"> Marketing consent given</label></div>
        <div id="tErr2"></div>
        <button class="btn" id="tAdd" style="width:100%;margin-top:16px;padding:16px;font-size:16px">Add & continue</button>
        <button class="btn ghost sm" id="tBack" style="width:100%;margin-top:10px">← Different number</button>
      </div>`;
    $('tBack').onclick=()=>{step=1;draw()};
    $('tAdd').onclick=async()=>{
      if(busy) return;
      const name=$('tName').value.trim();
      if(name.length<2){$('tErr2').innerHTML='<div class="err">Enter a name</div>';return}
      busy=true;$('tAdd').disabled=true;
      const {data,error}=await sb.rpc('quick_add_client',{p_business:S.biz.id,p_phone:notFoundPhone||phone,p_name:name,p_consent:$('tConsent').checked});
      if(error){busy=false;$('tAdd').disabled=false;$('tErr2').innerHTML=`<div class="err">${esc(error.message)}</div>`;return}
      const {data:lk,error:lkErr}=await sb.rpc('lookup_client_by_phone',{p_business:S.biz.id,p_phone:notFoundPhone||phone});
      busy=false;
      if(lkErr||!lk||lk.status!=='found'){$('tAdd').disabled=false;fail(lkErr||new Error('Customer added, but could not load their card — press Find again'));return}
      toast(data.status==='created'?'Customer added ✓':'Customer found ✓');
      cust=lk;step=2;draw();
    };
  }
  function drawCustomerCard(){
    const toNext=(cust.points_to_next!=null)?cust.points_to_next:null;
    M().innerHTML=`<div class="topbar"><div><h1>💵 Till</h1></div></div>
      <div class="card" style="max-width:460px;margin:0 auto">
        <div style="text-align:center">
          <div style="font-size:1.9rem;font-weight:700;letter-spacing:-.035em">${esc(cust.full_name)}</div>
          <p class="muted small">${esc(cust.phone||'')}${cust.member_since?' · member since '+esc(String(cust.member_since).slice(0,10)):''}</p>
        </div>
        <div class="kpis" style="margin-top:14px;grid-template-columns:repeat(3,1fr)">
          <div class="card kpi"><div class="l">Points</div><div class="v">${cust.points??0}</div></div>
          <div class="card kpi"><div class="l">Credit</div><div class="v">${money(cust.credit_cents||0)}</div></div>
          <div class="card kpi"><div class="l">Visits</div><div class="v">${cust.visits??0}</div></div>
        </div>
        ${toNext!=null?`<p class="muted small" style="text-align:center;margin-top:10px">⏳ ${toNext} points to next reward</p>`:''}
        ${cust.can_redeem?`<div style="text-align:center;margin-top:10px"><button class="btn ghost sm" id="tRedeem">🎁 Redeem reward</button></div>`:''}
        <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
        <label>Amount (${S.biz.currency||'SGD'})</label>
        <input id="tAmt" inputmode="decimal" placeholder="0.00" style="font-size:28px;text-align:center;height:56px">
        <div id="tErr3"></div>
        <button class="btn" id="tConfirm" style="width:100%;margin-top:14px;padding:18px;font-size:18px;background:var(--green)">✓ Confirm</button>
        <button class="btn ghost sm" id="tBack" style="width:100%;margin-top:10px">← Different number</button>
      </div>`;
    $('tBack').onclick=()=>{step=1;cust=null;saleIdem=null;draw()};
    $('tAmt').focus();
    const rd=$('tRedeem');
    if(rd) rd.onclick=async()=>{
      rd.disabled=true;
      const {data,error}=await sb.rpc('redeem_points',{p_business:S.biz.id,p_client:cust.client_id});
      if(error){fail(error);rd.disabled=false;return}
      toast(`Redeemed → ${money(data.credit_cents)} credit added 🎉`);
      const {data:lk}=await sb.rpc('lookup_client_by_phone',{p_business:S.biz.id,p_phone:cust.phone||phone});
      if(lk&&lk.status==='found') cust=lk;
      draw();
    };
    $('tConfirm').onclick=async()=>{
      if(busy) return;
      const amt=Math.round(parseFloat($('tAmt').value||'0')*100);
      if(!(amt>0)){$('tErr3').innerHTML='<div class="err">Enter an amount</div>';return}
      if(!saleIdem) saleIdem=crypto.randomUUID(); // fresh key for this sale; reused on retry
      busy=true;$('tConfirm').disabled=true;$('tConfirm').textContent='Recording…';
      const {data,error}=await sb.rpc('record_sale_by_phone',{p_business:S.biz.id,p_phone:cust.phone||phone,
        p_amount_cents:amt,p_kind:'quick_sale',p_note:null,p_staff:null,p_idem:saleIdem});
      busy=false;
      if(error){$('tConfirm').disabled=false;$('tConfirm').textContent='✓ Confirm';return fail(error)}
      doneInfo=(data.status==='duplicate_ignored')
        ?{name:data.full_name,pointsEarned:0,pointsTotal:data.points,duplicate:true}
        :{name:data.full_name,pointsEarned:data.points_earned||0,pointsTotal:data.points,duplicate:false};
      step=3;draw();
    };
  }
  function drawStep3(){
    M().innerHTML=`<div class="topbar"><div><h1>💵 Till</h1></div></div>
      <div class="card" style="max-width:420px;margin:0 auto;text-align:center">
        <div style="font-size:56px">✅</div>
        <h2 style="margin:8px 0 4px">${doneInfo.duplicate?'Already recorded':'Done'}</h2>
        ${doneInfo.duplicate?`<p class="muted">This sale was already recorded — no extra points added.</p>`
          :`<p style="font-size:1.6rem;font-weight:700;letter-spacing:-.035em;color:var(--green);margin-top:4px;font-variant-numeric:tabular-nums">+${doneInfo.pointsEarned} points</p>`}
        <p class="muted small" style="margin-top:6px">${esc(doneInfo.name)} · now ${doneInfo.pointsTotal} points total</p>
        <button class="btn" id="tNext" style="width:100%;margin-top:20px;padding:16px;font-size:16px">Next customer →</button>
      </div>`;
    $('tNext').onclick=resetToStart;
  }

  draw();
}

/* ---------- sales ---------- */
async function salesPage(){

  M().innerHTML=`<div class="topbar"><div><h1>Sales</h1><p class="muted small">Record a sale — loyalty points and retention rewards fire automatically</p></div></div>
    <div class="split">
    <div class="card"><b>Quick sale</b>
      <label>Customer</label><select id="qc"><option value="">Walk-in (no loyalty)</option>

  async function loadRecent(){

    $('recent').innerHTML=(sl&&sl.length)?`<table><tr><th>When</th><th>Customer</th><th>Amount</th></tr>

    <div class="row">${importBtn('services')}</div></div>

    <div class="card"><b>Your services</b><div id="slist" style="margin-top:8px"></div></div></div>`;
  /* Keep the list in memory so an add reflects INSTANTLY (one insert round-trip that
     returns the row, then local splice + re-render) instead of a second full re-fetch. */
  let svCache=[];
  function renderSvc(){
    const sv=svCache;
    $('slist').innerHTML=(sv&&sv.length)?`<table><tr><th>Service</th><th>Price</th><th>Mins</th><th>Status</th><th></th></tr>
      ${sv.map(s=>`<tr><td><b>${esc(s.name)}</b></td><td>${money(s.price_cents)}</td><td>${s.duration_min}</td>
      <td><span class="pill ${s.active?'on':'off'}">${s.active?'active':'off'}</span></td>
      <td><button class="btn ghost sm" onclick="toggleSvc('${s.id}',${!s.active})">${s.active?'Disable':'Enable'}</button></td></tr>`).join('')}</table>`
      :`<div class="empty"><div class="big">🛠️</div>No services yet.</div>`;
  }
  $('sadd').onclick=async()=>{
    const name=$('sn').value.trim(),price=Math.round(parseFloat($('sp').value||'0')*100),dur=parseInt($('sd').value||'60');
    if(name.length<2) return toast('Name required');
    const btn=$('sadd');btn.disabled=true;btn.textContent='Adding…';
    const {data,error}=await sb.from('services').insert({business_id:S.biz.id,name,price_cents:price,duration_min:dur}).select().single();
    btn.disabled=false;btn.textContent='Add service';
    if(error) return fail(error);
    svCache=[...svCache,data].sort((a,b)=>a.name.localeCompare(b.name));
    renderSvc();
    toast('Service added');$('sn').value='';$('sp').value='';$('sn').focus();
  };
  window.toggleSvc=async(id,to)=>{
    await sb.from('services').update({active:to}).eq('id',id);
    const s=svCache.find(x=>x.id===id);if(s)s.active=to;renderSvc();
  };
  async function load(){
    const {data:sv}=await sb.from('services').select('*').eq('business_id',S.biz.id).order('name');
    svCache=sv||[];renderSvc();
  }
  load();
  /* bundles + resources */
  M().insertAdjacentHTML('beforeend',`<div class="split" style="margin-top:16px">
    <div class="card"><b>Bundles</b><p class="muted small" style="margin:6px 0 10px">Several services at one price.</p>
      <label>Name</label><input id="bnm" placeholder="e.g. Cut + Colour">
      <label>Bundle price (${S.biz.currency||'SGD'})</label><input id="bpr" type="number" min="0" step="0.01">
      <label>Included services</label><div id="bsv" class="small"></div>
      <div style="margin-top:12px"><button class="btn sm" id="badd3">Create bundle</button></div>
      <div id="blist3" style="margin-top:12px"></div></div>
    <div class="card"><b>Resources</b><p class="muted small" style="margin:6px 0 10px">Rooms, chairs, equipment you can assign to appointments.</p>
      <div class="row"><input id="rnm" placeholder="e.g. Room 2"><button class="btn sm" id="radd3">Add</button></div>
      <div id="rlist3" style="margin-top:12px"></div></div></div>`);
  async function loadBR(){
    const [{data:sv2},{data:bu},{data:rs}]=await Promise.all([
      sb.from('services').select('id,name').eq('business_id',S.biz.id).eq('active',true).order('name'),
      sb.from('bundles').select('*, bundle_items(service_id, services(name))').eq('business_id',S.biz.id).order('name'),
      sb.from('resources').select('*').eq('business_id',S.biz.id).order('name')]);
    $('bsv').innerHTML=(sv2||[]).map(s=>`<label style="display:inline-flex;gap:6px;margin:4px 10px 0 0;cursor:pointer;color:var(--ink)">
      <input type="checkbox" style="width:auto" data-bs="${s.id}">${esc(s.name)}</label>`).join('')||'<span class="muted">add services first</span>';
    $('blist3').innerHTML=(bu&&bu.length)?bu.map(b=>`<div class="row small" style="padding:5px 0;border-bottom:1px solid var(--line)">
      <b>${esc(b.name)}</b><span class="muted">${money(b.price_cents)} · ${(b.bundle_items||[]).map(i=>esc(i.services?.name||'')).join(' + ')||'—'}</span>
      <span class="spacer"></span><span class="pill ${b.active?'on':'off'}">${b.active?'active':'off'}</span></div>`).join('')
      :'<p class="muted small">No bundles yet.</p>';
    $('rlist3').innerHTML=(rs&&rs.length)?rs.map(r=>`<div class="row small" style="padding:5px 0;border-bottom:1px solid var(--line)">
      <b>${esc(r.name)}</b><span class="spacer"></span><span class="pill ${r.active?'on':'off'}">${r.active?'active':'off'}</span></div>`).join('')
      :'<p class="muted small">No resources yet.</p>';
  }
  $('badd3').onclick=async()=>{
    const name=$('bnm').value.trim();
    const picked=[...document.querySelectorAll('[data-bs]')].filter(x=>x.checked).map(x=>x.dataset.bs);
    if(name.length<2) return toast('Name the bundle');
    if(picked.length<2) return toast('Pick at least 2 services');
    const {data:b,error}=await sb.from('bundles').insert({business_id:S.biz.id,name,
      price_cents:Math.round(parseFloat($('bpr').value||'0')*100)}).select().single();
    if(error) return fail(error);
    const {error:e2}=await sb.from('bundle_items').insert(picked.map(sid=>({bundle_id:b.id,service_id:sid})));
    if(e2) return fail(e2);
    toast('Bundle created');$('bnm').value='';loadBR();

  $('radd3').onclick=async()=>{
    if($('rnm').value.trim().length<2) return toast('Name it');
    const {error}=await sb.from('resources').insert({business_id:S.biz.id,name:$('rnm').value.trim()});

  M().insertAdjacentHTML('beforeend',`<div class="card" style="margin-top:16px"><b>Products used per service</b>

    <div class="row"><select id="lsvc"></select><select id="lprod"></select>
    <input id="lqty" type="number" min="1" value="1" style="max-width:90px"><button class="btn sm" id="ladd">Add</button></div>
    <div id="llist" style="margin-top:12px"></div></div>`);
  async function loadSP(){
    const [{data:sv3},{data:pr3}]=await Promise.all([
      sb.from('services').select('id,name').eq('business_id',S.biz.id).order('name'),
      sb.from('products').select('id,name').eq('business_id',S.biz.id).order('name')]);
    $('lsvc').innerHTML=(sv3&&sv3.length)?sv3.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join(''):'<option value="">— add a service first —</option>';
    $('lprod').innerHTML=(pr3&&pr3.length)?pr3.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join(''):'<option value="">— add a product first —</option>';
    const ids=(sv3||[]).map(s=>s.id);
    let links=[];
    if(ids.length){

      links=sp||[];
    }
    $('llist').innerHTML=links.length?links.map(l=>`<div class="row small" style="padding:6px 0;border-bottom:1px solid var(--line)">
      <span><b>${esc(l.services?.name||'—')}</b> ← ${l.qty} × ${esc(l.products?.name||'—')}</span>
      <span class="spacer"></span><button class="btn ghost sm" onclick="rmSP('${l.service_id}','${l.product_id}')">Remove</button></div>`).join('')
      :'<p class="muted small">No product links yet.</p>';
  }
  $('ladd').onclick=async()=>{
    if(!$('lsvc').value||!$('lprod').value) return toast('Pick a service and a product');
    const {error}=await sb.from('service_products').upsert({service_id:$('lsvc').value,product_id:$('lprod').value,qty:parseInt($('lqty').value||'1')});
    if(error) return fail(error);
    toast('Linked');loadSP();
  };
  window.rmSP=async(sid,pid)=>{
    const {error}=await sb.from('service_products').delete().eq('service_id',sid).eq('product_id',pid);
    if(error) return fail(error);
    toast('Removed');loadSP();
  };
  loadSP();
}

      <td class="small">${esc(b.phone||b.email||'—')}</td><td>${esc(b.services?.name||'—')}</td>
      <td>${sgt(b.preferred_at)||'—'}</td><td>${b.party_size||'—'}</td>
      <td><span class="pill ${b.status==='new'?'new':b.status==='confirmed'?'ok':'no'}">${b.status}</span></td>
      <td>${b.status==='new'?`<button class="btn sm" onclick="convBr('${b.id}')">→ Appointment</button>
      <button class="btn ghost sm" onclick="setBr('${b.id}','declined')">Decline</button>`:''}</td></tr>`).join('')}</table>`

      <td><span class="pill ${c.kind==='cancel'?'no':'new'}">${c.kind}</span></td>

      <button class="btn ghost sm" onclick="decideCr('${c.id}',false)">Decline</button></td></tr>`).join('')}</table>`

      sb.from('booking_tables').select('*').eq('business_id',S.biz.id).order('sort'),
      sb.from('v_table_availability').select('*').eq('business_id',S.biz.id)]);
    if(e1||e2){$('capBody').innerHTML=`<div class="err">${esc((e1||e2).message)}</div>`;return}
    const availByType=Object.fromEntries((avail||[]).map(a=>[a.table_type_id,a]));
    $('capBody').innerHTML=(tbl&&tbl.length)?`<table><tr><th>Name</th><th>Pax</th><th>Qty</th><th>Live</th><th>Status</th><th></th></tr>
      ${tbl.map(t=>{const a=availByType[t.id];
        return `<tr><td><b>${esc(t.name)}</b></td><td>${t.pax??'—'}</td><td>${t.quantity}</td>
        <td class="small">${a?`${a.held} held · ${a.available} free`:'—'}</td>
        <td><span class="pill ${t.active?'on':'off'}">${t.active?'active':'off'}</span></td>
        <td><button class="btn ghost sm" onclick="toggleTable('${t.id}',${!t.active})">${t.active?'Disable':'Enable'}</button>
        <button class="btn ghost sm" onclick="rmTable('${t.id}')">Remove</button></td></tr>`;
      }).join('')}</table>`
      :`<div class="empty"><div class="big">🪑</div>Add your tables so customers can reserve them.</div>`;
  }
  $('tblAdd').onclick=async()=>{

      pax:$('tblPax').value?parseInt($('tblPax').value):null,quantity:parseInt($('tblQty').value||'1')});
    if(error) return fail(error);
    toast('Table type added');$('tblName').value='';$('tblPax').value='';$('tblQty').value='1';loadCapacity();
  };
  window.toggleTable=async(id,to)=>{

    if(error) return fail(error);
    toast('Updated');loadCapacity();
  };
  window.rmTable=async(id)=>{
    if(!confirm('Remove this table type? Existing bookings against it are unaffected.')) return;
    const {error}=await sb.from('booking_tables').delete().eq('id',id);
    if(error) return fail(error);
    toast('Removed');loadCapacity();
  };
