  $('setSave').onclick=async()=>{
    const hold=parseInt($('setHold').value||'0'),overflow=$('setOverflow').value,autoConfirm=$('setAutoConfirm').checked;
    $('setSave').disabled=true;
    const {error}=await sb.rpc('set_booking_settings',{p_business:S.biz.id,p_hold_minutes:hold,
      p_overflow:overflow,p_notify:S.biz.notify_new_bookings,p_auto_confirm:autoConfirm});
    $('setSave').disabled=false;
    if(error){$('setErr').innerHTML=`<div class="err">${esc(error.message)}</div>`;return}
    $('setErr').innerHTML='';
    Object.assign(S.biz,{booking_hold_minutes:hold,booking_overflow:overflow,booking_auto_confirm:autoConfirm});
    toast('Booking rules saved');
  };

  /* ---- CSV import of existing bookings (owner only) ---- */
  $('bkCsvf').onchange=async(ev)=>{
    const file=ev.target.files[0];if(!file)return;
    const text=await file.text();
    const rows=[];let cur=[''],q=false;
    for(const ch of text){
      if(q){ if(ch==='"'){q=false} else cur[cur.length-1]+=ch; }
      else if(ch==='"'){q=true}
      else if(ch===','){cur.push('')}
      else if(ch==='\n'||ch==='\r'){ if(cur.length>1||cur[0]!==''){rows.push(cur);cur=[''];} }
      else cur[cur.length-1]+=ch;
    }
    if(cur.length>1||cur[0]!=='')rows.push(cur);
    if(rows.length<2){$('bkCsvPrev').innerHTML=`<div class="err">CSV needs a header row + data</div>`;return}
    const hdr=rows[0].map(h=>h.trim().toLowerCase());
    const col=n=>hdr.findIndex(h=>h.includes(n));
    const iN=col('name'),iP=col('phone'),iE=col('email'),iPs=col('party'),iAt=col('preferred'),iNo=col('notes');
    const iTtId=hdr.findIndex(h=>h.includes('table_type_id'));
    const iTt=hdr.findIndex((h,idx)=>idx!==iTtId&&h.includes('table'));
    if(iN<0){$('bkCsvPrev').innerHTML=`<div class="err">No "name" column found</div>`;return}
    const recs=rows.slice(1).filter(r=>r[iN]&&r[iN].trim().length>1).map(r=>{
      const rec={name:r[iN].trim()};
      if(iP>=0&&r[iP]) rec.phone=r[iP].trim();
      if(iE>=0&&r[iE]) rec.email=r[iE].trim();
      if(iPs>=0&&r[iPs]) rec.party_size=parseInt(r[iPs]);
      if(iAt>=0&&r[iAt]) rec.preferred_at=r[iAt].trim();
      if(iNo>=0&&r[iNo]) rec.notes=r[iNo].trim();
      if(iTtId>=0&&r[iTtId]) rec.table_type_id=r[iTtId].trim();
      else if(iTt>=0&&r[iTt]) rec.table_type=r[iTt].trim();
      return rec;
    });
    $('bkCsvPrev').innerHTML=`<p class="small"><b>${recs.length}</b> bookings ready (of ${rows.length-1} rows).
      First: ${esc(recs[0]?.name||'—')}${recs[1]?', '+esc(recs[1].name):''}…</p>
      <button class="btn sm" id="bkCsvGo" style="margin-top:8px">Import ${recs.length} bookings</button>`;
    $('bkCsvGo').onclick=async()=>{
      $('bkCsvGo').disabled=true;
      const {data,error}=await sb.rpc('import_bookings',{p_business:S.biz.id,p_rows:recs});
      $('bkCsvGo').disabled=false;
      if(error){$('bkCsvPrev').innerHTML+=`<div class="err">${esc(error.message)}</div>`;return}
      const errs=(data.errors||[]).slice(0,5);
      $('bkCsvPrev').innerHTML=`<p class="small">✓ Imported <b>${data.inserted}</b>, skipped <b>${data.skipped}</b>.</p>
        ${errs.length?`<div class="err" style="margin-top:8px">First ${errs.length} error${errs.length===1?'':'s'}:<br>${errs.map(e=>`Row ${esc(String(e.row))}: ${esc(e.error)}`).join('<br>')}</div>`:''}`;
      toast(`Imported ${data.inserted} bookings — review them above as pending`);
      load();
    };
  };
}

    const {data:ap}=await staffQ(sb.from('appointments').select('*, clients(full_name), services!appointments_service_id_fkey(name,price_cents)')
      .eq('business_id',S.biz.id)).order('starts_at',{ascending:false}).limit(25);

      <button class="btn ghost sm" onclick="setAp('${a.id}','no_show')">No-show</button>
      <button class="btn ghost sm" onclick="setAp('${a.id}','cancelled')">Cancel</button>`:''}</td></tr>`).join('')}</table>`
      :`<div class="empty"><div class="big">🗓️</div>${staffFilter!=='all'?'No appointments for this staff member yet.':'No appointments yet. Book one on the left, or convert a booking request.'}</div>`;
  }
  async function loadWeek(){
    const now=new Date();const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7)+wkOff*7);mon.setHours(0,0,0,0);
    const end=new Date(mon.getTime()+7*864e5);

      .eq('business_id',S.biz.id)).gte('starts_at',mon.toISOString()).lt('starts_at',end.toISOString());
    const days=[...Array(7)].map((_,i)=>new Date(mon.getTime()+i*864e5));
    const cell={};(ap||[]).forEach(a=>{const d=new Date(a.starts_at);const k=d.toISOString().slice(0,10)+'-'+d.getHours();(cell[k]=cell[k]||[]).push(a)});

      ${days.map(d=>`<th>${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][(d.getDay()+6)%7]} ${d.getDate()}</th>`).join('')}</tr>
      ${[...Array(11)].map((_,h)=>{const hr=h+9;return `<tr><td class="small muted">${String(hr).padStart(2,'0')}:00</td>

          return `<td style="min-height:36px;padding:6px">${items.map(a=>
            `<div onclick="apAct('${a.id}','${a.status}')" style="cursor:pointer;background:${a.status==='completed'?'#E7F6EE':a.status==='booked'?'#FFF1E8':'#F3F1EC'};border-radius:8px;padding:4px 8px;font-size:11.5px;margin-bottom:3px">

      <p class="muted small" style="margin-top:8px">Click a booked (orange) slot to complete it — the sale and loyalty fire automatically.</p>`;
  }

    await window.setAp(id,'completed');

  window.setAp=async(id,status)=>{
    const {error}=await sb.from('appointments').update({status}).eq('id',id);
    if(error) return fail(error);
    toast(status==='completed'?'Completed — sale booked, loyalty fired 🎉':'Appointment '+status.replace('_',' '));
    loadAppts();
  };
  loadAppts();
}

/* ---------- reports ---------- */
async function reportsPage(){
  const iso=d=>d.toISOString().slice(0,10);
  M().innerHTML=`<div class="topbar"><div><h1>Reports</h1><p class="muted small">Money and loyalty, in numbers your accountant can read.</p></div>
    <div class="range"><input type="date" id="rf" value="${iso(new Date(Date.now()-29*864e5))}"> <span class="muted">→</span>
    <input type="date" id="rt2" value="${iso(new Date())}"> <button class="btn sm" id="rgo">Run</button>
    <button class="btn ghost sm" id="rcsv">Export sales CSV</button></div></div>
    <div class="grid" id="rbody" style="grid-template-columns:1fr 1fr"><div class="card"><div class="empty">Pick a range and Run.</div></div></div>`;
  let lastSales=[];
  async function run(){
    const from=$('rf').value,to=$('rt2').value+'T23:59:59';
    const [{data:sl},{data:pl},{data:cb},{data:gc},{data:ms}]=await Promise.all([
      sb.from('sales').select('*, clients(full_name)').eq('business_id',S.biz.id).gte('occurred_at',from).lte('occurred_at',to).order('occurred_at'),
      sb.from('points_ledger').select('entry_type,points').eq('business_id',S.biz.id).gte('created_at',from).lte('created_at',to),
      sb.from('client_credit_balance').select('balance_cents').eq('business_id',S.biz.id),
      sb.from('gift_cards').select('balance_cents,status').eq('business_id',S.biz.id),
      sb.from('memberships').select('status').eq('business_id',S.biz.id)]);
    lastSales=sl||[];
    /* Revenue rollup reads each sale's own immutable counts_as_revenue snapshot — never a
       hardcoded kind list, and never today's sale_policies joined against past rows (that
       join is the v10.1 defect). Reversal rows carry the original's inherited flag and a
       negative amount, so they fall into the same kind bucket and net out on their own. */
    const byKind={};(sl||[]).forEach(s=>{if(!s.counts_as_revenue)return;byKind[s.kind]=(byKind[s.kind]||0)+s.amount_cents});
    /* "Cash collected, not revenue": any kind whose snapshot says counts_as_revenue=false —
       today that's gift cards by default, but a business that later defers package revenue
       (or anything else) lands here too, driven by the row's own flag rather than a name. */
    const nonRevByKind={};(sl||[]).forEach(s=>{if(s.counts_as_revenue)return;nonRevByKind[s.kind]=(nonRevByKind[s.kind]||0)+s.amount_cents});
    const pt={};(pl||[]).forEach(p=>{pt[p.entry_type]=(pt[p.entry_type]||0)+p.points});
    const liab=(cb||[]).reduce((a,c)=>a+Math.max(c.balance_cents,0),0);
    const gcOut=(gc||[]).filter(g=>g.status==='active').reduce((a,g)=>a+g.balance_cents,0);
    const actMs=(ms||[]).filter(m=>m.status==='active').length;
    $('rbody').innerHTML=`
      <div class="card"><b>Revenue by type</b><table style="margin-top:8px">
        ${Object.entries(byKind).map(([k,v])=>`<tr><td>${k.replace('_',' ')}</td><td style="text-align:right"><b>${money(v)}</b></td></tr>`).join('')||'<tr><td class="muted">No sales in range</td></tr>'}
        <tr><td><b>Total</b></td><td style="text-align:right"><b>${money(Object.values(byKind).reduce((a,b)=>a+b,0))}</b></td></tr></table>
        ${Object.keys(nonRevByKind).length?`<p class="muted small" style="margin-top:8px">Cash collected, not revenue: ${Object.entries(nonRevByKind).map(([k,v])=>`<b>${money(v)}</b> ${k.replace('_',' ')}`).join(', ')} — real cash in the drawer, but it isn't revenue until it's actually spent (gift cards) or otherwise realised, per this business's current sale policy.</p>`:''}</div>
      <div class="card"><b>Loyalty flow (in range)</b><table style="margin-top:8px">
        <tr><td>Points earned</td><td style="text-align:right"><b>${pt.earn||0}</b></td></tr>
        <tr><td>Points redeemed</td><td style="text-align:right"><b>${Math.abs(pt.redeem||0)}</b></td></tr>
        <tr><td>Points expired</td><td style="text-align:right"><b>${Math.abs(pt.expire||0)}</b></td></tr>
        <tr><td>Manual adjustments</td><td style="text-align:right"><b>${pt.adjust||0}</b></td></tr></table></div>
      <div class="card"><b>Liabilities (now)</b><table style="margin-top:8px">
        <tr><td>Customer credit outstanding</td><td style="text-align:right"><b>${money(liab)}</b></td></tr>
        <tr><td>Gift cards unredeemed</td><td style="text-align:right"><b>${money(gcOut)}</b></td></tr></table>
        <p class="muted small" style="margin-top:8px">Credit is money you owe customers — the daily expiry sweep keeps it honest.</p></div>
      <div class="card"><b>Memberships</b><table style="margin-top:8px">
        <tr><td>Active members</td><td style="text-align:right"><b>${actMs}</b></td></tr>
        <tr><td>Membership revenue (range)</td><td style="text-align:right"><b>${money(byKind.membership||0)}</b></td></tr></table></div>`;
  }
  $('rgo').onclick=run;
  $('rcsv').onclick=()=>{
    if(!lastSales.length) return toast('Run a report first');
    /* counts_as_revenue/counts_as_visit are each sale's own immutable snapshot at record
       time — included so this export stays byte-identical if the business's sale policy
       changes later, instead of quietly reflecting whatever policy is live on export day.
       refund/reversal state deferred to a future migration; no reversal rows exist yet. */
    const rows=[['occurred_at','customer','kind','amount','note','counts_as_revenue','counts_as_visit'],
      ...lastSales.map(s=>[s.occurred_at,s.clients?.full_name||'',s.kind,(s.amount_cents/100).toFixed(2),(s.note||'').replace(/,/g,';'),s.counts_as_revenue,s.counts_as_visit])];
    const blob=new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='frenly-sales.csv';a.click();
    toast('CSV downloaded');
  };
  run();
}

/* ---------- staff performance ---------- */
async function staffPerfPage(drillId){
  if(drillId) return staffPerfDrill(drillId);
  const today=new Date(),d30=new Date(Date.now()-29*864e5);
  const iso=d=>d.toISOString().slice(0,10);
  M().innerHTML=`<div class="topbar"><div><h1>Staff performance</h1><p class="muted small">Sales, revenue and commission per staff member — click a row to see the individual sales behind it</p></div>
    <div class="range">
      <button class="qbtn" data-d="7">7d</button><button class="qbtn act" data-d="30">30d</button><button class="qbtn" data-d="90">90d</button>
      <input type="date" id="pf" value="${iso(d30)}"> <span class="muted">→</span> <input type="date" id="pt" value="${iso(today)}">
      <button class="btn sm" id="papply">Apply</button>
    </div></div>
    <p class="muted small" style="margin:-8px 0 14px">Commission uses the rate frozen at the time of each sale — changing a staff member's or service's % today never changes past figures.</p>
    <div class="card" id="pbody"><div class="empty">Loading…</div></div>`;
  document.querySelectorAll('.qbtn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.qbtn').forEach(x=>x.classList.remove('act'));b.classList.add('act');
    $('pf').value=iso(new Date(Date.now()-(b.dataset.d-1)*864e5));$('pt').value=iso(new Date());load();
  });
  $('papply').onclick=()=>load();
  async function load(){
    const from=$('pf').value,to=$('pt').value+'T23:59:59';
    const [{data:sc,error},{data:st}]=await Promise.all([
      sb.from('sale_commission').select('*').eq('business_id',S.biz.id).gte('occurred_at',from).lte('occurred_at',to),
      sb.from('staff').select('id,full_name').eq('business_id',S.biz.id).order('full_name')
    ]);
    if(error){
      if(String(error.message||'').toLowerCase().includes('permission')){
        $('pbody').innerHTML=`<div class="empty"><div class="big">🔒</div>Ask the owner for finance access to see staff performance.</div>`;return
      }
      return fail(error);
    }
    const names=Object.fromEntries((st||[]).map(s=>[s.id,s.full_name||'Team member']));
    const agg={};
    (st||[]).forEach(s=>{agg[s.id]={count:0,revenue:0,commission:0}});
    (sc||[]).forEach(r=>{
      const key=r.staff_id||'__unattributed';
      if(!agg[key]) agg[key]={count:0,revenue:0,commission:0};
      agg[key].count++;agg[key].revenue+=r.amount_cents;agg[key].commission+=(r.commission_cents||0);
    });
    const keys=Object.keys(agg).sort((a,b)=>{
      if(a==='__unattributed') return 1; if(b==='__unattributed') return -1;
      return (names[a]||'').localeCompare(names[b]||'');
    });
    if(!keys.length){$('pbody').innerHTML=`<div class="empty"><div class="big">🧑‍💼</div>No staff or sales in this range yet.</div>`;return}
    const totals=keys.reduce((t,k)=>({count:t.count+agg[k].count,revenue:t.revenue+agg[k].revenue,commission:t.commission+agg[k].commission}),{count:0,revenue:0,commission:0});
    $('pbody').innerHTML=`<table><tr><th>Staff</th><th>Sales</th><th>Revenue attributed</th><th>Commission earned</th></tr>
      ${keys.map(k=>`<tr class="click" onclick="location.hash='#/staffperf/${k==='__unattributed'?'unattributed':k}'"><td><b>${k==='__unattributed'?'Unattributed':esc(names[k]||'Team member')}</b></td>
        <td>${agg[k].count}</td><td>${money(agg[k].revenue)}</td><td>${money(agg[k].commission)}</td></tr>`).join('')}
      <tr><td><b>Total</b></td><td><b>${totals.count}</b></td><td><b>${money(totals.revenue)}</b></td><td><b>${money(totals.commission)}</b></td></tr></table>`;
  }
  load();
}

/* Drill-down: one staff member's individual sales — customer clickable to their profile.
   Money + frozen rate come from sale_commission (per-sale snapshot, never today's rates);
   client_id isn't on that view, so a second sales fetch supplies it, joined client-side to
   a clients fetch for names ("Walk-in" for null client_id, matching the list page). */
async function staffPerfDrill(idParam){
  const isUnattr=idParam==='unattributed';
  const today=new Date(),d30=new Date(Date.now()-29*864e5);
  const iso=d=>d.toISOString().slice(0,10);
  let staffName='Unattributed';
  if(!isUnattr){
    const {data:s}=await sb.from('staff').select('full_name').eq('id',idParam).limit(1);
    staffName=s?.[0]?.full_name||'Team member';
  }
  M().innerHTML=`<div class="topbar"><div><h1>${esc(staffName)}</h1><p class="muted small">Individual sales in range</p></div>
    <a class="btn ghost sm" href="#/staffperf">← Staff performance</a></div>
    <div class="range">
      <button class="qbtn" data-d="7">7d</button><button class="qbtn act" data-d="30">30d</button><button class="qbtn" data-d="90">90d</button>
      <input type="date" id="df" value="${iso(d30)}"> <span class="muted">→</span> <input type="date" id="dt" value="${iso(today)}">
      <button class="btn sm" id="dapply">Apply</button>
    </div>
    <div class="card" style="margin-top:14px" id="dbody"><div class="empty">Loading…</div></div>`;
  document.querySelectorAll('.qbtn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.qbtn').forEach(x=>x.classList.remove('act'));b.classList.add('act');
    $('df').value=iso(new Date(Date.now()-(b.dataset.d-1)*864e5));$('dt').value=iso(new Date());load();
  });
  $('dapply').onclick=()=>load();
  async function load(){
    const from=$('df').value,to=$('dt').value+'T23:59:59';
    let q=sb.from('sale_commission').select('*').eq('business_id',S.biz.id).gte('occurred_at',from).lte('occurred_at',to);
    q=isUnattr?q.is('staff_id',null):q.eq('staff_id',idParam);
    const {data:sc,error}=await q;
    if(error){
      if(String(error.message||'').toLowerCase().includes('permission')){
        $('dbody').innerHTML=`<div class="empty"><div class="big">🔒</div>Ask the owner for finance access to see this.</div>`;return
      }
      return fail(error);
    }
    if(!sc||!sc.length){$('dbody').innerHTML=`<div class="empty"><div class="big">🧾</div>No sales for this staff member in range.</div>`;return}
    const ids=sc.map(r=>r.sale_id);
    const {data:sl}=await sb.from('sales').select('id,client_id').in('id',ids);
    const clientBySale=Object.fromEntries((sl||[]).map(s=>[s.id,s.client_id]));
    const clientIds=[...new Set((sl||[]).map(s=>s.client_id).filter(Boolean))];
    let clientName={};
    if(clientIds.length){
      const {data:cl}=await sb.from('clients').select('id,full_name').in('id',clientIds);
      clientName=Object.fromEntries((cl||[]).map(c=>[c.id,c.full_name]));
    }
    const rows=[...sc].sort((a,b)=>b.occurred_at.localeCompare(a.occurred_at));
    $('dbody').innerHTML=`<table><tr><th>Date</th><th>Customer</th><th>Kind</th><th>Amount</th><th>Commission</th></tr>
      ${rows.map(r=>{
        const cid=clientBySale[r.sale_id];
        const cust=cid?`<a href="#/client/${cid}" style="color:#D06A2E"><b>${esc(clientName[cid]||'Customer')}</b></a>`:'<span class="muted">Walk-in</span>';
        return `<tr><td>${sgt(r.occurred_at)}</td><td>${cust}</td><td>${esc((r.kind||'').replace('_',' '))}</td><td>${money(r.amount_cents)}</td><td>${money(r.commission_cents||0)}</td></tr>`;
      }).join('')}</table>`;
  }
  load();
}

/* ---------- daily report ---------- */
async function dailyReportPage(){
  const todayIso=(()=>{const d=new Date(new Date().getTime()+8*3600000);return d.toISOString().slice(0,10)})();
  M().innerHTML=`<div class="topbar"><div><h1>Daily report</h1><p class="muted small">Everyone served today — particulars, service, revenue, staff — in one view</p></div>
    <div class="row no-print"><input type="date" id="drDate" value="${todayIso}"><button class="btn sm" id="drGo">Generate</button>
    <button class="btn ghost sm" id="drCsv">Export CSV</button><button class="btn ghost sm" id="drPrint">Print</button></div></div>
    <div id="drBody"><div class="card"><div class="empty">Pick a date and Generate.</div></div></div>`;
  $('drPrint').onclick=()=>window.print();
  let lastRows=[];
  $('drGo').onclick=load;
  $('drCsv').onclick=()=>{
    if(!lastRows.length) return toast('Generate a report first');
    const rows=[['time','customer','phone','service_or_kind','amount','staff'],
      ...lastRows.map(r=>[sgt(r.occurred_at),r.custName,r.custPhone,r.label,(r.amount_cents/100).toFixed(2),r.staffName])];
    const blob=new Blob([rows.map(r=>r.map(v=>String(v??'').replace(/,/g,';')).join(',')).join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='frenly-daily-report-'+$('drDate').value+'.csv';a.click();
    toast('CSV downloaded');
  };
  async function load(){
    const day=$('drDate').value;
    const from=new Date(day+'T00:00:00+08:00').toISOString(), to=new Date(day+'T23:59:59+08:00').toISOString();
    const {data:sl,error}=await sb.from('sales')
      .select('*, clients(full_name,phone), staff(full_name), appointments(services!appointments_service_id_fkey(name))')
      .eq('business_id',S.biz.id).gte('occurred_at',from).lte('occurred_at',to).order('occurred_at');
    if(error) return fail(error);
    const rows=(sl||[]).map(s=>({
      occurred_at:s.occurred_at,
      custName:s.clients?.full_name||'Walk-in',custPhone:s.clients?.phone||'',
      label:s.appointments?.services?.name||(s.kind||'').replace('_',' '),
      amount_cents:s.amount_cents,staffName:s.staff?.full_name||'Unattributed',
      kind:s.kind,counts_as_revenue:s.counts_as_revenue,counts_as_visit:s.counts_as_visit,client_id:s.client_id}));
    lastRows=rows;
    const revenue=rows.filter(r=>r.counts_as_revenue).reduce((a,r)=>a+r.amount_cents,0);
    const visits=rows.filter(r=>r.counts_as_visit).length;
    const uniq=new Set(rows.filter(r=>r.client_id).map(r=>r.client_id)).size;
    const giftCash=rows.filter(r=>r.kind==='gift_card').reduce((a,r)=>a+r.amount_cents,0);
    $('drBody').innerHTML=`<div class="kpis">
        <div class="card kpi"><div class="l">Revenue</div><div class="v">${money(revenue)}</div></div>
        <div class="card kpi"><div class="l">Visits</div><div class="v">${visits}</div></div>
        <div class="card kpi"><div class="l">Unique customers</div><div class="v">${uniq}</div></div>
        <div class="card kpi"><div class="l">Gift card cash collected</div><div class="v">${money(giftCash)}</div></div>
      </div>
      <div class="charts"><div class="card"><b>Revenue by staff</b><canvas id="drC1"></canvas></div>
        <div class="card"><b>Revenue by kind</b><canvas id="drC2"></canvas></div></div>
      <div class="card" style="margin-top:16px"><b>All sales — ${esc(day)}</b>
        ${rows.length?`<table style="margin-top:8px"><tr><th>Time</th><th>Customer</th><th>Phone</th><th>Service/kind</th><th>Amount</th><th>Staff</th></tr>
          ${rows.map(r=>`<tr><td>${sgt(r.occurred_at).slice(11)}</td><td><b>${esc(r.custName)}</b></td><td class="small">${esc(r.custPhone)}</td>
            <td>${esc(r.label)}</td><td>${money(r.amount_cents)}</td><td class="muted">${esc(r.staffName)}</td></tr>`).join('')}</table>`
        :`<div class="empty"><div class="big">📋</div>No sales recorded on this day.</div>`}</div>`;
    if(!rows.length) return;
    const byStaff={};rows.filter(r=>r.counts_as_revenue).forEach(r=>{byStaff[r.staffName]=(byStaff[r.staffName]||0)+r.amount_cents});
    const byKind={};rows.filter(r=>r.counts_as_revenue).forEach(r=>{byKind[r.kind]=(byKind[r.kind]||0)+r.amount_cents});
    const coral='#FF6B5E',amber='#FFB86B';
    const C=(id,cfg)=>S.charts.push(new Chart($(id),cfg));
    C('drC1',{type:'bar',data:{labels:Object.keys(byStaff),datasets:[{data:Object.values(byStaff).map(v=>v/100),backgroundColor:amber,borderRadius:8}]},options:{plugins:{legend:{display:false}}}});
    C('drC2',{type:'doughnut',data:{labels:Object.keys(byKind).map(k=>k.replace('_',' ')),datasets:[{data:Object.values(byKind).map(v=>v/100),backgroundColor:[coral,amber,'#8B7BC7','#2FA36B','#E8E4DD']}]},options:{plugins:{legend:{position:'bottom'}}}});
  }
  load();
}

/* ---------- expenses ---------- */
async function expensesPage(){
  M().innerHTML=`<div class="topbar"><div><h1>Expenses</h1><p class="muted small">Track what goes out — feeds the P&L</p></div></div>
    <div class="card" id="expGate"><div class="empty">Loading…</div></div>`;
  /* expenses RLS (expenses_all) and get_revenue_summary both gate on the same view_finance
     permission — probe with get_revenue_summary (cheap, today only) since a plain SELECT on
     expenses fails silently under RLS (returns zero rows, not an error) and can't tell
     "no expenses yet" apart from "no permission". */
  const todayIso=new Date().toISOString().slice(0,10);
  const {error:permErr}=await sb.rpc('get_revenue_summary',{p_business:S.biz.id,p_from:todayIso,p_to:todayIso,p_branch:null});
  if(permErr){
    $('expGate').innerHTML=`<div class="empty"><div class="big">🔒</div>Ask the owner for finance access to see expenses.</div>`;return;
  }
  M().innerHTML=`<div class="topbar"><div><h1>Expenses</h1><p class="muted small">Track what goes out — feeds the P&L</p></div></div>
    <div class="split"><div class="card"><b>Add expense</b>
      <label>Category</label><input id="exCat" placeholder="e.g. Supplies, Rent, Utilities">
      <label>Supplier (optional)</label><input id="exSup">
      <label>Description</label><input id="exDesc">
      <label>Amount (SGD)</label><input id="exAmt" type="number" min="0" step="0.01">
      <label>Date</label><input id="exDate" type="date" value="${todayIso}">
      <div style="margin-top:16px"><button class="btn" id="exAdd">Add expense</button></div></div>
    <div class="card"><b>Recent expenses</b><div id="exList" style="margin-top:8px"><p class="muted small">Loading…</p></div></div></div>`;
  $('exAdd').onclick=async()=>{
    const category=$('exCat').value.trim(),amt=Math.round(parseFloat($('exAmt').value||'0')*100);
    if(category.length<2) return toast('Category required');
    if(!(amt>0)) return toast('Enter an amount');
    const {error}=await sb.from('expenses').insert({business_id:S.biz.id,category,
      supplier:$('exSup').value||null,description:$('exDesc').value||null,
      amount_cents:amt,currency:'SGD',occurred_on:$('exDate').value||todayIso});
    if(error) return fail(error);
    toast('Expense added');$('exCat').value='';$('exSup').value='';$('exDesc').value='';$('exAmt').value='';load();
  };
  async function load(){
    const {data:ex,error}=await sb.from('expenses').select('*').eq('business_id',S.biz.id).order('occurred_on',{ascending:false}).limit(200);
    if(error) return fail(error);
    $('exList').innerHTML=(ex&&ex.length)?`<table><tr><th>Date</th><th>Category</th><th>Supplier</th><th>Description</th><th>Amount</th><th>Status</th><th></th></tr>
      ${ex.map(e=>`<tr class="${e.voided_at?'strike':''}"><td>${e.occurred_on}</td><td>${esc(e.category)}</td>
        <td class="small">${esc(e.supplier||'—')}</td><td class="small">${esc(e.description||'—')}</td>
        <td>${money(e.amount_cents)}</td><td>${e.voided_at?'<span class="pill no">voided</span>':'<span class="pill ok">active</span>'}</td>
        <td>${e.voided_at?'':`<button class="btn ghost sm" onclick="voidExp('${e.id}')">Void</button>`}</td></tr>`).join('')}</table>`
      :`<div class="empty"><div class="big">💸</div>No expenses recorded yet.</div>`;
  }
  window.voidExp=async(id)=>{
    if(!confirm('Void this expense? It stays on record, struck through, and drops out of the P&L.')) return;
    const {error}=await sb.rpc('set_expense_void',{p_business:S.biz.id,p_expense:id,p_void:true});
    if(error) return fail(error);
    toast('Expense voided');load();
  };
  load();
}

      }
      return fail(error);
    }
    const {data:ex,error:e2}=await sb.from('expenses').select('*').eq('business_id',S.biz.id)
      .is('voided_at',null).gte('occurred_on',from).lte('occurred_on',to);
    if(e2) return fail(e2);
    const cash=sum.revenue_cash_cents||0, accrual=sum.revenue_accrual_cents||0, expTotal=sum.expenses_cents||0;
    const net=cash-expTotal;
    const byCat={};(ex||[]).forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+e.amount_cents});
    lastCat=byCat;
    /* month-by-month only when the range spans >1 calendar month, per the brief */
    const spanMonths=(new Date(to).getFullYear()-new Date(from).getFullYear())*12+(new Date(to).getMonth()-new Date(from).getMonth());
    let monthly={};
    if(spanMonths>=1){
      const {data:sl}=await sb.from('sales').select('amount_cents,occurred_at,counts_as_revenue').eq('business_id',S.biz.id)
        .eq('counts_as_revenue',true).gte('occurred_at',from).lte('occurred_at',to+'T23:59:59');
      (sl||[]).forEach(s=>{const k=s.occurred_at.slice(0,7);(monthly[k]=monthly[k]||{rev:0,exp:0}).rev+=s.amount_cents});
      (ex||[]).forEach(e=>{const k=e.occurred_on.slice(0,7);(monthly[k]=monthly[k]||{rev:0,exp:0}).exp+=e.amount_cents});
    }
    lastMonthly=monthly;
    const mk=Object.keys(monthly).sort();
    $('plBody').innerHTML=`<div class="kpis">
        <div class="card kpi"><div class="l">Revenue (money collected)</div><div class="v">${money(cash)}</div></div>
        <div class="card kpi"><div class="l">Revenue (accrual — earned incl. unpaid)</div><div class="v">${money(accrual)}</div></div>
        <div class="card kpi"><div class="l">Total expenses</div><div class="v">${money(expTotal)}</div></div>
        <div class="card kpi"><div class="l">Net</div><div class="v" style="color:${net>=0?'#2FA36B':'#C0392B'}">${net>=0?'+':'−'}${money(Math.abs(net))}</div></div>
      </div>
      <p class="muted small" style="margin:12px 0">Gift card sales are cash collected, not revenue — they appear when redeemed and spent.</p>
      <div class="charts"><div class="card"><b>Expenses by category</b><canvas id="plC1"></canvas></div>
        <div class="card"><b>${mk.length?'Revenue vs expenses by month':'Add a wider range to see month-by-month'}</b>${mk.length?'<canvas id="plC2"></canvas>':''}</div></div>`;
    const coral='#FF6B5E',amber='#FFB86B',green='#2FA36B';
    const C=(id,cfg)=>S.charts.push(new Chart($(id),cfg));
    const catKeys=Object.keys(byCat);
    if(catKeys.length) C('plC1',{type:'doughnut',data:{labels:catKeys,datasets:[{data:catKeys.map(k=>byCat[k]/100),backgroundColor:[coral,amber,'#8B7BC7',green,'#E8E4DD']}]},options:{plugins:{legend:{position:'bottom'}}}});
    if(mk.length) C('plC2',{type:'bar',data:{labels:mk,datasets:[
      {label:'Revenue',data:mk.map(k=>monthly[k].rev/100),backgroundColor:green,borderRadius:6},
      {label:'Expenses',data:mk.map(k=>monthly[k].exp/100),backgroundColor:coral,borderRadius:6}]},
      options:{plugins:{legend:{position:'bottom'}}}});
  }
  load();
}

      else if(ch===','){cur.push('')}

    }

      <button class="btn sm" id="csvgo" style="margin-top:8px">Import ${recs.length} customers</button>`;
    $('csvgo').onclick=async()=>{
      $('csvgo').disabled=true;let done=0;
      for(let i=0;i<recs.length;i+=100){
        const {error}=await sb.from('clients').insert(recs.slice(i,i+100));
        if(error){toast(`Imported ${done}, then failed: ${error.message}`);return}
        done+=Math.min(100,recs.length-i);
      }
      toast(`Imported ${done} customers 🎉`);$('csvprev').innerHTML=`<p class="small">✓ ${done} imported.</p>`;
    };
  };
  /* commission config — owner only, % only (flat-amount commission is not built yet) */
  loadCommissionConfig();
  /* billing (read-only) + customer sign-up QR — independent async loads, own cards */
  loadBillingConfig();
  loadSignupConfig();
}

      <input type="checkbox" id="joinEnabled" style="width:auto" ${S.biz.join_enabled!==false?'checked':''}> Accept new sign-ups</label>`;
  const qrEl=$('joinQr');qrEl.innerHTML='';
  new QRCode(qrEl,{text:url,width:180,height:180});
  $('cpJoin').onclick=()=>{navigator.clipboard.writeText(url);toast('Sign-up link copied')};
  $('dlQr').onclick=()=>{
    const img=qrEl.querySelector('img')||qrEl.querySelector('canvas');
    if(!img) return toast('QR still rendering — try again');
    const a=document.createElement('a');
    a.href=img.tagName==='CANVAS'?img.toDataURL('image/png'):img.src;
    a.download=`frenly-signup-qr-${S.biz.slug}.png`;a.click();
  };
  $('joinEnabled').onchange=async()=>{
    const to=$('joinEnabled').checked;
    const {error}=await sb.from('businesses').update({join_enabled:to}).eq('id',S.biz.id);
    if(error){$('joinEnabled').checked=!to;return fail(error)}
    Object.assign(S.biz,{join_enabled:to});
    toast(to?'Accepting new sign-ups':'New sign-ups paused');
  };
}
async function loadCommissionConfig(){
  const {data:me}=await sb.from('staff').select('role').eq('user_id',S.user.id).eq('business_id',S.biz.id).limit(1);
  if(!me||!me.length||me[0].role!=='owner') return; /* owner-only config */
  const pct=bps=>bps==null?'':(bps/100).toString();
  const toBps=v=>{const t=(v||'').trim();return t===''?null:Math.round(parseFloat(t)*100)};
  const [{data:staffList,error:e1},{data:svcList,error:e2}]=await Promise.all([
    sb.from('staff').select('id,full_name,commission_service_bps,commission_product_bps').eq('business_id',S.biz.id).order('full_name'),
    sb.from('services').select('id,name,commission_bps').eq('business_id',S.biz.id).order('name')
  ]);
  if(e1||e2) return fail(e1||e2);
  $('commissionWrap').innerHTML=`<div class="split" style="margin-top:16px">
    <div class="card"><b>Staff commission %</b>
      <p class="muted small" style="margin:6px 0 10px">Per-staff default commission on services and on products/retail sales. Leave blank if this firm doesn't use commission — 0% is a real setting (means "no commission"), different from blank ("not decided yet"). % only.</p>
      ${(staffList&&staffList.length)?`<table><tr><th>Staff</th><th>Service %</th><th>Product %</th><th></th></tr>
        ${staffList.map(s=>`<tr><td>${esc(s.full_name||'Team member')}</td>
          <td><input data-cs="${s.id}" type="number" min="0" step="0.1" placeholder="blank = not set" value="${pct(s.commission_service_bps)}" style="max-width:110px"></td>
          <td><input data-cp="${s.id}" type="number" min="0" step="0.1" placeholder="blank = not set" value="${pct(s.commission_product_bps)}" style="max-width:110px"></td>
          <td><button class="btn ghost sm" data-savestaff="${s.id}">Save</button></td></tr>`).join('')}</table>`
        :'<p class="muted small">No staff yet — add your team first.</p>'}</div>
    <div class="card"><b>Service commission override %</b>
      <p class="muted small" style="margin:6px 0 10px">Overrides the staff default for this one service. Blank = inherit staff default; 0% = explicitly no commission on this service.</p>
      ${(svcList&&svcList.length)?`<table><tr><th>Service</th><th>Override %</th><th></th></tr>
        ${svcList.map(s=>`<tr><td>${esc(s.name)}</td>
          <td><input data-cv="${s.id}" type="number" min="0" step="0.1" placeholder="blank = inherit" value="${pct(s.commission_bps)}" style="max-width:110px"></td>
          <td><button class="btn ghost sm" data-savesvc="${s.id}">Save</button></td></tr>`).join('')}</table>`
        :'<p class="muted small">No services yet.</p>'}</div></div>`;
  document.querySelectorAll('[data-savestaff]').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.savestaff;
    const cs=document.querySelector(`[data-cs="${id}"]`).value,cp=document.querySelector(`[data-cp="${id}"]`).value;
    const {error}=await sb.from('staff').update({commission_service_bps:toBps(cs),commission_product_bps:toBps(cp)}).eq('id',id);
    if(error) return fail(error);
    toast('Staff commission saved');
  });
  document.querySelectorAll('[data-savesvc]').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.savesvc;
    const cv=document.querySelector(`[data-cv="${id}"]`).value;
    const {error}=await sb.from('services').update({commission_bps:toBps(cv)}).eq('id',id);
    if(error) return fail(error);
    toast('Service override saved');
  });
}

/* ---------- phone country-code picker (portal only: booking form + manage-booking) ----------
   Singapore first/default since Frenly is SG-first; a handful of the other common corridors
   for this customer base. */
const COUNTRY_CODES=[['+65','🇸🇬'],['+60','🇲🇾'],['+62','🇮🇩'],['+852','🇭🇰'],['+61','🇦🇺'],
  ['+44','🇬🇧'],['+1','🇺🇸'],['+91','🇮🇳'],['+86','🇨🇳'],['+63','🇵🇭'],['+66','🇹🇭'],['+84','🇻🇳']];
function ccSelectHtml(id){
  return `<select id="${id}" style="max-width:110px">${COUNTRY_CODES.map(([c,f])=>
    `<option value="${c}" ${c==='+65'?'selected':''}>${f} ${c}</option>`).join('')}</select>`;
}
/* Combines a country-code <select> with a free-typed number input into one E.164-ish string,
   stripping spaces/dashes. Forgiving of a customer who types their own leading '+' (trusted
   as-is, so we never double-prefix) or who re-types the selected country's digits at the
   front of the number field. */
function buildPhone(ccId,phoneId){
  const cc=$(ccId).value;
  let digits=($(phoneId).value||'').trim().replace(/[\s\-]/g,'');
  if(!digits) return '';
  if(digits.startsWith('+')) return digits;
  const ccDigits=cc.replace('+','');
  if(digits.startsWith(ccDigits)) digits=digits.slice(ccDigits.length);
  return cc+digits;
}

/* ---------- public customer portal ---------- */
async function renderPortal(slug){
  root.innerHTML=`<div class="portal"><div class="head"><div class="logo">frenly<span>.</span></div><p class="muted small">powered booking</p></div><div class="card"><div class="empty">Loading…</div></div></div>`;
  const {data,error}=await sb.rpc('get_business_public',{p_slug:slug});
  if(error||!data){root.querySelector('.card').innerHTML=`<div class="empty"><div class="big">🤔</div>Business not found.</div>`;return}
  const biz=data;let selSvc=null,selTable=null;
  const bc=/^#[0-9A-Fa-f]{6}$/.test(biz.brand_color||'')?biz.brand_color:'#FF6B5E';
  const draw=()=>{
    root.innerHTML=`<div class="portal" style="--coral:${bc};--grad:linear-gradient(100deg,${bc},#FFB86B)">
      <div class="head"><h1 style="font-size:2rem">${esc(biz.name)}</h1><p class="muted">Book with us — it takes 30 seconds.</p></div>
      <div class="card">
        ${(biz.services&&biz.services.length)?`<b>Choose a service</b>
          <div style="margin:10px 0 4px">${biz.services.map(s=>`<div class="svc ${selSvc===s.id?'sel':''}" data-s="${s.id}">
            <span><b>${esc(s.name)}</b> <span class="muted small">· ${s.duration_min} min</span></span>
            <b>${biz.currency||'SGD'} ${(s.price_cents/100).toFixed(2)}</b></div>`).join('')}
          <div class="svc ${selSvc===null?'sel':''}" data-s=""><span><b>Just a reservation</b> <span class="muted small">· table / general visit</span></span></div></div>`
        :`<b>Make a reservation</b>`}
        ${biz.uses_tables?`<div style="margin-top:16px"><b>Choose a table</b>
          <div style="margin:10px 0 4px">${(biz.tables&&biz.tables.length)?biz.tables.map(t=>{
            const full=t.available<=0;
            return `<div class="svc ${selTable===t.table_type_id?'sel':''}" ${full?'':`data-tbl="${t.table_type_id}"`}
              style="${full?'opacity:.45;cursor:not-allowed':''}">
              <span><b>${esc(t.name)}</b>${t.pax?` <span class="muted small">· seats ${t.pax}</span>`:''}</span>
              <span class="muted small">${full?'Fully booked':t.available+' available'}</span></div>`;
          }).join(''):'<p class="muted small">No tables set up yet — request a general reservation below.</p>'}</div></div>`:''}
        <div class="split"><div><label>Your name *</label><input id="pn"></div>
          <div><label>Phone</label><div class="row">${ccSelectHtml('ppcc')}<input id="pp" placeholder="9123 4567"></div></div></div>
        <div class="split"><div><label>Email</label><input id="pe" type="email"></div><div><label>Party size</label><input id="ps" type="number" min="1" value="2"></div></div>
        <label>Preferred date & time</label><input id="pt" type="datetime-local">
        <label>Notes</label><textarea id="pnotes" rows="2" placeholder="anything we should know?"></textarea>
        <label style="display:flex;align-items:center;gap:8px;margin-top:16px;cursor:pointer;color:var(--ink);font-weight:500;font-size:14px">
          <input type="checkbox" id="pconsent" style="width:auto"> 📩 Send me offers & updates</label>
        <p class="muted small" style="margin-top:2px">Occasional news and offers from ${esc(biz.name)} — you can opt out anytime.</p>
        <div id="perr"></div>
        <div style="margin-top:18px"><button class="btn" id="psend" style="width:100%">Request booking</button></div>
        ${biz.booking_policy?`<p class="muted small" style="margin-top:12px;text-align:center">${esc(biz.booking_policy)}</p>`:''}
        <p class="muted small" style="margin-top:12px;text-align:center">The team confirms your request personally — you'll hear back soon.</p>
      </div>
      <div class="card" style="margin-top:16px"><b>Manage an existing booking</b>
        <p class="muted small" style="margin:6px 0 10px">Pick your country code and enter your number — no need to type the code twice.</p>
        <div class="row">${ccSelectHtml('mphonecc')}<input id="mphone" placeholder="Your number"><button class="btn ghost sm" id="mfind">Find my bookings</button></div>
        <div id="merr"></div>
        <div id="mlist" style="margin-top:12px"></div>
      </div></div>`;
    document.querySelectorAll('[data-s]').forEach(el=>el.onclick=()=>{selSvc=el.dataset.s||null;draw()});
    document.querySelectorAll('[data-tbl]').forEach(el=>el.onclick=()=>{selTable=el.dataset.tbl||null;draw()});
    $('psend').onclick=async()=>{
      $('psend').disabled=true;
      const rawPhone=($('pp').value||'').trim();
      const {data:bookRes,error}=await sb.rpc('request_booking',{
        p_slug:slug,
        p_name:$('pn').value,
        p_email:$('pe').value||null,
        p_phone:rawPhone?buildPhone('ppcc','pp'):null,
        p_service:selSvc,
        p_party:parseInt($('ps').value||'1'),
        p_preferred:sgIso($('pt').value),
        p_notes:$('pnotes').value||null,
        p_table_type:biz.uses_tables?selTable:null,
        p_consent:$('pconsent').checked
      });
      if(error){$('perr').innerHTML=`<div class="err">${esc(error.message)}</div>`;$('psend').disabled=false;return}
      const msgs={
        confirmed:{em:'🎉',title:"You're booked!",body:`${esc(biz.name)} has confirmed your booking.`},
        pending:{em:'🎉',title:'Request sent!',body:`${esc(biz.name)} has your booking request and will confirm shortly.`},
        waitlisted:{em:'⏳',title:"You're on the waitlist",body:`${esc(biz.name)} is fully booked for that time — we'll be in touch as soon as a spot opens up.`},
        rejected:{em:'😔',title:'Fully booked',body:`Sorry, ${esc(biz.name)} is fully booked for that — try another table or time.`}
      };
      const m=msgs[bookRes&&bookRes.status]||msgs.pending;
      root.querySelector('.card').innerHTML=`<div class="empty"><div class="big">${m.em}</div><h2 style="margin-bottom:8px">${esc(m.title)}</h2>
        <p class="muted">${m.body}</p></div>`;
    };
    $('mfind').onclick=async()=>{
      const raw=($('mphone').value||'').trim();
      if(!raw){$('merr').innerHTML='<div class="err">Enter your phone number</div>';return}
      $('merr').innerHTML='';$('mfind').disabled=true;
      const {data,error}=await sb.rpc('list_my_appointments',{p_slug:slug,p_phone:buildPhone('mphonecc','mphone')});
      $('mfind').disabled=false;
      if(error){$('merr').innerHTML=`<div class="err">${esc(error.message)}</div>`;return}
      $('mlist').innerHTML=(data&&data.length)?`<label>New preferred time (for reschedule requests)</label><input type="datetime-local" id="mdt">
        ${data.map(a=>`<div class="row" style="padding:10px 0;border-bottom:1px solid var(--line)">
          <div><b>${new Date(a.starts_at).toLocaleString()}</b><div class="muted small">${esc(a.service_name||'general visit')} · ${esc(a.status)}</div></div>
          <span class="spacer"></span>
          <button class="btn ghost sm" onclick="mCancel('${a.id}')">Cancel</button>
          <button class="btn sm" onclick="mReschedule('${a.id}')">Request reschedule</button></div>`).join('')}`
        :'<p class="muted small">No upcoming bookings found for that number.</p>';
    };
  };
  window.mCancel=async(apId)=>{
    const raw=($('mphone').value||'').trim();
    if(!raw) return toast('Enter your phone number first');
    if(!confirm('Cancel this booking?')) return;
    const {data,error}=await sb.rpc('request_change',{p_slug:slug,p_appointment:apId,p_phone:buildPhone('mphonecc','mphone'),p_kind:'cancel',p_proposed:null,p_note:null});
    if(error) return fail(error);
    toast(data&&data.status==='approved'?'Done — auto-approved':'Request sent — the team will confirm');
  };
  window.mReschedule=async(apId)=>{
    const raw=($('mphone').value||'').trim();
    if(!raw) return toast('Enter your phone number first');
    const val=$('mdt')?.value;
    if(!val) return toast('Pick a new date & time first');
    const {data,error}=await sb.rpc('request_change',{p_slug:slug,p_appointment:apId,p_phone:buildPhone('mphonecc','mphone'),p_kind:'reschedule',p_proposed:sgIso(val),p_note:null});
    if(error) return fail(error);
    toast(data&&data.status==='approved'?'Done — auto-approved':'Request sent — the team will confirm');
  };
  draw();
}

route();
</script>
