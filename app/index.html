<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frenly — Loyalty & retention for every business</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F5F1; --card:#FFFFFF; --ink:#1C1A22; --muted:#75717E;
  --line:#E8E4DD; --coral:#FF6B5E; --amber:#FFB86B; --green:#2FA36B;
  --grad:linear-gradient(100deg,#FF6B5E,#FFB86B);
  --r:14px; --shadow:0 1px 3px rgba(28,26,34,.06),0 8px 24px rgba(28,26,34,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:14.5px;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-.01em}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;font-size:14px}
input,select,textarea{font-family:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid rgba(255,107,94,.35);border-color:var(--coral)}
label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:14px 0 6px}
.btn{background:var(--grad);color:#fff;font-weight:600;padding:11px 20px;border-radius:100px;transition:transform .15s, box-shadow .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(255,107,94,.35)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.sm{padding:7px 14px;font-size:13px}
.btn.danger{background:#fff;color:#C0392B;border:1px solid #F0C4BE}
.btn[disabled]{opacity:.5;pointer-events:none}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:22px}
.grid{display:grid;gap:16px}
.muted{color:var(--muted)} .small{font-size:12.5px}
.pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:600}
.pill.on{background:#E7F6EE;color:var(--green)} .pill.off{background:#F3F1EC;color:var(--muted)}
.pill.new{background:#FFF1E8;color:#D06A2E} .pill.ok{background:#E7F6EE;color:var(--green)} .pill.no{background:#FBEAE7;color:#C0392B}
table{width:100%;border-collapse:collapse}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.click{cursor:pointer} tr.click:hover td{background:#FBFAF7}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .big{font-size:34px;margin-bottom:10px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:100px;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:99;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.err{background:#FBEAE7;color:#C0392B;padding:10px 14px;border-radius:10px;font-size:13px;margin-top:12px}
/* auth + onboard */
.center-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:420px;max-width:100%}
.logo{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:600}
.logo span{color:var(--coral)}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:8px}
.ind{border:1.5px solid var(--line);border-radius:12px;padding:14px;text-align:center;cursor:pointer;background:#fff;transition:border-color .15s}
.ind:hover{border-color:var(--amber)}
.ind.sel{border-color:var(--coral);background:#FFF7F0}
.ind .em{font-size:22px;display:block;margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{background:#F3F1EC;border-radius:100px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted)}
.chip.on{background:#FFF1E8;color:#D06A2E}
/* shell */
.shell{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
.side{background:#141218;color:#CFCAD6;padding:22px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side .logo{color:#fff;padding:0 10px 18px}
.nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:14px;margin-bottom:2px;color:#B9B3C4}
.nav a:hover{background:#201d27;color:#fff}
.nav a.act{background:var(--grad);color:#fff;font-weight:600}
.side .foot{margin-top:auto;padding:10px;font-size:12.5px;color:#8A8494}
.main{padding:28px 34px;max-width:1200px;width:100%}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:1.7rem}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.kpi .v{font-family:'Fraunces',serif;font-size:1.9rem;margin-top:2px}
.kpi .l{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.charts .card{min-height:280px}
.range{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.range input{width:auto}
.qbtn{background:#fff;border:1px solid var(--line);border-radius:100px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--muted)}
.qbtn.act{background:var(--ink);color:#fff;border-color:var(--ink)}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row{display:flex;gap:10px;align-items:center}
.spacer{flex:1}
@media(max-width:960px){.shell{grid-template-columns:1fr}.side{position:static;height:auto;flex-direction:row;align-items:center;overflow-x:auto}.side .foot,.side .logo{display:none}.nav{display:flex}.charts,.split{grid-template-columns:1fr}.main{padding:18px}}
/* portal */
.portal{max-width:640px;margin:0 auto;padding:40px 20px}
.portal .head{text-align:center;margin-bottom:26px}
.svc{display:flex;justify-content:space-between;padding:13px 16px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;background:#fff}
.svc.sel{border-color:var(--coral);background:#FFF7F0}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script>
/* ============ Frenly app ============ */
const SB_URL='https://kyzovonwnscrzmkvocid.supabase.co';
const SB_KEY='sb_publishable_hOMgvuulHY0iSs7nmbqt3Q_RD0df_p7';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

const ALLMODS=['dashboard','clients','appointments','sales','services','bookings','waitlist','inventory','packages','loyalty','retention','referrals','memberships','giftcards','reports'];
const INDUSTRIES={
  fnb:{em:'🍜',label:'F&B / Café',mods:['dashboard','clients','sales','bookings','waitlist','inventory','loyalty','retention','referrals','giftcards','reports']},
  salon:{em:'💇',label:'Hair Salon',mods:ALLMODS},
  facial:{em:'✨',label:'Facial / Spa',mods:ALLMODS},
  massage:{em:'💆',label:'Massage',mods:ALLMODS},
  fitness:{em:'🏋️',label:'Fitness',mods:ALLMODS},
  retail:{em:'🛍️',label:'Retail',mods:['dashboard','clients','sales','inventory','packages','loyalty','retention','referrals','giftcards','reports']},
  other:{em:'🏪',label:'Other',mods:ALLMODS}
};
const MODULES={dashboard:['📊','Dashboard'],clients:['👥','Customers'],appointments:['🗓️','Appointments'],
  sales:['🧾','Sales'],services:['🛠️','Services'],bookings:['📅','Bookings'],waitlist:['⏳','Waitlist'],
  inventory:['📦','Inventory'],packages:['🎫','Packages'],loyalty:['🎁','Loyalty'],
  retention:['🔁','Retention'],referrals:['🤝','Referrals'],memberships:['💎','Memberships'],
  giftcards:['🎟️','Gift cards'],reports:['📈','Reports'],settings:['⚙️','Settings']};

let S={user:null,biz:null,charts:[]};
const $=(id)=>document.getElementById(id);
const root=$('root');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=c=>(S.biz?.currency||'SGD')+' '+((c||0)/100).toFixed(2);
const toast=m=>{const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)};
const fail=e=>{console.error(e);toast('⚠️ '+(e.message||e))};
/* Singapore-fixed-offset (UTC+8) display helper: shows a stored UTC instant as SGT wall-clock
   text, regardless of the viewer's own browser/system timezone. Frenly is SG-first — bookings
   are always shown in SGT so "what the customer picked is what staff see". */
const sgt=iso=>{if(!iso) return null;const d=new Date(new Date(iso).getTime()+8*3600000);return d.toISOString().slice(0,16).replace('T',' ')};
/* Turn a <input type=datetime-local> value (always "YYYY-MM-DDTHH:mm", locale-free) into a
   UTC ISO string by anchoring it explicitly to Singapore time (+08:00) instead of relying on
   the browser's ambient system timezone — avoids the local-vs-UTC mismatch bug. */
const sgIso=v=>v?new Date(v+':00+08:00').toISOString():null;
function killCharts(){S.charts.forEach(c=>c.destroy());S.charts=[]}
function nav(h){location.hash=h}
window.addEventListener('hashchange',route);

/* ---------- routing ---------- */
async function route(){
  killCharts();
  const h=location.hash||'#/';
  if(h.startsWith('#/b/')) return renderPortal(h.slice(4).split('?')[0]);
  const {data:{session}}=await sb.auth.getSession();
  S.user=session?.user||null;
  if(!S.user) return renderAuth();
  if(!S.biz){
    const {data:st}=await sb.from('staff').select('business_id').eq('user_id',S.user.id).limit(1);
    if(st&&st.length){
      const {data:b}=await sb.from('businesses').select('*').eq('id',st[0].business_id).single();
      S.biz=b;
    }
  }
  if(!S.biz) return renderOnboard();
  const page=(h.replace('#/','')||'dashboard').split('/');
  renderShell(page);
}

/* ---------- auth ---------- */
function renderAuth(mode='in'){
  root.innerHTML=`<div class="center-wrap"><div class="auth-card card">
    <div class="logo" style="margin-bottom:6px">frenly<span>.</span></div>
    <p class="muted" style="margin-bottom:8px">Loyalty & retention for every business — real rewards, not vanity points.</p>
    <h2 style="margin:14px 0 2px">${mode==='in'?'Sign in':'Create your account'}</h2>
    <label>Email</label><input id="em" type="email" placeholder="you@business.com">
    <label>Password</label><input id="pw" type="password" placeholder="••••••••">
    <div id="autherr"></div>
    <div class="row" style="margin-top:18px">
      <button class="btn" id="go">${mode==='in'?'Sign in':'Sign up'}</button>
      <span class="spacer"></span>
      <button class="btn ghost sm" id="sw">${mode==='in'?'New here? Sign up':'Have an account? Sign in'}</button>
    </div></div></div>`;
  $('sw').onclick=()=>renderAuth(mode==='in'?'up':'in');
  $('go').onclick=async()=>{
    const email=$('em').value.trim(),password=$('pw').value;
    $('go').disabled=true;
    try{
      if(mode==='up'){
        const {data,error}=await sb.auth.signUp({email,password});
        if(error) throw error;
        if(!data.session){$('autherr').innerHTML='<div class="err">Check your email to confirm your account, then sign in.</div>';$('go').disabled=false;return}
      }else{
        const {error}=await sb.auth.signInWithPassword({email,password});
        if(error) throw error;
      }
      S.biz=null;route();
    }catch(e){$('autherr').innerHTML=`<div class="err">${esc(e.message)}</div>`;$('go').disabled=false}
  };
}

/* ---------- onboarding ---------- */
function renderOnboard(){
  let sel='fnb';
  const draw=()=>{
    root.innerHTML=`<div class="center-wrap"><div class="card" style="width:640px;max-width:100%">
      <div class="logo" style="margin-bottom:4px">frenly<span>.</span></div>
      <h2 style="margin:10px 0 4px">Set up your business</h2>
      <p class="muted small">Pick your industry — Frenly auto-selects the right modules. You can change them anytime in Settings.</p>
      <label>Business name</label><input id="bn" placeholder="e.g. Kopi & Co">
      <label>Industry</label>
      <div class="ind-grid">${Object.entries(INDUSTRIES).map(([k,v])=>
        `<div class="ind ${k===sel?'sel':''}" data-k="${k}"><span class="em">${v.em}</span><b>${v.label}</b></div>`).join('')}</div>
      <label>Modules included</label>
      <div class="chips">${Object.keys(MODULES).filter(m=>m!=='settings').map(m=>
        `<span class="chip ${INDUSTRIES[sel].mods.includes(m)?'on':''}">${MODULES[m][0]} ${MODULES[m][1]}</span>`).join('')}</div>
      <div id="oberr"></div>
      <div class="row" style="margin-top:20px"><button class="btn" id="mk">Create my workspace</button>
      <span class="spacer"></span><button class="btn ghost sm" id="out">Sign out</button></div>
      <hr style="border:none;border-top:1px solid var(--line);margin:22px 0 14px">
      <b>Joining a team instead?</b>
      <div class="row" style="margin-top:10px"><input id="ic" placeholder="Invite code from your boss" style="text-transform:uppercase;max-width:260px">
      <button class="btn ghost" id="join">Join team</button></div>
    </div></div>`;
    document.querySelectorAll('.ind').forEach(el=>el.onclick=()=>{sel=el.dataset.k;const n=$('bn').value;draw();$('bn').value=n});
    $('out').onclick=async()=>{await sb.auth.signOut();S.biz=null;route()};
    $('join').onclick=async()=>{
      if(!$('ic').value.trim()) return toast('Enter your invite code');
      $('join').disabled=true;
      const {data,error}=await sb.rpc('accept_invite',{p_code:$('ic').value});
      if(error){$('oberr').innerHTML=`<div class="err">${esc(error.message)}</div>`;$('join').disabled=false;return}
      S.biz=data;toast('Welcome to the team 🎉');nav('#/dashboard');
    };
    $('mk').onclick=async()=>{
      const name=$('bn').value.trim();
      if(name.length<2){$('oberr').innerHTML='<div class="err">Give your business a name.</div>';return}
      $('mk').disabled=true;
      try{
        const slug=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')+'-'+Math.random().toString(36).slice(2,6);
        const {data:b,error:e1}=await sb.rpc('create_business',{p_name:name,p_slug:slug,p_industry:sel,p_modules:INDUSTRIES[sel].mods});
        if(e1) throw e1;
        S.biz=b;toast('Workspace ready 🎉');nav('#/dashboard');
      }catch(e){$('oberr').innerHTML=`<div class="err">${esc(e.message)}</div>`;$('mk').disabled=false}
    };
  };
  draw();
}

/* ---------- shell ---------- */
function renderShell(page){
  const mods=[...(S.biz.enabled_modules||[]),'settings'];
  root.innerHTML=`<div class="shell">
    <aside class="side">
      <div class="logo">frenly<span>.</span></div>
      <nav class="nav">${mods.filter(m=>MODULES[m]).map(m=>
        `<a href="#/${m}" class="${page[0]===m||(m==='clients'&&page[0]==='client')?'act':''}">${MODULES[m][0]} ${MODULES[m][1]}</a>`).join('')}</nav>
      <div class="foot">${esc(S.biz.name)}<br><span style="opacity:.7">${INDUSTRIES[S.biz.industry]?.label||S.biz.industry}</span><br><br>
      <a href="#" id="so" style="color:#FF9C92">Sign out →</a></div>
    </aside>
    <main class="main" id="main"></main></div>`;
  $('so').onclick=async(e)=>{e.preventDefault();await sb.auth.signOut();S={user:null,biz:null,charts:[]};nav('#/')};
  const P={dashboard,clients:clientsPage,client:clientDetail,sales:salesPage,services:servicesPage,
    bookings:bookingsPage,loyalty:loyaltyPage,retention:retentionPage,referrals:referralsPage,
    memberships:membershipsPage,giftcards:giftcardsPage,appointments:appointmentsPage,
    waitlist:waitlistPage,inventory:inventoryPage,packages:packagesPage,reports:reportsPage,
    settings:settingsPage};
  (P[page[0]]||dashboard)(page[1]);
}
const M=()=> $('main');

/* ---------- dashboard ---------- */
async function dashboard(){
  const today=new Date(),d30=new Date(Date.now()-29*864e5);
  const iso=d=>d.toISOString().slice(0,10);
  M().innerHTML=`<div class="topbar"><div><h1>Dashboard</h1><p class="muted small">How ${esc(S.biz.name)} is doing</p></div>
    <div class="range">
      <button class="qbtn" data-d="7">7d</button><button class="qbtn act" data-d="30">30d</button><button class="qbtn" data-d="90">90d</button>
      <input type="date" id="df" value="${iso(d30)}"> <span class="muted">→</span> <input type="date" id="dt" value="${iso(today)}">
      <button class="btn sm" id="apply">Apply</button>
    </div></div>
    <div class="kpis" id="kpis"></div><div class="charts" id="charts"></div>`;
  document.querySelectorAll('.qbtn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.qbtn').forEach(x=>x.classList.remove('act'));b.classList.add('act');
    $('df').value=iso(new Date(Date.now()-(b.dataset.d-1)*864e5));$('dt').value=iso(new Date());load();
  });
  $('apply').onclick=()=>load();
  async function load(){
    killCharts();
    const from=$('df').value,to=$('dt').value+'T23:59:59';
    const [sales,clients,pts,credit]=await Promise.all([
      // refund/reversal state deferred to a future migration; no reversal rows exist yet
      sb.from('sales').select('id,client_id,amount_cents,occurred_at,kind,counts_as_revenue,counts_as_visit').eq('business_id',S.biz.id).gte('occurred_at',from).lte('occurred_at',to).order('occurred_at'),
      sb.from('clients').select('id,gender,birth_date,created_at').eq('business_id',S.biz.id),
      sb.from('points_ledger').select('points,entry_type,created_at').eq('business_id',S.biz.id).gte('created_at',from).lte('created_at',to),
      sb.from('client_credit_balance').select('balance_cents').eq('business_id',S.biz.id)
    ]);
    if(sales.error) return fail(sales.error);
    const sl=sales.data||[],cl=clients.data||[],pl=pts.data||[];
    /* Revenue and visits are read off each sale's own immutable policy snapshot
       (counts_as_revenue / counts_as_visit) — never re-derived from today's sale_policies.
       That live join was the v10.1 defect: a settings change would retroactively rewrite
       completed history. refund/reversal state deferred to a future migration; no reversal
       rows exist yet, so there is nothing to exclude from the visit count here. */
    const rev=sl.filter(s=>s.counts_as_revenue);
    const visits=sl.filter(s=>s.counts_as_visit);
    const revenue=rev.reduce((a,s)=>a+s.amount_cents,0);
    const uniq=new Set(sl.filter(s=>s.client_id).map(s=>s.client_id)).size;
    const newC=cl.filter(c=>c.created_at>=from&&c.created_at<=to).length;
    const earned=pl.filter(p=>p.entry_type==='earn').reduce((a,p)=>a+p.points,0);
    const liab=(credit.data||[]).reduce((a,c)=>a+Math.max(c.balance_cents,0),0);
    $('kpis').innerHTML=[['Visits (sales)',visits.length],['Revenue',money(revenue)],['Unique customers',uniq],
      ['New customers',newC],['Points issued',earned],['Credit liability',money(liab)]]
      .map(([l,v])=>`<div class="card kpi"><div class="l">${l}</div><div class="v">${v}</div></div>`).join('');
    $('charts').innerHTML=`
      <div class="card"><b>Busiest days</b><p class="muted small">Visits by day of week</p><canvas id="c1"></canvas></div>
      <div class="card"><b>Revenue over time</b><p class="muted small">Daily total in range</p><canvas id="c2"></canvas></div>
      <div class="card"><b>Customer gender</b><p class="muted small">All customers on file</p><canvas id="c3"></canvas></div>
      <div class="card"><b>Age groups</b><p class="muted small">From birth dates on file</p><canvas id="c4"></canvas></div>`;
    const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],wd=[0,0,0,0,0,0,0];
    visits.forEach(s=>{wd[(new Date(s.occurred_at).getDay()+6)%7]++});
    const byDay={};rev.forEach(s=>{const k=s.occurred_at.slice(0,10);byDay[k]=(byDay[k]||0)+s.amount_cents});
    const dk=Object.keys(byDay).sort();
    const g={female:0,male:0,other:0,unknown:0};
    cl.forEach(c=>g[c.gender||'unknown']++);
    const ages={'<25':0,'25–34':0,'35–44':0,'45–54':0,'55+':0,'—':0};
    cl.forEach(c=>{if(!c.birth_date){ages['—']++;return}
      const a=(Date.now()-new Date(c.birth_date))/3.156e10;
      ages[a<25?'<25':a<35?'25–34':a<45?'35–44':a<55?'45–54':'55+']++});
    const C=(id,cfg)=>S.charts.push(new Chart($(id),cfg));
    const coral='#FF6B5E',amber='#FFB86B',ink='#1C1A22';
    C('c1',{type:'bar',data:{labels:days,datasets:[{data:wd,backgroundColor:days.map((_,i)=>wd[i]===Math.max(...wd)&&wd[i]>0?coral:amber),borderRadius:8}]},options:{plugins:{legend:{display:false}}}});
    C('c2',{type:'line',data:{labels:dk,datasets:[{data:dk.map(k=>byDay[k]/100),borderColor:coral,backgroundColor:'rgba(255,107,94,.12)',fill:true,tension:.35}]},options:{plugins:{legend:{display:false}}}});

        gender:$('cg').value||null,marketing_consent:consent}).select().single();

async function clientDetail(id){
  const [{data:c,error},{data:pb},{data:cb},{data:sl},{data:rg},{data:lp},{data:xb}]=await Promise.all([
    sb.from('clients').select('*').eq('id',id).single(),
    sb.from('client_points_balance').select('points').eq('client_id',id),
    sb.from('client_credit_balance').select('balance_cents').eq('client_id',id),
    sb.from('sales').select('*').eq('client_id',id).order('occurred_at',{ascending:false}).limit(10),
    sb.from('reward_grants').select('*, retention_programs(name)').eq('client_id',id).order('granted_at',{ascending:false}),
    sb.from('loyalty_programs').select('*').eq('business_id',S.biz.id).limit(1),
    sb.from('points_batches').select('remaining,expires_at').eq('client_id',id).gt('remaining',0).not('expires_at','is',null).order('expires_at').limit(1)]);
  if(error) return fail(error);
  const pts=pb?.[0]?.points||0,cred=cb?.[0]?.balance_cents||0,prog=lp?.[0];
  const nextExp=xb?.[0];
  /* "Visits on record" must read each sale's own immutable counts_as_visit snapshot, not
     just count every row — otherwise gift-card and (pre-v10.1) membership rows inflate it.
     This list is also capped at the 10 most recent sales (see the query above), so the
     '+' suffix already meant "at least this many" before this fix and still does.
     refund/reversal state deferred to a future migration; no reversal rows exist yet. */
  const visitSales=(sl||[]).filter(s=>s.counts_as_visit);
  M().innerHTML=`<div class="topbar"><div><h1>${esc(c.full_name)}</h1>
      <p class="muted small">${esc(c.phone||'')} ${esc(c.email||'')} · ${esc(c.gender||'gender not set')} ${c.birth_date?'· born '+c.birth_date:''}</p></div>
    <a class="btn ghost sm" href="#/clients">← All customers</a></div>
    <div class="kpis">
      <div class="card kpi"><div class="l">Points</div><div class="v">${pts}</div></div>
      <div class="card kpi"><div class="l">Spendable credit</div><div class="v">${money(cred)}</div></div>
      <div class="card kpi"><div class="l">Visits on record</div><div class="v">${visitSales.length}${(sl?.length||0)===10?'+':''}</div></div>
    </div>
    <div class="split" style="margin-top:16px">
      <div class="card"><b>Loyalty</b>
        ${prog&&prog.active?`<p class="muted small" style="margin:6px 0 14px">Earns ${prog.earn_points_per_dollar} pt/$ · Redeem ${prog.redeem_points} pts → ${money(prog.reward_credit_cents)} credit</p>
        <button class="btn sm" id="redeem" ${pts<prog.redeem_points?'disabled':''}>Redeem ${prog.redeem_points} pts → ${money(prog.reward_credit_cents)}</button>
        ${pts<prog.redeem_points?`<p class="muted small" style="margin-top:8px">${prog.redeem_points-pts} more points to unlock</p>`:''}
        ${nextExp?`<p class="muted small" style="margin-top:8px">⏳ ${nextExp.remaining} pts expire ${nextExp.expires_at.slice(0,10)}</p>`:''}
        <div class="row" style="margin-top:14px"><input id="adjV" type="number" placeholder="+/- points" style="max-width:120px">
        <input id="adjR" placeholder="reason (audited)"><button class="btn ghost sm" id="adjGo">Adjust</button></div>`
        :'<p class="muted small" style="margin-top:6px">No active loyalty program. Configure it in Loyalty.</p>'}
      </div>
      <div class="card"><b>Referral & consent</b>
        <p class="muted small" style="margin:8px 0 4px">Personal referral code — friends quote it when they join:</p>
        <div class="row"><b style="font-size:1.3rem;letter-spacing:.15em">${esc(c.referral_code||'—')}</b>
        <button class="btn ghost sm" id="copyRef">Copy</button></div>
        <p class="muted small" style="margin:14px 0 6px">Marketing consent (PDPA) — every change is recorded:</p>
        <button class="btn ghost sm" id="consentBtn">${c.marketing_consent?'✓ Consented — withdraw':'Record consent'}</button>
      </div>
      <div class="card"><b>Retention rewards earned</b>
        ${(rg&&rg.length)?rg.map(g=>`<div class="row" style="margin-top:10px"><span>🏆 ${esc(g.retention_programs?.name||'Program')}</span><span class="spacer"></span>
          <span class="muted small">${g.reward_type==='credit'?money(g.reward_value):g.reward_type==='discount_pct'?g.reward_value+'% off':esc(g.reward_item||'free item')} · ${g.granted_at.slice(0,10)}</span></div>`).join('')
        :'<p class="muted small" style="margin-top:6px">None yet — rewards land here automatically when visit goals are hit.</p>'}
      </div></div>
    <div class="card" style="margin-top:16px"><b>Recent sales</b>
      ${(sl&&sl.length)?`<table style="margin-top:8px"><tr><th>Date</th><th>Kind</th><th>Amount</th><th>Note</th></tr>
        ${sl.map(s=>`<tr><td>${s.occurred_at.slice(0,10)}</td><td>${s.kind.replace('_',' ')}</td><td>${money(s.amount_cents)}</td><td class="muted">${esc(s.note||'')}</td></tr>`).join('')}</table>`
      :'<p class="muted small" style="margin-top:6px">No sales yet.</p>'}</div>`;
  const rd=$('redeem');
  if(rd) rd.onclick=async()=>{
    rd.disabled=true;
    const {data,error}=await sb.rpc('redeem_points',{p_business:S.biz.id,p_client:id});
    if(error){fail(error);rd.disabled=false;return}
    toast(`Redeemed → ${money(data.credit_cents)} credit added 🎉`);clientDetail(id);
  };
  const aj=$('adjGo');
  if(aj) aj.onclick=async()=>{
    const v=parseInt($('adjV').value||'0');
    if(!v) return toast('Enter +/- points');
    const {data,error}=await sb.rpc('adjust_points',{p_business:S.biz.id,p_client:id,
      p_points:v,p_reason:$('adjR').value||null});
    if(error) return fail(error);
    toast(`Adjusted — new balance ${data} pts (audited)`);clientDetail(id);
  };
  $('copyRef').onclick=()=>{navigator.clipboard.writeText(c.referral_code||'');toast('Code copied')};
  $('consentBtn').onclick=async()=>{
    const to=!c.marketing_consent;
    const {error:e1}=await sb.from('clients').update({marketing_consent:to}).eq('id',id);
    if(e1) return fail(e1);
    await sb.from('consents').insert({business_id:S.biz.id,client_id:id,channel:'marketing',
      action:to?'granted':'withdrawn',source:'admin client page',actor:S.user.id});
    toast(to?'Consent recorded':'Consent withdrawn — recorded');clientDetail(id);
  };
}

    if(error) return fail(error);
    toast(status==='completed'?'Completed — sale booked, loyalty fired 🎉':'Appointment '+status.replace('_',' '));
    loadAppts();
  };

/* ---------- reports ---------- */
async function reportsPage(){
  const iso=d=>d.toISOString().slice(0,10);
  M().innerHTML=`<div class="topbar"><div><h1>Reports</h1><p class="muted small">Money and loyalty, in numbers your accountant can read.</p></div>
    <div class="range"><input type="date" id="rf" value="${iso(new Date(Date.now()-29*864e5))}"> <span class="muted">→</span>
    <input type="date" id="rt2" value="${iso(new Date())}"> <button class="btn sm" id="rgo">Run</button>
    <button class="btn ghost sm" id="rcsv">Export sales CSV</button></div></div>
    <div class="grid" id="rbody" style="grid-template-columns:1fr 1fr"><div class="card"><div class="empty">Pick a range and Run.</div></div></div>`;
  let lastSales=[];
  async function run(){
    const from=$('rf').value,to=$('rt2').value+'T23:59:59';
    const [{data:sl},{data:pl},{data:cb},{data:gc},{data:ms}]=await Promise.all([
      sb.from('sales').select('*, clients(full_name)').eq('business_id',S.biz.id).gte('occurred_at',from).lte('occurred_at',to).order('occurred_at'),
      sb.from('points_ledger').select('entry_type,points').eq('business_id',S.biz.id).gte('created_at',from).lte('created_at',to),
      sb.from('client_credit_balance').select('balance_cents').eq('business_id',S.biz.id),
      sb.from('gift_cards').select('balance_cents,status').eq('business_id',S.biz.id),
      sb.from('memberships').select('status').eq('business_id',S.biz.id)]);
    lastSales=sl||[];
    /* Revenue rollup reads each sale's own immutable counts_as_revenue snapshot — never a
       hardcoded kind list, and never today's sale_policies joined against past rows (that
       join is the v10.1 defect). Reversal rows carry the original's inherited flag and a
       negative amount, so they fall into the same kind bucket and net out on their own. */
    const byKind={};(sl||[]).forEach(s=>{if(!s.counts_as_revenue)return;byKind[s.kind]=(byKind[s.kind]||0)+s.amount_cents});
    /* "Cash collected, not revenue": any kind whose snapshot says counts_as_revenue=false —
       today that's gift cards by default, but a business that later defers package revenue
       (or anything else) lands here too, driven by the row's own flag rather than a name. */
    const nonRevByKind={};(sl||[]).forEach(s=>{if(s.counts_as_revenue)return;nonRevByKind[s.kind]=(nonRevByKind[s.kind]||0)+s.amount_cents});
    const pt={};(pl||[]).forEach(p=>{pt[p.entry_type]=(pt[p.entry_type]||0)+p.points});
    const liab=(cb||[]).reduce((a,c)=>a+Math.max(c.balance_cents,0),0);
    const gcOut=(gc||[]).filter(g=>g.status==='active').reduce((a,g)=>a+g.balance_cents,0);
    const actMs=(ms||[]).filter(m=>m.status==='active').length;
    $('rbody').innerHTML=`
      <div class="card"><b>Revenue by type</b><table style="margin-top:8px">
        ${Object.entries(byKind).map(([k,v])=>`<tr><td>${k.replace('_',' ')}</td><td style="text-align:right"><b>${money(v)}</b></td></tr>`).join('')||'<tr><td class="muted">No sales in range</td></tr>'}
        <tr><td><b>Total</b></td><td style="text-align:right"><b>${money(Object.values(byKind).reduce((a,b)=>a+b,0))}</b></td></tr></table>
        ${Object.keys(nonRevByKind).length?`<p class="muted small" style="margin-top:8px">Cash collected, not revenue: ${Object.entries(nonRevByKind).map(([k,v])=>`<b>${money(v)}</b> ${k.replace('_',' ')}`).join(', ')} — real cash in the drawer, but it isn't revenue until it's actually spent (gift cards) or otherwise realised, per this business's current sale policy.</p>`:''}</div>
      <div class="card"><b>Loyalty flow (in range)</b><table style="margin-top:8px">
        <tr><td>Points earned</td><td style="text-align:right"><b>${pt.earn||0}</b></td></tr>
        <tr><td>Points redeemed</td><td style="text-align:right"><b>${Math.abs(pt.redeem||0)}</b></td></tr>
        <tr><td>Points expired</td><td style="text-align:right"><b>${Math.abs(pt.expire||0)}</b></td></tr>
        <tr><td>Manual adjustments</td><td style="text-align:right"><b>${pt.adjust||0}</b></td></tr></table></div>
      <div class="card"><b>Liabilities (now)</b><table style="margin-top:8px">
        <tr><td>Customer credit outstanding</td><td style="text-align:right"><b>${money(liab)}</b></td></tr>
        <tr><td>Gift cards unredeemed</td><td style="text-align:right"><b>${money(gcOut)}</b></td></tr></table>
        <p class="muted small" style="margin-top:8px">Credit is money you owe customers — the daily expiry sweep keeps it honest.</p></div>
      <div class="card"><b>Memberships</b><table style="margin-top:8px">
        <tr><td>Active members</td><td style="text-align:right"><b>${actMs}</b></td></tr>
        <tr><td>Membership revenue (range)</td><td style="text-align:right"><b>${money(byKind.membership||0)}</b></td></tr></table></div>`;
  }
  $('rgo').onclick=run;
  $('rcsv').onclick=()=>{
    if(!lastSales.length) return toast('Run a report first');
    /* counts_as_revenue/counts_as_visit are each sale's own immutable snapshot at record
       time — included so this export stays byte-identical if the business's sale policy
       changes later, instead of quietly reflecting whatever policy is live on export day.
       refund/reversal state deferred to a future migration; no reversal rows exist yet. */
    const rows=[['occurred_at','customer','kind','amount','note','counts_as_revenue','counts_as_visit'],
      ...lastSales.map(s=>[s.occurred_at,s.clients?.full_name||'',s.kind,(s.amount_cents/100).toFixed(2),(s.note||'').replace(/,/g,';'),s.counts_as_revenue,s.counts_as_visit])];
    const blob=new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='frenly-sales.csv';a.click();
    toast('CSV downloaded');
  };
  run();
}

/* ---------- settings ---------- */
async function settingsPage(){
  const mods=Object.keys(MODULES).filter(m=>m!=='settings'&&m!=='dashboard');
  M().innerHTML=`<div class="topbar"><div><h1>Settings</h1><p class="muted small">Workspace, team & modules</p></div></div>
    <div class="split"><div class="card"><b>Business</b>
      <label>Name</label><input id="bn" value="${esc(S.biz.name)}">
      <label>Industry</label><select id="bi">${Object.entries(INDUSTRIES).map(([k,v])=>`<option value="${k}" ${S.biz.industry===k?'selected':''}>${v.em} ${v.label}</option>`).join('')}</select>
      <label>Brand colour (used on your portal)</label><input id="bc" type="color" value="${esc(S.biz.brand_color||'#FF6B5E')}" style="height:44px;padding:4px">
      <label>Booking policy (shown on your portal)</label><textarea id="bp" rows="2" placeholder="e.g. Please arrive 5 minutes early. 24h notice for cancellations.">${esc(S.biz.booking_policy||'')}</textarea>
      <label>Portal link (share with customers)</label>
      <p class="small" style="word-break:break-all;margin-top:4px"><a style="color:#D06A2E" target="_blank" href="${location.origin}${location.pathname}#/b/${S.biz.slug}">${location.origin}${location.pathname}#/b/${S.biz.slug}</a></p>
      <div style="margin-top:16px"><button class="btn" id="bsave">Save</button></div></div>
    <div class="card"><b>Modules</b><p class="muted small" style="margin:6px 0 4px">Toggle what ${esc(S.biz.name)} uses. Dashboard is always on.</p>
      ${mods.map(m=>`<label style="display:flex;align-items:center;gap:10px;margin-top:12px;cursor:pointer;font-size:14px;color:var(--ink);font-weight:500">
        <input type="checkbox" style="width:auto" data-m="${m}" ${S.biz.enabled_modules.includes(m)?'checked':''}> ${MODULES[m][0]} ${MODULES[m][1]}</label>`).join('')}
      <div style="margin-top:16px"><button class="btn" id="msave">Save modules</button></div></div></div>
    <div class="split" style="margin-top:16px">
    <div class="card"><b>Team</b><p class="muted small" style="margin:6px 0 10px">Five roles: owner · manager · receptionist · bookkeeper · staff. Invite by code — teammate signs up, enters the code, and lands in this workspace.</p>
      <div id="team"><p class="muted small">Loading…</p></div>
      <div class="row" style="margin-top:14px"><select id="ir" style="max-width:150px">
        <option value="manager">Manager</option><option value="receptionist">Receptionist</option>
        <option value="bookkeeper">Bookkeeper</option><option value="staff">Staff</option></select>
      <input id="ie" type="email" placeholder="email (optional, for your records)">
      <button class="btn sm" id="igo">Create invite</button></div>
      <div id="invites" style="margin-top:10px"></div></div>
    <div class="card"><b>Import customers (CSV)</b>
      <p class="muted small" style="margin:6px 0 10px">Bring your list from a spreadsheet or another system. Columns recognised: <b>name</b> (required), phone, email, gender, birth_date (YYYY-MM-DD).</p>
      <input type="file" id="csvf" accept=".csv,text/csv">
      <div id="csvprev" style="margin-top:12px"></div></div></div>
    <div class="card" style="margin-top:16px"><b>Tenant isolation</b>
      <p class="muted small" style="margin-top:6px;line-height:1.7">Every business on Frenly has its own isolated data space. Row-level security is enforced by the database on every table — your customers, sales, and programs are invisible to every other business, and theirs to you. Your team only ever sees this workspace.</p></div>`;
  $('bsave').onclick=async()=>{
    const {error}=await sb.from('businesses').update({name:$('bn').value.trim(),industry:$('bi').value,
      brand_color:$('bc').value,booking_policy:$('bp').value||null}).eq('id',S.biz.id);
    if(error)return fail(error);
    Object.assign(S.biz,{name:$('bn').value.trim(),industry:$('bi').value,brand_color:$('bc').value,booking_policy:$('bp').value||null});
    toast('Saved');route();
  };
  $('msave').onclick=async()=>{
    const on=['dashboard',...[...document.querySelectorAll('[data-m]')].filter(x=>x.checked).map(x=>x.dataset.m)];
    const {error}=await sb.from('businesses').update({enabled_modules:on}).eq('id',S.biz.id);
    if(error)return fail(error);S.biz.enabled_modules=on;toast('Modules updated');route();
  };
  /* team */
  async function loadTeam(){
    const [{data:st},{data:inv}]=await Promise.all([
      sb.from('staff').select('*').eq('business_id',S.biz.id).order('created_at'),
      sb.from('staff_invites').select('*').eq('business_id',S.biz.id).eq('status','pending').order('created_at',{ascending:false})]);
    $('team').innerHTML=(st||[]).map(s=>`<div class="row" style="padding:6px 0;border-bottom:1px solid var(--line)">
      <b>${esc(s.full_name||'Member')}</b><span class="pill ${s.role==='owner'?'ok':'off'}">${s.role}</span><span class="spacer"></span>
      ${s.role!=='owner'?`<select onchange="chRole('${s.id}',this.value)" style="max-width:140px;padding:6px 10px">
        ${['manager','receptionist','bookkeeper','staff'].map(r=>`<option ${s.role===r?'selected':''}>${r}</option>`).join('')}</select>
      <button class="btn ghost sm" onclick="rmStaff('${s.id}')">Remove</button>`:''}</div>`).join('');
    $('invites').innerHTML=(inv&&inv.length)?inv.map(i=>`<div class="row small" style="padding:5px 0">
      <span>🎟️ <b style="letter-spacing:.1em">${esc(i.code)}</b> · ${i.role} ${i.email?'· '+esc(i.email):''}</span><span class="spacer"></span>
      <button class="btn ghost sm" onclick="cpInv('${i.code}')">Copy</button>
      <button class="btn ghost sm" onclick="rvInv('${i.id}')">Revoke</button></div>`).join('')
      :'<p class="muted small">No pending invites.</p>';
  }
  window.chRole=async(id,role)=>{const {error}=await sb.from('staff').update({role}).eq('id',id);if(error)return fail(error);toast('Role updated');};
  window.rmStaff=async(id)=>{const {error}=await sb.from('staff').delete().eq('id',id);if(error)return fail(error);toast('Removed');loadTeam();};
  window.cpInv=(c)=>{navigator.clipboard.writeText(c);toast('Code copied — send it to your teammate')};
  window.rvInv=async(id)=>{await sb.from('staff_invites').update({status:'revoked'}).eq('id',id);toast('Invite revoked');loadTeam();};
  $('igo').onclick=async()=>{
    const {data,error}=await sb.rpc('create_invite',{p_business:S.biz.id,p_role:$('ir').value,p_email:$('ie').value||null});
    if(error) return fail(error);
    toast(`Invite created: ${data.code} — copied`);navigator.clipboard.writeText(data.code);loadTeam();
  };
  loadTeam();
  /* CSV import */
  $('csvf').onchange=async(ev)=>{
    const file=ev.target.files[0];if(!file)return;
    const text=await file.text();
    const rows=[];let cur=[''],q=false,ri=0;
    for(const ch of text){
      if(q){ if(ch==='"'){q=false} else cur[cur.length-1]+=ch; }
      else if(ch==='"'){q=true}
      else if(ch===','){cur.push('')}
      else if(ch==='\n'||ch==='\r'){ if(cur.length>1||cur[0]!==''){rows.push(cur);cur=[''];} }
      else cur[cur.length-1]+=ch;
    }
    if(cur.length>1||cur[0]!=='')rows.push(cur);
    if(rows.length<2) return toast('CSV needs a header row + data');
    const hdr=rows[0].map(h=>h.trim().toLowerCase());
    const col=n=>hdr.findIndex(h=>h.includes(n));
    const iN=col('name'),iP=col('phone'),iE=col('email'),iG=col('gender'),iB=col('birth');
    if(iN<0) return toast('No "name" column found');
    const recs=rows.slice(1).filter(r=>r[iN]&&r[iN].trim().length>1).map(r=>({
      business_id:S.biz.id,full_name:r[iN].trim(),
      phone:iP>=0?(r[iP]||null):null,email:iE>=0?(r[iE]||null):null,
      gender:iG>=0&&['female','male','other'].includes((r[iG]||'').toLowerCase())?r[iG].toLowerCase():null,
      birth_date:iB>=0&&/^\d{4}-\d{2}-\d{2}$/.test(r[iB]||'')?r[iB]:null}));
    $('csvprev').innerHTML=`<p class="small"><b>${recs.length}</b> customers ready (of ${rows.length-1} rows).
      First: ${esc(recs[0]?.full_name||'—')}${recs[1]?', '+esc(recs[1].full_name):''}…</p>
      <button class="btn sm" id="csvgo" style="margin-top:8px">Import ${recs.length} customers</button>`;
    $('csvgo').onclick=async()=>{
      $('csvgo').disabled=true;let done=0;
      for(let i=0;i<recs.length;i+=100){
        const {error}=await sb.from('clients').insert(recs.slice(i,i+100));
        if(error){toast(`Imported ${done}, then failed: ${error.message}`);return}
        done+=Math.min(100,recs.length-i);
      }
      toast(`Imported ${done} customers 🎉`);$('csvprev').innerHTML=`<p class="small">✓ ${done} imported.</p>`;
    };
  };
}

/* ---------- public customer portal ---------- */
async function renderPortal(slug){
  root.innerHTML=`<div class="portal"><div class="head"><div class="logo">frenly<span>.</span></div><p class="muted small">powered booking</p></div><div class="card"><div class="empty">Loading…</div></div></div>`;
  const {data,error}=await sb.rpc('get_business_public',{p_slug:slug});
  if(error||!data){root.querySelector('.card').innerHTML=`<div class="empty"><div class="big">🤔</div>Business not found.</div>`;return}
  const biz=data;let selSvc=null;
  const bc=/^#[0-9A-Fa-f]{6}$/.test(biz.brand_color||'')?biz.brand_color:'#FF6B5E';
  const draw=()=>{
    root.innerHTML=`<div class="portal" style="--coral:${bc};--grad:linear-gradient(100deg,${bc},#FFB86B)">
      <div class="head"><h1 style="font-size:2rem">${esc(biz.name)}</h1><p class="muted">Book with us — it takes 30 seconds.</p></div>
      <div class="card">
        ${(biz.services&&biz.services.length)?`<b>Choose a service</b>
          <div style="margin:10px 0 4px">${biz.services.map(s=>`<div class="svc ${selSvc===s.id?'sel':''}" data-s="${s.id}">
            <span><b>${esc(s.name)}</b> <span class="muted small">· ${s.duration_min} min</span></span>
            <b>${biz.currency||'SGD'} ${(s.price_cents/100).toFixed(2)}</b></div>`).join('')}
          <div class="svc ${selSvc===null?'sel':''}" data-s=""><span><b>Just a reservation</b> <span class="muted small">· table / general visit</span></span></div></div>`
        :`<b>Make a reservation</b>`}
        <div class="split"><div><label>Your name *</label><input id="pn"></div><div><label>Phone</label><input id="pp" placeholder="+65"></div></div>
        <div class="split"><div><label>Email</label><input id="pe" type="email"></div><div><label>Party size</label><input id="ps" type="number" min="1" value="2"></div></div>
        <label>Preferred date & time</label><input id="pt" type="datetime-local">
        <label>Notes</label><textarea id="pnotes" rows="2" placeholder="anything we should know?"></textarea>
        <div id="perr"></div>
        <div style="margin-top:18px"><button class="btn" id="psend" style="width:100%">Request booking</button></div>
        ${biz.booking_policy?`<p class="muted small" style="margin-top:12px;text-align:center">${esc(biz.booking_policy)}</p>`:''}
        <p class="muted small" style="margin-top:12px;text-align:center">The team confirms your request personally — you'll hear back soon.</p>
      </div>
      <div class="card" style="margin-top:16px"><b>Manage an existing booking</b>
        <p class="muted small" style="margin:6px 0 10px">Enter the phone number you booked with to find your appointments.</p>
        <div class="row"><input id="mphone" placeholder="+65"><button class="btn ghost sm" id="mfind">Find my bookings</button></div>
        <div id="merr"></div>
        <div id="mlist" style="margin-top:12px"></div>
      </div></div>`;
    document.querySelectorAll('.svc').forEach(el=>el.onclick=()=>{selSvc=el.dataset.s||null;draw()});
    $('psend').onclick=async()=>{
      $('psend').disabled=true;
      const {error}=await sb.rpc('request_booking',{p_slug:slug,p_name:$('pn').value,p_email:$('pe').value||null,
        p_phone:$('pp').value||null,p_service:selSvc,p_party:parseInt($('ps').value||'1'),
        p_preferred:sgIso($('pt').value),p_notes:$('pnotes').value||null});
      if(error){$('perr').innerHTML=`<div class="err">${esc(error.message)}</div>`;$('psend').disabled=false;return}
      root.querySelector('.card').innerHTML=`<div class="empty"><div class="big">🎉</div><h2 style="margin-bottom:8px">Request sent!</h2>
        <p class="muted">${esc(biz.name)} has your booking request and will confirm shortly.</p></div>`;
    };
    $('mfind').onclick=async()=>{
      const phone=$('mphone').value.trim();
      if(!phone){$('merr').innerHTML='<div class="err">Enter your phone number</div>';return}
      $('merr').innerHTML='';$('mfind').disabled=true;
      const {data,error}=await sb.rpc('list_my_appointments',{p_slug:slug,p_phone:phone});
      $('mfind').disabled=false;
      if(error){$('merr').innerHTML=`<div class="err">${esc(error.message)}</div>`;return}
      $('mlist').innerHTML=(data&&data.length)?`<label>New preferred time (for reschedule requests)</label><input type="datetime-local" id="mdt">
        ${data.map(a=>`<div class="row" style="padding:10px 0;border-bottom:1px solid var(--line)">
          <div><b>${new Date(a.starts_at).toLocaleString()}</b><div class="muted small">${esc(a.service_name||'general visit')} · ${esc(a.status)}</div></div>
          <span class="spacer"></span>
          <button class="btn ghost sm" onclick="mCancel('${a.id}')">Cancel</button>
          <button class="btn sm" onclick="mReschedule('${a.id}')">Request reschedule</button></div>`).join('')}`
        :'<p class="muted small">No upcoming bookings found for that number.</p>';
    };
  };
  window.mCancel=async(apId)=>{
    const phone=$('mphone').value.trim();
    if(!phone) return toast('Enter your phone number first');
    if(!confirm('Cancel this booking?')) return;
    const {data,error}=await sb.rpc('request_change',{p_slug:slug,p_appointment:apId,p_phone:phone,p_kind:'cancel',p_proposed:null,p_note:null});
    if(error) return fail(error);
    toast(data&&data.status==='approved'?'Done — auto-approved':'Request sent — the team will confirm');
  };
  window.mReschedule=async(apId)=>{
    const phone=$('mphone').value.trim();
    if(!phone) return toast('Enter your phone number first');
    const val=$('mdt')?.value;
    if(!val) return toast('Pick a new date & time first');
    const {data,error}=await sb.rpc('request_change',{p_slug:slug,p_appointment:apId,p_phone:phone,p_kind:'reschedule',p_proposed:sgIso(val),p_note:null});
    if(error) return fail(error);
    toast(data&&data.status==='approved'?'Done — auto-approved':'Request sent — the team will confirm');
  };
  draw();
}

route();
</script>
