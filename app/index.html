      <div class="wallet-metric"><span class="muted small">Package session balance</span><b>${Number(packages.sessions_remaining||0)}</b></div>
      <div class="wallet-metric"><span class="muted small">${unit} expiry</span><b style="font-size:14px;line-height:1.35">${esc(actionableWalletExpiryText(card?.expiry,loyalty.unit||'points'))}</b></div>
    </div>
    <div class="wallet-line" style="margin-top:8px"><div><b>Next reward</b><p class="muted small" style="margin-top:4px">${reward?reward.available_now?`${esc(reward.name||'Reward')} is ready at the counter.`:`${Number(reward.remaining_units||0)} ${unit} to ${esc(reward.name||'your next reward')}.`:'No active reward is available right now.'}</p></div></div>
    ${card?.visits_remaining===null||card?.visits_remaining===undefined?'':`<div class="wallet-line"><div><b>Visit progress</b><p class="muted small" style="margin-top:4px">${Number(card.visits_remaining)===0?'Current visit goal is complete.':`${Number(card.visits_remaining)} qualifying visit${Number(card.visits_remaining)===1?'':'s'} remaining.`}${visit.customer_description?` ${esc(visit.customer_description)}`:''}</p></div></div>`}
    ${birthdayBenefitMarkup(card?.birthday_benefit,{interactive:detail,compact:!detail})}
    ${detail?`<p class="muted small" style="margin-top:14px">${esc(actionableWalletActionText(card))}</p>`:''}
  </article>`;
}
function renderActionableWalletHome(payload){
  const cards=Array.isArray(payload?.cards)?payload.cards:[];
  $('walletBody').innerHTML=`<h1>My Frenly</h1><p class="muted small" style="margin:4px 0 18px">Your rewards stay separate by business. Cards are ordered by the next action you can take.</p>
    ${payload?.truncated?'<div class="card" role="status"><p class="muted small">Showing the 100 highest-priority linked businesses. Ask Frenly support to help locate another programme.</p></div>':''}
    ${cards.length?`<div class="wallet-firms">${cards.map(card=>`<a class="wallet-firm" href="#/wallet/${encodeURIComponent(card?.business?.slug||'')}" aria-label="Open ${esc(card?.business?.name||'business')} rewards">${actionableWalletCardMarkup(card)}</a>`).join('')}</div>`:'<div class="card"><h2>No verified business links yet</h2><p class="muted small" style="margin-top:6px">Use a business link or QR code to add a programme.</p></div>'}`;
}
async function renderCustomerWallet(businessSlug=null){
  const walletRenderEpoch=++customerWalletRenderEpoch;
  const isWalletCurrent=()=>customerWalletRenderEpoch===walletRenderEpoch;
  const customerFeatures=await loadCustomerFeatureCapabilities();
  if(!isWalletCurrent())return;
  if(customerFeatures._load_error)return renderCustomerCapabilityRetry('We could not check your customer access. Please try again.');
  if(!customerFeatures.customer_wallet)return renderCustomerWalletUnavailable();
  if(customerFeatures.customer_phone_registration===true){
    const {data:profile,error:profileError}=await sb.rpc('customer_get_profile');
    if(!isWalletCurrent())return;
    if(profileError)return renderCustomerCapabilityRetry('We could not load your customer profile. Please try again.');
    if(profile?.profile===null){
      nav('#/customer');
      return renderCustomerRegistrationProfile();
    }
  }
  const {data:walletPersonas}=await sb.rpc('get_my_personas');
  if(!isWalletCurrent())return;
  const walletStaff=walletPersonas?.staff||[],walletCustomers=walletPersonas?.customer||[];
  const dualRoleWorkspace=walletStaff.length&&walletCustomers.length?walletStaff[0]:null;
  root.innerHTML=`<div class="wallet-shell"><div class="wallet-inner"><div class="wallet-head">
    ${businessSlug?'<button class="btn ghost sm" id="walletBack" aria-label="Back to all businesses" style="min-width:44px">←</button>':''}<div class="logo">frenly<span>.</span></div>
    <span class="spacer"></span><span id="customerInboxBellSlot"></span>${dualRoleWorkspace?`<a class="btn ghost sm" href="#/workspace/${encodeURIComponent(dualRoleWorkspace.business_slug)}/dashboard">Staff workspace</a>`:''}<button class="btn ghost sm" id="walletSignOut">Sign out</button></div>
    <div id="walletBody"><div class="card"><p class="muted">Loading…</p></div></div></div></div>`;
  $('walletSignOut').onclick=async()=>{killChannels();await sb.auth.signOut();resetClientSessionState();location.hash='#/';route()};
  if($('walletBack')) $('walletBack').onclick=()=>nav('#/wallet');
  let actionableCard=null;
  if(customerFeatures.customer_actionable_wallet===true){
    if(!businessSlug){
      const {data,error}=await sb.rpc('customer_get_actionable_wallet');
      if(!isWalletCurrent())return;
      if(error)return renderCustomerWalletRetry('Your wallet is temporarily unavailable.',null);
      renderActionableWalletHome(data);
      if(customerFeatures.customer_in_app_inbox===true) renderCustomerInAppInbox(null,isWalletCurrent);
      return;
    }
    const {data,error}=await sb.rpc('customer_get_actionable_business',{p_business_slug:businessSlug});
    if(!isWalletCurrent())return;
    if(error)return renderCustomerWalletRetry('This business could not be loaded.',businessSlug);
    actionableCard=data?.card||null;
    if(!actionableCard)return renderCustomerWalletRetry('This business could not be loaded.',businessSlug);
  }
  if(!businessSlug){
    const {data,error}=await sb.rpc('customer_get_wallet');
    if(!isWalletCurrent())return;
    if(error)return renderCustomerWalletRetry('Your wallet is temporarily unavailable.',null);
    const cards=Array.isArray(data)?data:[];
    $('walletBody').innerHTML=`<h1>My Frenly</h1><p class="muted small" style="margin:4px 0 18px">Each business keeps its own rewards and balances.</p>
      <div class="wallet-firms">${cards.map(card=>{
        const b=card.business||{},loyalty=card.loyalty||{},appointments=card.upcoming_appointments||{};
        const currency=b.currency||'SGD';
        return `<button class="wallet-firm" data-slug="${esc(b.slug)}"><b>${esc(b.name||'Business')}</b>
          <p class="muted small" style="margin-top:3px">${esc(b.industry||'Local business')}</p>
          <div class="wallet-metrics"><div class="wallet-metric"><span class="muted small">${esc(loyalty.unit||'points')}</span><b>${Number(loyalty.balance||0)}</b></div>
          <div class="wallet-metric"><span class="muted small">Credit</span><b>${esc(currency)} ${(Number(loyalty.credit_balance_cents||0)/100).toFixed(2)}</b></div></div>
          <p class="muted small" style="margin-top:12px">${Number(appointments.count||0)} upcoming</p></button>`}).join('')}</div>
      ${cards.length?'':'<div class="card"><p class="muted">No verified business links yet.</p></div>'}`;
    document.querySelectorAll('.wallet-firm').forEach(button=>button.onclick=()=>nav('#/wallet/'+encodeURIComponent(button.dataset.slug)));
    if(customerFeatures.customer_in_app_inbox===true) renderCustomerInAppInbox(null,isWalletCurrent);
    return;
  }
  const args={p_business_slug:businessSlug};
  const [{data:summary,error:summaryError},{data:capabilities,error:capabilitiesError}]=await Promise.all([
    sb.rpc('customer_get_business_summary',args),sb.rpc('customer_portal_capabilities',args)]);
  if(!isWalletCurrent())return;
  if(summaryError||capabilitiesError)return renderCustomerWalletRetry('This business could not be loaded.',businessSlug);
  const b=summary.business||{},loyalty=summary.loyalty||{},packages=summary.packages||{},membership=summary.membership||{};
  const currency=b.currency||'SGD';
  const hasWalletSection=['booking_request','rewards','activity','packages','membership','appointments'].some(key=>!!capabilities[key]);
  $('walletBody').innerHTML=`<div class="row"><div><h1>${esc(b.name||'My rewards')}</h1><p class="muted small" style="margin-top:4px">${esc(b.industry||'')}</p></div><span class="spacer"></span>${customerFeatures.customer_claims?'<button class="btn danger sm" id="walletUnlink">Disconnect</button>':''}</div>
    ${actionableCard?`<div style="margin-top:18px">${actionableWalletCardMarkup(actionableCard,{detail:true})}</div>`:''}
    ${actionableCard?'':`<div class="wallet-metrics">
      ${loyalty.enabled?`<div class="wallet-metric"><span class="muted small">${esc(loyalty.unit||'points')}</span><b>${Number(loyalty.balance||0)}</b></div>
      <div class="wallet-metric"><span class="muted small">Store credit</span><b>${esc(currency)} ${(Number(loyalty.credit_balance_cents||0)/100).toFixed(2)}</b></div>`:''}
      ${capabilities.packages?`<div class="wallet-metric"><span class="muted small">Package sessions</span><b>${Number(packages.sessions_remaining||0)}</b></div>`:''}
      ${capabilities.membership?`<div class="wallet-metric"><span class="muted small">Membership</span><b>${membership.active?'Active':'Inactive'}</b></div>`:''}
    </div>`}
    <div class="wallet-sections" id="walletSections">
      ${capabilities.booking_request?`<section class="card wallet-section" id="walletBook" aria-busy="false"><div class="wallet-section-head"><div><h2>Book</h2><p class="muted small">Request your next visit with ${esc(b.name||'this business')}.</p></div><span class="spacer"></span><a class="btn sm" href="#/b/${encodeURIComponent(b.slug)}">Book now</a></div></section>`:''}
      ${capabilities.rewards?walletSectionShell('walletRewards','Rewards','Browse rewards and ask the team to claim at the counter.'):''}
      ${capabilities.activity?walletSectionShell('walletActivity','Activity','Your loyalty history with this business.'):''}
      ${capabilities.packages?walletSectionShell('walletPackages','Packages','Session balances and recent usage.'):''}
      ${capabilities.membership?walletSectionShell('walletMemberships','Membership','Current plan and period status.'):''}
      ${capabilities.appointments?walletSectionShell('walletAppointments','Appointments','Upcoming and recent visits.'):''}
      ${customerFeatures.customer_in_app_inbox?`<section class="card wallet-section" id="customerInAppInbox" aria-busy="true" tabindex="-1"><div class="wallet-skeleton"></div></section>`:''}
      ${customerFeatures.customer_birthday_benefits?`<section class="card wallet-section" id="walletBirthdayParticipation" aria-busy="true"><div class="wallet-skeleton"></div></section>`:''}
      ${hasWalletSection?'':`<section class="card wallet-section" id="walletEmpty"><div class="wallet-section-head"><div><h2>Nothing to show yet</h2><p class="muted small">This business has no customer wallet sections available for your account.</p></div><span class="spacer"></span><button class="btn ghost sm" id="walletEmptyRetry">Refresh</button></div></section>`}
    </div>
    ${customerFeatures.customer_notifications?'<div id="customerNotificationPreferences"></div>':''}`;
  let unlinkAttemptId=crypto.randomUUID();
  let birthdayActivationAttemptId=crypto.randomUUID();
  const birthdayActivate=$('birthdayBenefitActivate');
  if(birthdayActivate)birthdayActivate.onclick=async()=>{
    birthdayActivate.disabled=true;
    const {data,error}=await sb.rpc('customer_activate_birthday_benefit',{p_business_slug:businessSlug,p_idempotency_key:birthdayActivationAttemptId});
    if(!isWalletCurrent()||!birthdayActivate.isConnected)return;
    if(error){birthdayActivate.disabled=false;return toast('Birthday benefit is unavailable right now.');}
    actionableCard={...actionableCard,birthday_benefit:data||null};
    birthdayActivationAttemptId=crypto.randomUUID();
    const cardHost=birthdayActivate.closest('.wallet-section');
    if(cardHost&&cardHost.isConnected){
      cardHost.outerHTML=actionableWalletCardMarkup(actionableCard,{detail:true});
      const replacement=$('birthdayBenefitShow');
      if(replacement)replacement.onclick=()=>{
        const status=$('birthdayBenefitCounter');if(status)status.textContent='Show this screen to the team at the counter. No birthday details are shared with the business.';
      };
    }
  };
  const birthdayShow=$('birthdayBenefitShow');
  if(birthdayShow)birthdayShow.onclick=()=>{
    const status=$('birthdayBenefitCounter');if(status)status.textContent='Show this screen to the team at the counter. No birthday details are shared with the business.';
  };
  const unlinkButton=$('walletUnlink');
  if(unlinkButton)unlinkButton.onclick=async()=>{
    if(!confirm('Disconnect this business from My Frenly? Your customer history stays with the business, but this account will immediately lose wallet access.'))return;
    unlinkButton.disabled=true;
    const {error}=await sb.rpc('customer_unlink_business_link',{
      p_business_slug:businessSlug,p_idempotency_key:unlinkAttemptId});
    if(!isWalletCurrent()||!unlinkButton.isConnected)return;
    if(error){unlinkButton.disabled=false;return toast('Customer access is unavailable. Please try again later.')}
    toast('Business disconnected');nav('#/wallet');
  };
  ensureWalletEmptyState(businessSlug);
  const isWalletSectionCurrent=(host)=>walletSectionStillCurrent(host,isWalletCurrent);
  const loadRewards=async()=>{
    const host=$('walletRewards');if(!host)return;
    host.setAttribute('aria-busy','true');
    const {data,error}=await sb.rpc('customer_get_reward_catalog',args);
    if(!isWalletSectionCurrent(host))return;
    if(error)return walletSectionError('walletRewards',walletRpcDenied(error)?'Rewards are not available for this account.':'Rewards could not be loaded.',loadRewards);
    const rewards=Array.isArray(data)?data:[];
    if(!rewards.length)return walletSectionEmpty('walletRewards','Rewards','No rewards are available right now.',businessSlug,'rewards',loadRewards,isWalletCurrent);
    const availability={available_at_counter:'Available at counter',insufficient_balance:'More points needed',not_started:'Available soon',ended:'Offer ended',limit_reached:'Claim limit reached'};
    host.setAttribute('aria-busy','false');
    host.innerHTML=`<div class="wallet-section-head"><div><h2>Rewards</h2><p class="muted small">Claims are completed with the team at the counter.</p></div></div><div class="wallet-rewards">${rewards.map(r=>`<article class="wallet-reward">
      ${r.image_ref?(String(r.image_ref).startsWith('https://')?`<p class="small" style="margin-bottom:9px"><a href="${esc(r.image_ref)}" target="_blank" rel="noopener noreferrer">View reward image</a></p>`:`<img src="${esc(r.image_ref)}" alt="" loading="lazy">`):''}<div class="row"><b>${esc(r.customer_name||'Reward')}</b><span class="spacer"></span><span class="pill">${Number(r.cost_points||0)} ${esc(loyalty.unit||'points')}</span></div>
      ${r.description?`<p class="muted small" style="margin-top:7px">${esc(r.description)}</p>`:''}<p class="small" style="margin-top:9px">${esc(availability[r.availability]||'Ask at counter')}</p>
      ${r.entitlement_expiry_days?`<p class="muted small" style="margin-top:5px">Use within ${Number(r.entitlement_expiry_days)} days after claim.</p>`:''}
      ${r.eligibility?`<p class="muted small" style="margin-top:5px">${[['branches','locations'],['services','services'],['products','products']].filter(([key])=>r.eligibility[key]?.scope==='restricted').map(([key,label])=>`${Number(r.eligibility[key].count||0)} eligible ${label}`).join(' · ')||'Valid across all eligible services and locations.'}</p>`:''}
      ${r.instructions?`<details style="margin-top:9px"><summary class="small">How to use</summary><p class="muted small" style="margin-top:5px">${esc(r.instructions)}</p></details>`:''}
      ${r.terms?`<details style="margin-top:9px"><summary class="small">Terms</summary><p class="muted small" style="margin-top:5px">${esc(r.terms)}</p></details>`:''}</article>`).join('')}</div>`;
  };
  const activityState={items:[],nextCursor:null};
  const loadActivity=async(cursor=null)=>{
    const host=$('walletActivity');if(!host)return;
    const {data,error}=await sb.rpc('customer_get_loyalty_details',{...args,p_cursor:cursor||{limit:20}});
    if(!isWalletSectionCurrent(host))return;
    if(error)return walletSectionError('walletActivity',walletRpcDenied(error)?'Loyalty activity is not available for this account.':'Activity could not be loaded.',()=>loadActivity(cursor));
    const next=Array.isArray(data?.items)?data.items:[];
    activityState.items=cursor?[...activityState.items,...next]:next;activityState.nextCursor=data?.next_cursor||null;
    if(!activityState.items.length)return walletSectionEmpty('walletActivity','Activity','No loyalty activity is available yet.',businessSlug,'activity',()=>loadActivity(null),isWalletCurrent);
    const unit=esc(data?.unit||loyalty.unit||'points'),expiry=data?.expiry||{};
    host.setAttribute('aria-busy','false');
    host.innerHTML=`<div class="wallet-section-head"><div><h2>Activity</h2>${Number(expiry.expiring_next_30_days||0)>0?`<p class="muted small">${Number(expiry.expiring_next_30_days)} ${unit} expire within 30 days${expiry.next_expiry_at?' · next '+esc(walletDate(expiry.next_expiry_at)):''}.</p>`:'<p class="muted small">Your loyalty history with this business.</p>'}</div></div>
      <div>${activityState.items.map(item=>{const delta=Number(item.points_delta||0);return `<div class="wallet-line"><div><b>${esc(item.title||'Loyalty activity')}</b><p class="muted small" style="margin-top:3px">${esc(walletDate(item.event_at,true))}${item.status?' · '+esc(String(item.status).replaceAll('_',' ')):''}</p>${item.detail?`<p class="muted small" style="margin-top:3px">${esc(item.detail)}</p>`:''}</div><span class="spacer"></span><span class="wallet-delta ${delta>0?'plus':delta<0?'minus':''}">${delta>0?'+':''}${delta} ${unit}</span></div>`}).join('')}</div>
      ${activityState.nextCursor?'<button class="btn ghost sm" id="walletActivityMore" style="margin-top:12px">Load more</button>':''}`;
    if($('walletActivityMore'))$('walletActivityMore').onclick=()=>{ $('walletActivityMore').disabled=true;loadActivity(activityState.nextCursor) };
  };
  const packageState={items:[],nextCursor:null};
  const loadPackages=async(cursor=null)=>{
    const host=$('walletPackages');if(!host)return;
    const {data,error}=await sb.rpc('customer_get_packages',{...args,p_cursor:cursor||{limit:20}});
    if(!isWalletSectionCurrent(host))return;
    if(error)return walletSectionError('walletPackages',walletRpcDenied(error)?'Packages are not available for this account.':'Packages could not be loaded.',()=>loadPackages(cursor));
    const next=Array.isArray(data?.items)?data.items:[];
    packageState.items=cursor?[...packageState.items,...next]:next;packageState.nextCursor=data?.next_cursor||null;
    if(!packageState.items.length)return walletSectionEmpty('walletPackages','Packages','No packages are available for this account.',businessSlug,'packages',()=>loadPackages(null),isWalletCurrent);
    host.setAttribute('aria-busy','false');
    host.innerHTML=`<div class="wallet-section-head"><div><h2>Packages</h2><p class="muted small">Session balances and recent usage.</p></div></div>${packageState.items.map(item=>`<div class="wallet-line"><div style="width:100%"><div class="row"><b>${esc(item.plan_name||'Package')}</b><span class="spacer"></span><span class="pill">${Number(item.sessions_remaining||0)} of ${Number(item.sessions_purchased||0)} left</span></div>
      <p class="muted small" style="margin-top:4px">${esc(String(item.status||'').replaceAll('_',' '))}${item.expires_at?' · expires '+esc(walletDate(item.expires_at)):''}</p>
      ${(item.usage_history||[]).length?`<div class="wallet-history">${item.usage_history.map(use=>`<p class="muted small">${esc(walletDate(use.used_at,true))} · ${esc(use.status)} · ${Number(use.remaining_after||0)} left</p>`).join('')}</div>`:''}</div></div>`).join('')}
      ${packageState.nextCursor?'<button class="btn ghost sm" id="walletPackagesMore" style="margin-top:12px">Load more</button>':''}`;
    if($('walletPackagesMore'))$('walletPackagesMore').onclick=()=>{ $('walletPackagesMore').disabled=true;loadPackages(packageState.nextCursor) };
  };
  const loadMemberships=async()=>{
    const host=$('walletMemberships');if(!host)return;
    const {data,error}=await sb.rpc('customer_get_memberships',args);
    if(!isWalletSectionCurrent(host))return;
    if(error)return walletSectionError('walletMemberships',walletRpcDenied(error)?'Membership is not available for this account.':'Membership could not be loaded.',loadMemberships);
    const memberships=Array.isArray(data)?data:[];
    if(!memberships.length)return walletSectionEmpty('walletMemberships','Membership','No membership is available for this account.',businessSlug,'membership',loadMemberships,isWalletCurrent);
    host.setAttribute('aria-busy','false');
    host.innerHTML=`<div class="wallet-section-head"><div><h2>Membership</h2><p class="muted small">Current plan and period status.</p></div></div>${memberships.map(item=>`<div class="wallet-line"><div><b>${esc(item.plan_name||'Membership')}</b><p class="muted small" style="margin-top:3px">${esc(String(item.cadence||'').replaceAll('_',' '))}${item.current_period_start?' · '+esc(walletDate(item.current_period_start))+' to '+esc(walletDate(item.current_period_end)):''}</p></div><span class="spacer"></span><span class="pill">${esc(String(item.status||'').replaceAll('_',' '))}</span></div>`).join('')}`;
  };
  const appointmentState={items:[],nextCursor:null};
  const loadAppointments=async(cursor=null)=>{
    const host=$('walletAppointments');if(!host)return;
    const {data,error}=await sb.rpc('customer_get_appointments_page',{...args,p_cursor:cursor||{limit:20}});
    if(!isWalletSectionCurrent(host))return;
    if(error)return walletSectionError('walletAppointments',walletRpcDenied(error)?'Appointments are not available for this account.':'Appointments could not be loaded.',()=>loadAppointments(cursor));
    const next=Array.isArray(data?.items)?data.items:[];
    appointmentState.items=cursor?[...appointmentState.items,...next]:next;appointmentState.nextCursor=data?.next_cursor||null;
    if(!appointmentState.items.length)return walletSectionEmpty('walletAppointments','Appointments','No appointments are available yet.',businessSlug,'appointments',()=>loadAppointments(null),isWalletCurrent);
    renderWalletAppointments(host,businessSlug,appointmentState,customerFeatures);
    if($('walletAppointmentsMore'))$('walletAppointmentsMore').onclick=()=>{ $('walletAppointmentsMore').disabled=true;loadAppointments(appointmentState.nextCursor) };
  };
  const loadBirthdayParticipation=async()=>{
    const host=$('walletBirthdayParticipation');if(!host)return;
    const {data,error}=await sb.rpc('customer_get_birthday_participation');
    if(!walletSectionStillCurrent(host,isWalletCurrent))return;
    if(error){host.remove();ensureWalletEmptyState(businessSlug);return;}
    const optedIn=data?.opted_in===true;
    host.setAttribute('aria-busy','false');
    host.innerHTML=`<div class="wallet-section-head"><div><h2>Birthday benefits</h2><p class="muted small">Your date of birth is used by Frenly to determine eligible birthday benefits. It is not shown to businesses, and this is separate from marketing.</p></div></div>
      <div class="row" style="margin-top:10px"><span class="pill">${optedIn?'Participating':'Not participating'}</span><span class="spacer"></span><button type="button" class="btn ghost sm" id="birthdayParticipationToggle">${optedIn?'Turn off':'Turn on'}</button></div>
      <p id="birthdayParticipationStatus" class="muted small" role="status" aria-live="polite" style="margin-top:8px"></p>`;
    const toggle=$('birthdayParticipationToggle');
    const birthdayParticipationAttemptId=crypto.randomUUID();
    toggle.onclick=async()=>{
      toggle.disabled=true;
      const {error:setError}=await sb.rpc('customer_set_birthday_participation',{p_opted_in:!optedIn,p_idempotency_key:birthdayParticipationAttemptId});
      if(!walletSectionStillCurrent(host,isWalletCurrent)||!toggle.isConnected)return;
      if(setError){toggle.disabled=false;const status=$('birthdayParticipationStatus');if(status)status.textContent='Birthday participation could not be updated. Please try again.';return;}
      // The participation state changes eligibility. Re-render the whole
      // business wallet so the actionable card is never left stale after an
      // opt-in or opt-out (the route/DOM guard above prevents late writes).
      renderCustomerWallet(businessSlug);
    };
  };
  await Promise.all([loadRewards(),loadActivity(),loadPackages(),loadMemberships(),loadAppointments(),loadBirthdayParticipation()]);
  if(!isWalletCurrent())return;
  if(customerFeatures.customer_notifications) renderCustomerNotificationPreferences(businessSlug,isWalletCurrent);
  if(customerFeatures.customer_in_app_inbox===true) renderCustomerInAppInbox(businessSlug,isWalletCurrent,actionableCard);
}

async function renderCustomerInAppInbox(businessSlug,isCurrent=()=>true,actionableCard=null){
  let host=$('customerInAppInbox');
  if(!host&&businessSlug===null){
    const body=$('walletBody');
    if(!body||!isCurrent()||!body.isConnected)return;
    body.insertAdjacentHTML('beforeend','<section class="card wallet-section" id="customerInAppInbox" aria-busy="true" tabindex="-1"><div class="wallet-skeleton"></div></section>');
    host=$('customerInAppInbox');
  }
  if(!walletSectionStillCurrent(host,isCurrent))return;
  const slot=$('customerInboxBellSlot');
  const slotCurrent=()=>!!slot&&slot.isConnected&&$('customerInboxBellSlot')===slot&&isCurrent();
  const global=businessSlug===null;
  const loyaltyUnit=actionableCard?.loyalty?.unit;
  const expiryReminderLabel=loyaltyUnit==='stamps'?'Stamps expiry reminders':loyaltyUnit==='points'?'Points expiry reminders':'Expiry reminders';
  let currentFilter='all',nextCursor=null,items=[],bell=null,refreshInbox;
  const topicLabels={
    value_expiry:expiryReminderLabel,reward_ready:'Reward ready reminders',
    visit_progress:'Visit progress reminders',birthday_benefit:'Birthday benefit reminders',
    booking_updates:'Booking update reminders'
  };
  const request=(name,args)=>sb.rpc(name,args);
  const refreshBell=async()=>{
    const {data,error}=await request(
      global?'customer_get_in_app_inbox_global_count':'customer_get_in_app_inbox_count',
      global?{}:{p_business_slug:businessSlug}
    );
    if(!walletSectionStillCurrent(host,isCurrent)||!slotCurrent())return null;
    if(error)return {error};
    const unread=Math.max(0,Number(data?.unread_count||0));
    slot.innerHTML=`<button type="button" class="customer-inbox-bell" id="customerInboxBell" aria-label="Open inbox" aria-controls="customerInAppInbox" title="${unread?`${unread} unread inbox item${unread===1?'':'s'}`:'Open inbox'}">${CUI.icon('bell',{size:19})}${unread?`<span class="customer-inbox-badge" aria-hidden="true">${unread>99?'99+':unread}</span>`:''}</button>`;
    const bell=$('customerInboxBell');
    if(bell)bell.onclick=()=>{if(!walletSectionStillCurrent(host,isCurrent))return;host.focus({preventScroll:true});host.scrollIntoView({behavior:'smooth',block:'start'});};
    return {unread,quiet:data?.quiet_hours_active===true};
  };
  const render=()=>{
    const status=[
      bell?.quiet?'Quiet hours are active. Inbox items are available without interrupting you.':'',
      items.some(item=>item?.state==='source_unavailable')?'Some programme updates are temporarily unavailable and cannot be opened.':''
    ].filter(Boolean).join(' ');
    let priorBusinessSlug='';
    const renderedItems=items.map(item=>{
      const state=String(item?.state||'read'),isResolved=state==='resolved',isUnavailable=state==='source_unavailable',business=item?.business||null;
      const routeSlug=global?business?.slug:businessSlug;
      const deadline=item?.deadline_at?`<p class="muted small" style="margin-top:4px">Relevant until ${esc(walletDate(item.deadline_at))}.</p>`:'';
      const businessHeading=global&&business?.slug!==priorBusinessSlug?`<h3 class="customer-inbox-group">${esc(business?.name||'Business programme')}</h3>`:'';
      if(global&&business?.slug)priorBusinessSlug=business.slug;
      const stateCopy=isResolved?'Resolved history':isUnavailable?'Programme temporarily unavailable':state==='unread'?'Unread':'Read';
      const openAction=item?.action_available===true&&!isResolved&&item?.route_key==='wallet_business'&&routeSlug?`<button type="button" class="btn ghost sm" data-inbox-open="${esc(item.event_id)}" data-route-key="wallet_business">Open programme</button>`:'';
      const markAction=!isResolved?`<button type="button" class="btn ghost sm" data-inbox-state="${esc(item.event_id)}" data-state="${state==='unread'?'read':'unread'}">Mark ${state==='unread'?'read':'unread'}</button><button type="button" class="btn ghost sm" data-inbox-state="${esc(item.event_id)}" data-state="dismiss">Dismiss</button>`:'';
      return `${businessHeading}<article class="customer-inbox-item ${esc(state)}"><div class="row"><div><b>${esc(item?.title||'Inbox update')}</b><p class="muted small" style="margin-top:3px">${esc(item?.body||'')}</p>${deadline}</div><span class="spacer"></span><span class="pill">${esc(stateCopy)}</span></div><div class="customer-inbox-actions">${openAction}${markAction}</div></article>`;
    }).join('');
    host.setAttribute('aria-busy','false');
    host.innerHTML=`<div class="wallet-section-head"><div><h2>${global?'My Frenly inbox':'Inbox'}</h2><p class="muted small">${global?'Updates grouped by your separate business programmes.':'Customer-safe updates from this business.'}</p></div><span class="spacer"></span><button type="button" class="btn ghost sm customer-inbox-filter" data-inbox-filter="all" aria-pressed="${currentFilter==='all'}">All</button><button type="button" class="btn ghost sm customer-inbox-filter" data-inbox-filter="unread" aria-pressed="${currentFilter==='unread'}">Unread</button></div>
      <p id="customerInboxStatus" class="muted small" role="status" aria-live="polite">${esc(status)}</p>
      <div id="customerInboxItems">${items.length?renderedItems:'<p class="muted small" style="padding:8px 0">No '+(currentFilter==='unread'?'unread ':'')+'inbox updates right now.</p>'}</div>
      ${nextCursor?'<button type="button" class="btn ghost sm" id="customerInboxMore" style="margin-top:12px">Load more</button>':''}
      ${global?'':`<div id="customerInAppInboxPreferences" style="margin-top:18px"></div>`}`;
    host.querySelectorAll('[data-inbox-filter]').forEach(button=>button.onclick=()=>{
      if(!walletSectionStillCurrent(host,isCurrent))return;currentFilter=button.dataset.inboxFilter||'all';load(null);
    });
    host.querySelectorAll('[data-inbox-open]').forEach(button=>button.onclick=async()=>{
      const item=items.find(entry=>entry?.event_id===button.dataset.inboxOpen);const slug=global?item?.business?.slug:businessSlug;
      if(!item||!slug||!walletSectionStillCurrent(host,isCurrent))return;
      button.disabled=true;await setState(item,'read');if(!isCurrent())return;nav('#/wallet/'+encodeURIComponent(slug));
    });
    host.querySelectorAll('[data-inbox-state]').forEach(button=>button.onclick=async()=>{
      const item=items.find(entry=>entry?.event_id===button.dataset.inboxState);if(!item)return;
      button.disabled=true;await setState(item,button.dataset.state);if(!walletSectionStillCurrent(host,isCurrent))return;load(null);
    });
    const more=$('customerInboxMore');if(more)more.onclick=()=>{more.disabled=true;load(nextCursor);};
    if(!global)renderPreferences();
  };
  const setState=async(item,operation)=>{
    const slug=global?item?.business?.slug:businessSlug;
    if(!slug)return;
    const {error}=await request('customer_set_in_app_inbox_state',{
      p_business_slug:slug,p_event_id:item.event_id,p_operation:operation,p_idempotency_key:crypto.randomUUID()
    });
    if(!walletSectionStillCurrent(host,isCurrent))return;
    const status=$('customerInboxStatus');
    if(error){if(status)status.textContent='That inbox item could not be updated. Please try again.';return;}
    if(status)status.textContent='Inbox updated.';CUI.announce('Inbox updated.');
    const refreshedBell=await refreshBell();
    if(refreshedBell?.error&&status)status.textContent='Inbox updated, but its unread count could not be refreshed.';
  };
  const renderRefreshUnavailable=()=>{
    if(!walletSectionStillCurrent(host,isCurrent))return;
    const offline=globalThis.navigator?.onLine===false;
    const heading=global?'My Frenly inbox needs a refresh':'Inbox needs a refresh';
    const message=offline
      ?'You appear to be offline. Reconnect, then retry to refresh your current programme updates.'
      :'We could not refresh your current programme updates. Programme actions are hidden until refresh succeeds.';
    items=[];nextCursor=null;bell=null;
    if(slotCurrent())slot.innerHTML='';
    host.setAttribute('aria-busy','false');
    host.innerHTML=`<div class="wallet-section-head"><div><h2>${heading}</h2><p class="muted small" role="status" aria-live="polite">${message}</p></div><span class="spacer"></span><button type="button" class="btn ghost sm" id="customerInboxSyncRetry">Retry inbox refresh</button></div>`;
    const retry=host.querySelector('#customerInboxSyncRetry');
    if(retry)retry.onclick=async()=>{if(!walletSectionStillCurrent(host,isCurrent))return;retry.disabled=true;await refreshInbox();};
  };
  const load=async(cursor=null)=>{
    const rpc=global?'customer_list_in_app_inbox_global':'customer_list_in_app_inbox';
    const args=global?{p_cursor:cursor||{limit:20,filter:currentFilter}}:{p_business_slug:businessSlug,p_cursor:cursor||{limit:20,filter:currentFilter}};
    const {data,error}=await request(rpc,args);
    if(!walletSectionStillCurrent(host,isCurrent))return;
    if(error){renderRefreshUnavailable();return;}
    const fresh=Array.isArray(data?.items)?data.items:[];items=cursor?[...items,...fresh]:fresh;nextCursor=data?.next_cursor||null;render();
  };
  refreshInbox=async()=>{
    if(!walletSectionStillCurrent(host,isCurrent))return;
    host.setAttribute('aria-busy','true');
    // A list is never loaded after a failed C46 sync. That prevents an old
    // actionable route from looking current when source availability is unknown.
    const {error}=await request(
      global?'customer_sync_in_app_inbox_global':'customer_sync_in_app_inbox',
      global?{p_idempotency_key:crypto.randomUUID()}:{p_business_slug:businessSlug,p_idempotency_key:crypto.randomUUID()}
    );
    if(!walletSectionStillCurrent(host,isCurrent))return;
    if(error){renderRefreshUnavailable();return;}
    const refreshedBell=await refreshBell();
    if(!walletSectionStillCurrent(host,isCurrent))return;
    if(!refreshedBell||refreshedBell.error){renderRefreshUnavailable();return;}
    bell=refreshedBell;
    await load(null);
  };
  const renderPreferences=async()=>{
    const preferenceHost=$('customerInAppInboxPreferences');if(!walletSectionStillCurrent(host,isCurrent)||!preferenceHost)return;
    const {data,error}=await request('customer_get_in_app_inbox_preferences',{p_business_slug:businessSlug});
    if(!walletSectionStillCurrent(host,isCurrent)||!preferenceHost.isConnected)return;
    if(error)return;
    const preferences=new Map((Array.isArray(data)?data:[]).map(item=>[item.topic,item]));
    const timezoneOptions='<datalist id="customerInboxIanaTimezones"><option value="Asia/Singapore"></option><option value="Asia/Kuala_Lumpur"></option><option value="Asia/Bangkok"></option><option value="Asia/Jakarta"></option><option value="Asia/Manila"></option><option value="Australia/Perth"></option><option value="Asia/Tokyo"></option><option value="Europe/London"></option><option value="America/Los_Angeles"></option></datalist>';
    const preferenceRows=Object.entries(topicLabels).map(([topic,label])=>{
      const preference=preferences.get(topic)||{};
      const start=String(preference.quiet_hours_start||'').slice(0,5),end=String(preference.quiet_hours_end||'').slice(0,5);
      const timezone=String(preference.quiet_hours_timezone||'Asia/Singapore').trim()||'Asia/Singapore';
      const timezoneHelpId=`customerInboxQuietTimezoneHelp-${topic}`;
      return `<fieldset style="margin-top:12px;padding:12px;border:1px solid var(--hair);border-radius:8px"><legend class="small" style="padding:0 4px">${esc(label)}</legend><label class="row" style="color:var(--ink);font-weight:500"><input type="checkbox" class="customerInboxPreference" style="width:auto" data-topic="${topic}" ${preference.opted_in===true?'checked':''}>Keep this reminder in my inbox</label><div class="customer-inbox-quiet"><label class="small">Quiet from<input class="customerInboxQuietStart" data-topic="${topic}" type="time" value="${esc(start)}"></label><label class="small">Quiet until<input class="customerInboxQuietEnd" data-topic="${topic}" type="time" value="${esc(end)}"></label><label class="small">Timezone<input class="customerInboxQuietTimezone" data-topic="${topic}" type="text" list="customerInboxIanaTimezones" value="${esc(timezone)}" spellcheck="false" autocapitalize="none" autocomplete="off" aria-describedby="${timezoneHelpId}"></label></div><p class="muted small" id="${timezoneHelpId}">Use an IANA timezone such as Asia/Singapore. It is checked when you save and only applies when both quiet-hour times are set.</p><button type="button" class="btn ghost sm customerInboxPreferenceSave" data-topic="${topic}" style="margin-top:8px">Save reminder</button></fieldset>`;
    }).join('');
    preferenceHost.innerHTML=`<h3 style="font-size:16px">Inbox reminders</h3><p class="muted small" style="margin-top:4px">Choose what this business can place in your inbox. Each reminder type has its own optional quiet hours. Inbox items remain available during quiet hours; these saved hours are retained for a future interruptive channel. Nothing changes until you select Save.</p>${timezoneOptions}${preferenceRows}`;
    preferenceHost.querySelectorAll('.customerInboxPreferenceSave').forEach(button=>button.onclick=async()=>{
      const topic=button.dataset.topic;const checkbox=preferenceHost.querySelector(`.customerInboxPreference[data-topic="${topic}"]`);const startInput=preferenceHost.querySelector(`.customerInboxQuietStart[data-topic="${topic}"]`);const endInput=preferenceHost.querySelector(`.customerInboxQuietEnd[data-topic="${topic}"]`);const timezoneInput=preferenceHost.querySelector(`.customerInboxQuietTimezone[data-topic="${topic}"]`);if(!checkbox||!startInput||!endInput||!timezoneInput)return;
      const start=startInput.value||null,end=endInput.value||null,timezone=timezoneInput.value.trim();if((start&&!end)||(!start&&end)){const status=$('customerInboxStatus');if(status)status.textContent='Set both quiet-hour times, or clear both.';return;}if(start&&!timezone){const status=$('customerInboxStatus');if(status)status.textContent='Enter an IANA timezone, such as Asia/Singapore, before saving quiet hours.';timezoneInput.focus();return;}
      button.disabled=true;const {error:setError}=await request('customer_set_in_app_inbox_preferences',{
        p_business_slug:businessSlug,p_topic:topic,p_opted_in:checkbox.checked,
        p_quiet_hours_timezone:start?timezone:null,p_quiet_hours_start:start,p_quiet_hours_end:end,p_idempotency_key:crypto.randomUUID()
      });
      if(!walletSectionStillCurrent(host,isCurrent)||!button.isConnected)return;
      button.disabled=false;const status=$('customerInboxStatus');if(setError){if(status)status.textContent='That reminder could not be saved. Please check the quiet hours and try again.';return;}
      preferences.set(topic,{opted_in:checkbox.checked,quiet_hours_timezone:start?timezone:null,quiet_hours_start:start,quiet_hours_end:end});if(status)status.textContent='Inbox reminder saved.';CUI.announce('Inbox reminder saved.');await refreshBell();
    });
  };
  await refreshInbox();
}

async function renderCustomerNotificationPreferences(businessSlug,isCurrent=()=>true){
  const host=$('customerNotificationPreferences');if(!walletSectionStillCurrent(host,isCurrent))return;
  const {data,error}=await sb.rpc('customer_get_notification_preferences',{p_business_slug:businessSlug});
  if(!walletSectionStillCurrent(host,isCurrent))return;
  if(error)return fail(error);
  const current=new Map((data||[]).map(x=>[`${x.channel}:${x.topic}`,!!x.opted_in]));
  const choices=[['in_app','booking_updates','Booking updates'],['in_app','loyalty_updates','Loyalty updates'],['email','marketing','Offers by email']];
  host.innerHTML=`<h2 style="margin-top:28px">Notifications</h2>${choices.map(([channel,topic,label])=>`<label class="row" style="margin-top:10px;color:var(--ink);font-weight:500">
    <input class="walletPref" type="checkbox" style="width:auto" data-channel="${channel}" data-topic="${topic}" ${current.get(`${channel}:${topic}`)?'checked':''}>${label}</label>`).join('')}`;
  document.querySelectorAll('.walletPref').forEach(input=>input.onchange=async()=>{
    input.disabled=true;
    const {error:setError}=await sb.rpc('customer_set_notification_preference',{
      p_business_slug:businessSlug,p_channel:input.dataset.channel,p_topic:input.dataset.topic,
      p_opted_in:input.checked,p_idempotency_key:crypto.randomUUID()});
    if(!walletSectionStillCurrent(host,isCurrent)||!input.isConnected)return;
    input.disabled=false;
    if(setError){input.checked=!input.checked;return fail(setError)}
    toast('Notification preference saved');
  });
}

/* ---------- auth ---------- */
function renderAuth(mode='in'){
  destroyMountedTurnstiles();
  if(mode==='forgot'){
    root.innerHTML=`<div class="center-wrap"><div class="auth-card card">
      <div class="logo" style="margin-bottom:6px">frenly<span>.</span></div>
      <h2 style="margin:14px 0 2px">Reset your password</h2>
      <p class="muted small" style="margin-top:6px">Enter your account email and we will send a secure reset link.</p>
      <label for="em">Email</label><input id="em" type="email" autocomplete="email" placeholder="you@business.com">
      <div id="autherr"></div>
      ${authChallengeHtml()}
      <div class="row" style="margin-top:18px"><button class="btn" id="resetRequest" disabled>Send reset link</button>
      <span class="spacer"></span><button class="btn ghost sm" id="backSignIn">Back to sign in</button></div>
      ${legalLinks()}</div></div>`;
    let authToken='',authControl=null;
    mountTurnstile(AUTH_TURNSTILE_SITE_KEY,{container:'authTurnstile',status:'authTurnstileStatus',
      retry:'authTurnstileRetry',action:'frenly_auth',
      onToken:(token)=>{authToken=token;$('resetRequest').disabled=!token}})
      .then(control=>authControl=control);
    $('backSignIn').onclick=()=>renderAuth('in');
    $('resetRequest').onclick=async()=>{
      const email=$('em').value.trim();
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        $('autherr').innerHTML='<div class="err">Enter a valid email address.</div>';return;
      }
      if(!authToken) return;
      $('resetRequest').disabled=true;
      const redirect=new URL(location.pathname,location.origin);
      redirect.searchParams.set('recovery','1');
      try{await sb.auth.resetPasswordForEmail(email,{redirectTo:redirect.toString(),captchaToken:authToken})}catch{}
      /* Turnstile tokens are single-use: clear and reset so a retry gets a fresh challenge. */
      authToken='';if(authControl)authControl.reset();
      $('autherr').innerHTML='<div class="err" style="background:#E7F6EE;color:var(--green)">If an account exists for that email, a reset link is on its way.</div>';
    };
    return;
  }
  root.innerHTML=`<div class="center-wrap"><div class="auth-card card">
    <div class="logo" style="margin-bottom:6px">frenly<span>.</span></div>
    <p class="muted" style="margin-bottom:8px">Loyalty & retention for every business — real rewards, not vanity points.</p>
    <h2 style="margin:14px 0 2px">${mode==='in'?'Sign in':'Create your account'}</h2>
    <label for="em">Email</label><input id="em" type="email" placeholder="you@business.com">
    <label for="pw">Password</label><input id="pw" type="password" placeholder="••••••••">
    <div id="autherr"></div>
    ${mode==='in'?'<div style="margin-top:9px;text-align:right"><button class="btn ghost sm" id="forgot" style="border:0;box-shadow:none;padding:4px">Forgot password?</button></div>':''}
    ${authChallengeHtml()}
    <div class="row" style="margin-top:18px">
      <button class="btn" id="go" disabled>${mode==='in'?'Sign in':'Sign up'}</button>
      <span class="spacer"></span>
      <button class="btn ghost sm" id="sw">${mode==='in'?'New here? Sign up':'Have an account? Sign in'}</button>
    </div>
    <button class="btn ghost" id="customerAuth" type="button" style="width:100%;margin-top:12px">${CUI.icon('customers',{size:18})}<span>I’m a customer</span></button>
    ${legalLinks()}</div></div>`;
  let authToken='',authControl=null;
  mountTurnstile(AUTH_TURNSTILE_SITE_KEY,{container:'authTurnstile',status:'authTurnstileStatus',
    retry:'authTurnstileRetry',action:'frenly_auth',
    onToken:(token)=>{authToken=token;$('go').disabled=!token}})
    .then(control=>authControl=control);
  $('sw').onclick=()=>renderAuth(mode==='in'?'up':'in');
  $('customerAuth').onclick=()=>nav('#/customer');
  if($('forgot')) $('forgot').onclick=()=>renderAuth('forgot');
  $('go').onclick=async()=>{
    const email=$('em').value.trim(),password=$('pw').value;
    if(!authToken) return;
    $('go').disabled=true;
    /* Tokens are single-use: consume, then reset the widget for any follow-up attempt. */
    const captchaToken=authToken;authToken='';
    try{
      if(mode==='up'){
        const {data,error}=await sb.auth.signUp({email,password,options:{captchaToken}});
        if(error) throw error;
        if(!data.session){
          if(authControl)authControl.reset();
          $('autherr').innerHTML='<div class="err">Check your email to confirm your account, then sign in.</div>';return}
      }else{
        const {error}=await sb.auth.signInWithPassword({email,password,options:{captchaToken}});
        if(error) throw error;
      }
      resetClientSessionState({preserveInvitation:true});route();
    }catch(e){
      if(authControl)authControl.reset();
      $('autherr').innerHTML=`<div class="err">${esc(e.message)}</div>`;
    }
  };
}

function validNewPassword(password){
  return password.length>=12 && /[a-z]/.test(password) && /[A-Z]/.test(password)
    && /[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password);
}
function renderPasswordUpdate(){
  root.innerHTML=`<div class="center-wrap"><div class="auth-card card">
    <div class="logo" style="margin-bottom:6px">frenly<span>.</span></div>
    <h2 style="margin:14px 0 2px">Choose a new password</h2>
    <p class="muted small" style="margin-top:6px">Use at least 12 characters with upper and lowercase letters, a number and a symbol.</p>
    <label for="newPw">New password</label><input id="newPw" type="password" autocomplete="new-password">
    <label for="confirmPw">Confirm new password</label><input id="confirmPw" type="password" autocomplete="new-password">
    <div id="autherr"></div><button class="btn" id="savePw" style="width:100%;margin-top:18px">Update password</button>
    ${legalLinks()}</div></div>`;
  $('savePw').onclick=async()=>{
    const password=$('newPw').value;
    if(!validNewPassword(password)){
      $('autherr').innerHTML='<div class="err">Use at least 12 characters with upper and lowercase letters, a number and a symbol.</div>';return;
    }
    if(password!==$('confirmPw').value){$('autherr').innerHTML='<div class="err">Passwords do not match.</div>';return}
    $('savePw').disabled=true;
    const {error}=await sb.auth.updateUser({password});
    if(error){$('autherr').innerHTML='<div class="err">This reset link is invalid or expired. Request a new one.</div>';$('savePw').disabled=false;return}
    await sb.auth.signOut();passwordRecoveryActive=false;resetClientSessionState();
    history.replaceState(null,'',location.pathname+'#/');
    renderAuth('in');
    $('autherr').innerHTML='<div class="err" style="background:#E7F6EE;color:var(--green)">Password updated. Sign in with your new password.</div>';
  };

/* Parse pasted/file text into array-of-arrays. Auto-detects tab (Excel paste) vs comma (CSV),
   honours quoted fields + embedded newlines. */
function parseDelimited(text){
  const head=(text.split(/\r?\n/)[0]||'');
  const delim=(head.split('\t').length>head.split(',').length)?'\t':',';
  const rows=[];let cur=[''],q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur[cur.length-1]+='"';i++} else q=false } else cur[cur.length-1]+=ch; }
    else if(ch==='"')q=true;
    else if(ch===delim)cur.push('');
    else if(ch==='\n'||ch==='\r'){ if(ch==='\r'&&text[i+1]==='\n')i++; if(cur.length>1||cur[0]!==''){rows.push(cur);cur=['']} }
    else cur[cur.length-1]+=ch;
  }
  if(cur.length>1||cur[0]!=='')rows.push(cur);
  return rows;
}
/* rows(array-of-arrays) + config → {recs:[{payload,mapped}], skipped, total, missing} */
function mapRows(rows,cfg){
  if(!rows||rows.length<2) return {recs:[],skipped:0,total:0,missing:null};
  const hdr=rows[0].map(h=>String(h||'').trim().toLowerCase());
  const idx={};let missingReq=null;
  for(const f of cfg.fields){
    let i=hdr.findIndex(h=>f.aliases.includes(h));
    if(i<0) i=hdr.findIndex(h=>h&&f.aliases.some(a=>h.includes(a)));
    idx[f.key]=i;
    if(f.required&&i<0) missingReq=f.aliases[0];
  }
  if(missingReq) return {recs:[],skipped:0,total:rows.length-1,missing:missingReq};
  const recs=[];let skipped=0;
  for(const r of rows.slice(1)){
    if(r.every(c=>!String(c||'').trim())) continue; // blank line
    const mapped={};let ok=true;
    for(const f of cfg.fields){
      const i=idx[f.key];let raw=i>=0?String(r[i]??'').trim():'';
      let val=raw;
      if(f.money) val=raw?Math.round(parseFloat(raw.replace(/[^0-9.\-]/g,''))*100):0;
      else if(f.int) val=raw?parseInt(raw.replace(/[^0-9\-]/g,'')):(f.def??null);
      else if(f.transform) val=raw?f.transform(raw):null;
      else val=raw||null;
      if(f.required&&(!val||String(val).length<2)){ok=false;break}
      if(val!==null&&val!==undefined&&val!=='') mapped[f.key]=val;
      else if(f.def!==undefined) mapped[f.key]=f.def;
    }
    if(!ok){skipped++;continue}
    recs.push({payload:cfg.build({...mapped}),mapped});
  }
  return {recs,skipped,total:rows.length-1,missing:null};
}
async function runImport(recs,entity,idempotencyKey,onProgress){
  if(onProgress) onProgress(0,recs.length,'Validating');
  const {data:staged,error:stageError}=await sb.rpc('stage_import_rows',{
    p_business:S.biz.id,p_entity:entity,p_rows:recs.map(r=>r.mapped),
    p_idempotency_key:idempotencyKey});
  if(stageError) return {inserted:0,failed:recs.length,errs:[stageError.message],blocked:true};
  const rowErrors=(staged.errors||[]).map(e=>`Row ${e.row_number}: ${(e.errors||[]).join(', ')}`);
  if(staged.invalid>0) return {inserted:0,failed:staged.invalid,errs:rowErrors,blocked:true};
  if(onProgress) onProgress(recs.length,recs.length,'Saving');
  const {data:done,error:commitError}=await sb.rpc('commit_import_job',{p_job:staged.job_id});
  if(commitError) return {inserted:0,failed:recs.length,errs:[commitError.message],blocked:true};
  return {inserted:done.imported,failed:0,errs:[],blocked:false};
}

    if(!parsed.recs.length){R.innerHTML=`<div class="err">No valid rows found${parsed.skipped?` (${parsed.skipped} skipped — missing a name)`:''}.</div>`;return}
    const cols=cfg.fields.filter(f=>!f.stripField).map(f=>f.key);
    const show=parsed.recs.slice(0,4);
    R.innerHTML=`<div class="imp-prev"><table><tr>${cols.map(c=>`<th>${esc(c.replace('_cents','').replace('_',' '))}</th>`).join('')}</tr>

      <p class="small muted" style="margin-top:8px"><b>${parsed.recs.length}</b> ready to import${parsed.skipped?` · ${parsed.skipped} skipped (no name)`:''}. Showing first ${show.length}.</p>

function wireGlobalActions(){
  const input=$('globalSearch');
  if(input){
    /* Route the query into an EXISTING lookup — a phone-shaped term to Quick earn's phone lookup,
       otherwise a name to the Customers search — so no new database query is introduced. When the
       target route is already open, re-run route() directly (setting the hash to its current value
       fires no hashchange). */
    const goTo=target=>{if(location.hash===target){route()}else{nav(target)}};
    const run=()=>{
      const q=input.value.trim();
      if(!q)return;
      const digits=q.replace(/\D/g,'');
      const looksPhone=digits.length>=4&&/^[+\s()\-\d]+$/.test(q);
      input.value='';
      if(looksPhone&&canReadModule('till')){pendingTillPhone=digits;goTo('#/till');return}
      if(canReadModule('clients')){pendingCustomerSearch=q;goTo('#/clients');return}
      if(canReadModule('till')){pendingTillPhone=digits;goTo('#/till')}
    };
    input.onkeydown=e=>{
      if(e.key==='Enter'){e.preventDefault();run()}
      else if(e.key==='Escape'){e.preventDefault();input.value='';input.blur()}
    };
    const go=$('globalSearchGo');if(go)go.onclick=run;
  }
  const qe=$('globalQuickEarn');if(qe)qe.onclick=()=>nav('#/till');
  const na=$('globalNewAppt');if(na)na.onclick=()=>nav('#/appointments');
}

/* Opening/closing the profile menu must NOT touch #main or #navwrap — it used to call
   renderShell(page), which also re-invokes the current page's render function (full
   Supabase refetch, chart re-animation, any custom date range reset). This widget now
   re-renders only itself. */
function wireProfile(page){
  $('profWho').onclick=(e)=>{e.stopPropagation();profileOpen=!profileOpen;if(profileOpen){bellOpen=false;renderBell(page);}renderProfile(page);};
  if(profileOpen){
    const menu=$('profmenu');
    menu.onkeydown=e=>{if(e.key==='Escape'){e.preventDefault();profileOpen=false;renderProfile(page);$('profWho')?.focus()}};
    $('pmSignout').onclick=async(e)=>{e.preventDefault();killChannels();await sb.auth.signOut();resetClientSessionState();nav('#/')};
    $('pmSetup').onclick=()=>{profileOpen=false};
    const pmS=$('pmSettings');if(pmS) pmS.onclick=()=>{profileOpen=false};
    const pmP=$('pmPlatform');if(pmP) pmP.onclick=()=>{profileOpen=false};
    const pmW=$('pmWallet');if(pmW) pmW.onclick=()=>{profileOpen=false};
    /* click-away to dismiss — expected of a native popover, and without it the menu
       could only be closed by re-clicking the chip. One-shot listener, re-armed on
       each open, so it can't stack up across renders. */
    setTimeout(()=>document.addEventListener('click',function away(ev){
      const w=$('profwrap');
      if(w&&!w.contains(ev.target)){profileOpen=false;document.removeEventListener('click',away);renderProfile(page);}
      else if(!w){document.removeEventListener('click',away);}
    }),0);
  }
}
function renderProfile(page){
  const wrap=$('profwrap');
  if(!wrap) return;
  wrap.outerHTML=profileHtml();
  wireProfile(page);
}

/* ---------- realtime notifications (bell, left of the profile chip) ----------
   One realtime channel per signed-in session, built once against the current S.biz and
   reused across every route change (route() -> renderShell() -> initNotifications() runs
   on every navigation, but ensureRealtimeChannel() is a no-op once a channel for this
   business already exists — tearing it down and rebuilding on every route change would be
   wasteful and could miss events landing in the gap). killChannels() is the only thing that
   removes it, called on sign-out (mirrors killCharts()). */
function timeAgo(iso){
  if(!iso) return '';
  const s=Math.max(0,(Date.now()-new Date(iso).getTime())/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
/* Every notification kind we currently emit routes to the same place — booking requests,
   waitlist and change-request activity are all triaged from the Bookings page. Kept as an
   explicit map (not a blanket default) so a future new kind is a deliberate decision, not
   an accident. */
const NOTIF_ROUTE={booking_new:'#/bookings',booking_waitlisted:'#/bookings',change_request:'#/bookings',
  booking_expired:'#/bookings',waitlist_ready:'#/bookings'};
async function loadNotifications(){
  const {data,error}=await sb.rpc('get_notifications',{p_business:S.biz.id,p_limit:30});
  if(error){notifError=error.message||'Could not load notifications';return}
  notifError=null;notifLoaded=true;notifState={unread:data.unread||0,items:data.items||[]};
}
function bellHtml(){
  const n=notifState.unread||0;

      <button type="button" class="bellbtn" id="bellBtn" title="Notifications" aria-label="Notifications${n?`, ${n} unread`:''}" aria-haspopup="true" aria-expanded="${bellOpen}">${CUI.icon('bell',{size:19})}${n>0?`<span class="dot" aria-hidden="true">${n>99?'99+':n}</span>`:''}</button>
      ${bellOpen?notifMenuHtml():''}

}
function notifMenuHtml(){

      ${notifState.unread>0?`<button class="btn ghost sm" id="markAll" style="padding:4px 10px;font-size:11.5px">Mark all read</button>`:''}</div>
    ${notifError?`<div class="err" style="margin:0 6px 8px">${esc(notifError)}</div>`:''}
    ${!notifLoaded?`<div class="notif-empty">Loading…</div>`
      :items.length?items.map(it=>`<button type="button" class="notif-item ${it.read_at?'':'unread'}" data-nid="${esc(it.id)}" data-ref="${esc(it.kind)}">
          <div class="t">${esc(it.title||'')}</div>
          ${it.body?`<div class="b">${esc(it.body)}</div>`:''}
          <div class="ago">${timeAgo(it.created_at)}</div></button>`).join('')
      :`<div class="notif-empty">No notifications yet.</div>`}
    <hr style="border:none;border-top:1px solid var(--hair);margin:6px 0">

        <button type="button" class="tglsw ${muteAlerts?'':'on'}" id="notifToggle" aria-label="Toggle pop-up alerts for this session" aria-pressed="${!muteAlerts}"></button></div>`}
    </div>`;
}
function wireBell(page){
  $('bellBtn').onclick=(e)=>{e.stopPropagation();bellOpen=!bellOpen;if(bellOpen){profileOpen=false;renderProfile(page);}renderBell(page);};
  if(!bellOpen) return;
  const markAll=$('markAll');
  if(markAll) markAll.onclick=async(e)=>{
    e.stopPropagation();markAll.disabled=true;
    const {error}=await sb.rpc('mark_all_notifications_read',{p_business:S.biz.id});
    if(error){fail(error);markAll.disabled=false;return}
    notifState.items=(notifState.items||[]).map(it=>({...it,read_at:it.read_at||new Date().toISOString()}));
    notifState.unread=0;
    renderBell(page);
  };
  document.querySelectorAll('.notif-item').forEach(el=>el.onclick=async()=>{
    const id=el.dataset.nid,kind=el.dataset.ref;
    const {error}=await sb.rpc('mark_notification_read',{p_id:id});
    if(!error){
      const item=(notifState.items||[]).find(i=>i.id===id);
      if(item&&!item.read_at){item.read_at=new Date().toISOString();notifState.unread=Math.max(0,notifState.unread-1);}
    }
    bellOpen=false;
    nav(NOTIF_ROUTE[kind]||'#/bookings');
  });
  const tgl=$('notifToggle');
  if(tgl) tgl.onclick=async(e)=>{
    e.stopPropagation();
    if(S.myRole==='owner'){
      const to=!S.biz.notify_new_bookings;
      tgl.style.pointerEvents='none';
      const {error}=await sb.rpc('set_booking_settings',{p_business:S.biz.id,
        p_hold_minutes:S.biz.booking_hold_minutes,p_overflow:S.biz.booking_overflow,
        p_notify:to,p_auto_confirm:S.biz.booking_auto_confirm});
      if(error){fail(error);tgl.style.pointerEvents='';return}
      S.biz.notify_new_bookings=to;
    }else{
      muteAlerts=!muteAlerts;
    }
    renderBell(page);
  };
  /* click-away, same one-shot pattern as the profile menu */
  setTimeout(()=>document.addEventListener('click',function away(ev){
    const w=$('bellwrap');
    if(w&&!w.contains(ev.target)){bellOpen=false;document.removeEventListener('click',away);renderBell(page);}
    else if(!w){document.removeEventListener('click',away);}
  }),0);
}
function renderBell(page){
  const wrap=$('bellwrap');
  if(!wrap) return;
  wrap.outerHTML=bellHtml();
  wireBell(page);
}
/* Re-runs the currently-open page's own render fn (no hash change) so new booking activity
   shows up without the owner having to manually refresh — the #1 complaint this feature set
   is meant to fix. Only wired for the pages where booking/waitlist activity is visible. */
function autoRefreshIfRelevant(){
  const key=(currentPage&&currentPage[0])||'';
  const P={bookings:bookingsPage,appointments:appointmentsPage,waitlist:waitlistPage};
  if(P[key]) P[key](currentPage[1]);
}
function ensureRealtimeChannel(){
  if(rtChannel&&rtChannelBizId===S.biz.id) return; // already live for this business — reuse it
  if(rtChannel){ try{sb.removeChannel(rtChannel);}catch(e){} rtChannel=null; }
  rtChannel=sb.channel('rt-'+S.biz.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:'business_id=eq.'+S.biz.id},payload=>{
      notifState.unread=(notifState.unread||0)+1;
      notifState.items=[payload.new,...(notifState.items||[])].slice(0,30);
      renderBell(currentPage);
      if(S.biz.notify_new_bookings&&!muteAlerts) toast('🔔 '+(payload.new?.title||'New notification'));
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'booking_requests',filter:'business_id=eq.'+S.biz.id},()=>autoRefreshIfRelevant())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'appointments',filter:'business_id=eq.'+S.biz.id},()=>autoRefreshIfRelevant())
    .subscribe();
  rtChannelBizId=S.biz.id;
}
function killChannels(){
  if(rtChannel){ try{sb.removeChannel(rtChannel);}catch(e){} }
  rtChannel=null;rtChannelBizId=null;
}
async function initNotifications(){

/* ---------- v40 staff reversal workflow ----------
   All writes stay behind reverse_sale / reverse_loyalty_redemption. The read model is a
   bounded SECURITY DEFINER RPC because the immutable provenance tables are deliberately
   not browser-readable. Keys survive retries and page re-renders for this tab session. */
const reversalKeys=new Map(),reversalItems=new Map();
const reversalItemKey=(kind,id)=>`${kind}:${id}`;
async function loadReversalWorkflows(clientId=null,limit=100,mode='all'){
  const {data,error}=await sb.rpc('staff_get_reversal_workflows',{
    p_business:S.biz.id,p_client:clientId,p_limit:limit,p_mode:mode});
  if(error){
    if(error.code==='42501'||/permission|authorization|staff required/i.test(error.message||''))return null;
    throw error;
  }
  [...(data?.sales||[])].forEach(x=>reversalItems.set(reversalItemKey('sale',x.id),x));
  [...(data?.redemptions||[])].forEach(x=>reversalItems.set(reversalItemKey('redemption',x.id),x));
  return data||{sales:[],redemptions:[]};
}
function reversalResultHtml(kind,result){
  if(!result)return '';
  if(kind==='sale'&&result.no_money_refund)return `<div class="imp-note"><b>Session restored.</b> No payment refund was created. ${Number(result.restored_sessions||1)} package session restored.</div>`;
  if(kind==='sale')return `<div class="imp-note"><b>Reversal completed.</b> ${money(Number(result.reversed_cents||0))} reversed · ${money(Number(result.refunded_payment_cents||0))} refunded${result.replayed?' · exact replay verified':''}.</div>`;
  return `<div class="imp-note"><b>Redemption reversed.</b> ${Number(result.restored_points||0)} points restored · ${money(Number(result.reversed_credit_cents||0))} credit compensated${result.replayed?' · exact replay verified':''}.</div>`;
}
function openReversalDialog(kind,item,onDone){
  if(!item?.can_reverse)return toast(item?.refusal_reason||'This item cannot be reversed safely');
  const keyId=reversalItemKey(kind,item.id);
  if(!reversalKeys.has(keyId))reversalKeys.set(keyId,crypto.randomUUID());
  const packageNote=kind==='sale'&&item.is_package_session
    ?'<div class="imp-note"><b>Package session only.</b> This restores one session. No payment refund occurs.</div>':'';
  const loyaltyNote=kind==='redemption'
    ?`<div class="imp-note"><b>Exact compensation only.</b> Frenly checks the original points entry, every FEFO batch drain, configuration version, and whether the ${money(Number(item.credit_cents||0))} reward credit may have been spent. If any proof is incomplete, it refuses the reversal.</div>`:'';
  document.body.insertAdjacentHTML('beforeend',`<div class="modal" id="reversalModal" role="dialog" aria-modal="true" aria-labelledby="revTitle" tabindex="-1"><div class="modal-card" style="max-width:560px">
    <div class="row"><div><h2 id="revTitle">${kind==='sale'?'Reverse sale':'Reverse redemption'}</h2><p class="muted small">${kind==='sale'?`Sale ${esc(item.id)} · ${money(Number(item.amount_cents||0))}`:`${esc(item.reward_name||'Reward')} · ${Number(item.points_spent||0)} points`}</p></div><span class="spacer"></span><button class="btn ghost sm" id="revClose">Close</button></div>
    ${packageNote}${loyaltyNote}
    <label for="revReason">Reason (required, at least 10 characters)</label><textarea id="revReason" rows="3" placeholder="What happened and who approved this correction?"></textarea>
    ${kind==='sale'?'<label for="revReference">Reference (required)</label><input id="revReference" placeholder="Receipt, case, or manager reference">':''}
    <label style="display:flex;gap:9px;align-items:flex-start;color:var(--ink2)"><input id="revConfirm" type="checkbox" style="width:auto;margin-top:2px">I checked the original record and understand this creates append-only compensating entries.</label>
    <div id="revOutcome"></div><div class="row" style="margin-top:16px"><button class="btn danger" id="revSubmit" disabled>Confirm reversal</button><button class="btn ghost sm" id="revCancel">Cancel</button></div>
  </div></div>`);
  let deactivateDialog;
  const close=()=>{if(deactivateDialog)deactivateDialog();else $('reversalModal')?.remove();if(onDone)onDone()};
  deactivateDialog=CUI.activateDialog($('reversalModal'),{onClose:close,initialFocus:'#revReason'});
  $('revClose').onclick=$('revCancel').onclick=close;
  $('revConfirm').onchange=()=>{$('revSubmit').disabled=!$('revConfirm').checked};
  async function invoke(isReplay=false){
    const reason=$('revReason').value.trim();
    if(reason.length<10)return toast('Write a reason of at least 10 characters');
    const btn=$('revSubmit');btn.disabled=true;btn.textContent=isReplay?'Verifying…':'Reversing…';
    const args=kind==='sale'
      ?{p_business:S.biz.id,p_sale:item.id,p_reason:reason,p_idempotency_key:reversalKeys.get(keyId),p_reference:$('revReference').value.trim(),p_restock_policy:'none'}
      :{p_business:S.biz.id,p_redemption:item.id,p_reason:reason,p_idempotency_key:reversalKeys.get(keyId)};
    if(kind==='sale'&&!args.p_reference){btn.disabled=false;btn.textContent='Confirm reversal';return toast('Add a receipt, case, or manager reference')}
    if(!isReplay&&!confirm(`Confirm ${kind==='sale'?'sale':'loyalty redemption'} reversal? This keeps the original and adds compensating records.`)){
      btn.disabled=false;btn.textContent='Confirm reversal';return;
    }
    const {data,error}=await sb.rpc(kind==='sale'?'reverse_sale':'reverse_loyalty_redemption',args);
    if(error){
      const conflict=error.code==='23505'||/conflict|another immutable request|already reversed/i.test(error.message||'');
      $('revOutcome').innerHTML=`<div class="err"><b>${conflict?'Changed-request conflict':'Reversal refused'}.</b> ${esc(error.message||'The database could not prove a safe compensation.')}</div>`;
      btn.disabled=false;btn.textContent='Retry same request';return;
    }
    $('revOutcome').innerHTML=reversalResultHtml(kind,data||{});
    btn.disabled=true;btn.textContent='Completed';
    $('revCancel').textContent='Done';
    if(!$('revReplay')){
      $('revCancel').insertAdjacentHTML('beforebegin','<button class="btn ghost sm" id="revReplay">Verify exact replay</button>');
      $('revReplay').onclick=()=>invoke(true);
    }
    toast(data?.replayed?'Exact replay returned the completed result':'Reversal completed');
  }
  $('revSubmit').onclick=()=>invoke(false);
}
function bindReversalButtons(onDone){
  document.querySelectorAll('[data-reverse-kind]').forEach(btn=>btn.onclick=()=>{
    const item=reversalItems.get(reversalItemKey(btn.dataset.reverseKind,btn.dataset.reverseId));
    openReversalDialog(btn.dataset.reverseKind,item,onDone);
  });
}

/* ---------- branch filter (shared: dashboard, daily report, P&L, reports) ----------
   One picker implementation reused by all four analytics pages. Owner/manager ("admin"
   role_class) get every branch plus "All branches (consolidated)"; an employee only ever
   sees branches they're actually assigned to via staff_branches — consolidated is never
   offered to them, matching app.can_see_branch()'s server-side rule (p_branch=null is
   ALWAYS denied for a non-admin, even one assigned to every branch individually). The
   branches table itself is readable business-wide by any staff member (v17 deliberately
   left it unscoped so the picker has names to show) — the allow-list built here is what
   the *picker offers*, not the security boundary; the real boundary is server-side
   RLS/RPC, which every consumer of this filter still applies on its own query. */
async function refreshBranchFilter(onChange,isCurrent=()=>true){
  const wrap=$('branchWrap');
  if(!wrap){ onChange(); return; }
  const isAdmin=S.myRole==='owner'||S.myRole==='manager';
  let branches=[];
  try{
    if(isAdmin){
      const {data,error}=await sb.from('branches').select('id,name,active').eq('business_id',S.biz.id).order('name');
      if(error) throw error;
      branches=data||[];
    }else{
      const {data:me}=await sb.from('staff').select('id').eq('business_id',S.biz.id).eq('user_id',S.user.id).limit(1);
      if(me&&me.length){
        const {data,error}=await sb.from('staff_branches').select('branches(id,name,active)').eq('business_id',S.biz.id).eq('staff_id',me[0].id);
        if(error) throw error;
        branches=(data||[]).map(r=>r.branches).filter(Boolean).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
      }
    }
  }catch(e){if(isCurrent()&&wrap.isConnected&&$('branchWrap')===wrap)console.error(e)}
  if(!isCurrent()||!wrap.isConnected||$('branchWrap')!==wrap)return;
  if(!isAdmin&&(!selectedBranchId||!branches.some(b=>b.id===selectedBranchId))){
    /* Employees can't request consolidated (the server raises branch_visibility on
       p_branch=null for them) — default to their first assigned branch so the page loads
       clean instead of surfacing that error on first paint. */
    selectedBranchId=branches.length?branches[0].id:null;
  }
  wrap.innerHTML=(branches.length||isAdmin)
    ? `<select id="branchSel" class="qbtn" aria-label="Business branch" style="padding-right:22px">
        ${isAdmin?`<option value="">All branches (consolidated)</option>`:''}
        ${branches.map(b=>`<option value="${b.id}">${esc(b.name)}${b.active===false?' (inactive)':''}</option>`).join('')}
      </select>`
    : `<span class="muted small">No branch assigned — ask the owner</span>`;
  const sel=wrap.querySelector('#branchSel');
  if(sel){
    sel.value=selectedBranchId||'';
    sel.onchange=()=>{selectedBranchId=sel.value||null;onChange()};
  }
  onChange();
}

    charts.innerHTML=`
      <div class="card"><b>Busiest days</b><p class="muted small">Visits by day of week</p><div class="chart-frame"><canvas id="c1"></canvas></div></div>
      <div class="card"><b>Revenue over time</b><p class="muted small">Daily total in range</p><div class="chart-frame"><canvas id="c2"></canvas></div></div>
      <div class="card"><b>Customer gender</b><p class="muted small">All customers on file</p><div class="chart-frame"><canvas id="c3"></canvas></div></div>
      <div class="card"><b>Age groups</b><p class="muted small">From birth dates on file</p><div class="chart-frame"><canvas id="c4"></canvas></div></div>`;
    const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const revenueDays=d.revenue_by_day||[],dk=revenueDays.map(x=>x.day);
    const g={female:0,male:0,other:0,unknown:0,...(d.gender_counts||{})};
    const ac=d.age_counts||{};
    const ages={'<25':ac.under_25||0,'25–34':ac.age_25_34||0,'35–44':ac.age_35_44||0,
      '45–54':ac.age_45_54||0,'55+':ac.age_55_plus||0,'—':ac.unknown||0};
    const C=(id,cfg)=>{if(isCurrent()){const canvas=dashboardRoot.querySelector('#'+id);if(canvas)S.charts.push(new Chart(canvas,cfg))}};
    const coral='#FF6B5E',amber='#FFB86B',ink='#1C1A22';
    C('c1',{type:'bar',data:{labels:days,datasets:[{data:wd,backgroundColor:days.map((_,i)=>wd[i]===Math.max(...wd)&&wd[i]>0?coral:amber),borderRadius:8}]},options:{plugins:{legend:{display:false}}}});
    C('c2',{type:'line',data:{labels:dk,datasets:[{data:revenueDays.map(x=>x.amount_cents/100),borderColor:coral,backgroundColor:'rgba(255,107,94,.12)',fill:true,tension:.35}]},options:{plugins:{legend:{display:false}}}});
    C('c3',{type:'doughnut',data:{labels:['Female','Male','Other','Not set'],datasets:[{data:[g.female,g.male,g.other,g.unknown],backgroundColor:[coral,amber,'#8B7BC7','#E8E4DD']}]},options:{plugins:{legend:{position:'bottom'}}}});
    C('c4',{type:'bar',data:{labels:Object.keys(ages),datasets:[{data:Object.values(ages),backgroundColor:amber,borderRadius:8}]},options:{plugins:{legend:{display:false}}}});
  }
  refreshBranchFilter(load,isDashboardCurrent);
}

        <button class="btn ghost sm" id="clNext" ${clientPage+1>=pages?'disabled':''}>Next</button></div>`;
