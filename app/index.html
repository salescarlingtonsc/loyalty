<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frenly — Loyalty & retention for every business</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F5F1; --card:#FFFFFF; --ink:#1C1A22; --muted:#75717E;
  --line:#E8E4DD; --coral:#FF6B5E; --amber:#FFB86B; --green:#2FA36B;
  --grad:linear-gradient(100deg,#FF6B5E,#FFB86B);
  --r:14px; --shadow:0 1px 3px rgba(28,26,34,.06),0 8px 24px rgba(28,26,34,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:14.5px;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-.01em}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;font-size:14px}
input,select,textarea{font-family:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid rgba(255,107,94,.35);border-color:var(--coral)}
label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:14px 0 6px}
.btn{background:var(--grad);color:#fff;font-weight:600;padding:11px 20px;border-radius:100px;transition:transform .15s, box-shadow .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(255,107,94,.35)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.sm{padding:7px 14px;font-size:13px}
.btn.danger{background:#fff;color:#C0392B;border:1px solid #F0C4BE}
.btn[disabled]{opacity:.5;pointer-events:none}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:22px}
.grid{display:grid;gap:16px}
.muted{color:var(--muted)} .small{font-size:12.5px}
.pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:600}
.pill.on{background:#E7F6EE;color:var(--green)} .pill.off{background:#F3F1EC;color:var(--muted)}
.pill.new{background:#FFF1E8;color:#D06A2E} .pill.ok{background:#E7F6EE;color:var(--green)} .pill.no{background:#FBEAE7;color:#C0392B}
table{width:100%;border-collapse:collapse}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.click{cursor:pointer} tr.click:hover td{background:#FBFAF7}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .big{font-size:34px;margin-bottom:10px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:100px;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:99;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.err{background:#FBEAE7;color:#C0392B;padding:10px 14px;border-radius:10px;font-size:13px;margin-top:12px}
/* auth + onboard */
.center-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:420px;max-width:100%}
.logo{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:600}
.logo span{color:var(--coral)}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:8px}
.ind{border:1.5px solid var(--line);border-radius:12px;padding:14px;text-align:center;cursor:pointer;background:#fff;transition:border-color .15s}
.ind:hover{border-color:var(--amber)}
.ind.sel{border-color:var(--coral);background:#FFF7F0}
.ind .em{font-size:22px;display:block;margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{background:#F3F1EC;border-radius:100px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted)}
.chip.on{background:#FFF1E8;color:#D06A2E}
/* shell */
.shell{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
.side{background:#141218;color:#CFCAD6;padding:22px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side .logo{color:#fff;padding:0 10px 18px}
.nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:14px;margin-bottom:2px;color:#B9B3C4}
.nav a:hover{background:#201d27;color:#fff}
.nav a.act{background:var(--grad);color:#fff;font-weight:600}
.side .foot{margin-top:auto;padding:10px;font-size:12.5px;color:#8A8494}
.main{padding:28px 34px;max-width:1200px;width:100%}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:1.7rem}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.kpi .v{font-family:'Fraunces',serif;font-size:1.9rem;margin-top:2px}
.kpi .l{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.charts .card{min-height:280px}
.range{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.range input{width:auto}
.qbtn{background:#fff;border:1px solid var(--line);border-radius:100px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--muted)}
.qbtn.act{background:var(--ink);color:#fff;border-color:var(--ink)}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row{display:flex;gap:10px;align-items:center}
.spacer{flex:1}
@media(max-width:960px){.shell{grid-template-columns:1fr}.side{position:static;height:auto;flex-direction:row;align-items:center;overflow-x:auto}.side .foot,.side .logo{display:none}.nav{display:flex}.charts,.split{grid-template-columns:1fr}.main{padding:18px}}
/* portal */
.portal{max-width:640px;margin:0 auto;padding:40px 20px}
.portal .head{text-align:center;margin-bottom:26px}
.svc{display:flex;justify-content:space-between;padding:13px 16px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;background:#fff}
.svc.sel{border-color:var(--coral);background:#FFF7F0}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script>
/* ============ Frenly app ============ */
const SB_URL='https://kyzovonwnscrzmkvocid.supabase.co';
const SB_KEY='sb_publishable_hOMgvuulHY0iSs7nmbqt3Q_RD0df_p7';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

const INDUSTRIES={
  fnb:{em:'🍜',label:'F&B / Café',mods:['dashboard','clients','sales','bookings','loyalty','retention','referrals']},
  salon:{em:'💇',label:'Hair Salon',mods:['dashboard','clients','sales','services','bookings','loyalty','retention','referrals']},
  facial:{em:'✨',label:'Facial / Spa',mods:['dashboard','clients','sales','services','bookings','loyalty','retention','referrals']},
  massage:{em:'💆',label:'Massage',mods:['dashboard','clients','sales','services','bookings','loyalty','retention','referrals']},
  fitness:{em:'🏋️',label:'Fitness',mods:['dashboard','clients','sales','services','bookings','loyalty','retention','referrals']},
  retail:{em:'🛍️',label:'Retail',mods:['dashboard','clients','sales','loyalty','retention','referrals']},
  other:{em:'🏪',label:'Other',mods:['dashboard','clients','sales','services','bookings','loyalty','retention','referrals']}
};
const MODULES={dashboard:['📊','Dashboard'],clients:['👥','Customers'],sales:['🧾','Sales'],
  services:['🛠️','Services'],bookings:['📅','Bookings'],loyalty:['🎁','Loyalty'],
  retention:['🔁','Retention'],referrals:['🤝','Referrals'],settings:['⚙️','Settings']};

let S={user:null,biz:null,charts:[]};
const $=(id)=>document.getElementById(id);
const root=$('root');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=c=>(S.biz?.currency||'SGD')+' '+((c||0)/100).toFixed(2);
const toast=m=>{const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)};
const fail=e=>{console.error(e);toast('⚠️ '+(e.message||e))};
function killCharts(){S.charts.forEach(c=>c.destroy());S.charts=[]}
function nav(h){location.hash=h}
window.addEventListener('hashchange',route);

/* ---------- routing ---------- */
async function route(){
  killCharts();
  const h=location.hash||'#/';
  if(h.startsWith('#/b/')) return renderPortal(h.slice(4).split('?')[0]);
  const {data:{session}}=await sb.auth.getSession();
  S.user=session?.user||null;
  if(!S.user) return renderAuth();
  if(!S.biz){
    const {data:st}=await sb.from('staff').select('business_id').eq('user_id',S.user.id).limit(1);
    if(st&&st.length){
      const {data:b}=await sb.from('businesses').select('*').eq('id',st[0].business_id).single();
      S.biz=b;
    }
  }
  if(!S.biz) return renderOnboard();
  const page=(h.replace('#/','')||'dashboard').split('/');
  renderShell(page);
}

/* ---------- auth ---------- */
function renderAuth(mode='in'){
  root.innerHTML=`<div class="center-wrap"><div class="auth-card card">
    <div class="logo" style="margin-bottom:6px">frenly<span>.</span></div>
    <p class="muted" style="margin-bottom:8px">Loyalty & retention for every business — real rewards, not vanity points.</p>
    <h2 style="margin:14px 0 2px">${mode==='in'?'Sign in':'Create your account'}</h2>
    <label>Email</label><input id="em" type="email" placeholder="you@business.com">
    <label>Password</label><input id="pw" type="password" placeholder="••••••••">
    <div id="autherr"></div>
    <div class="row" style="margin-top:18px">
      <button class="btn" id="go">${mode==='in'?'Sign in':'Sign up'}</button>
      <span class="spacer"></span>
      <button class="btn ghost sm" id="sw">${mode==='in'?'New here? Sign up':'Have an account? Sign in'}</button>
    </div></div></div>`;
  $('sw').onclick=()=>renderAuth(mode==='in'?'up':'in');
  $('go').onclick=async()=>{
    const email=$('em').value.trim(),password=$('pw').value;
    $('go').disabled=true;
    try{
      if(mode==='up'){
        const {data,error}=await sb.auth.signUp({email,password});
        if(error) throw error;
        if(!data.session){$('autherr').innerHTML='<div class="err">Check your email to confirm your account, then sign in.</div>';$('go').disabled=false;return}
      }else{
        const {error}=await sb.auth.signInWithPassword({email,password});
        if(error) throw error;
      }
      S.biz=null;route();
    }catch(e){$('autherr').innerHTML=`<div class="err">${esc(e.message)}</div>`;$('go').disabled=false}
  };
}

/* ---------- onboarding ---------- */
function renderOnboard(){
  let sel='fnb';
  const draw=()=>{
    root.innerHTML=`<div class="center-wrap"><div class="card" style="width:640px;max-width:100%">
      <div class="logo" style="margin-bottom:4px">frenly<span>.</span></div>
      <h2 style="margin:10px 0 4px">Set up your business</h2>
      <p class="muted small">Pick your industry — Frenly auto-selects the right modules. You can change them anytime in Settings.</p>
      <label>Business name</label><input id="bn" placeholder="e.g. Kopi & Co">
      <label>Industry</label>
      <div class="ind-grid">${Object.entries(INDUSTRIES).map(([k,v])=>
        `<div class="ind ${k===sel?'sel':''}" data-k="${k}"><span class="em">${v.em}</span><b>${v.label}</b></div>`).join('')}</div>
      <label>Modules included</label>
      <div class="chips">${Object.keys(MODULES).filter(m=>m!=='settings').map(m=>
        `<span class="chip ${INDUSTRIES[sel].mods.includes(m)?'on':''}">${MODULES[m][0]} ${MODULES[m][1]}</span>`).join('')}</div>
      <div id="oberr"></div>
      <div class="row" style="margin-top:20px"><button class="btn" id="mk">Create my workspace</button>
      <span class="spacer"></span><button class="btn ghost sm" id="out">Sign out</button></div>
    </div></div>`;
    document.querySelectorAll('.ind').forEach(el=>el.onclick=()=>{sel=el.dataset.k;const n=$('bn').value;draw();$('bn').value=n});
    $('out').onclick=async()=>{await sb.auth.signOut();S.biz=null;route()};
    $('mk').onclick=async()=>{
      const name=$('bn').value.trim();
      if(name.length<2){$('oberr').innerHTML='<div class="err">Give your business a name.</div>';return}
      $('mk').disabled=true;
      try{
        const slug=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')+'-'+Math.random().toString(36).slice(2,6);
        const {data:b,error:e1}=await sb.from('businesses').insert({name,slug,industry:sel,enabled_modules:INDUSTRIES[sel].mods}).select().single();
        if(e1) throw e1;
        const {error:e2}=await sb.from('staff').insert({business_id:b.id,user_id:S.user.id,role:'owner',full_name:S.user.email});
        if(e2) throw e2;
        await sb.from('loyalty_programs').insert({business_id:b.id,kind:'points',earn_points_per_dollar:1,redeem_points:800,reward_credit_cents:2000,active:true});
        S.biz=b;toast('Workspace ready 🎉');nav('#/dashboard');
      }catch(e){$('oberr').innerHTML=`<div class="err">${esc(e.message)}</div>`;$('mk').disabled=false}
    };
  };
  draw();
}

/* ---------- shell ---------- */
function renderShell(page){
  const mods=[...(S.biz.enabled_modules||[]),'settings'];
  root.innerHTML=`<div class="shell">
    <aside class="side">
      <div class="logo">frenly<span>.</span></div>
      <nav class="nav">${mods.filter(m=>MODULES[m]).map(m=>
        `<a href="#/${m}" class="${page[0]===m||(m==='clients'&&page[0]==='client')?'act':''}">${MODULES[m][0]} ${MODULES[m][1]}</a>`).join('')}</nav>
      <div class="foot">${esc(S.biz.name)}<br><span style="opacity:.7">${INDUSTRIES[S.biz.industry]?.label||S.biz.industry}</span><br><br>
      <a href="#" id="so" style="color:#FF9C92">Sign out →</a></div>
    </aside>
    <main class="main" id="main"></main></div>`;
  $('so').onclick=async(e)=>{e.preventDefault();await sb.auth.signOut();S={user:null,biz:null,charts:[]};nav('#/')};
  const P={dashboard,clients:clientsPage,client:clientDetail,sales:salesPage,services:servicesPage,
    bookings:bookingsPage,loyalty:loyaltyPage,retention:retentionPage,referrals:referralsPage,settings:settingsPage};
  (P[page[0]]||dashboard)(page[1]);
}
const M=()=> $('main');

/* ---------- dashboard ---------- */
async function dashboard(){
  const today=new Date(),d30=new Date(Date.now()-29*864e5);
  const iso=d=>d.toISOString().slice(0,10);
  M().innerHTML=`<div class="topbar"><div><h1>Dashboard</h1><p class="muted small">How ${esc(S.biz.name)} is doing</p></div>
    <div class="range">
      <button class="qbtn" data-d="7">7d</button><button class="qbtn act" data-d="30">30d</button><button class="qbtn" data-d="90">90d</button>
      <input type="date" id="df" value="${iso(d30)}"> <span class="muted">→</span> <input type="date" id="dt" value="${iso(today)}">
      <button class="btn sm" id="apply">Apply</button>
    </div></div>
    <div class="kpis" id="kpis"></div><div class="charts" id="charts"></div>`;
  document.querySelectorAll('.qbtn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.qbtn').forEach(x=>x.classList.remove('act'));b.classList.add('act');
    $('df').value=iso(new Date(Date.now()-(b.dataset.d-1)*864e5));$('dt').value=iso(new Date());load();
  });
  $('apply').onclick=()=>load();
  async function load(){
    killCharts();
    const from=$('df').value,to=$('dt').value+'T23:59:59';
    const [sales,clients,pts,credit]=await Promise.all([
      sb.from('sales').select('id,client_id,amount_cents,occurred_at,kind').eq('business_id',S.biz.id).gte('occurred_at',from).lte('occurred_at',to).order('occurred_at'),
      sb.from('clients').select('id,gender,birth_date,created_at').eq('business_id',S.biz.id),
      sb.from('points_ledger').select('points,entry_type,created_at').eq('business_id',S.biz.id).gte('created_at',from).lte('created_at',to),
      sb.from('client_credit_balance').select('balance_cents').eq('business_id',S.biz.id)
    ]);
    if(sales.error) return fail(sales.error);
    const sl=sales.data||[],cl=clients.data||[],pl=pts.data||[];
    const revenue=sl.reduce((a,s)=>a+s.amount_cents,0);
    const uniq=new Set(sl.filter(s=>s.client_id).map(s=>s.client_id)).size;
    const newC=cl.filter(c=>c.created_at>=from&&c.created_at<=to).length;
    const earned=pl.filter(p=>p.entry_type==='earn').reduce((a,p)=>a+p.points,0);
    const liab=(credit.data||[]).reduce((a,c)=>a+Math.max(c.balance_cents,0),0);
    $('kpis').innerHTML=[['Visits (sales)',sl.length],['Revenue',money(revenue)],['Unique customers',uniq],
      ['New customers',newC],['Points issued',earned],['Credit liability',money(liab)]]
      .map(([l,v])=>`<div class="card kpi"><div class="l">${l}</div><div class="v">${v}</div></div>`).join('');
    $('charts').innerHTML=`
      <div class="card"><b>Busiest days</b><p class="muted small">Visits by day of week</p><canvas id="c1"></canvas></div>
      <div class="card"><b>Revenue over time</b><p class="muted small">Daily total in range</p><canvas id="c2"></canvas></div>
      <div class="card"><b>Customer gender</b><p class="muted small">All customers on file</p><canvas id="c3"></canvas></div>
      <div class="card"><b>Age groups</b><p class="muted small">From birth dates on file</p><canvas id="c4"></canvas></div>`;
    const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],wd=[0,0,0,0,0,0,0];
    sl.forEach(s=>{wd[(new Date(s.occurred_at).getDay()+6)%7]++});
    const byDay={};sl.forEach(s=>{const k=s.occurred_at.slice(0,10);byDay[k]=(byDay[k]||0)+s.amount_cents});
    const dk=Object.keys(byDay).sort();
    const g={female:0,male:0,other:0,unknown:0};
    cl.forEach(c=>g[c.gender||'unknown']++);
    const ages={'<25':0,'25–34':0,'35–44':0,'45–54':0,'55+':0,'—':0};
    cl.forEach(c=>{if(!c.birth_date){ages['—']++;return}
      const a=(Date.now()-new Date(c.birth_date))/3.156e10;
      ages[a<25?'<25':a<35?'25–34':a<45?'35–44':a<55?'45–54':'55+']++});
    const C=(id,cfg)=>S.charts.push(new Chart($(id),cfg));
    const coral='#FF6B5E',amber='#FFB86B',ink='#1C1A22';
    C('c1',{type:'bar',data:{labels:days,datasets:[{data:wd,backgroundColor:days.map((_,i)=>wd[i]===Math.max(...wd)&&wd[i]>0?coral:amber),borderRadius:8}]},options:{plugins:{legend:{display:false}}}});
    C('c2',{type:'line',data:{labels:dk,datasets:[{data:dk.map(k=>byDay[k]/100),borderColor:coral,backgroundColor:'rgba(255,107,94,.12)',fill:true,tension:.35}]},options:{plugins:{legend:{display:false}}}});
    C('c3',{type:'doughnut',data:{labels:['Female','Male','Other','Not set'],datasets:[{data:[g.female,g.male,g.other,g.unknown],backgroundColor:[coral,amber,'#8B7BC7','#E8E4DD']}]},options:{plugins:{legend:{position:'bottom'}}}});
    C('c4',{type:'bar',data:{labels:Object.keys(ages),datasets:[{data:Object.values(ages),backgroundColor:amber,borderRadius:8}]},options:{plugins:{legend:{display:false}}}});
  }
  load();
}

/* ---------- customers ---------- */
async function clientsPage(){
  M().innerHTML=`<div class="topbar"><div><h1>Customers</h1><p class="muted small">Your member base</p></div>
    <button class="btn" id="add">+ Add customer</button></div>
    <div class="card" id="form" style="display:none;margin-bottom:16px"></div>
    <div class="card" id="list"><div class="empty">Loading…</div></div>`;
  $('add').onclick=()=>{
    $('form').style.display='block';
    $('form').innerHTML=`<b>New customer</b>
      <div class="split"><div><label>Full name *</label><input id="cn"></div><div><label>Phone</label><input id="cp" placeholder="+65"></div></div>
      <div class="split"><div><label>Email</label><input id="ce" type="email"></div><div><label>Birth date</label><input id="cb" type="date"></div></div>
      <div class="split"><div><label>Gender</label><select id="cg"><option value="">Not set</option><option value="female">Female</option><option value="male">Male</option><option value="other">Other</option></select></div>
      <div><label>Marketing consent (PDPA)</label><select id="cc"><option value="false">No</option><option value="true">Yes — consented</option></select></div></div>
      <label>Referred by (friend's code, optional)</label><input id="cr" placeholder="e.g. 4F7K2A" style="text-transform:uppercase">
      <div class="row" style="margin-top:16px"><button class="btn" id="save">Save customer</button>
      <button class="btn ghost sm" id="cancel">Cancel</button></div>`;
    $('cancel').onclick=()=>$('form').style.display='none';
    $('save').onclick=async()=>{
      const full_name=$('cn').value.trim();
      if(full_name.length<2) return toast('Name required');
      const consent=$('cc').value==='true';
      const {data:created,error}=await sb.from('clients').insert({business_id:S.biz.id,full_name,
        phone:$('cp').value||null,email:$('ce').value||null,birth_date:$('cb').value||null,
        gender:$('cg').value||null,marketing_consent:consent}).select().single();
      if(error) return fail(error);
      if(consent) await sb.from('consents').insert({business_id:S.biz.id,client_id:created.id,
        channel:'marketing',action:'granted',source:'admin add-customer',actor:S.user.id});
      const code=$('cr').value.trim().toUpperCase();
      if(code){
        const {data:ref}=await sb.from('clients').select('id').eq('business_id',S.biz.id).eq('referral_code',code).limit(1);
        if(ref&&ref.length&&ref[0].id!==created.id){
          const {error:re}=await sb.from('referrals').insert({business_id:S.biz.id,
            referrer_client_id:ref[0].id,referred_client_id:created.id,status:'pending'});
          if(re) toast('Customer saved, but referral not linked: '+re.message);
          else toast('Customer added + referral linked — reward fires on their first qualifying sale');
        } else toast('Customer added — referral code not found, skipped');
      } else toast('Customer added');
      $('form').style.display='none';load();
    };
  };
  async function load(){
    const [{data:cl,error},{data:pb},{data:cb}]=await Promise.all([
      sb.from('clients').select('*').eq('business_id',S.biz.id).order('created_at',{ascending:false}),
      sb.from('client_points_balance').select('*').eq('business_id',S.biz.id),
      sb.from('client_credit_balance').select('*').eq('business_id',S.biz.id)]);
    if(error) return fail(error);
    if(!cl.length){$('list').innerHTML=`<div class="empty"><div class="big">👥</div>No customers yet.<br>Add your first customer — every sale you record for them earns loyalty automatically.</div>`;return}
    const P=Object.fromEntries((pb||[]).map(x=>[x.client_id,x.points])),
          C=Object.fromEntries((cb||[]).map(x=>[x.client_id,x.balance_cents]));
    $('list').innerHTML=`<table><tr><th>Name</th><th>Phone</th><th>Gender</th><th>Points</th><th>Credit</th><th>Consent</th></tr>
      ${cl.map(c=>`<tr class="click" onclick="location.hash='#/client/${c.id}'">
        <td><b>${esc(c.full_name)}</b></td><td>${esc(c.phone||'—')}</td><td>${esc(c.gender||'—')}</td>
        <td>${P[c.id]||0} pts</td><td>${money(C[c.id]||0)}</td>
        <td>${c.marketing_consent?'<span class="pill ok">yes</span>':'<span class="pill off">no</span>'}</td></tr>`).join('')}</table>`;
  }
  load();
}

      <p class="muted small">${esc(c.phone||'')} ${esc(c.email||'')} · ${esc(c.gender||'gender not set')} ${c.birth_date?'· born '+c.birth_date:''}</p></div>
    <a class="btn ghost sm" href="#/clients">← All customers</a></div>

    </div>
    <div class="split" style="margin-top:16px">
      <div class="card"><b>Loyalty</b>
        ${prog&&prog.active?`<p class="muted small" style="margin:6px 0 14px">Earns ${prog.earn_points_per_dollar} pt/$ · Redeem ${prog.redeem_points} pts → ${money(prog.reward_credit_cents)} credit</p>
        <button class="btn sm" id="redeem" ${pts<prog.redeem_points?'disabled':''}>Redeem ${prog.redeem_points} pts → ${money(prog.reward_credit_cents)}</button>
        ${pts<prog.redeem_points?`<p class="muted small" style="margin-top:8px">${prog.redeem_points-pts} more points to unlock</p>`:''}
        ${nextExp?`<p class="muted small" style="margin-top:8px">⏳ ${nextExp.remaining} pts expire ${nextExp.expires_at.slice(0,10)}</p>`:''}
        <div class="row" style="margin-top:14px"><input id="adjV" type="number" placeholder="+/- points" style="max-width:120px">
        <input id="adjR" placeholder="reason (audited)"><button class="btn ghost sm" id="adjGo">Adjust</button></div>`
        :'<p class="muted small" style="margin-top:6px">No active loyalty program. Configure it in Loyalty.</p>'}
      </div>
      <div class="card"><b>Referral & consent</b>
        <p class="muted small" style="margin:8px 0 4px">Personal referral code — friends quote it when they join:</p>
        <div class="row"><b style="font-size:1.3rem;letter-spacing:.15em">${esc(c.referral_code||'—')}</b>
        <button class="btn ghost sm" id="copyRef">Copy</button></div>
        <p class="muted small" style="margin:14px 0 6px">Marketing consent (PDPA) — every change is recorded:</p>
        <button class="btn ghost sm" id="consentBtn">${c.marketing_consent?'✓ Consented — withdraw':'Record consent'}</button>
      </div>
      <div class="card"><b>Retention rewards earned</b>
        ${(rg&&rg.length)?rg.map(g=>`<div class="row" style="margin-top:10px"><span>🏆 ${esc(g.retention_programs?.name||'Program')}</span><span class="spacer"></span>
          <span class="muted small">${g.reward_type==='credit'?money(g.reward_value):g.reward_type==='discount_pct'?g.reward_value+'% off':esc(g.reward_item||'free item')} · ${g.granted_at.slice(0,10)}</span></div>`).join('')
        :'<p class="muted small" style="margin-top:6px">None yet — rewards land here automatically when visit goals are hit.</p>'}
      </div></div>
    <div class="card" style="margin-top:16px"><b>Recent sales</b>
      ${(sl&&sl.length)?`<table style="margin-top:8px"><tr><th>Date</th><th>Kind</th><th>Amount</th><th>Note</th></tr>
        ${sl.map(s=>`<tr><td>${s.occurred_at.slice(0,10)}</td><td>${s.kind}</td><td>${money(s.amount_cents)}</td><td class="muted">${esc(s.note||'')}</td></tr>`).join('')}</table>`
      :'<p class="muted small" style="margin-top:6px">No sales yet.</p>'}</div>`;
  const rd=$('redeem');
  if(rd) rd.onclick=async()=>{
    rd.disabled=true;
    const {data,error}=await sb.rpc('redeem_points',{p_business:S.biz.id,p_client:id});
    if(error){fail(error);rd.disabled=false;return}
    toast(`Redeemed → ${money(data.credit_cents)} credit added 🎉`);clientDetail(id);
  };
  const aj=$('adjGo');
  if(aj) aj.onclick=async()=>{
    const v=parseInt($('adjV').value||'0');
    if(!v) return toast('Enter +/- points');
    const {data,error}=await sb.rpc('adjust_points',{p_business:S.biz.id,p_client:id,

    if(e1) return fail(e1);
    await sb.from('consents').insert({business_id:S.biz.id,client_id:id,channel:'marketing',
      action:to?'granted':'withdrawn',source:'admin client page',actor:S.user.id});
    toast(to?'Consent recorded':'Consent withdrawn — recorded');clientDetail(id);
  };
}

  const {data:rp}=await sb.from('referral_programs').select('*').eq('business_id',S.biz.id).limit(1);
  const p=rp?.[0];
  M().innerHTML=`<div class="topbar"><div><h1>Referrals</h1><p class="muted small">Every customer has a personal code — the reward only pays after their friend's first qualifying sale</p></div></div>
    <div class="split"><div class="card"><b>Program settings</b>
      <label>Status</label><select id="fe"><option value="true" ${p?.enabled?'selected':''}>Enabled</option><option value="false" ${!p||!p.enabled?'selected':''}>Off</option></select>
      <label>Reward to referrer (${S.biz.currency||'SGD'} store credit)</label><input id="fr" type="number" min="0" step="0.01" value="${((p?.reward_cents??1000)/100).toFixed(2)}">
      <label>Minimum spend on friend's qualifying sale (${S.biz.currency||'SGD'})</label><input id="fm" type="number" min="0" step="0.01" value="${((p?.min_spend_cents??0)/100).toFixed(2)}">
      <p class="muted small" style="margin-top:8px">Self-funding by design: nothing pays out until the new customer has actually come in and spent above your floor. One reward per referred customer, ever.</p>
      <div style="margin-top:16px"><button class="btn" id="fsave">Save program</button></div></div>
    <div class="card"><b>How to use it</b>
      <p class="muted" style="margin-top:8px;line-height:1.7">1. Each customer's code is on their profile (Customers → open → copy).<br>
      2. When a new customer joins, type the friend's code into <b>"Referred by"</b> on the add-customer form.<br>
      3. The moment the new customer's first sale clears your minimum, ${money(p?.reward_cents??1000)} lands on the referrer's account automatically — audited, once only.</p></div></div>
    <div class="card" style="margin-top:16px"><b>Referral activity</b><div id="flist" style="margin-top:8px"><p class="muted small">Loading…</p></div></div>`;
  $('fsave').onclick=async()=>{
    const row={business_id:S.biz.id,enabled:$('fe').value==='true',
      reward_cents:Math.round(parseFloat($('fr').value||'10')*100),
      min_spend_cents:Math.round(parseFloat($('fm').value||'0')*100)};
    const q=p?sb.from('referral_programs').update(row).eq('id',p.id):sb.from('referral_programs').insert(row);
    const {error}=await q;if(error)return fail(error);toast('Referral program saved');
  };
  const {data:refs}=await sb.from('referrals')
    .select('*, referrer:clients!referrals_referrer_client_id_fkey(full_name), referred:clients!referrals_referred_client_id_fkey(full_name)')
    .eq('business_id',S.biz.id).order('created_at',{ascending:false});
  $('flist').innerHTML=(refs&&refs.length)?`<table><tr><th>Referrer</th><th>Brought in</th><th>Status</th><th>Reward</th><th>Qualified</th></tr>
    ${refs.map(r=>`<tr><td><b>${esc(r.referrer?.full_name||'—')}</b></td><td>${esc(r.referred?.full_name||'—')}</td>
    <td><span class="pill ${r.status==='rewarded'?'ok':r.status==='pending'?'new':'off'}">${r.status}</span></td>
    <td>${r.status==='rewarded'?money(r.reward_cents):'—'}</td>
    <td>${r.qualified_at?r.qualified_at.slice(0,10):'—'}</td></tr>`).join('')}</table>`
    :`<div class="empty"><div class="big">🤝</div>No referrals yet.<br>Link one via "Referred by" when adding a new customer.</div>`;
}

/* ---------- settings ---------- */
async function settingsPage(){
  const mods=Object.keys(MODULES).filter(m=>m!=='settings'&&m!=='dashboard');
  M().innerHTML=`<div class="topbar"><div><h1>Settings</h1><p class="muted small">Workspace & modules</p></div></div>
    <div class="split"><div class="card"><b>Business</b>
      <label>Name</label><input id="bn" value="${esc(S.biz.name)}">
      <label>Industry</label><select id="bi">${Object.entries(INDUSTRIES).map(([k,v])=>`<option value="${k}" ${S.biz.industry===k?'selected':''}>${v.em} ${v.label}</option>`).join('')}</select>
      <label>Portal link (share with customers)</label>
      <p class="small" style="word-break:break-all;margin-top:4px"><a style="color:#D06A2E" target="_blank" href="${location.origin}${location.pathname}#/b/${S.biz.slug}">${location.origin}${location.pathname}#/b/${S.biz.slug}</a></p>
      <div style="margin-top:16px"><button class="btn" id="bsave">Save</button></div></div>
    <div class="card"><b>Modules</b><p class="muted small" style="margin:6px 0 4px">Toggle what ${esc(S.biz.name)} uses. Dashboard is always on.</p>
      ${mods.map(m=>`<label style="display:flex;align-items:center;gap:10px;margin-top:12px;cursor:pointer;font-size:14px;color:var(--ink);font-weight:500">
        <input type="checkbox" style="width:auto" data-m="${m}" ${S.biz.enabled_modules.includes(m)?'checked':''}> ${MODULES[m][0]} ${MODULES[m][1]}</label>`).join('')}
      <div style="margin-top:16px"><button class="btn" id="msave">Save modules</button></div></div></div>
    <div class="card" style="margin-top:16px"><b>Tenant isolation</b>
      <p class="muted small" style="margin-top:6px;line-height:1.7">Every business on Frenly has its own isolated data space. Row-level security is enforced by the database on every table — your customers, sales, and programs are invisible to every other business, and theirs to you. Your team only ever sees this workspace.</p></div>`;
  $('bsave').onclick=async()=>{
    const {error}=await sb.from('businesses').update({name:$('bn').value.trim(),industry:$('bi').value}).eq('id',S.biz.id);
    if(error)return fail(error);S.biz.name=$('bn').value.trim();S.biz.industry=$('bi').value;toast('Saved');route();
  };
  $('msave').onclick=async()=>{
    const on=['dashboard',...[...document.querySelectorAll('[data-m]')].filter(x=>x.checked).map(x=>x.dataset.m)];
    const {error}=await sb.from('businesses').update({enabled_modules:on}).eq('id',S.biz.id);
    if(error)return fail(error);S.biz.enabled_modules=on;toast('Modules updated');route();
  };
}

/* ---------- public customer portal ---------- */
async function renderPortal(slug){
  root.innerHTML=`<div class="portal"><div class="head"><div class="logo">frenly<span>.</span></div><p class="muted small">powered booking</p></div><div class="card"><div class="empty">Loading…</div></div></div>`;
  const {data,error}=await sb.rpc('get_business_public',{p_slug:slug});
  if(error||!data){root.querySelector('.card').innerHTML=`<div class="empty"><div class="big">🤔</div>Business not found.</div>`;return}
  const biz=data;let selSvc=null;
  const draw=()=>{
    root.innerHTML=`<div class="portal">
      <div class="head"><h1 style="font-size:2rem">${esc(biz.name)}</h1><p class="muted">Book with us — it takes 30 seconds.</p></div>
      <div class="card">
        ${(biz.services&&biz.services.length)?`<b>Choose a service</b>
          <div style="margin:10px 0 4px">${biz.services.map(s=>`<div class="svc ${selSvc===s.id?'sel':''}" data-s="${s.id}">
            <span><b>${esc(s.name)}</b> <span class="muted small">· ${s.duration_min} min</span></span>
            <b>${biz.currency||'SGD'} ${(s.price_cents/100).toFixed(2)}</b></div>`).join('')}
          <div class="svc ${selSvc===null?'sel':''}" data-s=""><span><b>Just a reservation</b> <span class="muted small">· table / general visit</span></span></div></div>`
        :`<b>Make a reservation</b>`}
        <div class="split"><div><label>Your name *</label><input id="pn"></div><div><label>Phone</label><input id="pp" placeholder="+65"></div></div>
        <div class="split"><div><label>Email</label><input id="pe" type="email"></div><div><label>Party size</label><input id="ps" type="number" min="1" value="2"></div></div>
        <label>Preferred date & time</label><input id="pt" type="datetime-local">
        <label>Notes</label><textarea id="pnotes" rows="2" placeholder="anything we should know?"></textarea>
        <div id="perr"></div>
        <div style="margin-top:18px"><button class="btn" id="psend" style="width:100%">Request booking</button></div>
        <p class="muted small" style="margin-top:12px;text-align:center">The team confirms your request personally — you'll hear back soon.</p>
      </div></div>`;
    document.querySelectorAll('.svc').forEach(el=>el.onclick=()=>{selSvc=el.dataset.s||null;draw()});
    $('psend').onclick=async()=>{
      $('psend').disabled=true;
      const {error}=await sb.rpc('request_booking',{p_slug:slug,p_name:$('pn').value,p_email:$('pe').value||null,
        p_phone:$('pp').value||null,p_service:selSvc,p_party:parseInt($('ps').value||'1'),
        p_preferred:$('pt').value?new Date($('pt').value).toISOString():null,p_notes:$('pnotes').value||null});
      if(error){$('perr').innerHTML=`<div class="err">${esc(error.message)}</div>`;$('psend').disabled=false;return}
      root.querySelector('.card').innerHTML=`<div class="empty"><div class="big">🎉</div><h2 style="margin-bottom:8px">Request sent!</h2>
        <p class="muted">${esc(biz.name)} has your booking request and will confirm shortly.</p></div>`;
    };
  };
  draw();
}

route();
</script>
</body>
</html>
